<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>전태영의 사진지도 (v4.0)</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
  <!-- ── API 키: 고정(하드코딩). 이 폴더 파일들은 아래 카카오 JavaScript 키로 동작 ── -->
  <script>
  var KAKAO_JS_KEY = '94bf4516825c146467eb2318cd55b782';
  document.write('<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_JS_KEY
    + '&libraries=services&autoload=false"><\/script>');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; }
    #app { display:flex; width:100%; height:100%; overflow:hidden; }

    /* ── 사이드바 ── */
    #sidebar {
      width:360px; min-width:160px; display:none; flex-direction:column;
      background:#eaf4fc; flex-shrink:0; overflow:hidden;
      border-right:2px solid #85c1e9;
    }
    #sidebarResizer { width:5px; background:#85c1e9; cursor:col-resize; flex-shrink:0; transition:background .15s; display:none; }
    #sidebarResizer:hover { background:#2980b9; }
    /* 컬럼 리사이저 */
    .col-resizer { position:absolute; right:0; top:0; width:5px; height:100%; cursor:col-resize; background:#5dade2; z-index:3; }
    .col-resizer:hover { background:#1a73c8; }

    /* ── 헤더 ── */
    #listHeader { background:#2980b9; flex-shrink:0; }
    .list-header-top {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 8px; color:#fff; font-size:13px; font-weight:bold;
    }
    #itemCountBadge {
      background:#e74c3c; color:#fff; border-radius:12px;
      padding:1px 8px; font-size:11px; font-weight:normal; margin-left:6px;
    }
    .list-header-top .hdr-btns { display:flex; gap:5px; flex-shrink:0; }
    .list-header-top .hdr-btn {
      font-size:11px; padding:2px 8px; cursor:pointer; background:#fff;
      border:1px solid #1a5276; border-radius:3px; color:#1a5276;
      font-weight:bold; white-space:nowrap;
    }
    .list-header-top .hdr-btn:hover { background:#d6eaf8; }
    .list-header-top .hdr-btn.on { background:#1a5276; color:#fff; border-color:#1a5276; }
    /* 항목표시(컬럼 선택) 버튼 + 팝업 */
    #colVisBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #colVisBtn:hover { background:#d6eaf8; }
    #colVisMenu { display:none; position:fixed; z-index:9600; background:#fff; border:1px solid #bbb; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.25); padding:8px 10px; font-size:12px; color:#1a5276; }
    #colVisMenu.show { display:block; }
    #colVisMenu .cvm-title { font-weight:bold; margin-bottom:6px; color:#1a5276; }
    #colVisMenu label { display:flex; align-items:center; gap:6px; padding:3px 2px; cursor:pointer; white-space:nowrap; }
    #colVisMenu label.fixed { color:#999; cursor:default; }
    #colVisMenu input { accent-color:#2980b9; }
    #filterTabs { display:flex; background:#5dade2; }
    .ftab {
      flex:1; padding:5px 2px; font-size:11px; border:none;
      border-right:1px solid #2980b9; background:transparent;
      color:#fff; cursor:pointer; white-space:nowrap;
      display:flex; align-items:center; justify-content:center; gap:3px;
    }
    .ftab:last-child { border-right:none; }
    .ftab:hover { background:#2e86c1; color:#fff; }
    .ftab.active { background:#1a5276; color:#fff; font-weight:bold; }
    .vis-check { width:12px; height:12px; cursor:pointer; flex-shrink:0; accent-color:#aef; margin:0; }
    .ftab.hidden-type { opacity:0.55; }
    /* 폴더 선택 바 */
    #folderBar { background:#d6eaf8; padding:4px 6px; flex-shrink:0; display:flex; flex-direction:column; gap:4px; border-bottom:1px solid #85c1e9; }
    #folderBar .fbar-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    #insertBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #insertBtn:hover { background:#d6eaf8; }
    #numToggleBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #numToggleBtn:hover { background:#d6eaf8; }
    #numToggleBtn.on { background:#1a5276; color:#fff; border-color:#1a5276; }
    #trackNameOrgBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #trackNameOrgBtn:hover { background:#d6eaf8; }
    #trackNameOrgBtn.on { background:#7d3c98; color:#fff; border-color:#7d3c98; }
    .ftab[data-f="track"] span { cursor:pointer; }
    .ftab[data-f="track"] span:hover { text-decoration:underline; }
    .ftab[data-f="track"] span.track-all-on { color:#FF9F43; font-weight:bold; }

    /* ── 목록 ── */
    #photoListWrapper { flex:1; overflow-y:auto; overflow-x:hidden; min-height:0; outline:none; }
    #photoTable { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
    #photoTable thead th {
      background:#2e86c1; color:#fff; padding:5px 6px; text-align:left;
      position:sticky; top:0; z-index:2; white-space:nowrap;
    }
    #photoTable tbody tr { cursor:pointer; }
    #photoTable tbody tr:nth-child(even) { background:#d6eaf8; }
    #photoTable tbody tr:hover { background:#aed6f1 !important; }
    #photoTable tbody tr.selected { background:#7fb3d3 !important; }
    #photoTable tbody tr.selected td { color:#0a2744 !important; }
    #photoTable tbody tr.drag-over { background:#c0d8ec !important; }
    /* 임시(파일선택/엑셀 미리보기) 객체 — 흐리게 + 기울임으로 영구 객체와 구분 */
    #photoTable tbody tr.live-row td { color:#8aa0b0; font-style:italic; opacity:.65; }
    #photoTable tbody tr.live-row .item-name::after { content:' ·임시'; font-size:10px; color:#9aa; font-style:normal; }
    #photoTable tbody td { padding:4px 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px solid #b0cfe0; max-width:0; }
    .type-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; flex-shrink:0; vertical-align:middle; }
    .dot-photo { background:#2471a3; }
    .dot-marker { background:#e74c3c; }
    .dot-track { background:#1e8449; border-radius:2px; height:5px; }
    /* 트랙 색상 표시(사이드바) — 실제 색으로, 길게 표시해 구분 쉽게 */
    .track-swatch { display:inline-block; width:22px; height:12px; border-radius:2px; margin-right:6px; flex-shrink:0; vertical-align:middle; border:1px solid rgba(0,0,0,0.35); cursor:pointer; }
    .track-swatch:hover { outline:2px solid #1a5276; outline-offset:1px; }
    /* 엑셀식 색상 팔레트 팝업 */
    #colorPalette { display:none; position:fixed; z-index:9500; background:#fff; border:1px solid #bbb; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.25); padding:8px; }
    #colorPalette.show { display:block; }
    #colorPalette .pal-grid { display:grid; grid-template-columns:repeat(10,18px); gap:3px; }
    #colorPalette .pal-sw { width:18px; height:18px; border-radius:3px; border:1px solid rgba(0,0,0,0.2); cursor:pointer; padding:0; }
    #colorPalette .pal-sw:hover { outline:2px solid #1a5276; outline-offset:1px; }
    #drawColorBtn { width:30px; height:26px; padding:0; border:1px solid #ccc; border-radius:4px; cursor:pointer; }
    .item-name { vertical-align:middle; }
    .item-name-input { width:90%; box-sizing:border-box; font-size:12px; padding:2px 5px; border:1px solid #2980b9; outline:none; background:#fff; color:#000; border-radius:3px; box-shadow:0 1px 6px rgba(0,0,0,.35); }

    /* ── 미리보기 리사이저 ── */
    #metaResizer { height:5px; background:#85c1e9; cursor:row-resize; flex-shrink:0; transition:background .15s; }
    #metaResizer:hover { background:#2980b9; }
    #metaSection { flex-shrink:0; height:150px; min-height:40px; display:flex; flex-direction:column; overflow:hidden; }
    #metaHeader { background:#2980b9; color:#fff; padding:4px 10px; font-size:12px; font-weight:bold; flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
    #metaEditBtn { background:#fff; color:#1a5276; border:none; border-radius:4px; padding:2px 9px; font-size:11px; font-weight:bold; cursor:pointer; }
    #metaEditBtn:hover { background:#d6eaf8; }
    #metaEditBtn[disabled] { opacity:.45; cursor:default; }
    /* 메타 수정 모달 */
    #metaEditModal { display:none; position:fixed; inset:0; z-index:100001; background:rgba(0,0,0,.35); align-items:center; justify-content:center; }
    #metaEditBox { background:#fff; border-radius:10px; width:340px; max-width:92vw; box-shadow:0 8px 30px rgba(0,0,0,.4); overflow:hidden; }
    #metaEditBox h3 { margin:0; background:#2980b9; color:#fff; font-size:14px; padding:10px 14px; }
    #metaEditBody { padding:14px; }
    #metaEditBody label { display:block; font-size:12px; color:#1a5276; font-weight:bold; margin:8px 0 3px; }
    #metaEditBody input, #metaEditBody textarea { width:100%; box-sizing:border-box; border:1px solid #bcd; border-radius:5px; padding:6px 8px; font-size:13px; font-family:inherit; }
    #metaEditBody textarea { resize:vertical; min-height:60px; }
    #metaEditBtns { display:flex; justify-content:flex-end; gap:8px; padding:0 14px 14px; }
    #metaEditBtns button { padding:6px 16px; border-radius:5px; font-size:13px; cursor:pointer; border:1px solid #ccc; background:#f5f5f5; }
    #metaEditBtns #metaEditSave { background:#d6eaf8; color:#000; border:1px solid #1a5276; font-weight:bold; }
    #metaEditBtns #metaEditSave:hover { background:#aed4f0; }
    #metaBody { flex:1; overflow:auto; padding:6px 10px; font-size:12px; background:#fff; color:#333; }
    #metaPlaceholder { color:#5d8aa8; }
    #metaBody table { width:100%; border-collapse:collapse; }
    #metaBody th { text-align:left; color:#1a5276; white-space:nowrap; vertical-align:top; padding:2px 8px 2px 0; font-weight:bold; width:1%; }
    #metaBody td { padding:2px 0; word-break:break-all; vertical-align:top; }
    #previewResizer { height:5px; background:#85c1e9; cursor:row-resize; flex-shrink:0; transition:background .15s; }
    #previewResizer:hover { background:#2980b9; }

    /* ── 미리보기 ── */
    #previewSection { flex-shrink:0; height:220px; min-height:60px; display:flex; flex-direction:column; overflow:hidden; }
    #previewHeader { background:#2980b9; color:#fff; padding:5px 10px; font-size:12px; font-weight:bold; flex-shrink:0; }
    #previewImgWrapper { flex:1; background:#d6eaf8; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    #previewImg { max-width:100%; max-height:100%; object-fit:contain; display:none; }
    #previewPlaceholder { color:#5d8aa8; font-size:12px; text-align:center; padding:8px; }

    /* ── 지도 영역 ── */
    #mapContainer { flex:1; position:relative; overflow:hidden; }
    #map { width:100%; height:100%; }

    /* 목록 토글 버튼 (항상 지도 왼쪽 가장자리) */
    #sidebarOpenBtn {
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      z-index:1001; display:flex; align-items:center; justify-content:center;
      background:#fff; color:#2980b9; border:2px solid #2980b9; border-left:none; cursor:pointer;
      border-radius:0 6px 6px 0; padding:10px 2px;
      font-size:13px; writing-mode:vertical-rl;
      box-shadow:2px 0 8px rgba(0,0,0,0.15); transition:background .15s;
    }
    #sidebarOpenBtn:hover { background:#ebf5fb; }

    /* ── 기존 맵 오버레이 ── */
    .kakao_map_marker, .daumRoughmapContainer .roughmap_maker_btn { display:none !important; }
    .wrap_map_cont .map_zoom_close, .map_info_close { display:none !important; }
    a[href*="location"], a[title*="현재위치"], a[title*="내위치"] { display:none !important; }
    .zoom_reset, [class*="zoom_reset"] { display:none !important; }

    #search-form, .controls {
      position:absolute; background:white; padding:5px; border-radius:5px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3); z-index:1000;
    }
    #search-form { top:10px; left:10px; display:flex; gap:5px; }
    .controls { top:10px; right:10px; display:flex; flex-direction:column; align-items:flex-start; gap:4px; }

    /* 주소 표시 → 좌측 하단 */
    #address-display {
      position:absolute; bottom:10px; left:10px; z-index:1000;
      background:rgba(0,0,0,0.65); color:#fff;
      font-size:12px; padding:5px 8px; border-radius:5px;
      white-space:nowrap; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    #address-display:hover { background:rgba(0,0,0,0.85); }

    .dotOverlay.distanceInfo { background:white; border:1px solid #db4040; padding:5px; border-radius:3px; font-size:12px; white-space:nowrap; }
    .drawing-cursor * { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="20" font-size="20" fill="red">&#x3009;</text></svg>') 0 0, auto !important; }
    /* 선그리기 중: 지도 내부의 마커/오버레이가 마우스 이벤트를 받지 못하게 (클릭은 #drawCatcher가 전담) */
    .drawing-cursor *:not(#drawCatcher) { pointer-events: none !important; }

    #polyMenu { display:none; position:fixed; z-index:9000; background:white; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.25); overflow:hidden; min-width:140px; }
    #polyMenu.show { display:block; }
    #polyMenu button { display:block; width:100%; padding:13px 18px; border:none; background:none; text-align:left; font-size:15px; cursor:pointer; }
    #polyMenu button:hover { background:#f1f3f4; }
    #polyMenu button.danger { color:#e53935; }

    /* ── 탐색기 연동 배지 ── */
    #explorerBadge {
      position:absolute; bottom:42px; left:10px; z-index:1001;
      background:rgba(0,0,0,0.62); color:#fff;
      font-size:11px; padding:4px 9px; border-radius:5px;
      white-space:nowrap; user-select:none; pointer-events:none;
      max-width:260px; overflow:hidden; text-overflow:ellipsis;
    }
    #explorerBadge.connected { background:rgba(18,110,50,0.88); }

    /* ── 실시간 위치 마커 ── */
    @keyframes liveRing {
      0%   { transform:translate(-50%,-50%) scale(1); opacity:.8; }
      100% { transform:translate(-50%,-50%) scale(3.2); opacity:0; }
    }
    .live-pin { position:relative; width:14px; height:14px; user-select:none; pointer-events:none; }
    .live-pin.dragging .live-pin-ring { animation:none; opacity:0; }
    .live-pin-dot {
      position:absolute; top:50%; left:50%;
      width:14px; height:14px; border-radius:50%;
      background:#00e676; border:2px solid #fff;
      transform:translate(-50%,-50%); z-index:2;
      box-shadow:0 0 4px rgba(0,0,0,0.4);
    }
    .live-pin-ring {
      position:absolute; top:50%; left:50%;
      width:14px; height:14px; border-radius:50%;
      background:rgba(0,230,118,0.55);
      transform:translate(-50%,-50%);
      animation:liveRing 1.3s ease-out infinite; z-index:1;
    }
    .live-pin-label {
      position:absolute; bottom:14px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:#fff;
      font-size:10px; padding:2px 6px; border-radius:3px;
      white-space:nowrap; pointer-events:none;
    }

    /* ── GPS 드래그 확인 모달 ── */
    #gpsDragModal {
      display:none; position:fixed; inset:0; z-index:10000;
      background:rgba(0,0,0,0.45);
      align-items:center; justify-content:center;
    }
    #gpsDragModal.visible { display:flex; }
    #gpsDragBox {
      background:#fff; padding:18px 22px; border-radius:10px;
      min-width:250px; box-shadow:0 4px 20px rgba(0,0,0,0.35); font-size:13px;
    }
    #gpsDragBox strong { font-size:14px; }
    #gpsDragInfo { color:#555; font-size:12px; margin:8px 0 16px; white-space:pre-line; }
    .gps-modal-btns { display:flex; gap:8px; justify-content:flex-end; }
    .gps-modal-btns button { padding:6px 16px; border-radius:5px; cursor:pointer; font-size:13px; }
    #gpsDragCancel { background:#f5f5f5; border:1px solid #ccc; }
    #gpsDragOk { background:#2980b9; color:#fff; border:none; font-weight:bold; }
    /* 위치로 검색 진행 표시 + 중단 버튼 */
    #searchRunning {
      display:none; position:absolute; top:14px; left:50%; transform:translateX(-50%);
      z-index:60; align-items:center; gap:10px;
      background:rgba(33,33,33,0.92); color:#fff; padding:8px 14px;
      border-radius:22px; box-shadow:0 3px 14px rgba(0,0,0,0.35);
      font-size:13px; white-space:nowrap;
    }
    #searchRunning.on { display:inline-flex; }
    #searchRunning .spin {
      width:15px; height:15px; border:2.5px solid rgba(255,255,255,0.3);
      border-top-color:#4fc3f7; border-radius:50%; display:inline-block;
      animation:searchSpin 0.8s linear infinite;
    }
    @keyframes searchSpin { to { transform:rotate(360deg); } }
    #searchCancelBtn {
      background:#e74c3c; color:#fff; border:none; border-radius:14px;
      padding:4px 12px; font-size:12px; font-weight:bold; cursor:pointer;
    }
    #searchCancelBtn:hover { background:#c0392b; }
  </style>
</head>
<body>
<div id="app">

  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="listHeader">
      <div class="list-header-top">
        <span>📋 목록 <span id="itemCountBadge">0</span></span>
        <div class="hdr-btns">
          <span id="reindexStatus" style="display:none;align-items:center;gap:5px;font-size:12px;color:#fff;background:rgba(33,33,33,0.88);padding:3px 10px;border-radius:14px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis;">
            <span style="width:11px;height:11px;border:2px solid rgba(255,255,255,0.3);border-top-color:#4fc3f7;border-radius:50%;display:inline-block;animation:searchSpin 0.8s linear infinite;flex-shrink:0;"></span>
            <span id="reindexMsg">🗂 색인 중…</span>
            <button id="reindexCancelBtn" style="background:#e74c3c;color:#fff;border:none;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:bold;cursor:pointer;flex-shrink:0;">■ 중단</button>
          </span>
          <button id="holdViewBtn" class="hdr-btn" title="켜면 사이드바·검색결과에서 객체를 선택해도 지도 화면이 이동하지 않습니다 (다시 누르면 해제)">🔒 Hold</button>
          <button id="kmzNearBtn" class="hdr-btn" title="누른 뒤 ①지도에서 검색 중심점을 클릭 → ②마우스를 움직여 반경을 정하고 한 번 더 클릭하면, 그 원 안의 KMZ·사진을 폴더(하위 포함)에서 검색합니다 (폴더·트랙 포함 여부는 이어서 선택, Esc=취소)">🧭 위치로 검색</button>
          <button id="viewFilterBtn" class="hdr-btn" title="현재 지도 화면에 보이는 객체만 목록에 표시 (다시 누르면 전체). 필터 상태에서 '전체객체' 저장 시 목록에 보이는 객체만 저장됩니다.">🔲 필터</button>
        </div>
      </div>
      <div id="filterTabs">
        <button class="ftab active" data-f="all"><span>전체</span></button>
        <button class="ftab" data-f="photo"><span>사진</span><input type="checkbox" class="vis-check" data-t="photo" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="marker"><span>마커</span><input type="checkbox" class="vis-check" data-t="marker" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="track"><span>트랙</span><input type="checkbox" class="vis-check" data-t="track" checked title="지도 표시/숨기기"></button>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// ══════════════════════════════════════════════════
//  통합 목록 관리
// ══════════════════════════════════════════════════
let allItems = [];          // { type:'photo'|'marker'|'track', name, address, markerObj?, imgSrc?, polyline? }
let bulkLoading = false;    // KMZ 대량 로드 중: 항목별 renderList/주소조회/히스토리를 보류하고 끝나고 한 번에 (대형 KMZ 멈춤 방지)
let currentFilter = 'all';
let sortCol = null, sortDir = 1; // sortCol: null|'name'|'address'|'length'|'taken'|'geohash'
let visibility = { photo: true, marker: true, track: true };
let viewFilterOn = false;        // '필터' 버튼: 현재 지도 화면에 보이는 객체만 목록에 표시(라이브)
let holdView = false;            // 'Hold' 버튼: 사이드바/검색결과에서 객체 선택해도 지도 화면 이동 안 함
let _lastFiltered = [];          // 마지막 renderList 의 필터결과(라이브 필터 선택 유지용)
// 목록 표시 컬럼(번호·이름은 항상 표시, 나머지는 '항목표시'로 켜고 끄기 — 설정 저장됨)
let colVis = { address: true, length: true, taken: true, geohash: true };
// 컬럼 폭 가중치(헤더 경계 드래그로 조정, 보이는 컬럼끼리 비율로 폭 분배 — 설정 저장됨)
let colW = { num: 0.55, name: 2.0, address: 1.7, length: 0.85, taken: 1.15, geohash: 1.55 };
let selectedItems = new Set(); // Set of filtered indices (multi-select)
let anchorIdx = -1;            // shift-click anchor
let lastClickedIdx = -1;       // keyboard nav + InfoWindow focus
let dragStartIdx = -1, isDragging = false, dragStartX = 0, dragStartY = 0;
let trackCounter = 0;
let _blockMapClick = false;

// ── Undo / Redo (Vmap 스타일 통합 스택) ──
const undoStack = [], redoStack = [];
let _restoring = false;   // undo/redo 실행 중 재귀 기록 방지
function pushHistory(op) {
  if (_restoring) return;
  undoStack.push(op);
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}
function doUndo() {
  if (!undoStack.length) return;
  const op = undoStack.pop();
  _restoring = true;
  try { op.undo(); } catch(e) { console.error('undo error', e); }
  _restoring = false;
  redoStack.push(op);
}
function doRedo() {
  if (!redoStack.length) return;
  const op = redoStack.pop();
  _restoring = true;
  try { op.redo(); } catch(e) { console.error('redo error', e); }
  _restoring = false;
  undoStack.push(op);
}
function blockMapClick() { _blockMapClick = true; setTimeout(() => _blockMapClick = false, 150); }

function getFilteredItems() {
  let base = currentFilter === 'all' ? allItems : allItems.filter(i => i.type === currentFilter);
  base = base.filter(i => visibility[i.type] !== false);
  // '필터' 켜짐: 현재 지도 화면(bounds) 안에 있는 객체만
  if (viewFilterOn && typeof map !== 'undefined' && map) {
    const b = map.getBounds();
    if (b) {
      const sw = b.getSouthWest(), ne = b.getNorthEast();
      const bx = { s: sw.getLat(), n: ne.getLat(), w: sw.getLng(), e: ne.getLng() };
      base = base.filter(i => itemInView(i, bx));
    }
  }
  return base;
}
// 항목이 현재 화면(bx) 안에 있는가 — 마커는 위치, 트랙은 어느 점이라도 화면 안이면 포함
function itemInView(item, bx) {
  const inBox = (la, lo) => la >= bx.s && la <= bx.n && lo >= bx.w && lo <= bx.e;
  if (item.markerObj && item.markerObj.marker) {
    const p = item.markerObj.marker.getPosition();
    return inBox(p.getLat(), p.getLng());
  }
  for (const pl of _itemOverlays(item)) {
    if (pl._pnum) { for (const part of pl._pnum) for (const c of part) if (inBox(c[0], c[1])) return true; }
    else { for (const p of flatPath(pl)) if (inBox(p.getLat(), p.getLng())) return true; }
  }
  return false;
}
// 번호표시 모드용: 객체 → 번호포함이름 맵 반환
function buildNumNameMap(){
  if(!showNumbers)return null;
  const filtered=getFilteredItems();
  const total=filtered.length;
  const digits=String(total).length;
  const m=new Map();
  filtered.forEach((item,idx)=>{
    const base=item.name.replace(/^\d+_/,''); // 기존 번호 프레픽스 제거
    const n=String(idx+1).padStart(digits,'0')+'_'+base;
    if(item.markerObj)m.set(item.markerObj,n);
    if(item.polyline)m.set(item.polyline,n);
  });
  return m;
}

// PNU 정렬키 — 법정동코드(10)+산구분(1)+본번(5)+부번(5). 키가 없으면 정렬 시 맨 뒤로.
// 카카오 coord2Address엔 b_code가 없어 법정동코드는 coord2RegionCode로 따로 받아 넘김.
function buildPnu(bcode, adr) {
  if (!bcode) return '';
  const san = adr && adr.mountain_yn === 'Y' ? '2' : '1';
  const main = String(parseInt((adr && adr.main_address_no) || '0', 10) || 0).padStart(5, '0');
  const sub = String(parseInt((adr && adr.sub_address_no) || '0', 10) || 0).padStart(5, '0');
  return String(bcode).slice(0, 10) + san + main + sub;
}

// 상위 행정구역 제거. 단 (광역시 아닌) 시·군 명칭은 유지.
//  · 도 → 제거, 그 아래 시·군은 유지
//  · 특별시/광역시/특별자치시 → 제거하고 그 아래 구도 제거
function trimRegion(parts) {
  let i = 0;
  if (/도$/.test(parts[0] || '')) {
    i++;
  } else if (/(특별시|광역시|특별자치시)$/.test(parts[0] || '')) {
    i++;
    if (/구$/.test(parts[i] || '')) i++;
  }
  return parts.slice(i);
}
function shortAddr(fullAddr) {
  if (!fullAddr) return '';
  const out = trimRegion(fullAddr.trim().split(/\s+/));
  return out.join(' ') || fullAddr;
}

function fetchAddr(latlng, callback) {
  if (!geocoder) { callback('', ''); return; }
  const lng = latlng.getLng(), lat = latlng.getLat();
  geocoder.coord2Address(lng, lat, (res, status) => {
    if (status !== kakao.maps.services.Status.OK || !res[0]) { callback('', ''); return; }
    const adr = res[0].address;
    const addrStr = shortAddr(adr?.address_name || '');
    // 법정동코드는 coord2Address에 없으므로 coord2RegionCode로 별도 조회 → PNU 정렬키 생성
    geocoder.coord2RegionCode(lng, lat, (rres, rstatus) => {
      let bcode = '';
      if (rstatus === kakao.maps.services.Status.OK && rres && rres.length) {
        const b = rres.find(r => r.region_type === 'B') || rres[0];
        bcode = (b && b.code) || '';
      }
      callback(addrStr, buildPnu(bcode, adr));
    });
  });
}

function addItem(item) {
  allItems.push(item);
  // 대량 로드 중에는 렌더/주소조회/히스토리를 건너뛴다 (loadKMZ가 끝나고 한 번에 처리)
  if (bulkLoading) return;
  // 첫 항목 추가 시 사이드바 자동 열기
  if (allItems.length === 1) openSidebar();
  renderList();
  const ll = isBundleItem(item) ? null : getItemLatLng(item);   // 묶음객체는 주소 의미 없음
  if (ll) fetchAddr(ll, (addr, pnu) => { item.address = addr; item.pnu = pnu; renderList(); });
  pushHistory({
    undo() { _removeItemSilent(item); },
    redo() { _readdItemSilent(item); }
  });
}

// 대량 로드(KMZ)된 항목들의 주소를 천천히(throttle) 조회 — 지오코더 과부하/속도제한 회피.
// KMZ 안 사진·마커, 트랙(폴리라인 중점 좌표)까지 주소를 채운다.
let _addrQueue = [], _addrRunning = false, _addrRenderTimer = null;
function _scheduleAddrRender() {
  if (_addrRenderTimer) return;
  _addrRenderTimer = setTimeout(() => { _addrRenderTimer = null; renderList(); }, 400);
}
function queueAddrFetch(items) {
  for (const it of items) {
    // 주소 없음(undefined/''/null) 또는 로딩표시('…')면 조회 대상 (항목은 address:'' 로 생성됨)
    // 묶음객체는 주소가 의미 없어 제외('묶음객체' 표시)
    if (it && !isBundleItem(it) && (!it.address || it.address === '…')) _addrQueue.push(it);
  }
  if (!_addrRunning) _runAddrQueue();
}
function _runAddrQueue() {
  if (!_addrQueue.length) { _addrRunning = false; renderList(); return; }
  _addrRunning = true;
  const it = _addrQueue.shift();
  if (!allItems.includes(it)) { _runAddrQueue(); return; }   // 이미 제거된 항목 skip
  const ll = getItemLatLng(it);
  if (!ll) { setTimeout(_runAddrQueue, 0); return; }
  fetchAddr(ll, (addr, pnu) => {
    it.address = addr; it.pnu = pnu;
    _scheduleAddrRender();
    setTimeout(_runAddrQueue, 80);   // 약 12건/초로 제한
  });
}

// 한 항목이 가진 모든 폴리라인 오버레이(기본 + 추가 = MultiGeometry/폴리곤 분해분)
// ── 멀티파트 폴리라인 헬퍼 ──
// htm 대량 로딩은 색상별 1개 Polyline에 path를 '배열의 배열'(Kakao 공식 지원)로 담아 경량화.
// 단 Kakao getPath()는 멀티파트로 넣은 경로를 그대로 돌려주지 않음(부분 유실) →
// 생성 시 원본 배열을 pl._parts 에 보관하고 여기서 항상 우선 사용한다. (KMZ 내보내기 누락 방지)
function pathParts(pl) { if (pl._parts) return pl._parts; const pa = pl.getPath(); return (pa.length && Array.isArray(pa[0])) ? pa : [pa]; }
function flatPath(pl) { if (pl._parts) return pl._parts.flat(); const pa = pl.getPath(); return (pa.length && Array.isArray(pa[0])) ? pa.flat() : pa; }
// 묶음객체(여러 선을 한 항목에 담은 트랙 — htm 색상묶음/KMZ MultiGeometry) 여부.
// 주소·연장이 의미 없으므로 목록에 '묶음객체'로만 표시하고 주소조회도 건너뛴다.
function isBundleItem(item) {
  return !!(item && item.type === 'track' &&
    ((item.polyline && item.polyline._parts) || (item.extraOverlays && item.extraOverlays.length)));
}

// ── 묶음객체 뷰포트 컬링 + 줌별 점 단순화 ──
// Kakao 는 오버레이의 '전체' 좌표를 줌/이동 때마다 SVG 로 다시 그린다(뷰포트 클리핑 없음)
// → 좌표 수만 점짜리 묶음선(KMZ/htm)은 줌인이 매우 느렸음. (OL(Vmap)은 화면만 그려서 빠름)
// 해결: 화면(+여유 30%)과 교차하는 구간만, 화면에서 ~1px 이상 간격인 점만 setPath 로 반영.
// 원본 좌표는 _parts 에 그대로 있으므로 내보내기/길이계산은 영향 없음.
// 화면 밖으로 완전히 나가 지도에서 떼어낸 선은 _viewCulled=true (내보내기에선 표시 중으로 취급).
let _cullTimer = null;
function scheduleBundleCull() { clearTimeout(_cullTimer); _cullTimer = setTimeout(cullBundlePolys, 60); }
function cullBundlePolys() {
  if (typeof map === 'undefined' || !map) return;
  const b = map.getBounds(); if (!b) return;
  const sw = b.getSouthWest(), ne = b.getNorthEast();
  const latSpan = ne.getLat() - sw.getLat(), lngSpan = ne.getLng() - sw.getLng();
  const s = sw.getLat() - latSpan * 0.3, n = ne.getLat() + latSpan * 0.3;
  const w = sw.getLng() - lngSpan * 0.3, e = ne.getLng() + lngSpan * 0.3;
  const mapH = (document.getElementById('map') || {}).clientHeight || 800;
  const eps = latSpan / mapH * 1.3;   // 화면 ~1.3px 미만 간격 점은 생략 (줌아웃일수록 크게 줄어듦)
  for (const pl of polylines) {
    if (!pl || !pl._parts) continue;
    // 좌표 숫자 캐시 (getLat/getLng 반복 호출 절약)
    if (!pl._pnum) pl._pnum = pl._parts.map(part => part.map(p => [p.getLat(), p.getLng()]));
    const parts = [];
    for (let pi = 0; pi < pl._parts.length; pi++) {
      const part = pl._parts[pi], num = pl._pnum[pi];
      if (num.length < 2) continue;
      let run = null;
      let pla = num[0][0], plo = num[0][1];
      let prevIn = (pla >= s && pla <= n && plo >= w && plo <= e);
      if (prevIn) { run = [part[0]]; run._la = pla; run._lo = plo; parts.push(run); }
      for (let i = 1; i < num.length; i++) {
        const la = num[i][0], lo = num[i][1];
        const pin = (la >= s && la <= n && lo >= w && lo <= e);
        let segIn = pin || prevIn;
        if (!segIn) {
          // 양 끝점이 밖이어도 화면을 '가로지르는' 선분은 포함 (선분 bbox 교차 판정)
          const l1 = Math.min(pla, la), l2 = Math.max(pla, la);
          const g1 = Math.min(plo, lo), g2 = Math.max(plo, lo);
          segIn = !(l2 < s || l1 > n || g2 < w || g1 > e);
        }
        if (segIn) {
          if (!run) { run = [part[i - 1]]; run._la = pla; run._lo = plo; parts.push(run); }
          // 단순화: 마지막 채택점과 eps 이상 떨어졌거나 / 구간 끝 / 화면 이탈점이면 채택
          if (Math.abs(la - run._la) > eps || Math.abs(lo - run._lo) > eps ||
              i === num.length - 1 || !pin) {
            run.push(part[i]); run._la = la; run._lo = lo;
          }
          if (!pin) run = null;   // 화면 밖으로 나감 → 다음 교차 구간은 새 run
        } else run = null;
        pla = la; plo = lo; prevIn = pin;
      }
    }
    const vis = parts.filter(r => r.length >= 2);
    if (vis.length) {
      pl.setPath(vis.length === 1 ? vis[0] : vis);
      pl._viewCulled = false;
      if (!pl.getMap()) pl.setMap(map);
    } else {
      pl._viewCulled = true;   // 화면 밖 컬링일 뿐 — 내보내기에선 표시 중으로 취급
      if (pl.getMap()) pl.setMap(null);
    }
  }
}

function _itemOverlays(item) {
  const a = [];
  if (item.polyline) a.push(item.polyline);
  if (item.extraOverlays) for (const o of item.extraOverlays) a.push(o);
  return a;
}
// 폴리라인(기본/추가) 으로 항목 찾기 — 그룹 안 어느 선을 우클릭해도 항목을 찾도록
function itemByPoly(t) {
  return allItems.find(i => i.type === 'track' &&
    (i.polyline === t || (i.extraOverlays && i.extraOverlays.includes(t))));
}
// 마커/폴리라인의 지도 표시를 복원
function _showItemOnMap(item) {
  if (item.markerObj && item.markerObj.marker) {
    item.markerObj.marker.setMap(map);
    if (!markers.includes(item.markerObj)) markers.push(item.markerObj);
  }
  for (const o of _itemOverlays(item)) {
    o.setMap(map);
    if (!polylines.includes(o)) polylines.push(o);
  }
  scheduleBundleCull();   // 묶음선이면 화면 교차 구간만 다시 반영
}

    markers = markers.filter(m => m !== item.markerObj);

  for (const o of _itemOverlays(item)) {
    o.setMap(null);
    o._viewCulled = false;   // 사용자 숨김/제거 — 컬링 표시 해제 (내보내기 포함 방지)

function getItemLatLng(item) {
  if (item.markerObj) return item.markerObj.marker.getPosition();
  if (item.polyline) {
    const path = flatPath(item.polyline);
    return path.length ? path[Math.floor(path.length / 2)] : null;
  }
  return null;
}

// ── Geohash 인코딩 (표준 base32, 기본 8자리 ≈ ±19m) ──
function geohashEncode(lat, lng, prec) {
  prec = prec || 8;
  const b32 = '0123456789bcdefghjkmnpqrstuvwxyz';
  let idx = 0, bit = 0, evenBit = true, gh = '';
  let latMin = -90, latMax = 90, lngMin = -180, lngMax = 180;
  while (gh.length < prec) {
    if (evenBit) { const mid = (lngMin + lngMax) / 2; if (lng >= mid) { idx = idx * 2 + 1; lngMin = mid; } else { idx = idx * 2; lngMax = mid; } }
    else { const mid = (latMin + latMax) / 2; if (lat >= mid) { idx = idx * 2 + 1; latMin = mid; } else { idx = idx * 2; latMax = mid; } }
    evenBit = !evenBit;
    if (++bit === 5) { gh += b32[idx]; bit = 0; idx = 0; }
  }
  return gh;
}
// 항목의 Geohash (묶음객체·좌표없음은 빈문자열)
function itemGeohash(item) {
  if (isBundleItem(item)) return '';
  const ll = getItemLatLng(item);
  return ll ? geohashEncode(ll.getLat(), ll.getLng(), 8) : '';
}
// 항목의 촬영일시 (사진에 저장된 값, 없으면 빈문자열)

function itemLenStr(item) {
  if (!item || item.type !== 'track') return '';
  const L = getTrackTotalLength(item);
  return L ? fmtLen(L) : '';
}

  if (!item) return;

function removeItem(predicate) {

function renderList() {
  const filtered = getFilteredItems();
  _lastFiltered = filtered;

  tbody.innerHTML = '';

  const cnt = { all: allItems.length, photo: 0, marker: 0, track: 0 };
  allItems.forEach(i => cnt[i.type]++);
  document.querySelectorAll('.ftab').forEach(btn => {
    const f = btn.dataset.f;

      const sw = document.createElement('span');
      sw.className = 'track-swatch';
      sw.style.background = trackColorOf(item);
      sw.title = '클릭하여 색상 변경';
      sw.onclick = e => { e.stopPropagation(); openColorPalette(sw, c => recolorTrack(item, c)); };
      const nm = document.createElement('span');
      nm.className = 'item-name'; nm.textContent = dispName;
      nameTd.append(sw, nm);

      nameTd.innerHTML = `<span class="type-dot ${dotCls}"></span><span class="item-name">${escHtml(dispName)}</span>`;
    }

    // 주소 (연장은 별도 컬럼으로 분리)
    const addrTd = document.createElement('td');
    let addrText;
    if (isBundleItem(item)) {
      addrText = '묶음객체';   // 색상묶음/MultiGeometry: 주소 의미 없음
    } else if (item.type === 'track') {
      addrText = (item.address && item.address !== '…') ? item.address : '';
    } else {
      addrText = (item.address !== undefined ? (item.address || '…') : '…');
    }
    addrTd.textContent = addrText;
    addrTd.title = addrText;

    // 연장 (트랙만)
    const lenTd = document.createElement('td');
    const lenText = itemLenStr(item);
    lenTd.textContent = lenText; lenTd.title = lenText;

    // 촬영일시
    const takenTd = document.createElement('td');
    const takenText = itemTaken(item);
    takenTd.textContent = takenText; takenTd.title = takenText;

    // Geohash
    const geoTd = document.createElement('td');
    const geoText = itemGeohash(item);
    geoTd.textContent = geoText; geoTd.title = geoText;
    geoTd.style.fontFamily = 'monospace';

    takenTd.style.display = colVis.taken    ? '' : 'none';
    geoTd.style.display   = colVis.geohash  ? '' : 'none';

    tr.append(numTd, nameTd, addrTd, lenTd, takenTd, geoTd);

    tr.ondblclick = e => {
      if (e.target.tagName === 'INPUT') return;
      e.stopPropagation();
      startEditItem(tr, item, idx);
    };

    tr.onmousedown = e => {
      if (e.button !== 0) return;
      if (e.target.tagName === 'INPUT') return;
      dragStartIdx = idx; isDragging = false;
      dragStartX = e.clientX; dragStartY = e.clientY;
      e.preventDefault();

      reorderHoldTimer = setTimeout(() => {
        reorderHoldTimer = null;
        if (!selectedItems.has(idx)) {
          selectedItems.clear(); selectedItems.add(idx);

      if (isDragging) { isDragging = false; return; }
      if (e.shiftKey && anchorIdx >= 0) {
        const lo = Math.min(anchorIdx, idx), hi = Math.max(anchorIdx, idx);

        selectedItems.add(idx);

      updateTrackHighlights();
      maybeShowMultiTrackTotal();   // 여러 트랙 선택 시 합계 길이로 덮어쓰기
    };

    tbody.appendChild(tr);
  });
  renderNumbers();
  updateTrackHighlights();
  updateAllTrackHighlights();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

(function(){

    alert('서버에 연결되어 있지 않아 저장할 수 없습니다.\n사진위치표시(파이썬)가 실행 중인지 확인하세요.');

// 트랙(선) 항목의 전체연장(m) — 묶인 보조선(extraOverlays)까지 합산
function getTrackTotalLength(item) {
  if (!item || item.type !== 'track') return 0;
  let len = 0;
  // 멀티파트(htm 색상묶음)는 getLength()가 부분 경로 합을 보장하지 않아 직접 합산
  const segLen = part => { let d = 0; const R = 6371008.8, rad = Math.PI / 180;
    for (let i = 1; i < part.length; i++) {
      const a = part[i-1], b = part[i];
      const la1 = a.getLat()*rad, la2 = b.getLat()*rad, dlo = (b.getLng()-a.getLng())*rad;
      const h = Math.sin((la2-la1)/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dlo/2)**2;
      d += 2*R*Math.asin(Math.sqrt(h));
    } return d; };
  const addLen = p => { try {
    if (!p) return;
    const parts = pathParts(p);
    if (parts.length > 1) parts.forEach(part => { len += segLen(part); });
    else if (p.getLength) len += p.getLength();
  } catch (e) {} };
  addLen(item.polyline);
  (item.extraOverlays || []).forEach(addLen);
  return len;
}
function fmtLen(m) { return m < 1000 ? `${m.toFixed(1)} m` : `${(m / 1000).toFixed(3)} km`; }
// 여러 트랙을 선택하면 메타패널에 합계 길이(전체연장 합계)를 표시. 2개 미만이면 아무 것도 안 함.
function maybeShowMultiTrackTotal() {
  const filtered = getFilteredItems();
  const selTracks = [...selectedItems].map(i => filtered[i]).filter(it => it && it.type === 'track');
  if (selTracks.length < 2) return false;
  const total = selTracks.reduce((s, it) => s + getTrackTotalLength(it), 0);
  const body = document.getElementById('metaBody');
  if (body) body.innerHTML = '<table>'

    + `<tr><th>전체연장(합계)</th><td>${fmtLen(total)}</td></tr>`
    + '</table>';
  return true;
}
function renderMeta(item, sm) {
  const body = document.getElementById('metaBody');
  if (!body) return;
  if (!item) { body.innerHTML = '<span id="metaPlaceholder">항목을 선택하세요</span>'; return; }
  const rows = [];
  const add = (k, v) => { if (v !== undefined && v !== null && String(v).trim() !== '') rows.push([k, String(v)]); };
  // 제목 — 사진은 서버가 읽은 저장 제목. KMZ 파일은 파일명을 제목으로 쓰지 않음(저장 메타 없으면 공란).
  if (sm && 'title' in sm) add('제목', sm.title || '(제목 없음)');
  else if (item.type !== 'kmz') add('제목', item.name);
  // 트랙(선)이면 전체연장 표시 (사이드바에서 트랙 선택 시 하단 메타창에 나타남)
  if (item.type === 'track') { const L = getTrackTotalLength(item); if (L > 0) add('전체연장', fmtLen(L)); }
  add('촬영일시', (sm && sm.taken) || item.takenDate);
  if (sm) add('설명', sm.desc);
  // KMZ 엑셀로 따로 저장한 메타(헤더:값)
  if (sm && sm.excelMeta) for (const k in sm.excelMeta) add(k, sm.excelMeta[k]);
  body.innerHTML = rows.length
    ? '<table>' + rows.map(([k, v]) => `<tr><th>${escHtml(k)}</th><td>${escHtml(v)}</td></tr>`).join('') + '</table>'
    : '<span id="metaPlaceholder">표시할 메타정보 없음</span>';
}

function selectFilteredItem(idx, fromMap=false) {
  const filtered = getFilteredItems();
  if (idx < 0 || idx >= filtered.length) return;
  lastClickedIdx = idx;
  const item = filtered[idx];
  updateMetaPanel(item);   // 사진리스트↔미리보기 사이 메타정보창 갱신

  // 번호 표시 모드: 팝업 없이 번호 색상만 변경 + 지도 이동
  if (showNumbers) {
    renderNumbers();
    highlightPhotoMarkers(item);   // 선택된 사진마커 강조(구분)
    const ll = getItemLatLng(item);
    if (ll && !holdView) map.panTo(ll);   // Hold 켜짐 → 화면 이동 안 함
    const _img = document.getElementById('previewImg');
    const _ph  = document.getElementById('previewPlaceholder');
    if (item.type === 'photo' && item.imgSrc) {
      _img.src = item.imgSrc; _img.style.display = 'block'; _ph.style.display = 'none';
    } else {
      _img.style.display = 'none'; _img.src = '';
      _ph.style.display = ''; _ph.textContent = item.type === 'track' ? `🗺 트랙: ${item.name}` : `📍 마커: ${item.name}`;
    }
    const rows = document.querySelectorAll('#photoTbody tr');
    if (rows[idx]) rows[idx].scrollIntoView({ block:'nearest' });
    document.getElementById('photoListWrapper').focus();
    return;
  }

  blockMapClick();
  // 팝업은 항상 하나만: 전부 닫고, 지도 마커 클릭(fromMap)일 때만 그 마커 팝업을 연다.
  // 사이드바 선택(fromMap=false)은 사진창을 띄우지 않는다(팝업 닫기만).
  allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
  highlightPhotoMarkers(item);   // 선택된 사진마커 강조(구분)
  if (item.markerObj) {
    const pos = item.markerObj.marker.getPosition();
    if (fromMap) {
      // 지도 클릭: 사진은 사이드바 미리보기로 충분 → 사진창 안 띄움. 일반 마커만 이름 팝업.
      if (!showNumbers && item.type !== 'photo') item.markerObj.iw.open(map, item.markerObj.marker);
    } else if (!holdView) {
      map.panTo(pos);   // 사이드바 선택 시에만 마커로 이동(사진창은 안 띄움)
    }
  } else if (item.polyline) {
    const path = flatPath(item.polyline);
    if (path.length && !holdView) {   // Hold 켜짐 → 화면 이동 안 함
      const b = new kakao.maps.LatLngBounds();
      path.forEach(p => b.extend(p));
      map.setBounds(b);
    }
  }

  const img = document.getElementById('previewImg');
  const ph  = document.getElementById('previewPlaceholder');
  if (item.type === 'photo' && item.imgSrc) {
    img.src = item.imgSrc; img.style.display = 'block'; ph.style.display = 'none';
  } else {
    img.style.display = 'none'; img.src = '';
    ph.style.display = ''; ph.textContent = item.type === 'track' ? `🗺 트랙: ${item.name}` : `📍 마커: ${item.name}`;
  }

  const rows = document.querySelectorAll('#photoTbody tr');
  if (rows[idx]) rows[idx].scrollIntoView({ block:'nearest' });
  document.getElementById('photoListWrapper').focus();
}

function showSaveStatus(msg, ok=true) {

// ── 사진 이름 → EXIF 저장 (3가지 경로 우선순위) ──
//   1) 서버 연동 사진(item.path 있음): 서버가 원본 파일 EXIF만 갱신 (고화질 보존)
//   2) 드래그&드롭 사진(fileHandle 있음): 브라우저가 직접 파일 덮어쓰기
//   3) 둘 다 없음: 메모리 imgSrc EXIF만 갱신 (내보내기 시 포함)
async function savePhotoName(item, newName) {
  // (1) 서버 경로가 있으면 — 서버에 위임 (원본 고화질 그대로, 수정날짜 갱신됨)
  if (item.path && window.__wsSend) {
    const sent = window.__wsSend({ type:'update_name', path:item.path, name:newName });
    if (sent) {
      showSaveStatus('💾 저장 중… ' + item.path.split(/[\\/]/).pop());
      return; // 결과는 서버의 name_saved 메시지에서 표시
    }
    showSaveStatus('🔴 서버 연결 안됨 — 메타데이터 저장 실패', false);
    return;
  }

  // (2)/(3) 메모리 imgSrc(JPEG)에 EXIF 기록
  if (!(item.imgSrc && item.imgSrc.startsWith('data:image/jpeg'))) {
    showSaveStatus('ℹ️ JPEG가 아니어서 메타데이터 저장 안 함');
    return;
  }
  let exifBytes;
  try {
    let old = null;
    try { old = piexif.load(item.imgSrc); } catch(e) { console.warn('piexif.load 무시:', e); }
    const exif = {'0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null};
    if (old) {
      if (old['GPS']) exif['GPS'] = old['GPS'];
      const ori = old['0th']?.[piexif.ImageIFD.Orientation];
      if (ori !== undefined) exif['0th'][piexif.ImageIFD.Orientation] = ori;
      const dto = old['Exif']?.[piexif.ExifIFD.DateTimeOriginal];
      if (dto !== undefined) exif['Exif'][piexif.ExifIFD.DateTimeOriginal] = dto;
      const dt = old['0th']?.[piexif.ImageIFD.DateTime];
      if (dt !== undefined) exif['0th'][piexif.ImageIFD.DateTime] = dt;
    }
    // ImageDescription은 ASCII 필드 — piexif.js가 한글을 하위바이트만 남겨 깨뜨림(꿀뷰 등에서 깨져 보임)
    // → ASCII일 때만 기록. 한글 이름은 XPTitle에 보존되고, 서버 연결 시엔 서버가 CP949로 기록.
    if (/^[\x00-\x7F]*$/.test(newName)) exif['0th'][piexif.ImageIFD.ImageDescription] = newName;
    const utf16le = [];
    for (let i = 0; i < newName.length; i++) { const c = newName.charCodeAt(i); utf16le.push(c & 0xff, (c >> 8) & 0xff); }
    utf16le.push(0, 0);
    exif['0th'][40091] = utf16le; // XPTitle
    try { exifBytes = piexif.dump(exif); }
    catch(e) { console.warn('dump 재시도(XPTitle 제외):', e); delete exif['0th'][40091]; exifBytes = piexif.dump(exif); }
    let base = item.imgSrc;
    try { base = piexif.remove(item.imgSrc); } catch(e) {}
    item.imgSrc = piexif.insert(exifBytes, base);
  } catch(e) {
    console.error('EXIF 처리 실패 상세:', e);
    showSaveStatus('❌ EXIF 처리 실패: ' + (e && e.message ? e.message : e), false);
    return;
  }

  // 드래그&드롭 파일 핸들이 있으면 원본 파일에 직접 덮어쓰기
  const fh = item.fileHandle || item.markerObj?.fileHandle;
  if (fh && fh.kind === 'file') {
    try {
      const b64 = item.imgSrc.split(',')[1];
      const bin = atob(b64);
      const buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      const writable = await fh.createWritable();
      await writable.write(new Blob([buf], {type:'image/jpeg'}));
      await writable.close();
      showSaveStatus('✅ 파일 저장됨 · 수정날짜 갱신됨 — ' + fh.name);
    } catch(ex) {
      console.error('파일 직접저장 실패:', ex);
      showSaveStatus('⚠️ 직접저장 실패: ' + ex.message + ' (내보내기로 저장하세요)', false);
    }
  } else {
    showSaveStatus('💾 메타데이터 반영됨 (파일저장: 내보내기로 저장하세요)');
  }
}

function startEditItem(tr, item, idx) {
  const nameSpan = tr.querySelector('.item-name');
  if (!nameSpan || tr.querySelector('.item-name-input')) return;
  const nameTd = nameSpan.parentElement;
  const input = document.createElement('input');
  input.className = 'item-name-input';
  input.value = item.name;
  nameSpan.textContent = '';
  nameSpan.appendChild(input);
  // 이름 칸이 좁아 긴 이름이 잘려 오타 확인이 안 되던 문제 →
  // 편집 중에는 칸을 넘어 줄 오른쪽 끝까지 넓게 띄워 전체 이름이 보이게 한다.
  const _prevOv = nameTd.style.overflow, _prevPos = nameTd.style.position;
  nameTd.style.overflow = 'visible';
  nameTd.style.position = 'relative';
  const _rowR = tr.getBoundingClientRect(), _tdR = nameTd.getBoundingClientRect();
  const _avail = Math.round(_rowR.right - _tdR.left - 8);
  input.style.position = 'absolute';
  input.style.left = '0';
  input.style.top = '50%';
  input.style.transform = 'translateY(-50%)';
  input.style.width = Math.max(220, _avail) + 'px';
  input.style.zIndex = '30';
  const _restoreCell = () => { nameTd.style.overflow = _prevOv; nameTd.style.position = _prevPos; };
  input.focus(); input.select();

  // 같은 줄 내부의 빈 공간(번호/주소 칸 등)을 눌러도 편집 유지 (input 포커스 보존)
  const keepFocus = e => { if (e.target !== input) { e.preventDefault(); input.focus(); } };
  tr.addEventListener('mousedown', keepFocus);

  const save = async () => {
    tr.removeEventListener('mousedown', keepFocus);
    _restoreCell();
    const newName = input.value.trim() || item.name;
    item.name = newName;
    if (item.markerObj) {
      item.markerObj.name = newName;
      const found = markers.find(m => m.marker === item.markerObj.marker);
      if (found) found.name = newName;
      const iwContent = item.markerObj.iw.getContent();
      if (iwContent) { const t = iwContent.querySelector('span') || iwContent.querySelector('div'); if (t) t.textContent = newName; }
    }
    if (item.polyline) item.polyline._name = newName;
    // ── 사진: 원본 파일 EXIF에 이름 기록 ──
    if (item.type === 'photo') {
      savePhotoName(item, newName);
    }
    renderList();
    document.getElementById('photoListWrapper').focus();
  };

  input.onblur = save;
  input.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); e.stopPropagation(); input.blur(); }
    if (e.key === 'Escape') { e.stopPropagation(); input.value = item.name; input.blur(); }
    else e.stopPropagation();
  };
  input.onclick = e => e.stopPropagation();
}

    const ov = new kakao.maps.CustomOverlay({ map, content, position: ll, xAnchor: 0.5, yAnchor: 0.5, zIndex: isSel ? 10 : 5 });

  });
}

// ── 전체 트랙 강조 토글 — 원래 색 유지, 굵게만 ──
function updateAllTrackHighlights() {
  trackAllHighlights.forEach(p => p.setMap(null));
  trackAllHighlights = [];
  if (!trackAllColorActive || !map) return;
  allItems.forEach(item => {
    if (item.type !== 'track') return;
    for (const o of _itemOverlays(item)) {
      if (!o || !o.getMap || !o.getMap()) continue;
      const col = o._origColor || trackColorOf(item);
      const w   = (o._origWeight || 3) + 6;
      const hl = new kakao.maps.Polyline({
        map: o.getMap(), path: o.getPath(),
        strokeWeight: w, strokeColor: col, strokeOpacity: 1, zIndex: 1
      });
      trackAllHighlights.push(hl);
    }
  });
}

// ── 트랙 선택 시 하이라이트 — 색은 원래 색 그대로, '굵게만' 표시(임시) ──
function updateTrackHighlights() {
  trackHighlightPolylines.forEach(p => p.setMap(null));
  trackHighlightPolylines = [];
  if (!map) return;
  const filtered = getFilteredItems();
  [...selectedItems].forEach(idx => {
    const item = filtered[idx];
    if (!item || item.type !== 'track') return;
    for (const o of _itemOverlays(item)) {
      if (!o || !o.getMap || !o.getMap()) continue;
      const col = o._origColor || trackColorOf(item);
      const w   = (o._origWeight || 3) + 6;   // 원래 굵기보다 두껍게 → 선택 표시
      const hl = new kakao.maps.Polyline({
        map: o.getMap(), path: o.getPath(),
        strokeWeight: w, strokeColor: col, strokeOpacity: 1, zIndex: 1
      });
      trackHighlightPolylines.push(hl);
    }
  });
}

// 이름정리 대상 판별: 사용자가 직접 붙인 이름은 그대로 두고,
// 자동 생성된 기본 이름(붙여넣기_*, 사진 파일명, 트랙N/경로 N)만 바꾼다.
function isDefaultName(nm){
  nm = (nm || '').trim();
  if (!nm) return true;
  if (/^붙여넣기_/.test(nm)) return true;                                     // Ctrl+V 붙여넣기 기본명
  if (/\.(jpe?g|png|gif|bmp|webp|heic|heif|tiff?)$/i.test(nm)) return true;   // 사진 파일명
  if (/^트랙\s*\d+$/.test(nm)) return true;                                   // Vmap 기본 트랙명
  if (/^경로\s*\d+$/.test(nm)) return true;                                   // map 기본 트랙명
  return false;
}

// ── 이름 정리 버튼 (이름없는 트랙·사진에 가장 가까운 마커 이름 붙이기) ──
document.getElementById('trackNameOrgBtn').onclick = () => {
  const markerItems = allItems.filter(i => i.markerObj && !isDefaultName(i.name));   // 이름 기준점 = 사용자가 이름 붙인 점 객체(마커·사진)
  const targets = allItems.filter(i => (i.type === 'track' && i.polyline) || (i.type === 'photo' && i.markerObj)); // 대상 = 트랙·사진

  if (!trackNameOrgActive) {
    // 마커가 없어도 토글은 항상 켜짐 (이후 선/사진 추가 시 가까운 마커 이름 자동 적용)
    if (markerItems.length) {
      targets.forEach(t => {
        if (!isDefaultName(t.name)) return;   // 사용자가 붙인 이름은 건드리지 않음
        const tll = getItemLatLng(t);
        if (!tll) return;
        let nearest = null, minDist = Infinity;
        markerItems.forEach(m => {
          const mpos = m.markerObj.marker.getPosition();
          const d = haversineDistance(tll.getLat(), tll.getLng(), mpos.getLat(), mpos.getLng());
          if (d < minDist) { minDist = d; nearest = m; }
        });
        if (nearest) {
          trackOrigNames.set(t, t.name);
          t.name = nearest.name;
          if (t.polyline) t.polyline._name = nearest.name;
          if (t.markerObj) t.markerObj.name = nearest.name;
        }
      });
    }
    trackNameOrgActive = true;
    document.getElementById('trackNameOrgBtn').classList.add('on');
    renderList();
  } else {
    trackOrigNames.forEach((origName, t) => {
      t.name = origName;
      if (t.polyline) t.polyline._name = origName;
      if (t.markerObj) t.markerObj.name = origName;
    });
    trackOrigNames.clear();
    trackNameOrgActive = false;
    document.getElementById('trackNameOrgBtn').classList.remove('on');
    renderList();
  }
};

// ── 필터 탭 ──

const _sortInd = { name:'sortNameInd', address:'sortAddrInd', length:'sortLenInd', taken:'sortTakenInd', geohash:'sortGeoInd' };

  name:    (a, b) => a.name.localeCompare(b.name, 'ko'),
  address: (a, b) => {   // PNU 앞 10자리(법정동코드 = 동·리)까지만 비교, 번지 제외. 키 없으면 맨 뒤(주소 문자열 정렬)

// ── 목록 표시 컬럼(항목표시) — 번호·이름 고정, 나머지 켜고 끄기(설정 저장) ──
const _colOrder = ['num','name','address','length','taken','geohash'];
const _colThId = { num:'numColTh', name:'nameColTh', address:'addrColTh', length:'lenColTh', taken:'takenColTh', geohash:'geoColTh' };
function _colShown(k) { return (k === 'num' || k === 'name') ? true : colVis[k] !== false; }
function applyColHeaders() {
  let sum = 0; for (const k of _colOrder) if (_colShown(k)) sum += colW[k];
  if (!sum) sum = 1;
  for (const k of _colOrder) {
    const el = document.getElementById(_colThId[k]); if (!el) continue;
    if (_colShown(k)) { el.style.display = ''; el.style.width = (colW[k] / sum * 100).toFixed(2) + '%'; }
    else el.style.display = 'none';
  }
}
function applyColVis() { applyColHeaders(); renderList(); }
function saveColVis() { if (window.__saveUi) window.__saveUi('colvis', JSON.stringify(colVis)); }
function saveColW() { if (window.__saveUi) window.__saveUi('colw', JSON.stringify(colW)); }
// 헤더 경계 드래그로 컬럼 폭 조정 (드래그한 컬럼 ↔ 오른쪽 이웃 보이는 컬럼 사이에서 가중치 이동)
(function(){
  const _nextShown = k => { const oi = _colOrder.indexOf(k); for (let i = oi + 1; i < _colOrder.length; i++) if (_colShown(_colOrder[i])) return _colOrder[i]; return null; };
  const MIN = 0.15;
  let drag = null;
  _colOrder.forEach(k => {
    const th = document.getElementById(_colThId[k]); if (!th) return;
    const rz = th.querySelector('.col-resizer'); if (!rz) return;
    rz.addEventListener('mousedown', e => {
      const nk = _nextShown(k); if (!nk) return;   // 마지막 보이는 컬럼은 조정 대상 없음
      let sum = 0; for (const c of _colOrder) if (_colShown(c)) sum += colW[c];
      drag = { k, nk, startX: e.clientX, tableW: (th.closest('table').offsetWidth || 1), wk0: colW[k], total: colW[k] + colW[nk], sum };
      document.body.style.cursor = 'col-resize';
      e.preventDefault(); e.stopPropagation();
    });
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const dw = (e.clientX - drag.startX) * drag.sum / drag.tableW;   // px 이동량 → 가중치
    const wk = Math.max(MIN, Math.min(drag.total - MIN, drag.wk0 + dw));
    colW[drag.k] = wk; colW[drag.nk] = drag.total - wk;
    applyColHeaders();
  });
  document.addEventListener('mouseup', () => { if (drag) { drag = null; document.body.style.cursor = ''; saveColW(); } });
})();
(function(){
  const btn = document.getElementById('colVisBtn'), menu = document.getElementById('colVisMenu');
  if (!btn || !menu) return;

// ── 주소 → [읍면, 리, 번지] 분리 ──
function parseAddr3(addr) {
  if (!addr || addr === '…') return ['', '', ''];
  const parts = addr.trim().replace(/산\s+(\d)/g, '산$1').split(/\s+/);
  // 번지 시작 위치: 숫자로 시작하거나, 산+숫자, 또는 '산' 뒤에 숫자가 오는 경우
  let lotIdx = -1;
  for (let i = 0; i < parts.length; i++) {
    if (/^\d/.test(parts[i]) || /^산\d/.test(parts[i])) { lotIdx = i; break; }
    if (parts[i] === '산' && i + 1 < parts.length && /^\d/.test(parts[i + 1])) { lotIdx = i; break; }
  }
  if (lotIdx < 0) lotIdx = parts.length;
  const bunji = parts.slice(lotIdx).join(' ');
  const addrParts = parts.slice(0, lotIdx);
  return [addrParts[0] || '', addrParts.slice(1).join(' ') || '', bunji];
}

// 사진 확장자 (imgSrc MIME에서 추출, 전체 경로는 브라우저 보안상 불가)
function getImgExt(imgSrc) {
  const m = (imgSrc||'').match(/^data:image\/([a-zA-Z]+);/);
  if (!m) return '';
  return m[1].toLowerCase() === 'jpeg' ? '.jpg' : '.' + m[1].toLowerCase();
}

document.getElementById('copyListBtn').onclick = () => {
  const filtered = getFilteredItems();
  const selIdxs = [...selectedItems].sort((a,b)=>a-b);
  const items = selIdxs.map(i=>({item:filtered[i], rowNum:i+1})).filter(x=>x.item);
  if (!items.length) { alert('복사할 항목을 선택하세요.'); return; }
  const hdrs = ['번호', '이름', '읍면', '리', '번지', '위도', '경도', '사진'];
  const rows = [hdrs.join('\t')];
  const hRows = [`<tr>${hdrs.map(h=>`<th>${h}</th>`).join('')}</tr>`];
  const digits = String(filtered.length).length;
  items.forEach(({item, rowNum}) => {
    let lat = '', lng = '';
    if (item.markerObj) {
      const pos = item.markerObj.marker.getPosition();
      lat = pos.getLat().toFixed(7); lng = pos.getLng().toFixed(7);
    } else if (item.polyline) {
      const path = flatPath(item.polyline);
      if (path.length) {
        const mid = path[Math.floor(path.length / 2)];
        lat = mid.getLat().toFixed(7); lng = mid.getLng().toFixed(7);
      }
    }
    const [eup, ri, bunji] = parseAddr3(item.address || '');
    // 번호 모드면 번호_이름 형태로 복사
    const baseName = item.name.replace(/^\d+_/,'');
    const exportName = showNumbers ? String(rowNum).padStart(digits,'0')+'_'+baseName : item.name;
    const photo = item.type === 'photo' ? (item.path || exportName + getImgExt(item.imgSrc)) : '';
    const vals = [rowNum, exportName, eup, ri, bunji, lat, lng, photo];
    rows.push(vals.join('\t'));
    hRows.push(`<tr>${vals.map(v=>`<td style="mso-number-format:'@'">${String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</td>`).join('')}</tr>`);
  });
  const text = rows.join('\n');
  const html = `<html><body><table>${hRows.join('')}</table></body></html>`;
  const btn = document.getElementById('copyListBtn');
  function showDone(){const orig=btn.textContent;btn.textContent='✅ 복사됨';setTimeout(()=>btn.textContent=orig,1500);}
  (async()=>{
    try{
      await navigator.clipboard.write([new ClipboardItem({'text/plain':new Blob([text],{type:'text/plain'}),'text/html':new Blob([html],{type:'text/html'})})]);
      showDone();
    }catch(e){
      navigator.clipboard.writeText(text).then(showDone).catch(()=>{
        const ta=document.createElement('textarea');ta.value=text;ta.style='position:fixed;opacity:0;';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showDone();
      });
    }
  })();
};

// ── Ctrl+C: 선택 항목의 '객체'를 복사 (임시/영구 관계없이). 목록복사는 📋 복사 버튼에서만. ──
//   ① 디스크경로 있고 서버 연결됨 → 실제 파일 복사(copy_files)  ② 그 외 사진 → 이미지 클립보드 복사
function copySelectedFiles() {
  const filtered = getFilteredItems();
  const items = [...selectedItems].sort((a,b)=>a-b).map(i => filtered[i]).filter(Boolean);
  const paths = [...new Set(
    items.map(it => {
      if (it.path) return it.path;                       // 디스크 사진/파일
      // KMZ 내부 사진 → 가상 경로(...kmz\files\photo.jpg): 탐색기엔 사진, 엑셀엔 경로
      if (it._srcKmz && it._kmzInner)
        return it._srcKmz + '\\' + it._kmzInner.replace(/\//g,'\\');
      return it._srcKmz || null;                          // 그 외(트랙 등) → KMZ 파일
    }).filter(Boolean)
  )];
  if (paths.length && window.__wsReady && window.__wsReady()) {
    window.__wsSend({ type: 'copy_files', paths });      // 실제 파일 복사(탐색기에 붙여넣기 가능)
    window.__setBadge && window.__setBadge(true, '📎 파일 복사 중…');
    return;
  }
  // 서버 경로 없음/서버 미연결 → 사진이면 이미지를 클립보드로 복사 (목록복사 아님)
  const photo = [...items].reverse().find(it => it.type === 'photo' && it.imgSrc) || items.find(it => it.imgSrc);
  if (photo) { copyPhotoImageToClipboard(photo); return; }
  window.__setBadge && window.__setBadge(true, '⚠️ 복사할 사진/파일이 없습니다 (목록 복사는 📋 복사)');
}
// 사진 이미지를 클립보드에 복사 (ClipboardItem 에 Promise 전달 → 사용자 제스처 유지, PNG 변환)
function copyPhotoImageToClipboard(item) {
  const src = item && item.imgSrc;
  if (!src) return;
  try {
    const blobPromise = (async () => {
      const img = new Image();
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = src; });
      const c = document.createElement('canvas');
      c.width = img.naturalWidth || img.width; c.height = img.naturalHeight || img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      return await new Promise(r => c.toBlob(r, 'image/png'));
    })();
    navigator.clipboard.write([new ClipboardItem({ 'image/png': blobPromise })])
      .then(() => window.__setBadge && window.__setBadge(true, '🖼 사진 복사됨 (클립보드)'))
      .catch(err => { console.warn('이미지 클립보드 복사 실패', err); window.__setBadge && window.__setBadge(true, '⚠️ 사진 복사 실패'); });
  } catch (e) { console.warn(e); }
}

// ── 드롭 사진 중복 방지 + 디스크경로 확보 ──
// 이미 영구 삽입된 같은 파일(파일명)이 있으면 true — 재삽입(드래그) 중복을 막는다.
function hasItemByFileName(fileName) {
  const base = String(fileName || '').toLowerCase();
  if (!base) return false;
  return allItems.some(it => it.type === 'photo' && !it._live && (
    (it.path && String(it.path).toLowerCase().split(/[\\/]/).pop() === base) ||
    (it._fname && String(it._fname).toLowerCase() === base)
  ));
}
// 드래그&드롭된 사진은 브라우저가 원본 경로를 몰라 path 가 없다 → 서버(최근 탐색기 선택)에서
// 파일명으로 실제 디스크 경로를 받아 item.path 에 채운다(그러면 Ctrl+C 가 파일복사, 재삽입 중복도 판정 가능).
let _pendingPathResolve = [];
function requestPathResolve(item, fileName) {
  if (!item || item.path || !fileName) return;
  item._fname = fileName;
  if (!(window.__wsReady && window.__wsReady())) return;
  _pendingPathResolve.push(item);
  window.__wsSend({ type: 'resolve_paths', names: [fileName] });
}
// 서버 응답(resolved_paths) 처리 — 파일명→경로 매핑을 대기 항목에 반영
function applyResolvedPaths(map) {
  const still = [];
  for (const it of _pendingPathResolve) {
    const b = (it._fname || '').toLowerCase();
    if (map && map[b]) { if (!it.path) it.path = map[b]; }
    else still.push(it);
  }
  _pendingPathResolve = still;
}

// ── XPTitle (UTF-16LE) → 문자열 변환 ──
function xpTitleToStr(bytes) {
  if (!bytes || bytes.length < 2) return '';
  let s = '';
  for (let i = 0; i + 1 < bytes.length; i += 2) {
    const code = bytes[i] | (bytes[i + 1] << 8);
    if (code === 0) break;
    s += String.fromCharCode(code);
  }
  return s.trim();
}

// EXIF에서 저장된 이름 읽기 (XPTitle → ImageDescription 순)
function readMetaName(exifObj) {
  try {
    const xpRaw = exifObj['0th']?.[40091]; // XPTitle
    if (xpRaw && xpRaw.length > 2) { const n = xpTitleToStr(xpRaw); if (n) return n; }
    const desc = (exifObj['0th']?.[piexif.ImageIFD.ImageDescription] || '').trim();
    if (desc) return desc;
  } catch(e) {}
  return '';
}

    document.getElementById('searchRunningMsg').textContent = msg || '🧭 검색 중…';
    box.classList.add('on');

    box.classList.remove('on');
