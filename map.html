<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>KMZ & 사진 지도 (v1.0)</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; }
    #map { width:100%; height:100%; }
    /* 카카오맵 기본 줌/내위치 컨트롤 숨기기 */
    .kakao_map_marker, .daumRoughmapContainer .roughmap_maker_btn { display:none !important; }
    .wrap_map_cont .map_zoom_close, .map_info_close { display:none !important; }
    a[href*="location"], a[title*="현재위치"], a[title*="내위치"] { display:none !important; }
    .zoom_reset, [class*="zoom_reset"] { display:none !important; }
    #search-form, #address-display, .controls {
      position:absolute; background:white; padding:5px; border-radius:5px; box-shadow:0 2px 6px rgba(0,0,0,0.3); z-index:1000;
    }
    #search-form { top:10px; left:10px; display:flex; gap:5px; }
    #address-display { top:10px; left:260px; background:rgba(0,0,0,0.6); color:white; font-size:12px; white-space:nowrap; overflow:hidden; cursor:pointer; }
    #address-display:hover { background:rgba(0,0,0,0.8); }
    .controls { top:10px; right:10px; display:flex; gap:6px; }
.dotOverlay.distanceInfo {
  background: white;
  border: 1px solid #db4040;
  padding: 5px;
  border-radius: 3px;
  font-size: 12px;
  white-space: nowrap;
}
.drawing-cursor * {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="20" font-size="20" fill="red">&#x3009;</text></svg>') 0 0, auto !important;
}
/* 선 컨텍스트 메뉴 */
#polyMenu {
  display: none; position: fixed; z-index: 9000;
  background: white; border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  overflow: hidden; min-width: 140px;
}
#polyMenu.show { display: block; }
#polyMenu button {
  display: block; width: 100%; padding: 13px 18px;
  border: none; background: none; text-align: left;
  font-size: 15px; cursor: pointer;
}
#polyMenu button:hover { background: #f1f3f4; }
#polyMenu button.danger { color: #e53935; }

  </style>
</head>
<body>
  <form id="search-form">
    <input id="address-input" type="text" placeholder="주소 검색" style="padding:5px; width:180px;">
    <button type="submit" style="padding:5px;">검색</button>
  </form>
  <div id="address-display">주소 없음</div>
  <!-- 선 컨텍스트 메뉴 -->
  <div id="polyMenu">
    <button id="polyEditBtn">✏️ 수정</button>
    <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
    <button id="polyMenuCancelBtn">✕ 취소</button>
  </div>
  <div class="controls">
    <label>위도:</label><input id="latitude" readonly size="12">
    <label>경도:</label><input id="longitude" readonly size="12">
    <button type="button" onclick="downloadAllPhotos()">📸 사진 다운로드</button>
    <button type="button" onclick="startDrawing()">선 그리기 (Alt)</button>
    <button type="button" onclick="resetPolylines()">선 초기화</button>
    <button type="button" onclick="resetAll()">화면 초기화</button>
    <select id="exportFormat" style="padding:5px;">
      <option value="kmz">KMZ 내보내기</option>
      <option value="gpx">GPX 내보내기</option>
      <option value="csv">CSV 내보내기</option>
    </select>
    <button type="button" onclick="exportByFormat()">💾 저장</button>
  </div>
  <div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
let map, geocoder, drawingMode = false;
let markers = [], polylines = [], markerInputOverlay = null;
let currentPolyline, currentPath = [];
let searchMarker = null;
let movingPhotoMarker = null;
let isDragging = false;  // 드래그 중 여부
// START: 거리 표시용 전역변수
let moveLine = null;
let distanceOverlay = null;

function getRandomColor() {
  return `#${Math.floor(Math.random() * 0xFFFFFF).toString(16).padStart(6, '0')}`;
}

function attachMarkerFollower(marker, followers = []) {
  kakao.maps.event.addListener(marker, 'position_changed', () => {
    const pos = marker.getPosition();
    followers.forEach(obj => {
      if (typeof obj.setPosition === 'function') {
        obj.setPosition(pos);
      }
    });
  });
}

function updateDistance(mouseEvent) {
  if (!drawingMode || currentPath.length === 0) return;

  const lastPos = currentPath[currentPath.length - 1];
  const mousePosition = mouseEvent.latLng;
  const movepath = [lastPos, mousePosition];

  if (!moveLine) {
    moveLine = new kakao.maps.Polyline({
      strokeWeight: 3,
      strokeColor: '#db4040',
      strokeOpacity: 0.5,
      strokeStyle: 'solid'
    });
  }
  moveLine.setPath(movepath);
  moveLine.setMap(map);

  const totalDistance = currentPolyline.getLength() + moveLine.getLength();

  const formatDistance = d => {
    if (d <= 1000) return `${d.toFixed(1)}m`;
    return `${(d / 1000).toFixed(2)}km`;
  };

  const content = `
    <div class="dotOverlay distanceInfo" style="font-size: 0.8em; margin-left:4px; margin-bottom:8px;">
      총거리 <span class="number">${formatDistance(totalDistance)}</span>
    </div>
  `;

  if (distanceOverlay) {
    distanceOverlay.setPosition(mousePosition);
    distanceOverlay.setContent(content);
  } else {
    distanceOverlay = new kakao.maps.CustomOverlay({
      map: map,
      content,
      position: mousePosition,
      xAnchor: 0,
      yAnchor: 0,
      zIndex: 3
    });
  }
}


// END: 거리 표시용 전역변수 및 함수

const trimCityProvince = str => str?.split(' ').slice(1).join(' ') || '';

function initializeMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), { center, level: 4, mapTypeId: kakao.maps.MapTypeId.HYBRID });
  // 카카오맵 기본 줌/내위치 버튼 DOM에서 제거
  setTimeout(() => {
    document.querySelectorAll('.zoom_in, .zoom_out, .zoom_reset, .map_zoom_close').forEach(el => el.remove());
  }, 500);
  window.map = map;
  geocoder = new kakao.maps.services.Geocoder();

kakao.maps.event.addListener(map, 'click', e => {
  if (markerInputOverlay) {
    markerInputOverlay.setMap(null);
    markerInputOverlay = null;
    return;
  }

  // ✅ 마커 위치 이동 중이면 새 위치로 설정
  if (movingPhotoMarker) {
    movingPhotoMarker.marker.setPosition(e.latLng);
    movingPhotoMarker.marker.setDraggable(false); // ✅ 이동 후 잠금
    movingPhotoMarker = null;
    return;
  }


  if (drawingMode) {
    currentPath.push(e.latLng);
    currentPolyline.setPath(currentPath);

    if (currentPath.length === 1 && !distanceOverlay) {
      const content = `
        <div class="dotOverlay distanceInfo" style="font-size: 0.8em; margin-left:4px; margin-bottom:8px;">
          총거리 <span class="number">0m</span>
        </div>
      `;
      distanceOverlay = new kakao.maps.CustomOverlay({
        map,
        content,
        position: e.latLng,
        xAnchor: 0,
        yAnchor: 1,
        zIndex: 3
      });
    }

if (movingPhotoMarker) {
  movingPhotoMarker.marker.setPosition(e.latLng);
  movingPhotoMarker.marker.setDraggable(false); // ✅ 드래그 비활성화
  movingPhotoMarker = null;
  return;
}

  }

  markers.forEach(m => m.iw.close());
  document.getElementById('latitude').value = e.latLng.getLat();
  document.getElementById('longitude').value = e.latLng.getLng();

  geocoder.coord2Address(e.latLng.getLng(), e.latLng.getLat(), (res, status) => {
    const el = document.getElementById('address-display');
      // 주소 클릭 시 순수 텍스트로 클립보드 복사 (엑셀 붙여넣기 시 검정색)
      el.onclick = () => {
        if (!el.innerText || el.innerText === '주소 없음' || el.innerText === '✅ 복사됨') return;
        copyAndMarkLocation();
      };
    if (status === kakao.maps.services.Status.OK) {
      const legal = res[0].address?.address_name || '주소 없음';
      const roadFull = res[0].road_address?.address_name;
      const road = roadFull ? roadFull.split(' ').slice(1).join(' ') : '';
      el.innerText = road ? `${legal} / ${road}` : legal;
    } else {
      el.innerText = '주소 없음';
    }
  });
});


  // 지도 우클릭: 그리기 중이면 종료, 선 근처면 메뉴, 빈곳이면 마커 입력
  kakao.maps.event.addListener(map, 'rightclick', e => {
  if (drawingMode) {
    if (moveLine) { moveLine.setMap(null); moveLine = null; }
    if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay = null; }
    drawingMode = false;
    document.getElementById('map').classList.remove('drawing-cursor');
    return;
  }

  // 우클릭 위치 근처 폴리라인 탐색 (픽셀 기준 10px 이내)
  const proj = map.getProjection();
  const clickPx = proj.pointFromCoords(e.latLng);

  let nearestPoly = null;
  let nearestDist = Infinity;
  const threshold = 10;

  polylines.forEach(pl => {
    if (!pl || !pl.getMap()) return;
    const path = pl.getPath();
    for (let i = 0; i < path.length - 1; i++) {
      const aPx = proj.pointFromCoords(path[i]);
      const bPx = proj.pointFromCoords(path[i + 1]);
      const dist = pointToSegmentDist(clickPx, aPx, bPx);
      if (dist < nearestDist) {
        nearestDist = dist;
        nearestPoly = pl;
      }
    }
  });

  if (nearestPoly && nearestDist <= threshold) {
    showPolyMenu(lastClientX, lastClientY, nearestPoly);
  } else {
    showMarkerInput(e.latLng);
  }
});

// 점과 선분 사이의 픽셀 거리 계산
function pointToSegmentDist(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  if (dx === 0 && dy === 0) {
    return Math.hypot(p.x - a.x, p.y - a.y);
  }
  const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
}




  // 주소 검색
  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    const keyword = document.getElementById('address-input').value;
    geocoder.addressSearch(keyword, (res, status) => {
      if (status === kakao.maps.services.Status.OK) {
        const pos = new kakao.maps.LatLng(res[0].y, res[0].x);
        map.setCenter(pos);

        // 이전에 생성한 검색 마커가 있으면 제거
        if (searchMarker) {
          searchMarker.setMap(null);
        }
        // 새 검색 마커 생성
        searchMarker = new kakao.maps.Marker({
          map,
          position: pos
        });
        // 우클릭으로 검색 마커 삭제 가능
        kakao.maps.event.addListener(searchMarker, 'rightclick', () => {
          searchMarker.setMap(null);
          searchMarker = null;
        });
      } else {
        alert('주소를 찾을 수 없습니다');
      }
    });
  });
  // 지도 위 마우스 무브 시 거리 툴팁 업데이트
  kakao.maps.event.addListener(map, 'mousemove', updateDistance);

// Ctrl+C, Alt 단축키
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key.toLowerCase() === 'c' && !window.getSelection().toString()) {
    e.preventDefault();
    copyAndMarkLocation();
  }

  if (e.altKey) {
    e.preventDefault();
    if (drawingMode) {
      if (moveLine) moveLine.setMap(null);
      if (distanceOverlay) distanceOverlay.setMap(null);
      drawingMode = false;
      document.getElementById('map').classList.remove('drawing-cursor');
    } else {
      startDrawing();
    }
  }

  // ✅ Ctrl+S → 보이는 마커/선만 내보내기 (선택된 포맷으로)
  if (e.ctrlKey && e.key.toLowerCase() === 's') {
    e.preventDefault();
    const format = document.getElementById('exportFormat').value;
    if (format === 'kmz') exportVisibleKMZ();
    else if (format === 'gpx') exportVisibleGPX();
    else if (format === 'csv') exportCSV();
  }
});

// ✅ Ctrl+V → 클립보드 이미지를 지도에 마커로 추가
document.addEventListener('paste', async e => {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItem = items.find(item => item.type.startsWith('image/'));
  if (!imageItem) return;
  e.preventDefault();

  const file = imageItem.getAsFile();
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const imgSrc = ev.target.result;
    const img = new Image();
    img.onload = () => {
      // EXIF GPS 확인
      let lat = null, lng = null;
      try {
        const exif = piexif.load(imgSrc);
        const gps = exif['GPS'];
        if (gps && gps[piexif.GPSIFD.GPSLatitude] && gps[piexif.GPSIFD.GPSLongitude]) {
          const toDec = (dms, ref) => {
            const d = dms[0][0]/dms[0][1];
            const m = dms[1][0]/dms[1][1];
            const s = dms[2][0]/dms[2][1];
            return (d + m/60 + s/3600) * ((ref === 'S' || ref === 'W') ? -1 : 1);
          };
          const _lat = toDec(gps[piexif.GPSIFD.GPSLatitude],  gps[piexif.GPSIFD.GPSLatitudeRef]  || 'N');
          const _lng = toDec(gps[piexif.GPSIFD.GPSLongitude], gps[piexif.GPSIFD.GPSLongitudeRef] || 'E');
          if (!isNaN(_lat) && !isNaN(_lng) && (_lat !== 0 || _lng !== 0)) {
            lat = _lat; lng = _lng;
          }
        }
      } catch(ex) {}

      const center = (lat && lng)
        ? new kakao.maps.LatLng(lat, lng)
        : map.getCenter();

      const now = new Date();
      const name = `붙여넣기_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;

      addPhotoMarker(center, imgSrc, name);
      map.panTo(center);

      // GPS 없으면 이동 모드 활성화 → 클릭으로 위치 지정
      if (!lat) {
        const added = markers.at(-1);
        if (added) {
          added.marker.setDraggable(true);
          movingPhotoMarker = added;
        }
      }
    };
    img.src = imgSrc;
  };
  reader.readAsDataURL(file);
});



}
function showMarkerInput(latlng) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);

  const container = document.createElement('div');
container.innerHTML = `
  <input type="text" placeholder="마커 이름" style="width:120px;padding:3px;" 
         lang="ko" autocomplete="off" autocapitalize="off" autocorrect="off" autofocus>
  <button style="margin-top:4px;">추가</button>
  <button style="margin-top:4px;">취소</button>`;


  container.style = 'background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';
  
  markerInputOverlay = new kakao.maps.CustomOverlay({ position: latlng, content: container, yAnchor: 1 });
  markerInputOverlay.setMap(map);

  container.addEventListener('mousedown', e => e.stopPropagation());

  const [input, addBtn, cancelBtn] = container.querySelectorAll('input, button');
  input.focus();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addBtn.click();
    }
  });

  addBtn.onclick = () => {
    const text = input.value.trim() || '설명 없음';
    addMarker(latlng, text);
    markerInputOverlay.setMap(null);
  };
  cancelBtn.onclick = () => markerInputOverlay.setMap(null);
}

function addMarker(latlng, desc) {
  const marker = new kakao.maps.Marker({
    map,
    position: latlng,
    draggable: false
  });

  const div = document.createElement('div');
  div.style = 'position:relative; display:flex; align-items:center; justify-content:space-between; padding:5px;';
  div.innerHTML = `<span>${desc}</span><div style="cursor:pointer; font-weight:bold;">✖</div>`;
  const [label, btn] = div.querySelectorAll('span, div');

  const iw = new kakao.maps.InfoWindow({ content: div });

  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));
  kakao.maps.event.addListener(marker, 'rightclick', () => {
    showEditInput({ marker, iw, name: desc }, label);
  });
  btn.onclick = () => iw.close();

  let previousPosition = latlng;
  let holdTimer = null;

  kakao.maps.event.addListener(marker, 'mousedown', () => {
    map.setDraggable(false);
    holdTimer = setTimeout(() => {
      iw.close(); // ✅ 텍스트창 닫기
      marker.setDraggable(true);
      movingPhotoMarker = { marker, iw, name: desc };
    }, 1000);
  });

  ['mouseup', 'mouseout'].forEach(evt =>
    kakao.maps.event.addListener(marker, evt, () => {
      clearTimeout(holdTimer);
      map.setDraggable(true);
    })
  );

  kakao.maps.event.addListener(marker, 'dragend', () => {
    if (movingPhotoMarker && marker === movingPhotoMarker.marker) {
      previousPosition = marker.getPosition();
      marker.setDraggable(false);
      movingPhotoMarker = null;
    }
  });

  markers.push({ marker, iw, name: desc });
}

function addPhotoMarker(latlng, imgSrc, filename) {
  const marker = new kakao.maps.Marker({
    map,
    position: latlng,
    draggable: false
  });

  const div = document.createElement('div');
  div.style = 'position:relative; padding:5px;';
  div.innerHTML = `
    <div style="font-weight:bold; margin-bottom:5px;">${filename}</div>
    <div style="position:absolute; top:2px; right:2px; display:flex; gap:4px;">
      <span class="dl-btn" style="cursor:pointer; font-size:14px;" title="다운로드">💾</span>
      <span class="cl-btn" style="cursor:pointer; font-weight:bold;">✖</span>
    </div>
    <img src="${imgSrc}" style="max-height:400px; display:block;">
  `;
  const title = div.querySelector('div');
  const dlBtn = div.querySelector('.dl-btn');
  const btn = div.querySelector('.cl-btn');

  let isDownloading = false;
  dlBtn.onclick = async () => {
    if (isDownloading) return;
    isDownloading = true;
    const img = div.querySelector('img');
    const latlng = marker.getPosition();
    const lat = latlng.getLat();
    const lng = latlng.getLng();

    let originalExifObj = {};
    try { originalExifObj = piexif.load(img.src); } catch (e) { originalExifObj = {}; }

    const image = new Image();
    image.onload = () => {
      const maxWidth = 1600;
      const scale = image.width > maxWidth ? maxWidth / image.width : 1;
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);
      canvas.getContext('2d').drawImage(image, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const toDMS = val => {
            const abs = Math.abs(val);
            const deg = Math.floor(abs);
            const min = Math.floor((abs - deg) * 60);
            const sec = (abs - deg - min / 60) * 3600;
            return [[deg, 1], [min, 1], [Math.round(sec * 100), 100]];
          };
          if (originalExifObj["0th"]) {
            delete originalExifObj["0th"][piexif.ImageIFD.UserComment];
            delete originalExifObj["0th"][piexif.ImageIFD.ImageDescription];
          }
          if (originalExifObj["Exif"]) delete originalExifObj["Exif"][piexif.ExifIFD.UserComment];
          if (!originalExifObj["GPS"]) originalExifObj["GPS"] = {};
          originalExifObj["GPS"][piexif.GPSIFD.GPSLatitudeRef] = lat >= 0 ? "N" : "S";
          originalExifObj["GPS"][piexif.GPSIFD.GPSLatitude] = toDMS(lat);
          originalExifObj["GPS"][piexif.GPSIFD.GPSLongitudeRef] = lng >= 0 ? "E" : "W";
          originalExifObj["GPS"][piexif.GPSIFD.GPSLongitude] = toDMS(lng);
          const finalDataUrl = piexif.insert(piexif.dump(originalExifObj), reader.result);
          const a = document.createElement('a');
          a.href = finalDataUrl;
          // markers 배열에서 현재 name을 가져와 다운로드 파일명으로 사용 (이름 수정 반영)
          const currentEntry = markers.find(m => m.marker === marker);
          const currentName = currentEntry ? currentEntry.name : filename;
          a.download = (currentName || 'image') + '.jpg';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          isDownloading = false;
        };
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.95);
    };
    image.src = img.src;
  };

  const iw = new kakao.maps.InfoWindow({ content: div });

  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));
  kakao.maps.event.addListener(marker, 'rightclick', () => {
    const entry = markers.find(m => m.marker === marker);
    showEditInput(entry || { marker, iw, name: filename }, title);
  });
  btn.onclick = () => iw.close();

  let previousPosition = latlng;
  let holdTimer = null;

  kakao.maps.event.addListener(marker, 'mousedown', () => {
    map.setDraggable(false);
    holdTimer = setTimeout(() => {
      iw.close(); // ✅ 사진창 닫기
      marker.setDraggable(true);
      movingPhotoMarker = { marker, iw, name: filename };
    }, 1000);
  });

  ['mouseup', 'mouseout'].forEach(evt =>
    kakao.maps.event.addListener(marker, evt, () => {
      clearTimeout(holdTimer);
      map.setDraggable(true);
    })
  );

  kakao.maps.event.addListener(marker, 'dragend', () => {
    if (movingPhotoMarker && marker === movingPhotoMarker.marker) {
      previousPosition = marker.getPosition();
      marker.setDraggable(false);
      movingPhotoMarker = null;
    }
  });

  // 동일 마커 중복 등록 방지
  if (!markers.find(m => m.marker === marker)) {
    markers.push({ marker, iw, name: filename });
  }
}

function showEditInput(markerObj, label) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);

  const container = document.createElement('div');
  container.innerHTML = `
    <input type="text" value="${label.textContent}" style="width:120px;padding:3px;"
           lang="ko" autocomplete="off" autocapitalize="off" autocorrect="off" autofocus>
    <button style="margin-top:4px;">수정</button>
    <button style="margin-top:4px;">삭제</button>`;
  container.style = 'background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';

  markerInputOverlay = new kakao.maps.CustomOverlay({
    position: markerObj.marker.getPosition(),
    content: container,
    yAnchor: 1
  });
  markerInputOverlay.setMap(map);

  container.addEventListener('mousedown', e => e.stopPropagation());

  const [input, editBtn, deleteBtn] = container.querySelectorAll('input, button');

  input.focus();
  const val = input.value;
  input.value = '';
  input.value = val;

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      editBtn.click();
    }
  });

  editBtn.onclick = () => {
    const newName = input.value.trim() || '설명 없음';
    label.textContent = newName;

    // 동일 marker 객체를 가진 항목 모두 찾아 첫 번째만 남기고 나머지 제거 후 이름 업데이트
    const duplicates = markers.filter(m => m.marker === markerObj.marker);
    if (duplicates.length > 1) {
      // 첫 번째만 남기고 나머지 제거
      markers = markers.filter((m, i) => {
        if (m.marker !== markerObj.marker) return true;
        return markers.indexOf(m) === markers.findIndex(x => x.marker === markerObj.marker);
      });
    }
    const found = markers.find(m => m.marker === markerObj.marker);
    if (found) found.name = newName;
    markerObj.name = newName;

    markerObj.iw.close();
    markerInputOverlay.setMap(null);
  };

  deleteBtn.onclick = () => {
    markerObj.marker.setMap(null);
    markerObj.iw.close();
    markerInputOverlay.setMap(null);
  };


}


let locationMarkerCount = 0; // 위치 마커 번호 카운터

function copyAndMarkLocation() {
  const lat = document.getElementById('latitude').value;
  const lng = document.getElementById('longitude').value;
  const addr = document.getElementById('address-display').innerText;
  if (!lat || !lng) return;
  const text = `${lat}\t${lng}\t${addr}`;
  navigator.clipboard.writeText(text).then(() => {
    createLocationMarker(parseFloat(lat), parseFloat(lng));
    const el = document.getElementById('address-display');
    const prev = el.innerText;
    el.innerText = '✅ 복사됨';
    setTimeout(() => { el.innerText = prev; }, 1200);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    createLocationMarker(parseFloat(lat), parseFloat(lng));
  });
}

function createLocationMarker(lat, lng) {
  locationMarkerCount++;
  const latlng = new kakao.maps.LatLng(lat, lng);
  const addr = document.getElementById('address-display').innerText;
  addMarker(latlng, String(locationMarkerCount));
  // 주소 저장
  const entry = markers[markers.length - 1];
  if (entry) {
    entry.addr = (addr === '✅ 복사됨' || addr === '주소 없음') ? '' : addr;
    entry.iw.open(map, entry.marker);
  }
}

function startDrawing() {
  if (drawingMode) return;

  // ✅ 이전 거리 오버레이 및 가이드 선 제거
  if (moveLine) {
    moveLine.setMap(null);
    moveLine = null;
  }
  if (distanceOverlay) {
    distanceOverlay.setMap(null);
    distanceOverlay = null;
  }

  drawingMode = true;
  currentPath = [];

  currentPolyline = new kakao.maps.Polyline({
    map,
    path: currentPath,
    strokeWeight: 3,
    strokeColor: '#FF0000',
    strokeOpacity: 0.8
  });

  polylines.push(currentPolyline);
  attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
}


const resetPolylines = () => {
  polylines.forEach(p => p.setMap(null));
  polylines = [];
  drawingMode = false;
  document.getElementById('map').classList.remove('drawing-cursor');
};

// ─── 선 컨텍스트 메뉴 ────────────────────────────────
let polyMenuTarget = null;
let lastClientX = 0, lastClientY = 0;
document.addEventListener('mousemove', e => { lastClientX = e.clientX; lastClientY = e.clientY; }, { passive: true });
document.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { lastClientX = e.touches[0].clientX; lastClientY = e.touches[0].clientY; }
}, { passive: true });

function showPolyMenu(x, y, poly) {
  if (drawingMode && poly === currentPolyline) return;
  polyMenuTarget = poly;
  const menu = document.getElementById('polyMenu');
  menu.style.left = Math.min(x, window.innerWidth - 160) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 130) + 'px';
  menu.classList.add('show');
}
function hidePolyMenu() {
  document.getElementById('polyMenu').classList.remove('show');
  polyMenuTarget = null;
}
document.addEventListener('click', e => {
  if (!document.getElementById('polyMenu').contains(e.target)) hidePolyMenu();
});
document.getElementById('polyMenuCancelBtn').onclick = hidePolyMenu;

document.getElementById('polyDeleteBtn').onclick = () => {
  if (!polyMenuTarget) return;
  const t = polyMenuTarget;
  t.setMap(null);
  polylines = polylines.filter(p => p !== t);
  hidePolyMenu();
};

document.getElementById('polyEditBtn').onclick = () => {
  if (!polyMenuTarget) return;
  const poly = polyMenuTarget;
  hidePolyMenu();
  if (drawingMode) {
    // 현재 그리기 중인 선 정리
    if (currentPolyline) { currentPolyline.setMap(null); polylines = polylines.filter(p => p !== currentPolyline); }
    drawingMode = false;
  }
  // 기존 선 제거 후 경로 복원해서 그리기 모드 진입
  const path = poly.getPath();
  poly.setMap(null);
  polylines = polylines.filter(p => p !== poly);

  drawingMode = true;
  currentPath = path.map(p => new kakao.maps.LatLng(p.getLat(), p.getLng()));
  currentPolyline = new kakao.maps.Polyline({ map, path: currentPath, strokeWeight: 3, strokeColor: '#FF0000', strokeOpacity: 0.8 });
  polylines.push(currentPolyline);
  attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
  // 거리 오버레이 표시
  if (currentPath.length > 0) updateDistanceOverlay(currentPath[currentPath.length - 1]);
};

// 폴리라인 우클릭/롱프레스 메뉴
function attachPolylineRightClick(poly) {
  kakao.maps.event.addListener(poly, 'rightclick', e => {
    if (drawingMode && poly === currentPolyline) return;
    showPolyMenu(lastClientX, lastClientY, poly);
  });
  // 모바일 롱프레스
  let lpTimer = null;
  kakao.maps.event.addListener(poly, 'touchstart', () => {
    lpTimer = setTimeout(() => { showPolyMenu(lastClientX, lastClientY, poly); }, 600);
  });
  kakao.maps.event.addListener(poly, 'touchend', () => clearTimeout(lpTimer));
  kakao.maps.event.addListener(poly, 'touchmove', () => clearTimeout(lpTimer));
}

// 선그리기 중 Ctrl+Z / Backspace / Escape → 이전 포인트 삭제
document.addEventListener('keydown', e => {
  if (!drawingMode || currentPath.length === 0) return;
  if (e.key === 'Backspace' || e.key === 'Escape' || (e.key === 'z' && e.ctrlKey)) {
    e.preventDefault();
    currentPath.pop();
    currentPolyline.setPath([...currentPath]);
    if (currentPath.length === 0) {
      if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay = null; }
      if (moveLine) { moveLine.setMap(null); moveLine = null; }
    } else { updateDistanceOverlay(currentPath[currentPath.length - 1]); }
  }
});

const resetAll = () => { markers.forEach(m => { m.iw.close(); m.marker.setMap(null); }); markers = []; resetPolylines(); locationMarkerCount = 0; };

function exportGPX() {
  const activeMarkers = markers.filter(m => m.marker && m.marker.getMap()); // 지도에 남아있는 마커만
  const lastMarkerName = activeMarkers.at(-1)?.name?.trim() || 'data';
  const fname = prompt('파일명', lastMarkerName);
  if (!fname) return;

  let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="KakaoMap">\n';

  // 트랙(선) 내보내기: (선은 기존 동작 유지하되, 화면에 보이는 선만 포함하려면 아래에 필터 추가 가능)
  polylines.forEach((pl, i) => {
    if (pl && pl.getMap()) { // 화면에 보이는 선만 포함 (getMap 존재 시)
      const pts = pl.getPath().map(p => `<trkpt lat="${p.getLat()}" lon="${p.getLng()}"></trkpt>\n`).join('');
      gpx += `<trk><name>path${i+1}</name><trkseg>\n${pts}</trkseg></trk>\n`;
    }
  });

  // 활성 마커만 내보내기
  activeMarkers.forEach(m => {
    const p = m.marker.getPosition();
    gpx += `<wpt lat="${p.getLat()}" lon="${p.getLng()}"><name>${m.name || ''}</name></wpt>\n`;
  });

  gpx += '</gpx>';

  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname + '.gpx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}


// ─── CSV 내보내기 ─────────────────────────────────────
async function exportCSV() {
  const activeMarkers = markers.filter(m => m.marker && m.marker.getMap());
  if (activeMarkers.length === 0) { alert('내보낼 마커가 없습니다.'); return; }

  const fname = prompt('CSV 파일명', document.getElementById('address-display').innerText.split(' ')[0] || 'markers');
  if (!fname) return;

  // 주소 없는 마커 역지오코딩
  const getAddr = (m) => new Promise(resolve => {
    if (m.addr !== undefined) { resolve(m.addr); return; }
    const pos = m.marker.getPosition();
    geocoder.coord2Address(pos.getLng(), pos.getLat(), (res, status) => {
      if (status === kakao.maps.services.Status.OK) {
        const addr = res[0].address?.address_name || '';
        m.addr = addr;
        resolve(addr);
      } else {
        resolve('');
      }
    });
  });

  // 헤더 (BOM 포함으로 엑셀 한글 깨짐 방지)
  let csv = '\uFEFF이름,위도,경도,주소,사진경로\n';

  for (let idx = 0; idx < activeMarkers.length; idx++) {
    const m = activeMarkers[idx];
    const pos = m.marker.getPosition ? m.marker.getPosition() : null;
    if (!pos) continue;
    const lat = pos.getLat();
    const lng = pos.getLng();
    const name = (m.name || '').replace(/"/g, '""');
    const addr = (await getAddr(m)).replace(/"/g, '""');

    // 사진 마커 여부
    const imgEl = m.iw.getContent ? m.iw.getContent().querySelector('img') : null;
    const photoPath = imgEl ? '사진포함' : '';

    csv += `"${name}",${lat},${lng},"${addr}","${photoPath}"\n`;
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function exportByFormat() {
  const format = document.getElementById('exportFormat').value;
  if (format === 'kmz') exportKMZ();
  else if (format === 'gpx') exportGPX();
  else if (format === 'csv') exportCSV();
}

async function exportKMZ() {
  const activeMarkers = markers.filter(m => m.marker && m.marker.getMap());

  // 주소+날짜+마커 기본 파일명 생성
  const now = new Date();
  const dateStr = now.getFullYear().toString() +
                  (now.getMonth()+1).toString().padStart(2,'0') +
                  now.getDate().toString().padStart(2,'0');

  const getAddrPrefix = () => new Promise(resolve => {
    const center = map.getCenter();
    geocoder.coord2Address(center.getLng(), center.getLat(), (result, status) => {
      if (status !== kakao.maps.services.Status.OK || !result[0]) { resolve(''); return; }
      const parts = (result[0].address?.address_name || '').split(' ').filter(p => !/^\d/.test(p));
      const eupMyeon = parts.find(p => /[읍면]$/.test(p)) || '';
      const ri       = parts.find(p => /리$/.test(p)) || '';
      const gu   = parts.find(p => /구$/.test(p)) || '';
      const dong = [...parts].reverse().find(p => /동(\d+가)?$/.test(p)) || '';
      let prefix = '';
      if (eupMyeon && ri)      prefix = `${eupMyeon.replace(/[읍면]$/, '')}${ri}_`;
      else if (eupMyeon)       prefix = `${eupMyeon}_`;
      else if (gu && dong)     prefix = `${gu.replace(/구$/, '')}${dong}_`;
      else if (gu)             prefix = `${gu.replace(/구$/, '')}_`;
      else if (dong)           prefix = `${dong}_`;
      resolve(prefix);
    });
  });

  const prefix = await getAddrPrefix();
  const lastMarkerRaw = ([...activeMarkers].reverse().find(m => !m.iw.getContent().querySelector('img'))?.name
                        || activeMarkers.at(-1)?.name || '');
  const lastMarkerName = lastMarkerRaw.replace(/_\d{8}.*$/, '').replace(/[\\/:*?"<>|]/g, '').trim();
  const defaultName = lastMarkerName
    ? `${prefix}${dateStr}_${lastMarkerName}`
    : `${prefix}${dateStr}_`;

  const fname = prompt('파일명', defaultName);
  if (!fname) return;

  const zip = new JSZip();
  const photoFiles = []; // { filename, dataUrl }

  // 사진 마커에서 이미지 추출 (파일명 중복 방지용 인덱스 추가)
  let photoCount = 0;
  for (const m of activeMarkers) {
    const img = m.iw.getContent().querySelector('img');
    if (img && img.src.startsWith('data:image')) {
      photoCount++;
      const safeName = (m.name || 'photo').replace(/[^\w가-힣\-_.]/g, '_');
      const safeFilename = `${photoCount}_${safeName}.jpg`;
      photoFiles.push({ filename: safeFilename, markerName: m.name });
      const compressed = await compressImage(img.src);
      zip.file(`files/${safeFilename}`, compressed.split(',')[1], { base64: true });
    }
  }

  // KML 생성
  let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>${fname}</name>\n`;

  // 선(트랙) → KML LineString
  polylines.forEach((pl, i) => {
    if (!pl || !pl.getMap()) return;
    const coords = pl.getPath().map(p => `${p.getLng()},${p.getLat()},0`).join('\n          ');
    kml += `  <Placemark>
    <name>path${i + 1}</name>
    <LineString><coordinates>
          ${coords}
    </coordinates></LineString>
  </Placemark>\n`;
  });

  // 마커 → KML Placemark
  let photoIdx = 0;
  for (const m of activeMarkers) {
    const p = m.marker.getPosition();
    const img = m.iw.getContent().querySelector('img');
    if (img && img.src.startsWith('data:image')) {
      const safeFilename = photoFiles[photoIdx]?.filename || 'photo.jpg';
      photoIdx++;
      kml += `  <Placemark>
    <name>${m.name || ''}</name>
    <description><![CDATA[<img src="files/${safeFilename}" style="max-width:400px">]]></description>
    <ExtendedData><Data name="photoFile"><value>${safeFilename}</value></Data></ExtendedData>
    <Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point>
  </Placemark>\n`;
    } else {
      kml += `  <Placemark>
    <name>${m.name || ''}</name>
    <Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point>
  </Placemark>\n`;
    }
  }

  kml += `</Document>\n</kml>`;
  zip.file('doc.kml', kml);

  const blob = await zip.generateAsync({ type: 'blob' });
  const kmzFile = new File([blob], fname + '.kmz', { type: 'application/vnd.google-earth.kmz' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(kmzFile);
  a.download = fname + '.kmz';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
}

    if (img && img.src.startsWith('data:image')) {

      const safeName = (m.name || 'photo').replace(/[^\w가-힣\-_.]/g, '_');
      const safeFilename = `${photoCount}_${safeName}.jpg`;
      photoFiles.push({ filename: safeFilename, markerName: m.name });
      const compressed = await compressImage(img.src);
      zip.file(`files/${safeFilename}`, compressed.split(',')[1], { base64: true });
    } else {
      photoFiles.push(null);
    }
  }

  // KML 생성
  let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>${fname}</name>\n`;

  // 선
  visiblePolylines.forEach((pl, i) => {
    const coords = pl.getPath()
      .filter(p => bounds.contain(p))
      .map(p => `${p.getLng()},${p.getLat()},0`).join('\n          ');
    kml += `  <Placemark>
    <name>path${i + 1}</name>
    <LineString><coordinates>
          ${coords}
    </coordinates></LineString>
  </Placemark>\n`;
  });

  // 마커
  let photoIdx = 0;
  for (const m of visibleMarkers) {
    const p = m.marker.getPosition();
    const img = m.iw.getContent().querySelector('img');
    if (img && img.src.startsWith('data:image')) {
      const safeFilename = photoFiles[photoIdx]?.filename || 'photo.jpg';
      photoIdx++;
      kml += `  <Placemark>
    <name>${m.name || ''}</name>
    <description><![CDATA[<img src="files/${safeFilename}" style="max-width:400px">]]></description>
    <ExtendedData><Data name="photoFile"><value>${safeFilename}</value></Data></ExtendedData>
    <Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point>
  </Placemark>\n`;
    } else {
      kml += `  <Placemark>
    <name>${m.name || ''}</name>
    <Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point>
  </Placemark>\n`;
    }
  }

  kml += `</Document>\n</kml>`;
  zip.file('doc.kml', kml);

  const blob = await zip.generateAsync({ type: 'blob' });
  const kmzFile = new File([blob], fname + '.kmz', { type: 'application/vnd.google-earth.kmz' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(kmzFile);
  a.download = fname + '.kmz';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
}
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  if (!files.length) return;
  const bounds = new kakao.maps.LatLngBounds();
  let photoWithoutGPSAction = null;

  files.forEach(file => {
    const name = file.name.toLowerCase();

    // 0) KMZ / ZIP 불러오기 (.zip은 휴대폰에서 .kmz가 .kmz.zip으로 저장될 때 대응)
    if (name.endsWith('.kmz') || name.endsWith('.zip')) {
      loadKMZ(file, bounds);

    // 1) GPX
    } else if (name.endsWith('.gpx')) {
      const reader = new FileReader();
      reader.onload = ev => {
        const xml = new DOMParser().parseFromString(ev.target.result, 'application/xml');
        Array.from(xml.getElementsByTagName('trk')).forEach((trk, index) => {
          const trackName = trk.getElementsByTagName('name')[0]?.textContent || `path${index + 1}`;
          Array.from(trk.getElementsByTagName('trkseg')).forEach(seg => {
            const pts = Array.from(seg.getElementsByTagName('trkpt')).map(pt => {
              const ll = new kakao.maps.LatLng(parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon')));
              bounds.extend(ll);
              return ll;
            });
            if (pts.length) {
              const poly = new kakao.maps.Polyline({ map, path: pts, strokeWeight: 4, strokeColor: getRandomColor(), strokeOpacity: 0.9 });
              const distance = poly.getLength();
              const formatDistance = d => d <= 10 ? `${d.toFixed(1)}m` : d < 1000 ? `${Math.round(d)}m` : `${(d/1000).toFixed(2)}km`;
              const overlay = new kakao.maps.CustomOverlay({
                content: `<div style="padding:5px 8px;background:white;border:1px solid #333;font-size:1.0em;border-radius:3px;"><b>${trackName}</b><br>총거리: ${formatDistance(distance)}</div>`,
                yAnchor: 1, zIndex: 4
              });
              kakao.maps.event.addListener(poly, 'mouseover', () => { overlay.setPosition(poly.getPath()[Math.floor(pts.length/2)]); overlay.setMap(map); });
              kakao.maps.event.addListener(poly, 'mouseout', () => overlay.setMap(null));
              polylines.push(poly);
              attachPolylineRightClick(poly);
            }
          });
        });
        Array.from(xml.getElementsByTagName('wpt')).forEach(wpt => {
          const ll = new kakao.maps.LatLng(parseFloat(wpt.getAttribute('lat')), parseFloat(wpt.getAttribute('lon')));
          bounds.extend(ll);
          addMarker(ll, wpt.getElementsByTagName('name')[0]?.textContent || '설명 없음');
        });
        if (!bounds.isEmpty()) map.setBounds(bounds);
      };
      reader.readAsText(file);

    // 2) 이미지
    } else if (file.type.startsWith('image/') || /\.(jpe?g|png)$/i.test(name)) {
      const reader = new FileReader();
      reader.onload = ev => {
        const imgSrc = ev.target.result;
        const imgName = file.name.replace(/\.[^/.]+$/, '');

        // piexif로 EXIF GPS 읽기
        let latlng = null;
        try {
          const exif = piexif.load(imgSrc);
          const gps = exif['GPS'];
          if (gps && gps[piexif.GPSIFD.GPSLatitude] && gps[piexif.GPSIFD.GPSLongitude]) {
            const toDec = (dms, ref) => {
              const d = dms[0][0]/dms[0][1];
              const m = dms[1][0]/dms[1][1];
              const s = dms[2][0]/dms[2][1];
              return (d + m/60 + s/3600) * ((ref === 'S' || ref === 'W') ? -1 : 1);
            };
            const lat = toDec(gps[piexif.GPSIFD.GPSLatitude],  gps[piexif.GPSIFD.GPSLatitudeRef]  || 'N');
            const lng = toDec(gps[piexif.GPSIFD.GPSLongitude], gps[piexif.GPSIFD.GPSLongitudeRef] || 'E');
            if (!isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0)) {
              latlng = new kakao.maps.LatLng(lat, lng);
            }
          }
        } catch(ex) {}

        if (latlng) {
          bounds.extend(latlng);
          addPhotoMarker(latlng, imgSrc, imgName);
          if (!bounds.isEmpty()) map.setBounds(bounds);
        } else {
          if (photoWithoutGPSAction === null) {
            photoWithoutGPSAction = confirm(`"${file.name}" 사진에 위치 정보가 없습니다.\n지도 중심에 마커를 추가하시겠습니까?\n(이 선택은 이번에 올리는 모든 사진에 적용됩니다)`);
          }
          if (photoWithoutGPSAction) {
            const center = map.getCenter();
            addPhotoMarker(center, imgSrc, imgName);
            map.panTo(center);
            const added = markers.at(-1);
            if (added) { added.marker.setDraggable(true); movingPhotoMarker = added; }
          }
        }
      };
      reader.readAsDataURL(file);

    // 3) CSV
    } else if (name.endsWith('.csv')) {
      const reader = new FileReader();
      reader.onload = evt => {
        const lines = evt.target.result.trim().split('\n').slice(1);
        lines.forEach(line => {
          const [lngStr, latStr, desc] = line.split(',');
          const lat = parseFloat(latStr), lng = parseFloat(lngStr);
          if (!lat || !lng) return;
          const latlng = new kakao.maps.LatLng(lat, lng);
          bounds.extend(latlng);
          if (desc && /\.(jpe?g|png)$/i.test(desc.trim())) {
            fetch(desc.trim()).then(res => res.blob()).then(blob => {
              const fr = new FileReader();
              fr.onload = e2 => addPhotoMarker(latlng, e2.target.result, desc.trim().split(/[\\/]/).pop());
              fr.readAsDataURL(blob);
            }).catch(() => addMarker(latlng, desc));
          } else {
            addMarker(latlng, desc?.trim() || '설명 없음');
          }
        });
        if (!bounds.isEmpty()) map.setBounds(bounds);
      };
      reader.readAsText(file, 'utf-8');
    }
  });
});

async function loadKMZ(file, bounds) {
  try {
    // .kmz 또는 .zip 확장자 모두 허용 (KMZ는 ZIP 기반이므로 동일하게 처리)
    const fname = file.name.toLowerCase();
    if (!fname.endsWith('.kmz') && !fname.endsWith('.zip')) {
      alert('KMZ 또는 ZIP 파일만 불러올 수 있습니다.');
      return;
    }
    const zip = await JSZip.loadAsync(file);
    const zipFiles = Object.keys(zip.files);

    // 파일명의 널문자(\u0000) 제거 후 .kml 탐색
    let kmlText = null;
    for (const name of zipFiles) {
      const cleanName = name.replace(/\0/g, '');
      if (/\.kml$/i.test(cleanName)) {
        try {
          const text = await zip.files[name].async('string');
          if (text && text.length > 0) { kmlText = text; break; }
        } catch(e) {}
      }
    }
    if (!kmlText) { alert('KMZ 안에 .kml 파일이 없습니다.'); return; }

    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const placemarks = Array.from(xml.getElementsByTagName('Placemark'));

    for (const pm of placemarks) {
      const pmName = pm.getElementsByTagName('name')[0]?.textContent?.trim()
                  || pm.getElementsByTagName('n')[0]?.textContent?.trim()
                  || '설명 없음';
      const lineString = pm.getElementsByTagName('LineString')[0];
      const point = pm.getElementsByTagName('Point')[0];

      // photoFile 읽기 방법 1: Data 태그
      let photoFilename = '';
      const dataEls = pm.getElementsByTagName('Data');
      for (const d of Array.from(dataEls)) {
        if (d.getAttribute('name') === 'photoFile') {
          photoFilename = d.getElementsByTagName('value')[0]?.textContent || '';
          break;
        }
      }

      // photoFile 읽기 방법 2: description 안의 <img src="..."> 추출 (CDATA 포함)
      if (!photoFilename) {
        const descEl = pm.getElementsByTagName('description')[0];
        if (descEl) {
          const descText = descEl.textContent || '';
          const imgMatch = descText.match(/src=["']([^"']+\.(jpe?g|png))["']/i)
                        || descText.match(/src=([^\s>]+\.(jpe?g|png))/i);
          if (imgMatch) {
            const thumbPath = imgMatch[1].trim();
            const rollPath = thumbPath.replace('_thumb.', '_roll.');
            const rollEntry = zipFiles.find(z => {
              const c = z.replace(/\0/g, '');
              return c === rollPath || c.endsWith('/' + rollPath.split('/').pop());
            });
            photoFilename = rollEntry ? rollPath : thumbPath;
          }
        }
      }

      if (lineString) {
        const coordsText = lineString.getElementsByTagName('coordinates')[0]?.textContent || '';
        const pts = coordsText.trim().split(/\s+/).map(c => {
          const [lng, lat] = c.split(',').map(Number);
          return new kakao.maps.LatLng(lat, lng);
        }).filter(ll => !isNaN(ll.getLat()) && !isNaN(ll.getLng()));
        if (pts.length) {
          const poly = new kakao.maps.Polyline({ map, path: pts, strokeWeight: 4, strokeColor: getRandomColor(), strokeOpacity: 0.9 });
          pts.forEach(p => bounds.extend(p));
          polylines.push(poly);
          attachPolylineRightClick(poly);
        }
      } else if (point) {
        const coordsText = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = coordsText.trim().split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) continue;
        const ll = new kakao.maps.LatLng(lat, lng);
        bounds.extend(ll);

        if (photoFilename) {
          const baseName = photoFilename.split('/').pop();
          let photoZipFile = null;
          for (const name of zipFiles) {
            const cleanName = name.replace(/\0/g, '');
            if (cleanName === photoFilename ||
                cleanName === `files/${photoFilename}` ||
                cleanName === `images/${baseName}` ||
                cleanName === `photo/${baseName}` ||
                cleanName.endsWith('/' + baseName) ||
                cleanName === baseName) {
              photoZipFile = zip.files[name];
              break;
            }
          }
          if (photoZipFile) {
            const base64 = await photoZipFile.async('base64');
            const ext = baseName.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' : 'image/jpeg';
            addPhotoMarker(ll, `data:${mime};base64,${base64}`, pmName);
          } else {
            addMarker(ll, pmName);
          }
        } else {
          addMarker(ll, pmName);
        }
      }
    }
    if (!bounds.isEmpty()) map.setBounds(bounds);
  } catch (err) {
    console.error(err);
    alert('KMZ 파일을 읽는 중 오류가 발생했습니다: ' + err.message);
  }
}

window.onload = () => {
  navigator.geolocation.getCurrentPosition(
    pos => initializeMap(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude)),
    () => initializeMap(new kakao.maps.LatLng(35.6478, 127.5213))
  );
};

// ─── 이미지 압축 (저장 시 500KB 이하) ────────────────
function compressImage(imgSrc) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const TARGET = 300 * 1024;
      const canvas = document.createElement('canvas');
      const MAX = 1920;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.85;
      let result = canvas.toDataURL('image/jpeg', quality);
      while (result.length * 0.75 > TARGET && quality > 0.1) {
        quality = Math.round((quality - 0.05) * 100) / 100;
        result = canvas.toDataURL('image/jpeg', quality);
      }
      resolve(result);
    };
    img.src = imgSrc;
  });
}

function downloadCompressedImage(imgSrc, filename, maxWidth = 1600, quality = 0.98) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const scale = maxWidth / img.width;
    const canvas = document.createElement('canvas');
    canvas.width = maxWidth;
    canvas.height = img.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/jpeg', quality);
  };
  img.src = imgSrc;
}

async function downloadAllPhotos() {
  // marker, iw 객체 모두 기준으로 중복 제거
  const seenMarkers = new Set();
  const seenIw = new Set();
  const photoMarkers = markers.filter(m => {
    if (!m.marker || !m.marker.getMap()) return false;
    if (seenMarkers.has(m.marker) || seenIw.has(m.iw)) return false;
    seenMarkers.add(m.marker);
    seenIw.add(m.iw);
    const img = m.iw.getContent().querySelector('img');
    return img && img.src.startsWith('data:image');
  });

  for (const m of photoMarkers) {
    await new Promise(resolve => {
      const iwContent = m.iw.getContent();
      const img = iwContent.querySelector('img');

      const latlng = m.marker.getPosition();
      const lat = latlng.getLat();
      const lng = latlng.getLng();

      // 1. 원본 EXIF 읽기
      let originalExifObj = {};
      try { originalExifObj = piexif.load(img.src); } catch (e) { originalExifObj = {}; }

      // 2. 이미지 로드
      const image = new Image();
      let downloaded = false;
      image.addEventListener('load', () => {
        if (downloaded) { resolve(); return; }
        downloaded = true;
        const maxWidth = 1600;
        const scale = image.width > maxWidth ? maxWidth / image.width : 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(image.width * scale);
        canvas.height = Math.round(image.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(blob => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const resizedDataUrl = reader.result;

            const toDMS = val => {
              const abs = Math.abs(val);
              const deg = Math.floor(abs);
              const min = Math.floor((abs - deg) * 60);
              const sec = (abs - deg - min / 60) * 3600;
              return [[deg, 1], [min, 1], [Math.round(sec * 100), 100]];
            };

            if (originalExifObj["0th"]) {
              delete originalExifObj["0th"][piexif.ImageIFD.UserComment];
              delete originalExifObj["0th"][piexif.ImageIFD.ImageDescription];
            }
            if (originalExifObj["Exif"]) {
              delete originalExifObj["Exif"][piexif.ExifIFD.UserComment];
            }
            if (!originalExifObj["GPS"]) originalExifObj["GPS"] = {};
            originalExifObj["GPS"][piexif.GPSIFD.GPSLatitudeRef] = lat >= 0 ? "N" : "S";
            originalExifObj["GPS"][piexif.GPSIFD.GPSLatitude] = toDMS(lat);
            originalExifObj["GPS"][piexif.GPSIFD.GPSLongitudeRef] = lng >= 0 ? "E" : "W";
            originalExifObj["GPS"][piexif.GPSIFD.GPSLongitude] = toDMS(lng);

            const exifBytes = piexif.dump(originalExifObj);
            const finalDataUrl = piexif.insert(exifBytes, resizedDataUrl);

            const a = document.createElement('a');
            a.href = finalDataUrl;
            a.download = (m.name || 'image') + '.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // 다음 사진으로 넘어가기 전 잠깐 대기
            setTimeout(resolve, 300);
          };
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.95);
      });
      image.src = img.src;
    });
  }
}
