<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>KMZ & 사진 지도 (v4.0)</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&libraries=services&autoload=false"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; }
    #app { display:flex; width:100%; height:100%; overflow:hidden; }

    /* ── 사이드바 ── */
    #sidebar {
      width:360px; min-width:160px; display:none; flex-direction:column;
      background:#eaf4fc; flex-shrink:0; overflow:hidden;
      border-right:2px solid #85c1e9;
    }
    #sidebarResizer { width:5px; background:#85c1e9; cursor:col-resize; flex-shrink:0; transition:background .15s; display:none; }
    #sidebarResizer:hover { background:#2980b9; }
    /* 컬럼 리사이저 */
    .col-resizer { position:absolute; right:0; top:0; width:5px; height:100%; cursor:col-resize; background:#5dade2; z-index:3; }
    .col-resizer:hover { background:#1a73c8; }

    /* ── 헤더 ── */
    #listHeader { background:#2980b9; flex-shrink:0; }
    .list-header-top {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 8px; color:#fff; font-size:13px; font-weight:bold;
    }
    #itemCountBadge {
      background:#e74c3c; color:#fff; border-radius:12px;
      padding:1px 8px; font-size:11px; font-weight:normal; margin-left:6px;
    }
    #filterTabs { display:flex; background:#5dade2; }
    .ftab {
      flex:1; padding:5px 2px; font-size:11px; border:none;
      border-right:1px solid #2980b9; background:transparent;
      color:#fff; cursor:pointer; white-space:nowrap;
      display:flex; align-items:center; justify-content:center; gap:3px;
    }
    .ftab:last-child { border-right:none; }
    .ftab:hover { background:#2e86c1; color:#fff; }
    .ftab.active { background:#1a5276; color:#fff; font-weight:bold; }
    .vis-check { width:12px; height:12px; cursor:pointer; flex-shrink:0; accent-color:#aef; margin:0; }
    .ftab.hidden-type { opacity:0.55; }
    /* 폴더 선택 바 */
    #folderBar { background:#d6eaf8; padding:4px 6px; flex-shrink:0; display:flex; align-items:center; gap:6px; border-bottom:1px solid #85c1e9; }
    #excelInsertBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #excelInsertBtn:hover { background:#d6eaf8; }
    #numToggleBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #numToggleBtn:hover { background:#d6eaf8; }
    #numToggleBtn.on { background:#1a5276; color:#fff; border-color:#1a5276; }
    #trackNameOrgBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #trackNameOrgBtn:hover { background:#d6eaf8; }
    #trackNameOrgBtn.on { background:#7d3c98; color:#fff; border-color:#7d3c98; }
    .ftab[data-f="track"] span { cursor:pointer; }
    .ftab[data-f="track"] span:hover { text-decoration:underline; }
    .ftab[data-f="track"] span.track-all-on { color:#FF9F43; font-weight:bold; }
    #folderName { font-size:10px; color:#1a5276; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── 목록 ── */
    #photoListWrapper { flex:1; overflow-y:auto; overflow-x:hidden; min-height:0; outline:none; }
    #photoTable { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
    #photoTable thead th {
      background:#2e86c1; color:#fff; padding:5px 6px; text-align:left;
      position:sticky; top:0; z-index:2; white-space:nowrap;
    }
    #photoTable tbody tr { cursor:pointer; }
    #photoTable tbody tr:nth-child(even) { background:#d6eaf8; }
    #photoTable tbody tr:hover { background:#aed6f1 !important; }
    #photoTable tbody tr.selected { background:#7fb3d3 !important; }
    #photoTable tbody tr.selected td { color:#0a2744 !important; }
    #photoTable tbody tr.drag-over { background:#c0d8ec !important; }
    #photoTable tbody td { padding:4px 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px solid #b0cfe0; max-width:0; }
    .type-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; flex-shrink:0; vertical-align:middle; }
    .dot-photo { background:#2471a3; }
    .dot-marker { background:#e74c3c; }
    .dot-track { background:#1e8449; border-radius:2px; height:5px; }
    .item-name { vertical-align:middle; }
    .item-name-input { width:90%; box-sizing:border-box; font-size:12px; padding:1px 3px; border:1px solid #2980b9; outline:none; }

    /* ── 미리보기 리사이저 ── */
    #previewResizer { height:5px; background:#85c1e9; cursor:row-resize; flex-shrink:0; transition:background .15s; }
    #previewResizer:hover { background:#2980b9; }

    /* ── 미리보기 ── */
    #previewSection { flex-shrink:0; height:220px; min-height:60px; display:flex; flex-direction:column; overflow:hidden; }
    #previewHeader { background:#2980b9; color:#fff; padding:5px 10px; font-size:12px; font-weight:bold; flex-shrink:0; }
    #previewImgWrapper { flex:1; background:#d6eaf8; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    #previewImg { max-width:100%; max-height:100%; object-fit:contain; display:none; }
    #previewPlaceholder { color:#5d8aa8; font-size:12px; text-align:center; padding:8px; }

    /* ── 지도 영역 ── */
    #mapContainer { flex:1; position:relative; overflow:hidden; }
    #map { width:100%; height:100%; }

    /* 목록 토글 버튼 (항상 지도 왼쪽 가장자리) */
    #sidebarOpenBtn {
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      z-index:1001; display:flex; align-items:center; justify-content:center;
      background:#fff; color:#2980b9; border:2px solid #2980b9; border-left:none; cursor:pointer;
      border-radius:0 6px 6px 0; padding:10px 2px;
      font-size:13px; writing-mode:vertical-rl;
      box-shadow:2px 0 8px rgba(0,0,0,0.15); transition:background .15s;
    }
    #sidebarOpenBtn:hover { background:#ebf5fb; }

    /* ── 기존 맵 오버레이 ── */
    .kakao_map_marker, .daumRoughmapContainer .roughmap_maker_btn { display:none !important; }
    .wrap_map_cont .map_zoom_close, .map_info_close { display:none !important; }
    a[href*="location"], a[title*="현재위치"], a[title*="내위치"] { display:none !important; }
    .zoom_reset, [class*="zoom_reset"] { display:none !important; }

    #search-form, .controls {
      position:absolute; background:white; padding:5px; border-radius:5px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3); z-index:1000;
    }
    #search-form { top:10px; left:10px; display:flex; gap:5px; }
    .controls { top:10px; right:10px; display:flex; flex-direction:column; align-items:flex-start; gap:4px; }

    /* 주소 표시 → 좌측 하단 */
    #address-display {
      position:absolute; bottom:10px; left:10px; z-index:1000;
      background:rgba(0,0,0,0.65); color:#fff;
      font-size:12px; padding:5px 8px; border-radius:5px;
      white-space:nowrap; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    #address-display:hover { background:rgba(0,0,0,0.85); }

    .dotOverlay.distanceInfo { background:white; border:1px solid #db4040; padding:5px; border-radius:3px; font-size:12px; white-space:nowrap; }
    .drawing-cursor * { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="20" font-size="20" fill="red">&#x3009;</text></svg>') 0 0, auto !important; }

    #polyMenu { display:none; position:fixed; z-index:9000; background:white; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.25); overflow:hidden; min-width:140px; }
    #polyMenu.show { display:block; }
    #polyMenu button { display:block; width:100%; padding:13px 18px; border:none; background:none; text-align:left; font-size:15px; cursor:pointer; }
    #polyMenu button:hover { background:#f1f3f4; }
    #polyMenu button.danger { color:#e53935; }

    /* ── 탐색기 연동 배지 ── */
    #explorerBadge {
      position:absolute; bottom:42px; left:10px; z-index:1001;
      background:rgba(0,0,0,0.62); color:#fff;
      font-size:11px; padding:4px 9px; border-radius:5px;
      white-space:nowrap; user-select:none; pointer-events:none;
      max-width:260px; overflow:hidden; text-overflow:ellipsis;
    }
    #explorerBadge.connected { background:rgba(18,110,50,0.88); }

    /* ── 실시간 위치 마커 ── */
    @keyframes liveRing {
      0%   { transform:translate(-50%,-50%) scale(1); opacity:.8; }
      100% { transform:translate(-50%,-50%) scale(3.2); opacity:0; }
    }
    .live-pin { position:relative; width:14px; height:14px; user-select:none; pointer-events:none; }
    .live-pin.dragging .live-pin-ring { animation:none; opacity:0; }
    .live-pin-dot {
      position:absolute; top:50%; left:50%;
      width:14px; height:14px; border-radius:50%;
      background:#00e676; border:2px solid #fff;
      transform:translate(-50%,-50%); z-index:2;
      box-shadow:0 0 4px rgba(0,0,0,0.4);
    }
    .live-pin-ring {
      position:absolute; top:50%; left:50%;
      width:14px; height:14px; border-radius:50%;
      background:rgba(0,230,118,0.55);
      transform:translate(-50%,-50%);
      animation:liveRing 1.3s ease-out infinite; z-index:1;
    }
    .live-pin-label {
      position:absolute; bottom:14px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:#fff;
      font-size:10px; padding:2px 6px; border-radius:3px;
      white-space:nowrap; pointer-events:none;
    }

    /* ── GPS 드래그 확인 모달 ── */
    #gpsDragModal {
      display:none; position:fixed; inset:0; z-index:10000;
      background:rgba(0,0,0,0.45);
      align-items:center; justify-content:center;
    }
    #gpsDragModal.visible { display:flex; }
    #gpsDragBox {
      background:#fff; padding:18px 22px; border-radius:10px;
      min-width:250px; box-shadow:0 4px 20px rgba(0,0,0,0.35); font-size:13px;
    }
    #gpsDragBox strong { font-size:14px; }
    #gpsDragInfo { color:#555; font-size:12px; margin:8px 0 16px; white-space:pre-line; }
    .gps-modal-btns { display:flex; gap:8px; justify-content:flex-end; }
    .gps-modal-btns button { padding:6px 16px; border-radius:5px; cursor:pointer; font-size:13px; }
    #gpsDragCancel { background:#f5f5f5; border:1px solid #ccc; }
    #gpsDragOk { background:#2980b9; color:#fff; border:none; font-weight:bold; }
  </style>
</head>
<body>
<div id="app">

  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="listHeader">
      <div class="list-header-top">
        <span>📋 목록 <span id="itemCountBadge">0</span></span>
      </div>
      <div id="filterTabs">
        <button class="ftab active" data-f="all"><span>전체</span></button>
        <button class="ftab" data-f="photo"><span>사진</span><input type="checkbox" class="vis-check" data-t="photo" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="marker"><span>마커</span><input type="checkbox" class="vis-check" data-t="marker" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="track"><span>트랙</span><input type="checkbox" class="vis-check" data-t="track" checked title="지도 표시/숨기기"></button>
      </div>
    </div>
    <div id="folderBar">
      <button id="excelInsertBtn" title="엑셀에서 선택한 셀(파일경로)의 사진/KMZ를 지도에 삽입 — 단축키 Ctrl+Shift+V">⬇ 엑셀 선택 삽입</button>
      <button id="copyListBtn" title="목록 클립보드 복사">📋 복사</button>
      <button id="numToggleBtn" title="지도에 번호 표시/숨기기">① 번호</button>
      <button id="trackNameOrgBtn" title="이름없는 트랙(경로N)에 가장 가까운 마커 이름 붙이기 / 다시 누르면 원위치">🏷 트랙이름 정리</button>
      <span id="folderName"></span>
    </div>
    <div id="photoListWrapper" tabindex="0">
      <table id="photoTable">
        <thead><tr>
          <th id="numColTh" style="width:10%;text-align:center;user-select:none;">번호<div class="col-resizer" id="numColResizer"></div></th>
          <th id="nameColTh" style="width:58%;cursor:pointer;user-select:none;">이름<span id="sortNameInd"></span><div class="col-resizer" id="colResizer"></div></th>
          <th id="addrColTh" style="width:32%;cursor:pointer;user-select:none;">주소<span id="sortAddrInd"></span></th>
        </tr></thead>
        <tbody id="photoTbody"></tbody>
      </table>
    </div>
    <div id="previewResizer"></div>
    <div id="previewSection">
      <div id="previewHeader">🖼 미리보기</div>
      <div id="previewImgWrapper">
        <span id="previewPlaceholder">항목을 선택하세요</span>
        <img id="previewImg" alt="미리보기">
      </div>
    </div>
  </div>

  <div id="sidebarResizer"></div>

  <!-- GPS 드래그 확인 모달 -->
  <div id="gpsDragModal">
    <div id="gpsDragBox">
      <strong>📍 GPS 위치를 수정하시겠습니까?</strong>
      <div id="gpsDragInfo"></div>
      <div class="gps-modal-btns">
        <button id="gpsDragCancel">취소</button>
        <button id="gpsDragOk">저장</button>
      </div>
    </div>
  </div>

  <!-- 지도 -->
  <div id="mapContainer">
    <button id="sidebarOpenBtn" title="목록 열기/닫기">▶</button>
    <div id="explorerBadge">🔴 탐색기 연동 대기중</div>
    <form id="search-form">
      <input id="address-input" type="text" placeholder="주소 검색" style="padding:5px;width:180px;">
      <button type="submit" style="padding:5px;">검색</button>
    </form>
    <div id="address-display">주소 없음</div>
    <div id="polyMenu">
      <button id="polyEditBtn">✏️ 수정</button>
      <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
      <button id="polyMenuCancelBtn">✕ 취소</button>
    </div>
    <div class="controls">
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="latlng-display" readonly style="width:220px;font-size:12px;cursor:pointer;" title="클릭하여 복사" onclick="copyCoordFromInput(this)">
        <button type="button" onclick="window.open('https://junty75.github.io/map/help','_blank','width=900,height=700,scrollbars=yes')" title="도움말 (F1)">❓</button>
        <button type="button" onclick="startDrawing()">선 그리기 (Alt)</button>
        <button type="button" onclick="resetPolylines()">선 초기화</button>
        <button type="button" onclick="resetAll()">화면 초기화</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="exportFormat" style="padding:5px;">
          <option value="kmz">KMZ 내보내기</option>
          <option value="gpx">GPX 내보내기</option>
          <option value="csv">CSV 내보내기</option>
          <option value="photos">사진</option>
        </select>
        <select id="exportArea" style="padding:5px;">
          <option value="all">전체 영역</option>
          <option value="visible">현재 영역</option>
          <option value="selected">선택 객체</option>
          <option value="clustered">각각저장</option>
        </select>
        <select id="photoQuality" style="padding:5px;">
          <option value="200" selected>200KB↓</option>
          <option value="300">300KB↓</option>
          <option value="500">500KB↓</option>
          <option value="800">800KB↓</option>
          <option value="1024">1MB↓</option>
          <option value="0">원본</option>
        </select>
        <button type="button" onclick="exportByFormat()">💾 저장</button>
        <select id="mapTypeSelect" style="padding:5px;" onchange="changeMapType(this.value)">
          <option value="HYBRID" selected>위성+지도</option>
          <option value="SKYVIEW">위성사진</option>
          <option value="ROADMAP">일반지도</option>
          <option value="TERRAIN">🏔️ 지형도</option>
          <option value="USE_DISTRICT">🗺️ 지적도</option>
        </select>
      </div>
    </div>
    <div id="map"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// ══════════════════════════════════════════════════
//  통합 목록 관리
// ══════════════════════════════════════════════════
let allItems = [];          // { type:'photo'|'marker'|'track', name, address, markerObj?, imgSrc?, polyline? }
let currentFilter = 'all';
let sortCol = null, sortDir = 1; // sortCol: null|'name'|'address'
let visibility = { photo: true, marker: true, track: true };
let selectedItems = new Set(); // Set of filtered indices (multi-select)
let anchorIdx = -1;            // shift-click anchor
let lastClickedIdx = -1;       // keyboard nav + InfoWindow focus
let dragStartIdx = -1, isDragging = false, dragStartX = 0, dragStartY = 0;
let trackCounter = 0;
let _blockMapClick = false;

// ── Undo / Redo (Vmap 스타일 통합 스택) ──
const undoStack = [], redoStack = [];
let _restoring = false;   // undo/redo 실행 중 재귀 기록 방지
function pushHistory(op) {
  if (_restoring) return;
  undoStack.push(op);
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}
function doUndo() {
  if (!undoStack.length) return;
  const op = undoStack.pop();
  _restoring = true;
  try { op.undo(); } catch(e) { console.error('undo error', e); }
  _restoring = false;
  redoStack.push(op);
}
function doRedo() {
  if (!redoStack.length) return;
  const op = redoStack.pop();
  _restoring = true;
  try { op.redo(); } catch(e) { console.error('redo error', e); }
  _restoring = false;
  undoStack.push(op);
}
function blockMapClick() { _blockMapClick = true; setTimeout(() => _blockMapClick = false, 150); }

function getFilteredItems() {
  const base = currentFilter === 'all' ? allItems : allItems.filter(i => i.type === currentFilter);
  return base.filter(i => visibility[i.type] !== false);
}
// 번호표시 모드용: 객체 → 번호포함이름 맵 반환
function buildNumNameMap(){
  if(!showNumbers)return null;
  const filtered=getFilteredItems();
  const total=filtered.length;
  const digits=String(total).length;
  const m=new Map();
  filtered.forEach((item,idx)=>{
    const base=item.name.replace(/^\d+_/,''); // 기존 번호 프레픽스 제거
    const n=String(idx+1).padStart(digits,'0')+'_'+base;
    if(item.markerObj)m.set(item.markerObj,n);
    if(item.polyline)m.set(item.polyline,n);
  });
  return m;
}

function shortAddr(fullAddr) {
  if (!fullAddr) return '';
  const parts = fullAddr.split(' ');
  // 도/특별시/광역시 + 시/군/구 제거 → 읍면동리번지
  let start = 0;
  if (parts.length > 0 && /[도시]$/.test(parts[0])) start = 1;
  if (parts.length > 1 && /[시군구]$/.test(parts[start])) start++;
  return parts.slice(start).join(' ') || fullAddr;
}

function fetchAddr(latlng, callback) {
  if (!geocoder) { callback(''); return; }
  geocoder.coord2Address(latlng.getLng(), latlng.getLat(), (res, status) => {
    if (status === kakao.maps.services.Status.OK) callback(shortAddr(res[0].address?.address_name || ''));
    else callback('');
  });
}

function addItem(item) {
  allItems.push(item);
  // 첫 항목 추가 시 사이드바 자동 열기
  if (allItems.length === 1) openSidebar();
  renderList();
  const ll = getItemLatLng(item);
  if (ll) fetchAddr(ll, addr => { item.address = addr; renderList(); });
  pushHistory({
    undo() { _removeItemSilent(item); },
    redo() { _readdItemSilent(item); }
  });
}

// 마커/폴리라인의 지도 표시를 복원
function _showItemOnMap(item) {
  if (item.markerObj && item.markerObj.marker) {
    item.markerObj.marker.setMap(map);
    if (!markers.includes(item.markerObj)) markers.push(item.markerObj);
  }
  if (item.polyline) {
    item.polyline.setMap(map);
    if (!polylines.includes(item.polyline)) polylines.push(item.polyline);
  }
}
function _hideItemOnMap(item) {
  if (item.markerObj && item.markerObj.marker) {
    if (item.markerObj.iw) item.markerObj.iw.close();
    item.markerObj.marker.setMap(null);
    markers = markers.filter(m => m !== item.markerObj);
  }
  if (item.polyline) {
    item.polyline.setMap(null);
    polylines = polylines.filter(p => p !== item.polyline);
  }
}
function _removeItemSilent(item) {
  _hideItemOnMap(item);
  const idx = allItems.indexOf(item);
  if (idx >= 0) allItems.splice(idx, 1);
  selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
  clearPreview(); renderList();
}
function _readdItemSilent(item) {
  _showItemOnMap(item);
  if (!allItems.includes(item)) {
    allItems.push(item);
    if (allItems.length === 1) openSidebar();
  }

}

function getItemLatLng(item) {
  if (item.markerObj) return item.markerObj.marker.getPosition();
  if (item.polyline) {
    const path = item.polyline.getPath();
    return path.length ? path[Math.floor(path.length / 2)] : null;
  }
  return null;
}

function updateMarkerAddr(marker) {

function removeItem(predicate) {

function renderList() {
  const filtered = getFilteredItems();
  const tbody = document.getElementById('photoTbody');
  tbody.innerHTML = '';

  const cnt = { all: allItems.length, photo: 0, marker: 0, track: 0 };
  allItems.forEach(i => cnt[i.type]++);
  document.querySelectorAll('.ftab').forEach(btn => {
    const f = btn.dataset.f;
    const text = { all:`전체(${cnt.all})`, photo:`사진(${cnt.photo})`, marker:`마커(${cnt.marker})`, track:`트랙(${cnt.track})` }[f];
    const sp = btn.querySelector('span'); if (sp) sp.textContent = text; else btn.textContent = text;
  });
  document.getElementById('itemCountBadge').textContent = filtered.length;

  filtered.forEach((item, idx) => {
    const tr = document.createElement('tr');
    if (selectedItems.has(idx)) tr.classList.add('selected');

    const numTd = document.createElement('td');
    numTd.textContent = idx + 1;
    numTd.style.cssText = 'text-align:center;color:#777;font-size:11px;';

    const nameTd = document.createElement('td');
    const dotCls = { photo:'dot-photo', marker:'dot-marker', track:'dot-track' }[item.type];
    const digits = String(filtered.length).length;
    const baseName = item.name.replace(/^\d+_/,''); // 기존 번호 제거 후 재부여
    const dispName = showNumbers ? String(idx+1).padStart(digits,'0')+'_'+baseName : item.name;
    nameTd.innerHTML = `<span class="type-dot ${dotCls}"></span><span class="item-name">${escHtml(dispName)}</span>`;
    nameTd.title = dispName;

    const addrTd = document.createElement('td');
    const addrText = (item.address !== undefined ? (item.address || '…') : '…') + trackLenStr(item);
    addrTd.textContent = addrText;
    addrTd.title = addrText;

    tr.append(numTd, nameTd, addrTd);

    tr.ondblclick = e => {
      if (e.target.tagName === 'INPUT') return;
      e.stopPropagation();
      startEditItem(tr, item, idx);
    };

    tr.onmousedown = e => {
      if (e.button !== 0) return;
      if (e.target.tagName === 'INPUT') return;
      dragStartIdx = idx; isDragging = false;
      dragStartX = e.clientX; dragStartY = e.clientY;
      e.preventDefault();
      // 길게 누르면 순서 변경 모드 (선택 여부 무관)
      reorderHoldTimer = setTimeout(() => {
        reorderHoldTimer = null;
        if (!selectedItems.has(idx)) {
          selectedItems.clear(); selectedItems.add(idx);
          document.querySelectorAll('#photoTbody tr').forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
        }
        reorderMode = true; reorderTargetIdx = -1;
        document.querySelectorAll('#photoTbody tr').forEach((r, i) => {
          r.style.opacity = selectedItems.has(i) ? '0.4' : '1';
        });
      }, 300);
    };

    tr.onclick = e => {
      if (isDragging) { isDragging = false; return; }
      if (e.shiftKey && anchorIdx >= 0) {
        const lo = Math.min(anchorIdx, idx), hi = Math.max(anchorIdx, idx);
        if (!e.ctrlKey) selectedItems.clear();
        for (let i = lo; i <= hi; i++) selectedItems.add(i);
      } else if (e.ctrlKey || e.metaKey) {
        if (selectedItems.has(idx)) selectedItems.delete(idx);
        else selectedItems.add(idx);
        anchorIdx = idx;
      } else {
        selectedItems.clear();
        selectedItems.add(idx);
        anchorIdx = idx;
      }
      lastClickedIdx = idx;
      // renderList() 대신 클래스만 직접 업데이트 → DOM 유지로 더블클릭 정상 동작
      document.querySelectorAll('#photoTbody tr').forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
      selectFilteredItem(idx);
      updateTrackHighlights();
    };

    tbody.appendChild(tr);
  });
  renderNumbers();
  updateTrackHighlights();
  updateAllTrackHighlights();
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function selectFilteredItem(idx) {
  const filtered = getFilteredItems();
  if (idx < 0 || idx >= filtered.length) return;
  lastClickedIdx = idx;
  const item = filtered[idx];

  // 번호 표시 모드: 팝업 없이 번호 색상만 변경 + 지도 이동
  if (showNumbers) {
    renderNumbers();
    const ll = getItemLatLng(item);
    if (ll) map.panTo(ll);
    const _img = document.getElementById('previewImg');
    const _ph  = document.getElementById('previewPlaceholder');
    if (item.type === 'photo' && item.imgSrc) {
      _img.src = item.imgSrc; _img.style.display = 'block'; _ph.style.display = 'none';
    } else {
      _img.style.display = 'none'; _img.src = '';
      _ph.style.display = ''; _ph.textContent = item.type === 'track' ? `🗺 트랙: ${item.name}` : `📍 마커: ${item.name}`;
    }
    const rows = document.querySelectorAll('#photoTbody tr');
    if (rows[idx]) rows[idx].scrollIntoView({ block:'nearest' });
    document.getElementById('photoListWrapper').focus();
    return;
  }

  blockMapClick();
  allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
  if (item.markerObj) {
    const pos = item.markerObj.marker.getPosition();
    if (item.type === 'photo') {
      // 사진 InfoWindow(~300px 높이)가 지도 안에 완전히 보이도록
      // 마커를 화면의 75% 아래에 배치 (위 25% = InfoWindow 영역)
      try {
        const proj = map.getProjection();
        const mapEl = document.getElementById('map');
        const mapH = mapEl.offsetHeight, mapW = mapEl.offsetWidth;
        const markerPx = proj.pointFromCoords(pos);
        const centerPx = proj.pointFromCoords(map.getCenter());
        const targetX = mapW * 0.5, targetY = mapH * 0.75;
        const newCenter = proj.coordsFromPoint({
          x: centerPx.x + (markerPx.x - targetX),
          y: centerPx.y + (markerPx.y - targetY)
        });
        map.panTo(newCenter);
      } catch(e) {
        map.panTo(pos);
      }
    } else {
      map.panTo(pos);
    }
    item.markerObj.iw.open(map, item.markerObj.marker);
  } else if (item.polyline) {
    const path = item.polyline.getPath();
    if (path.length) {
      const b = new kakao.maps.LatLngBounds();
      path.forEach(p => b.extend(p));
      map.setBounds(b);
    }
  }

  const img = document.getElementById('previewImg');
  const ph  = document.getElementById('previewPlaceholder');
  if (item.type === 'photo' && item.imgSrc) {
    img.src = item.imgSrc; img.style.display = 'block'; ph.style.display = 'none';
  } else {
    img.style.display = 'none'; img.src = '';
    ph.style.display = ''; ph.textContent = item.type === 'track' ? `🗺 트랙: ${item.name}` : `📍 마커: ${item.name}`;
  }

  const rows = document.querySelectorAll('#photoTbody tr');
  if (rows[idx]) rows[idx].scrollIntoView({ block:'nearest' });
  document.getElementById('photoListWrapper').focus();
}

// ── 사진 이름 → EXIF 저장 (3가지 경로 우선순위) ──
//   1) 서버 연동 사진(item.path 있음): 서버가 원본 파일 EXIF만 갱신 (고화질 보존)
//   2) 드래그&드롭 사진(fileHandle 있음): 브라우저가 직접 파일 덮어쓰기
//   3) 둘 다 없음: 메모리 imgSrc EXIF만 갱신 (내보내기 시 포함)
async function savePhotoName(item, newName) {
  // (1) 서버 경로가 있으면 — 서버에 위임 (원본 고화질 그대로, 수정날짜 갱신됨)
  if (item.path && window.__wsSend) {
    const sent = window.__wsSend({ type:'update_name', path:item.path, name:newName });
    if (sent) {
      showSaveStatus('💾 저장 중… ' + item.path.split(/[\\/]/).pop());
      return; // 결과는 서버의 name_saved 메시지에서 표시
    }
    showSaveStatus('🔴 서버 연결 안됨 — 메타데이터 저장 실패', false);
    return;
  }

  // (2)/(3) 메모리 imgSrc(JPEG)에 EXIF 기록
  if (!(item.imgSrc && item.imgSrc.startsWith('data:image/jpeg'))) {
    showSaveStatus('ℹ️ JPEG가 아니어서 메타데이터 저장 안 함');
    return;
  }
  let exifBytes;
  try {
    let old = null;
    try { old = piexif.load(item.imgSrc); } catch(e) { console.warn('piexif.load 무시:', e); }
    const exif = {'0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null};
    if (old) {
      if (old['GPS']) exif['GPS'] = old['GPS'];
      const ori = old['0th']?.[piexif.ImageIFD.Orientation];
      if (ori !== undefined) exif['0th'][piexif.ImageIFD.Orientation] = ori;
      const dto = old['Exif']?.[piexif.ExifIFD.DateTimeOriginal];
      if (dto !== undefined) exif['Exif'][piexif.ExifIFD.DateTimeOriginal] = dto;
      const dt = old['0th']?.[piexif.ImageIFD.DateTime];
      if (dt !== undefined) exif['0th'][piexif.ImageIFD.DateTime] = dt;
    }
    exif['0th'][piexif.ImageIFD.ImageDescription] = newName;
    const utf16le = [];
    for (let i = 0; i < newName.length; i++) { const c = newName.charCodeAt(i); utf16le.push(c & 0xff, (c >> 8) & 0xff); }
    utf16le.push(0, 0);
    exif['0th'][40091] = utf16le; // XPTitle
    try { exifBytes = piexif.dump(exif); }
    catch(e) { console.warn('dump 재시도(XPTitle 제외):', e); delete exif['0th'][40091]; exifBytes = piexif.dump(exif); }
    let base = item.imgSrc;
    try { base = piexif.remove(item.imgSrc); } catch(e) {}
    item.imgSrc = piexif.insert(exifBytes, base);
  } catch(e) {
    console.error('EXIF 처리 실패 상세:', e);
    showSaveStatus('❌ EXIF 처리 실패: ' + (e && e.message ? e.message : e), false);
    return;
  }

  // 드래그&드롭 파일 핸들이 있으면 원본 파일에 직접 덮어쓰기
  const fh = item.fileHandle || item.markerObj?.fileHandle;
  if (fh && fh.kind === 'file') {
    try {
      const b64 = item.imgSrc.split(',')[1];
      const bin = atob(b64);
      const buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      const writable = await fh.createWritable();
      await writable.write(new Blob([buf], {type:'image/jpeg'}));
      await writable.close();
      showSaveStatus('✅ 파일 저장됨 · 수정날짜 갱신됨 — ' + fh.name);
    } catch(ex) {
      console.error('파일 직접저장 실패:', ex);
      showSaveStatus('⚠️ 직접저장 실패: ' + ex.message + ' (내보내기로 저장하세요)', false);
    }
  } else {
    showSaveStatus('💾 메타데이터 반영됨 (파일저장: 내보내기로 저장하세요)');
  }
}

function startEditItem(tr, item, idx) {
  const nameSpan = tr.querySelector('.item-name');
  if (!nameSpan || tr.querySelector('.item-name-input')) return;
  const input = document.createElement('input');
  input.className = 'item-name-input';
  input.value = item.name;
  nameSpan.textContent = '';
  nameSpan.appendChild(input);
  input.focus(); input.select();

  // 같은 줄 내부의 빈 공간(번호/주소 칸 등)을 눌러도 편집 유지 (input 포커스 보존)
  const keepFocus = e => { if (e.target !== input) { e.preventDefault(); input.focus(); } };
  tr.addEventListener('mousedown', keepFocus);

  const save = async () => {
    tr.removeEventListener('mousedown', keepFocus);
    const newName = input.value.trim() || item.name;
    item.name = newName;
    if (item.markerObj) {
      item.markerObj.name = newName;
      const found = markers.find(m => m.marker === item.markerObj.marker);
      if (found) found.name = newName;
      const iwContent = item.markerObj.iw.getContent();
      if (iwContent) { const t = iwContent.querySelector('span') || iwContent.querySelector('div'); if (t) t.textContent = newName; }
    }
    if (item.polyline) item.polyline._name = newName;
    // ── 사진: 원본 파일 EXIF에 이름 기록 ──
    if (item.type === 'photo') {
      savePhotoName(item, newName);
    }
    renderList();
    document.getElementById('photoListWrapper').focus();
  };

  input.onblur = save;
  input.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); e.stopPropagation(); input.blur(); }
    if (e.key === 'Escape') { e.stopPropagation(); input.value = item.name; input.blur(); }
    else e.stopPropagation();
  };
  input.onclick = e => e.stopPropagation();
}

function renderNumbers() {
  numberOverlays.forEach(o => o.setMap(null));
  numberOverlays = [];
  if (!showNumbers || !map) return;
  getFilteredItems().forEach((item, idx) => {
    const ll = getItemLatLng(item);
    if (!ll) return;
    const n = idx + 1;
    const bg = selectedItems.has(idx) ? 'rgba(200,0,0,.9)' : 'rgba(0,0,0,.65)';
    const isSel = selectedItems.has(idx);
    const content = `<div style="position:relative;width:0;height:0;"><div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;border-radius:4px;padding:0 4px;font-size:10px;font-weight:bold;line-height:16px;pointer-events:none;white-space:nowrap;">${n}</div></div>`;
    const ov = new kakao.maps.CustomOverlay({ map, content, position: ll, xAnchor: 0.5, yAnchor: 0.5, zIndex: isSel ? 10 : 5 });
    numberOverlays.push(ov);
  });
}

// ── 트랙이름 정리 버튼 ──
document.getElementById('trackNameOrgBtn').onclick = () => {
  const trackItems = allItems.filter(i => i.type === 'track' && i.polyline);
  const markerItems = allItems.filter(i => (i.type === 'marker' || i.type === 'photo') && i.markerObj);

  if (!trackNameOrgActive) {
    if (!trackItems.length) { alert('트랙이 없습니다.'); return; }
    if (!markerItems.length) { alert('가까운 마커가 없습니다.\n마커를 먼저 추가해 주세요.'); return; }
    let renamed = 0;
    trackItems.forEach(track => {
      trackOrigNames.set(track, track.name);
      const tll = getItemLatLng(track);
      if (!tll) return;
      let nearest = null, minDist = Infinity;
      markerItems.forEach(m => {
        const mpos = m.markerObj.marker.getPosition();
        const d = haversineDistance(tll.getLat(), tll.getLng(), mpos.getLat(), mpos.getLng());
        if (d < minDist) { minDist = d; nearest = m; }
      });
      if (nearest) {
        track.name = nearest.name;
        if (track.polyline) track.polyline._name = nearest.name;
        renamed++;
      }
    });
    trackNameOrgActive = true;
    document.getElementById('trackNameOrgBtn').classList.add('on');
    renderList();
  } else {
    trackOrigNames.forEach((origName, track) => {
      track.name = origName;
      if (track.polyline) track.polyline._name = origName;
    });
    trackOrigNames.clear();
    trackNameOrgActive = false;
    document.getElementById('trackNameOrgBtn').classList.remove('on');
    renderList();
  }
};

function applyVisibility(type) {
  const show = visibility[type];
  allItems.forEach(item => {
    if (item.type !== type) return;
    if (item.markerObj) {
      item.markerObj.marker.setMap(show ? map : null);
      if (!show) item.markerObj.iw.close();
    }
    if (item.polyline) item.polyline.setMap(show ? map : null);
  });
  document.querySelectorAll(`.ftab[data-f="${type}"]`).forEach(btn => btn.classList.toggle('hidden-type', !show));
  selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
  renderList();
}

  cb.addEventListener('click', e => e.stopPropagation());

    e.stopPropagation();
    const type = cb.dataset.t;
    visibility[type] = cb.checked;
    applyVisibility(type);
  });
});

// ── 트랙 길이 포맷 ──
function fmtDist(d) {
  if (d < 1000) return d < 100 ? `${d.toFixed(1)}m` : `${Math.round(d)}m`;
  return `${(d/1000).toFixed(2)}km`;
}
function trackLenStr(item) {
  if (item.type !== 'track' || !item.polyline) return '';
  const m = item.polyline.getLength();
  if (!m) return '';
  return ` (L=${fmtDist(m)})`;
}

// ── 주소 → [읍면, 리, 번지] 분리 ──
function parseAddr3(addr) {
  if (!addr || addr === '…') return ['', '', ''];
  const parts = addr.trim().replace(/산\s+(\d)/g, '산$1').split(/\s+/);
  // 번지 시작 위치: 숫자로 시작하거나, 산+숫자, 또는 '산' 뒤에 숫자가 오는 경우
  let lotIdx = -1;
  for (let i = 0; i < parts.length; i++) {
    if (/^\d/.test(parts[i]) || /^산\d/.test(parts[i])) { lotIdx = i; break; }
    if (parts[i] === '산' && i + 1 < parts.length && /^\d/.test(parts[i + 1])) { lotIdx = i; break; }
  }
  if (lotIdx < 0) lotIdx = parts.length;
  const bunji = parts.slice(lotIdx).join(' ');
  const addrParts = parts.slice(0, lotIdx);
  return [addrParts[0] || '', addrParts.slice(1).join(' ') || '', bunji];
}

// 사진 확장자 (imgSrc MIME에서 추출, 전체 경로는 브라우저 보안상 불가)
function getImgExt(imgSrc) {
  const m = (imgSrc||'').match(/^data:image\/([a-zA-Z]+);/);
  if (!m) return '';
  return m[1].toLowerCase() === 'jpeg' ? '.jpg' : '.' + m[1].toLowerCase();
}

// ── XPTitle (UTF-16LE) → 문자열 변환 ──
function xpTitleToStr(bytes) {
  if (!bytes || bytes.length < 2) return '';
  let s = '';
  for (let i = 0; i + 1 < bytes.length; i += 2) {
    const code = bytes[i] | (bytes[i + 1] << 8);
    if (code === 0) break;
    s += String.fromCharCode(code);
  }
  return s.trim();
}

// EXIF에서 저장된 이름 읽기 (XPTitle → ImageDescription 순)
function readMetaName(exifObj) {
  try {
    const xpRaw = exifObj['0th']?.[40091]; // XPTitle
    if (xpRaw && xpRaw.length > 2) { const n = xpTitleToStr(xpRaw); if (n) return n; }
    const desc = (exifObj['0th']?.[piexif.ImageIFD.ImageDescription] || '').trim();
    if (desc) return desc;
  } catch(e) {}
  return '';
}

// ── 이미지 파일 판별 ──
const IMAGE_EXT = /\.(jpe?g|png|heic|heif|arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i;
const RAW_EXT   = /\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i;
function isImageFile(file) { return file.type.startsWith('image/') || IMAGE_EXT.test(file.name); }

// ── 디렉터리 재귀 탐색 (하위폴더 포함) ──
async function* walkDirForImages(dirHandle) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file') {
      const file = await entry.getFile();
      if (isImageFile(file)) yield file;
    } else if (entry.kind === 'directory') {
      yield* walkDirForImages(entry);
    }
  }
}

// ── 이미지 파일 목록 처리 (공통) ──
async function processImageFileList(files, statusCb) {
  const bounds = new kakao.maps.LatLngBounds();
  let noGPSAction = null;
  let done = 0;
  for (const file of files) {
    const n = file.name.toLowerCase();
    const imgName = file.name.replace(/\.[^/.]+$/, '');
    if (statusCb) statusCb(++done, files.length);

    if (RAW_EXT.test(n)) {
      let imgSrc=null, latlng=null, takenDate='';
      if (typeof exifr!=='undefined') {
        const [gpsData,thumbBuf,exifData]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null),exifr.parse(file,['DateTimeOriginal']).catch(()=>null)]);
        if (gpsData?.longitude!==undefined) latlng=new kakao.maps.LatLng(gpsData.latitude,gpsData.longitude);
        if (exifData?.DateTimeOriginal) takenDate=exifData.DateTimeOriginal.toISOString().substring(0,10);
        if (thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
      }
      if (!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
      if (latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);}
      else{if(noGPSAction===null)noGPSAction=confirm('위치 정보가 없는 사진이 있습니다.\n지도 중심에 마커를 추가하시겠습니까?');if(noGPSAction)addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);}
      continue;
    }

    await new Promise(resolve=>{
      (async()=>{
        const imgFile=await convertHeicIfNeeded(file);
        const reader=new FileReader();
        reader.onload=ev=>{
          const imgSrc=ev.target.result;
          let latlng=null,takenDate='',useName=imgName;
          try{
            const exif=piexif.load(imgSrc),gps=exif['GPS'];
            if(gps&&gps[piexif.GPSIFD.GPSLatitude]&&gps[piexif.GPSIFD.GPSLongitude]){
              const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
              const lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
              const lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
              if(!isNaN(lat)&&!isNaN(lng)&&(lat!==0||lng!==0))latlng=new kakao.maps.LatLng(lat,lng);
            }
            const rawDate=exif['Exif']?.[piexif.ExifIFD.DateTimeOriginal]||exif['0th']?.[piexif.ImageIFD.DateTime]||'';
            if(rawDate)takenDate=rawDate.substring(0,10).replace(/:/g,'-');
            const mn=readMetaName(exif); if(mn) useName=mn;
          }catch(ex){}
          if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,useName,takenDate);}
          else{if(noGPSAction===null)noGPSAction=confirm('위치 정보가 없는 사진이 있습니다.\n지도 중심에 마커를 추가하시겠습니까?');if(noGPSAction)addPhotoMarker(map.getCenter(),imgSrc,useName,takenDate);}
          resolve();
        };
        reader.readAsDataURL(imgFile);
      })();
    });
  }
  if (!bounds.isEmpty()) map.setBounds(bounds);
}

function updateDistance(mouseEvent) {
  if (!drawingMode || !currentPath.length) return;
  const last = currentPath[currentPath.length-1];
  const mp = mouseEvent.latLng;
  if (!moveLine) moveLine = new kakao.maps.Polyline({ strokeWeight:3, strokeColor:'#db4040', strokeOpacity:0.5 });
  moveLine.setPath([last, mp]); moveLine.setMap(map);
  const total = currentPolyline.getLength() + moveLine.getLength();
  const fmt = d => d<=1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  const html = `<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 <span>${fmt(total)}</span></div>`;
  if (distanceOverlay) { distanceOverlay.setPosition(mp); distanceOverlay.setContent(html); }
  else distanceOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:mp, xAnchor:0, yAnchor:0, zIndex:3 });
}

function initializeMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), { center, level:4, minLevel:0, mapTypeId:kakao.maps.MapTypeId.HYBRID });
  setTimeout(() => document.querySelectorAll('.zoom_in,.zoom_out,.zoom_reset,.map_zoom_close').forEach(el=>el.remove()), 500);
  window.map = map;
  // Edge에서 minLevel:0이 무시될 경우 휠 이벤트로 강제 처리
  document.getElementById('map').addEventListener('wheel', e => {
    if (e.deltaY < 0 && map && map.getLevel() === 1) {
      setTimeout(() => { if (map.getLevel() === 1) map.setLevel(0); }, 50);
    }
  }, { passive: true });
  geocoder = new kakao.maps.services.Geocoder();

  kakao.maps.event.addListener(map, 'click', e => {
    if (_blockMapClick) return;
    if (markerInputOverlay) { markerInputOverlay.setMap(null); markerInputOverlay=null; return; }
    if (movingPhotoMarker) {
      const mk = movingPhotoMarker.marker;
      mk.setPosition(e.latLng);
      mk.setDraggable(false);
      movingPhotoMarker = null;
      updateMarkerAddr(mk);
      return;
    }
    if (drawingMode) {
      currentPath.push(e.latLng);
      currentPolyline.setPath(currentPath);
      if (currentPath.length===1 && !distanceOverlay)
        distanceOverlay = new kakao.maps.CustomOverlay({ map, content:`<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 0m</div>`, position:e.latLng, xAnchor:0, yAnchor:1, zIndex:3 });
    }
    allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
    // 주소검색창 포커스 해제 (포커스 있으면 마커 생성이 막히므로)
    document.getElementById('address-input').blur();

    }
    const lat=e.latLng.getLat(), lng=e.latLng.getLng();
    document.getElementById('latlng-display').value = `${lat}, ${lng}`;
    geocoder.coord2Address(lng, lat, (res, status) => {
      const el = document.getElementById('address-display');
      el.onclick = () => { if (!el.innerText||el.innerText==='주소 없음'||el.innerText==='✅ 복사됨') return; copyAndMarkLocation(); };
      if (status===kakao.maps.services.Status.OK) {
        const legal = res[0].address?.address_name||'주소 없음';
        const roadFull = res[0].road_address?.address_name;
        const road = roadFull ? roadFull.split(' ').slice(1).join(' ') : '';
        el.innerText = road ? `${legal} / ${road}` : legal;
      } else el.innerText='주소 없음';
    });
  });

  kakao.maps.event.addListener(map, 'rightclick', e => {
    if (drawingMode) {
      if (moveLine) { moveLine.setMap(null); moveLine=null; }
      if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay=null; }
      drawingMode=false;
      document.getElementById('map').classList.remove('drawing-cursor');
      // 완성된 트랙을 목록에 추가
      if (currentPath.length >= 2) {
        const tname = currentPolyline._name || `경로 ${++trackCounter}`;
        if (!currentPolyline._name) currentPolyline._name = tname;
        addItem({ type:'track', name:tname, address:'', polyline:currentPolyline });
      } else {
        currentPolyline.setMap(null);
        polylines = polylines.filter(p=>p!==currentPolyline);
      }
      return;
    }
    const proj = map.getProjection(), clickPx = proj.pointFromCoords(e.latLng);
    let nearestPoly=null, nearestDist=Infinity;
    polylines.forEach(pl => {
      if (!pl||!pl.getMap()) return;
      const path=pl.getPath();
      for (let i=0;i<path.length-1;i++) {
        const d=ptSegDist(clickPx, proj.pointFromCoords(path[i]), proj.pointFromCoords(path[i+1]));
        if (d<nearestDist) { nearestDist=d; nearestPoly=pl; }
      }
    });
    if (nearestPoly && nearestDist<=10) showPolyMenu(lastClientX, lastClientY, nearestPoly);
    else showMarkerInput(e.latLng);
  });

  function ptSegDist(p,a,b) {
    const dx=b.x-a.x, dy=b.y-a.y;
    if (!dx&&!dy) return Math.hypot(p.x-a.x,p.y-a.y);
    const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
    return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
  }

  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    geocoder.addressSearch(document.getElementById('address-input').value, (res,status) => {
      if (status===kakao.maps.services.Status.OK) {

  kakao.maps.event.addListener(map, 'mousemove', updateDistance);

  // Ctrl+V 붙여넣기 — 클립보드의 이미지 데이터를 마커로 추가
  //   (엑셀 셀의 파일경로 삽입은 '⬇ 엑셀 선택 삽입' 버튼 / Ctrl+Shift+V 사용)
  document.addEventListener('paste', async e => {
    const item = Array.from(e.clipboardData?.items||[]).find(i=>i.type.startsWith('image/'));
    if (!item) return;
    e.preventDefault();
    const file=item.getAsFile(); if(!file) return;
    const reader=new FileReader();
    reader.onload = ev => {
      const imgSrc=ev.target.result;
      const img=new Image();
      img.onload = () => {
        let lat=null,lng=null;
        try {
          const exif=piexif.load(imgSrc), gps=exif['GPS'];
          if (gps&&gps[piexif.GPSIFD.GPSLatitude]) {
            const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
            lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
            lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
            if (isNaN(lat)||isNaN(lng)||(lat===0&&lng===0)) {lat=null;lng=null;}
          }
        } catch(ex){}
        const now=new Date();
        const name=`붙여넣기_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const pos=(lat&&lng)?new kakao.maps.LatLng(lat,lng):map.getCenter();
        addPhotoMarker(pos,imgSrc,name,'');
        if (!lat) { const added=markers.at(-1); if(added){added.marker.setDraggable(true);movingPhotoMarker=added;} }
      };
      img.src=imgSrc;
    };
    reader.readAsDataURL(file);
  });
}

// ── 마커 이미지 생성 (SVG 원형) ──
function mkMarkerImg(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"><circle cx="9" cy="9" r="8" fill="${color}" stroke="white" stroke-width="2"/></svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(18, 18),
    { offset: new kakao.maps.Point(9, 9) }
  );
}
const MARKER_IMG_RED  = ()=>mkMarkerImg('#e74c3c');  // 설명/위치 마커
const MARKER_IMG_BLUE = ()=>mkMarkerImg('#2471a3');  // 사진 마커

function addMarker(latlng, desc) {
  const marker=new kakao.maps.Marker({map,position:latlng,image:MARKER_IMG_RED(),draggable:false});
  const div=document.createElement('div');
  div.style='position:relative;display:flex;align-items:center;justify-content:space-between;padding:5px;';
  div.innerHTML=`<span>${desc}</span><div style="cursor:pointer;font-weight:bold;margin-left:8px;">✖</div>`;
  const [label,btn]=div.querySelectorAll('span,div');
  const iw=new kakao.maps.InfoWindow({content:div});
  kakao.maps.event.addListener(marker,'click',()=>{blockMapClick();if(!showNumbers)iw.open(map,marker);selectItemByMarker(marker);});
  kakao.maps.event.addListener(marker,'rightclick',()=>showEditInput({marker,iw,name:desc},label));
  btn.onclick=()=>iw.close();
  let holdTimer=null;
  let _dragStartPos = null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);_dragStartPos=marker.getPosition();movingPhotoMarker={marker,iw,name:desc};},300);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;const prev=_dragStartPos;const next=marker.getPosition();_dragStartPos=null;updateMarkerAddr(marker);if(prev&&(prev.getLat()!==next.getLat()||prev.getLng()!==next.getLng())){pushHistory({undo(){marker.setPosition(prev);updateMarkerAddr(marker);},redo(){marker.setPosition(next);updateMarkerAddr(marker);}});}}});
  const markerObj={marker,iw,name:desc};
  markers.push(markerObj);
  addItem({type:'marker',name:desc,address:'',markerObj});
}

function addPhotoMarker(latlng, imgSrc, filename, takenDate, fileHandle=null) {
  const marker=new kakao.maps.Marker({map,position:latlng,image:MARKER_IMG_BLUE(),draggable:false});
  const div=document.createElement('div');

    isDownloading=false;
  };

  const iw=new kakao.maps.InfoWindow({content:div});
  // 타이머로 단일클릭/더블클릭 구분 (Kakao dblclick 이벤트는 지도 줌과 충돌)
  let _clickTimer=null;
  kakao.maps.event.addListener(marker,'click',()=>{

  kakao.maps.event.addListener(marker,'rightclick',()=>{const e=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(e?e.markerObj:{marker,iw,name:filename},title);});
  // InfoWindow 제목 더블클릭으로도 수정 가능
  title.ondblclick=e=>{e.stopPropagation();const entry=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(entry?entry.markerObj:{marker,iw,name:filename},title);};
  clBtn.onclick=()=>iw.close();

  let holdTimer=null;
  let _dragStartPos2 = null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);_dragStartPos2=marker.getPosition();movingPhotoMarker={marker,iw,name:filename};},300);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;const prev=_dragStartPos2;const next=marker.getPosition();_dragStartPos2=null;updateMarkerAddr(marker);if(prev&&(prev.getLat()!==next.getLat()||prev.getLng()!==next.getLng())){pushHistory({undo(){marker.setPosition(prev);updateMarkerAddr(marker);},redo(){marker.setPosition(next);updateMarkerAddr(marker);}});}}});

  if (!markers.find(m=>m.marker===marker)) {
    const markerObj={marker,iw,name:filename,fileHandle};
    markers.push(markerObj);
    addItem({type:'photo',name:filename,address:'',markerObj,imgSrc,fileHandle});
  }
}

function showEditInput(markerObj, label) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);
  const c=document.createElement('div');
  c.innerHTML=`<input type="text" value="${label.textContent}" style="width:120px;padding:3px;" lang="ko" autocomplete="off" autofocus><button style="margin-top:4px;">수정</button><button style="margin-top:4px;">삭제</button>`;

  markerInputOverlay=new kakao.maps.CustomOverlay({position:markerObj.marker.getPosition(),content:c,yAnchor:1});
  markerInputOverlay.setMap(map);
  c.addEventListener('mousedown',e=>e.stopPropagation());
  const [inp,editBtn,deleteBtn]=c.querySelectorAll('input,button');
  inp.focus(); const v=inp.value; inp.value=''; inp.value=v;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();editBtn.click();}});

  editBtn.onclick=()=>{
    const newName=inp.value.trim()||'설명 없음';
    label.textContent=newName;
    const dup=markers.filter(m=>m.marker===markerObj.marker);
    if (dup.length>1) markers=markers.filter((m,i)=>m.marker!==markerObj.marker||i===markers.findIndex(x=>x.marker===markerObj.marker));
    const found=markers.find(m=>m.marker===markerObj.marker);
    if (found) found.name=newName;
    markerObj.name=newName;
    const aItem=allItems.find(i=>i.markerObj?.marker===markerObj.marker);
    if (aItem){aItem.name=newName;renderList();}
    markerObj.iw.close(); markerInputOverlay.setMap(null);
  };
  deleteBtn.onclick=()=>{
    markerInputOverlay.setMap(null);
    const item = allItems.find(i => i.markerObj?.marker === markerObj.marker);
    if (item) {
      _hideItemOnMap(item);
      const idx = allItems.indexOf(item);
      if (idx >= 0) allItems.splice(idx, 1);
      selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
      clearPreview(); renderList();
      pushHistory({
        undo(){ _readdItemSilent(item); },
        redo(){ _removeItemSilent(item); }
      });
    } else {
      markerObj.marker.setMap(null); markerObj.iw.close();
      markers = markers.filter(m => m.marker !== markerObj.marker);
    }
  };
}

function attachPolylineRightClick(poly) {

  let lp=null;

  kakao.maps.event.addListener(poly,'touchmove',()=>clearTimeout(lp));
}

  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:3,strokeColor:'#FF0000',strokeOpacity:0.8});

function startDrawing() {

  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:3,strokeColor:'#FF0000',strokeOpacity:0.8});
  polylines.push(currentPolyline); attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
}

// ══════════════════════════════════════════════════
//  통합 키보드 핸들러
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const inInput = e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA';
  const inListInput = inInput && e.target.closest('#photoListWrapper');

  // 목록 인풋 안에서는 상위 처리 차단 (onkeydown으로 자체 처리)
  if (inListInput) return;

  // 그리기 모드 Backspace/Escape/Ctrl+Z
  if (drawingMode && currentPath.length>0 && !inInput) {
    if (e.key==='Backspace'||e.key==='Escape'||(e.key==='z'&&e.ctrlKey)) {
      e.preventDefault(); currentPath.pop(); currentPolyline.setPath([...currentPath]);
      if (!currentPath.length){if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}if(moveLine){moveLine.setMap(null);moveLine=null;}}
      else updateDistanceOverlay(currentPath[currentPath.length-1]);
      return;
    }
  }

  // 일반 단축키
  if (!inInput) {
    // Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y — 통합 Undo/Redo
    if (e.ctrlKey && !e.shiftKey && e.key.toLowerCase()==='z'){e.preventDefault();doUndo();return;}
    if (e.ctrlKey && ((e.shiftKey && e.key.toLowerCase()==='z') || e.key.toLowerCase()==='y')){e.preventDefault();doRedo();return;}
    if (e.ctrlKey&&e.key.toLowerCase()==='a'){e.preventDefault();const fl=getFilteredItems();fl.forEach((_,i)=>selectedItems.add(i));anchorIdx=0;lastClickedIdx=fl.length-1;renderList();return;}
    if (e.ctrlKey&&e.key.toLowerCase()==='c'&&!window.getSelection().toString()){
      e.preventDefault();
      if (selectedItems.size > 0) {
        document.getElementById('copyListBtn').click();
      } else {
        copyAndMarkLocation();
      }
      return;
    }
    // Ctrl+Shift+V — 엑셀 선택 영역(파일경로) 삽입
    if (e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='v'){e.preventDefault();insertExcelSelection();return;}
    if (e.key==='F1'){e.preventDefault();window.open('https://junty75.github.io/map/help','_blank','width=900,height=700,scrollbars=yes');return;}
    if (e.altKey){
      e.preventDefault();
      if (drawingMode) {
        if(moveLine){moveLine.setMap(null);moveLine=null;}
        if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
        drawingMode=false; document.getElementById('map').classList.remove('drawing-cursor');
        if (currentPath.length>=2) {
          const tname=currentPolyline._name||`경로 ${++trackCounter}`;
          if(!currentPolyline._name) currentPolyline._name=tname;
          addItem({type:'track',name:tname,address:'',polyline:currentPolyline});
        } else { currentPolyline.setMap(null); polylines=polylines.filter(p=>p!==currentPolyline); }
      } else startDrawing();
      return;
    }
  }
  if (e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();exportByFormat();return;}

  // 목록 방향키 + Enter + Delete (입력창 밖)
  if (!inInput) {
    const filtered=getFilteredItems();

    if (e.key==='Delete' && selectedItems.size>0) {
      e.preventDefault();
      const toDelete=[...selectedItems].map(i=>filtered[i]).filter(Boolean);
      const names=toDelete.map(i=>i.name).join(', ');
      if (!confirm(`"${names}"\n\n${toDelete.length}개 항목을 삭제하시겠습니까?`)) return;
      toDelete.forEach(item => _hideItemOnMap(item));
      allItems=allItems.filter(i=>!toDelete.includes(i));
      selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
      clearPreview(); renderList();
      pushHistory({
        undo(){ toDelete.forEach(item => _readdItemSilent(item)); },
        redo(){ toDelete.forEach(item => _removeItemSilent(item)); }
      });
      return;
    }

    if (e.key==='ArrowDown'){
      e.preventDefault();
      const next=lastClickedIdx<0?0:Math.min(lastClickedIdx+1,filtered.length-1);
      if (filtered.length>0){
        selectedItems.clear(); selectedItems.add(next); anchorIdx=next;
        renderList(); selectFilteredItem(next);
      }
    } else if (e.key==='ArrowUp'){
      e.preventDefault();
      if (lastClickedIdx>0){
        const prev=lastClickedIdx-1;
        selectedItems.clear(); selectedItems.add(prev); anchorIdx=prev;
        renderList(); selectFilteredItem(prev);
      }
    } else if (e.key==='Enter'&&lastClickedIdx>=0){
      e.preventDefault();
      const rows=document.querySelectorAll('#photoTbody tr');
      const row=rows[lastClickedIdx];
      if (row&&!row.querySelector('.item-name-input')) startEditItem(row,filtered[lastClickedIdx],lastClickedIdx);
    }
  }
});
