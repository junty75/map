// 검색 결과 모달 — items=[{path,name,...}]
//   onPick(item):       행 클릭 시(임시 미리보기). 창은 닫지 않음 → 다른 항목도 확인 가능.
//   onSaveItems(items): 하단 '저장하기' — 체크된 항목들을 한꺼번에 영구 저장.
function showSearchResults(title, items, onPick, fmt, onSaveItems) {
  let modal = document.getElementById('searchResultModal');
  if (!modal) {
    // 지도를 가리지 않는 떠있는 패널 — 헤더를 잡고 드래그해 이동 가능
    modal = document.createElement('div');
    modal.id = 'searchResultModal';
    modal.style.cssText = 'position:fixed;top:70px;right:20px;z-index:100000;background:#fff;border-radius:8px;width:380px;max-width:90vw;max-height:75vh;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.35);';
    modal.innerHTML = `
      <div id="srHeader" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #e0e0e0;cursor:move;user-select:none;background:#f5f9fc;border-radius:8px 8px 0 0;">
        <b id="srTitle" style="font-size:14px;">결과</b>
        <button id="srClose" style="border:none;background:none;font-size:18px;cursor:pointer;line-height:1;">✕</button>
      </div>
      <div id="srSelBar" style="display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid #eee;background:#fafafa;font-size:12px;">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;"><input type="checkbox" id="srSelectAll"> 전체 선택</label>
        <span id="srSelCount" style="color:#888;">0개 선택</span>
        <button id="srMapToggle" title="검색 결과 전체를 지도에 마커로 표시 — 다시 누르면 해제. 마커 클릭 시 목록에서 해당 항목 선택" style="padding:3px 10px;border:1px solid #27ae60;border-radius:4px;background:#fff;color:#27ae60;font-size:12px;font-weight:bold;cursor:pointer;">🗺 지도삽입</button>
        <button id="srSelectMode" title="켜면 행을 클릭해서 선택할 수 있습니다 (끄면 체크박스로만 선택)" style="margin-left:auto;padding:3px 10px;border:1px solid #1a5276;border-radius:4px;background:#fff;color:#1a5276;font-size:12px;font-weight:bold;cursor:pointer;">선택하기</button>
      </div>
      <div id="srList" style="overflow:auto;padding:6px 0;flex:1;"></div>
      <div id="srFooter" style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid #e0e0e0;">
        <span style="color:#888;font-size:12px;">체크박스=선택 · 행 클릭/↑↓=미리보기</span>
        <button id="srSave" style="padding:6px 16px;border:none;border-radius:5px;background:#1a5276;color:#fff;font-size:13px;font-weight:bold;cursor:pointer;">💾 저장하기</button>
      </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#srClose').onclick = () => {
      if (modal._srMapMarkerMap) { Object.values(modal._srMapMarkerMap).forEach(m => m && m.setMap(null)); modal._srMapMarkerMap = {}; }
      modal._srMapOn = false; modal._srSelectedIdx = undefined;
      window.__srMapDisplayOn = false;
      modal.style.display = 'none';
    };
    // ↑↓ 화살표로 결과 항목을 위/아래로 이동하며 미리보기 (한 번만 등록)
    document.addEventListener('keydown', e => {
      if (modal.style.display === 'none' || !modal._moveSel) return;
      if (e.target.matches && e.target.matches('input[type="text"],textarea')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); modal._moveSel(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); modal._moveSel(-1); }
    });
    // 헤더 드래그 이동
    (function () {
      const hdr = modal.querySelector('#srHeader');
      let sx, sy, ox, oy, dragging = false;
      hdr.addEventListener('mousedown', e => {
        if (e.target.id === 'srClose') return;
        dragging = true; sx = e.clientX; sy = e.clientY;
        const r = modal.getBoundingClientRect(); ox = r.left; oy = r.top;
        modal.style.right = 'auto'; modal.style.left = ox + 'px'; modal.style.top = oy + 'px';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        modal.style.left = (ox + e.clientX - sx) + 'px';
        modal.style.top  = (oy + e.clientY - sy) + 'px';
      });
      document.addEventListener('mouseup', () => { dragging = false; });
    })();
  }
  modal.querySelector('#srTitle').textContent = title;
  const list    = modal.querySelector('#srList');
  const selAll  = modal.querySelector('#srSelectAll');
  const selCnt  = modal.querySelector('#srSelCount');
  const saveBtn = modal.querySelector('#srSave');
  const selModeBtn = modal.querySelector('#srSelectMode');
  const mapToggleBtn = modal.querySelector('#srMapToggle');
  // 새 결과가 올 때마다 기존 지도 마커 제거 & 버튼 초기화
  if (modal._srMapMarkerMap) { Object.values(modal._srMapMarkerMap).forEach(m => m && m.setMap(null)); modal._srMapMarkerMap = {}; }
  modal._srMapOn = false; modal._srSelectedIdx = undefined;
  mapToggleBtn.style.background = '#fff'; mapToggleBtn.style.color = '#27ae60'; mapToggleBtn.textContent = '🗺 지도삽입';

  // '선택하기' 모드: 켜면 행 클릭으로 선택, 끄면 체크박스로만 선택
  let selectMode = false;
  function setSelectMode(on) {
    selectMode = on;
    selModeBtn.style.background = on ? '#1a5276' : '#fff';
    selModeBtn.style.color      = on ? '#fff' : '#1a5276';
    selModeBtn.textContent      = on ? '✓ 선택 중' : '선택하기';
  }
  setSelectMode(false);   // 새 결과창은 항상 끈 상태로 시작
  selModeBtn.onclick = () => setSelectMode(!selectMode);

  function updateCount() {
    const checks = [...list.querySelectorAll('.sr-check')];
    const n = checks.filter(c => c.checked).length;
    selCnt.textContent = `${n}개 선택`;
    selAll.checked = n > 0 && n === checks.length;
    selAll.indeterminate = n > 0 && n < checks.length;
  }

  // 행 선택(미리보기) — 클릭과 ↑↓ 화살표가 공통으로 사용
  const rows = [];
  let curIdx = -1;
  // fromMap=true: 지도에 표시된 번호 마커 클릭 — 선택/색상/미리보기만 하고 지도 중심은 안 움직임(수동 이동 유지)
  function selectAt(idx, fromMap) {
    if (idx < 0 || idx >= rows.length) return;
    curIdx = idx;
    list.querySelectorAll('.sr-row').forEach(r => { r.dataset.sel = ''; r.style.background = ''; });
    const { row, it } = rows[idx];
    row.dataset.sel = '1';
    row.style.background = '#d6eaf8';
    row.scrollIntoView({ block: 'nearest' });
    if (typeof it.lat !== 'number' || typeof it.lng !== 'number') {
      let _mo = document.getElementById('mapCenterMsg');
      if (!_mo) { _mo = document.createElement('div'); _mo.id='mapCenterMsg'; _mo.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;pointer-events:none;z-index:90000;transition:opacity .4s;'; document.getElementById('map').appendChild(_mo); }
      _mo.textContent='📍 위치 정보 없음'; _mo.style.opacity='1';
      clearTimeout(_mo._t); _mo._t = setTimeout(() => { _mo.style.opacity='0'; }, 2000);
    }
    if (modal._srMapOn && typeof it.lat === 'number' && typeof it.lng === 'number') {
      // 목록에서 선택: 번호가 화면 안에 보이면 이동 안 함, 화면 밖일 때만 중심 이동.
      // 지도 번호 클릭(fromMap): 이동 안 함.
      const pos = new kakao.maps.LatLng(it.lat, it.lng);
      if (!fromMap && !holdView && !map.getBounds().contain(pos)) map.setCenter(pos);   // Hold 켜짐 → 화면 이동 안 함
      // 이전 선택 마커 → 빨강 복원
      if (modal._srSelectedIdx !== undefined && modal._srSelectedIdx !== idx) {
        const pm = modal._srMapMarkerMap[modal._srSelectedIdx];
        if (pm) { const pn = modal._srSelectedIdx+1; const ps=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="9" fill="#e74c3c" stroke="white" stroke-width="2"/><text x="11" y="15" text-anchor="middle" fill="white" font-size="9" font-weight="bold">${pn<=99?pn:'·'}</text></svg>`; pm.setImage(new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(ps),new kakao.maps.Size(22,22),{offset:new kakao.maps.Point(11,11)})); pm.setZIndex(1); }
      }
      // 현재 선택 마커 → 녹색 + 맨앞
      const cm = modal._srMapMarkerMap[idx];
      if (cm) { const cn=idx+1; const cs=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="9" fill="#27ae60" stroke="white" stroke-width="2"/><text x="11" y="15" text-anchor="middle" fill="white" font-size="9" font-weight="bold">${cn<=99?cn:'·'}</text></svg>`; cm.setImage(new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(cs),new kakao.maps.Size(22,22),{offset:new kakao.maps.Point(11,11)})); cm.setZIndex(10); }
      modal._srSelectedIdx = idx;
    }
    onPick(it);   // 지도표시 중에도 사진 미리보기는 항상 실행
  }
  modal._moveSel = dir => {
    if (!rows.length) return;
    let n = curIdx < 0 ? (dir > 0 ? 0 : rows.length - 1) : curIdx + dir;
    n = Math.max(0, Math.min(rows.length - 1, n));
    selectAt(n);
  };
  modal._srSelectAt = selectAt;

  function mkOneSrMarker(it, idx) {
    if (typeof it.lat !== 'number' || typeof it.lng !== 'number') return null;
    const pos = new kakao.maps.LatLng(it.lat, it.lng);
    const n = idx + 1;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="11" cy="11" r="9" fill="#e74c3c" stroke="white" stroke-width="2"/><text x="11" y="15" text-anchor="middle" fill="white" font-size="9" font-weight="bold">${n <= 99 ? n : '·'}</text></svg>`;
    const img = new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg), new kakao.maps.Size(22, 22), { offset: new kakao.maps.Point(11, 11) });
    const marker = new kakao.maps.Marker({ map, position: pos, image: img });
    kakao.maps.event.addListener(marker, 'click', () => { modal._srSelectAt && modal._srSelectAt(idx, true); });
    return marker;
  }

  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div style="padding:20px;color:#888;text-align:center;">결과 없음</div>';
    selAll.checked = false; selAll.indeterminate = false; selCnt.textContent = '0개 선택';
  } else {
    items.forEach((it, idx) => {
      const row = document.createElement('div');
      row.className = 'sr-row';
      row.style.cssText = 'display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:13px;';
      row.onmouseover = () => { if (row.dataset.sel !== '1') row.style.background = '#eef6fc'; };
      row.onmouseout  = () => { if (row.dataset.sel !== '1') row.style.background = ''; };
      const numBadge = document.createElement('span');
      numBadge.className = 'sr-num';
      numBadge.textContent = String(idx + 1);
      numBadge.style.cssText = 'display:none;min-width:18px;height:18px;border-radius:50%;background:#e74c3c;color:white;font-size:9px;font-weight:bold;flex-shrink:0;align-items:center;justify-content:center;margin-top:2px;';
      const chk = document.createElement('input');
      chk.type = 'checkbox'; chk.className = 'sr-check'; chk.style.marginTop = '3px';
      chk._item = it;
      chk.onclick = e => {
        e.stopPropagation();
        if (modal._srMapOn) {
          if (chk.checked) {
            if (!modal._srMapMarkerMap[idx]) modal._srMapMarkerMap[idx] = mkOneSrMarker(it, idx);
          } else {
            if (modal._srMapMarkerMap && modal._srMapMarkerMap[idx]) {
              modal._srMapMarkerMap[idx].setMap(null);
              delete modal._srMapMarkerMap[idx];
            }
          }
        }
        updateCount();
      };
      const body = document.createElement('div');
      body.style.flex = '1';
      body.innerHTML = fmt ? fmt(it) : `<b>${escHtml(it.name)}</b>`;
      row.appendChild(chk); row.appendChild(numBadge); row.appendChild(body);
      row.title = it.path || '';
      rows.push({ row, it, chk });
      row.onclick = () => {
        // 선택 모드일 때만 행 클릭으로 체크 토글 (기본은 미리보기만)
        if (selectMode) { chk.checked = !chk.checked; updateCount(); }
        selectAt(idx);
      };
      list.appendChild(row);
    });
    updateCount();
  }

  selAll.onclick = () => {
    list.querySelectorAll('.sr-check').forEach(c => { c.checked = selAll.checked; });
    updateCount();
  };
  saveBtn.style.display = onSaveItems ? '' : 'none';
  saveBtn.onclick = () => {
    const sel = [...list.querySelectorAll('.sr-check')].filter(c => c.checked).map(c => c._item);
    if (!sel.length) { alert('저장할 항목을 체크하세요 (전체 선택 가능).'); return; }
    if (onSaveItems) onSaveItems(sel);
  };

  // 지도삽입 토글 — ON: 전체 체크+지도표시 / OFF: 전체 해제+마커제거
  mapToggleBtn.onclick = () => {
    if (modal._srMapOn) {
      if (modal._srMapMarkerMap) { Object.values(modal._srMapMarkerMap).forEach(m => m && m.setMap(null)); }
      modal._srMapMarkerMap = {};
      modal._srMapOn = false; modal._srSelectedIdx = undefined;
      window.__srMapDisplayOn = false;
      mapToggleBtn.style.background = '#fff'; mapToggleBtn.style.color = '#27ae60'; mapToggleBtn.textContent = '🗺 지도삽입';
      list.querySelectorAll('.sr-check').forEach(c => { c.checked = false; });
      list.querySelectorAll('.sr-num').forEach(n => { n.style.display = 'none'; });
      updateCount();
    } else {
      modal._srMapOn = true;
      modal._srMapMarkerMap = {};
      window.__srMapDisplayOn = true;
      mapToggleBtn.style.background = '#27ae60'; mapToggleBtn.style.color = '#fff'; mapToggleBtn.textContent = '✓ 지도표시 중';
      list.querySelectorAll('.sr-check').forEach(c => { c.checked = true; });
      list.querySelectorAll('.sr-num').forEach(n => { n.style.display = 'flex'; });
      updateCount();
      items.forEach((it, idx) => {
        const m = mkOneSrMarker(it, idx);
        if (m) modal._srMapMarkerMap[idx] = m;
      });
    }
  };

  modal.style.display = 'flex';
}

// 검색 결과에서 체크된 항목들을 지정한 폴더에 복사 저장 (서버가 폴더 선택창 띄움)
function saveSearchItems(sel) {
  const paths = sel.map(it => it.path).filter(Boolean);
  if (!paths.length) { alert('저장할 파일 경로가 없습니다.'); return; }
  window.__wsSend({ type: 'save_files_to_folder', paths });
  window.__setBadge && window.__setBadge(true, `💾 ${paths.length}개 — 저장 폴더 선택 중…`);
}

// ══════════════════════════════════════════════════
//  지도 전역 변수
// ══════════════════════════════════════════════════
let map, geocoder, drawingMode = false;
let roadviewPickMode = false;
// 위치로 검색 — 지도에서 중심점·반경 직접 선택
let locPickMode = null;            // null | 'center' | 'radius'
let locCenter = null, locCircle = null, locCenterDot = null;
let locRadiusLine = null, locRadiusOverlay = null;
let markers = [], polylines = [], markerInputOverlay = null;
let currentPolyline, currentPath = [];
let searchMarker = null, movingPhotoMarker = null;
let moveLine = null, distanceOverlay = null;
let locationMarkerCount = 0;
let showNumbers = false, numberOverlays = [];
let trackHighlightPolylines = [];
let trackAllHighlights = [];
let trackAllColorActive = false;
let trackNameOrgActive = false;
const trackOrigNames = new Map();

function getRandomColor() { return '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); }

// ── 거리 표시 ──
function updateDistance(mouseEvent) {
  if (!drawingMode || !currentPath.length) return;
  const last = currentPath[currentPath.length-1];
  const mp = mouseEvent.latLng;
  if (!moveLine) moveLine = new kakao.maps.Polyline({ strokeWeight:3, strokeColor:'#db4040', strokeOpacity:0.5 });
  moveLine.setPath([last, mp]); moveLine.setMap(map);
  const total = currentPolyline.getLength() + moveLine.getLength();
  const fmt = d => d<=1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  const html = `<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 <span>${fmt(total)}</span></div>`;
  if (distanceOverlay) { distanceOverlay.setPosition(mp); distanceOverlay.setContent(html); }
  else distanceOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:mp, xAnchor:0, yAnchor:0, zIndex:3 });
}

function updateDistanceOverlay(pos) {
  const fmt = d => d<=1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  const html = `<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 <span>${fmt(currentPolyline.getLength())}</span></div>`;
  if (distanceOverlay) { distanceOverlay.setPosition(pos); distanceOverlay.setContent(html); }
  else distanceOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:pos, xAnchor:0, yAnchor:0, zIndex:3 });
}

// ══════════════════════════════════════════════════
//  지도 초기화
// ══════════════════════════════════════════════════
function initializeMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), { center, level:4, minLevel:0, mapTypeId:kakao.maps.MapTypeId.HYBRID });
  setTimeout(() => document.querySelectorAll('.zoom_in,.zoom_out,.zoom_reset,.map_zoom_close').forEach(el=>el.remove()), 500);
  window.map = map;
  // Edge에서 minLevel:0이 무시될 경우 휠 이벤트로 강제 처리
  document.getElementById('map').addEventListener('wheel', e => {
    if (e.deltaY < 0 && map && map.getLevel() === 1) {
      setTimeout(() => { if (map.getLevel() === 1) map.setLevel(0); }, 50);
    }
  }, { passive: true });
  geocoder = new kakao.maps.services.Geocoder();
  openSidebar();   // 지도 열릴 때 사이드바를 기본으로 펼친 상태로

  // 줌/이동이 끝날 때마다 묶음선을 화면 교차 구간만 다시 반영 (줌인 느림 해결)
  kakao.maps.event.addListener(map, 'idle', scheduleBundleCull);
  kakao.maps.event.addListener(map, 'idle', refreshViewFilterList);   // '필터' 켜짐 시 화면이동마다 목록 갱신

  kakao.maps.event.addListener(map, 'click', e => {
    if (_blockMapClick) return;
    // 로드뷰 지점 선택 모드 — 클릭한 지점의 카카오 로드뷰를 새 창으로 연다
    if (roadviewPickMode) {
      stopRoadviewPick();
      openRoadview(e.latLng.getLat(), e.latLng.getLng());
      return;
    }
    // 위치로 검색 — ①중심점 클릭 ②반경 정하고 다시 클릭
    if (locPickMode === 'center') {
      locCenter = e.latLng;
      locCenterDot = new kakao.maps.CustomOverlay({ map, position:locCenter, xAnchor:0.5, yAnchor:0.5, zIndex:8,
        content:'<div style="width:12px;height:12px;background:#ff00aa;border:2px solid #fff;border-radius:50%;box-shadow:0 0 3px rgba(0,0,0,.6);"></div>' });
      locCircle = new kakao.maps.Circle({ center:locCenter, radius:1,
        strokeWeight:2, strokeColor:'#ff00aa', strokeOpacity:0.9, strokeStyle:'shortdash',
        fillColor:'#cc00ff', fillOpacity:0.18 });
      locCircle.setMap(map);
      locPickMode = 'radius';
      showSaveStatus('🧭 반경을 정한 뒤 한 번 더 클릭하세요 (Esc=취소)');
      return;
    }
    if (locPickMode === 'radius') {
      const r = Math.max(1, Math.round(
        locRadiusLine ? locRadiusLine.getLength() : (locCircle ? locCircle.getRadius() : 0)));
      const lat = locCenter.getLat(), lng = locCenter.getLng();
      stopLocationPick();
      clearLocationPick(true);   // 원·중심점은 검색 동안 남겨 둠 (선·라벨만 제거)
      window.__wsSend({ type:'search_kmz_by_location', lat, lng, radius:r,
        winX:window.screenX, winY:window.screenY, winW:window.outerWidth, winH:window.outerHeight });
      window.__setBadge && window.__setBadge(true, `🧭 반경 ${_fmtR(r)} — 검색 폴더 선택 중…`);
      return;
    }
    if (markerInputOverlay) { markerInputOverlay.setMap(null); markerInputOverlay=null; return; }
    if (movingPhotoMarker) {
      const mk = movingPhotoMarker.marker;
      mk.setPosition(e.latLng);
      mk.setDraggable(false);
      movingPhotoMarker = null;
      updateMarkerAddr(mk);
      return;
    }
    // 그리기 꼭짓점 추가는 #map의 DOM 캡처 핸들러에서 처리 (마커 위 클릭도 동작 — 중복 추가 방지 위해 여기선 생략)
    allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
    // 주소검색창 포커스 해제 (포커스 있으면 마커 생성이 막히므로)
    document.getElementById('address-input').blur();
    // 지도 클릭 시 사이드바 선택 전체 해제
    if (selectedItems.size > 0) {
      selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
      document.querySelectorAll('#photoTbody tr').forEach(r=>r.classList.remove('selected'));
      highlightPhotoMarkers(null);   // 사진마커 강조 해제
      if (showNumbers) renderNumbers();
    }
    const lat=e.latLng.getLat(), lng=e.latLng.getLng();
    document.getElementById('latlng-display').value = `${lat}, ${lng}`;
    geocoder.coord2Address(lng, lat, (res, status) => {
      const el = document.getElementById('address-display');
      el.onclick = () => { if (!el.innerText||el.innerText==='주소 없음'||el.innerText==='✅ 복사됨') return; copyAndMarkLocation(); };
      if (status===kakao.maps.services.Status.OK) {
        const legal = res[0].address?.address_name||'주소 없음';
        const roadFull = res[0].road_address?.address_name;
        const road = roadFull ? roadFull.split(' ').slice(1).join(' ') : '';
        el.innerText = road ? `${legal} / ${road}` : legal;
      } else el.innerText='주소 없음';
    });
  });

  kakao.maps.event.addListener(map, 'rightclick', e => {
    if (drawingMode) { finishDrawing(); return; }
    if (Date.now() - _lastDrawFinishTs < 400) return;   // 그리기 종료 직후 중복 우클릭 무시
    const proj = map.getProjection(), clickPx = proj.pointFromCoords(e.latLng);
    let nearestPoly=null, nearestDist=Infinity;
    polylines.forEach(pl => {
      if (!pl||!pl.getMap()) return;
      for (const path of pathParts(pl)) {
        for (let i=0;i<path.length-1;i++) {
          const d=ptSegDist(clickPx, proj.pointFromCoords(path[i]), proj.pointFromCoords(path[i+1]));
          if (d<nearestDist) { nearestDist=d; nearestPoly=pl; }
        }
      }
    });
    if (nearestPoly && nearestDist<=10) showPolyMenu(lastClientX, lastClientY, nearestPoly);
    else showMarkerInput(e.latLng);
  });

  function ptSegDist(p,a,b) {
    const dx=b.x-a.x, dy=b.y-a.y;
    if (!dx&&!dy) return Math.hypot(p.x-a.x,p.y-a.y);
    const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
    return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
  }

  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    geocoder.addressSearch(document.getElementById('address-input').value, (res,status) => {
      if (status===kakao.maps.services.Status.OK) {
        const pos=new kakao.maps.LatLng(res[0].y,res[0].x);
        map.setCenter(pos);
        if (searchMarker) searchMarker.setMap(null);
        searchMarker=new kakao.maps.Marker({map,position:pos});
        kakao.maps.event.addListener(searchMarker,'rightclick',()=>{searchMarker.setMap(null);searchMarker=null;});
      } else alert('주소를 찾을 수 없습니다');
    });
  });

  kakao.maps.event.addListener(map, 'mousemove', updateDistance);
  kakao.maps.event.addListener(map, 'mousemove', updateLocationRadius);

  // Ctrl+V 붙여넣기 — 클립보드의 이미지 데이터를 마커로 추가
  //   (엑셀 셀의 파일경로 삽입은 '⬇ 엑셀 선택 삽입' 버튼 / Ctrl+Shift+V 사용)
  document.addEventListener('paste', async e => {
    const item = Array.from(e.clipboardData?.items||[]).find(i=>i.type.startsWith('image/'));
    if (!item) return;
    e.preventDefault();
    const file=item.getAsFile(); if(!file) return;
    const reader=new FileReader();
    reader.onload = ev => {
      const imgSrc=ev.target.result;
      const img=new Image();
      img.onload = () => {
        let lat=null,lng=null;
        try {
          const exif=piexif.load(imgSrc), gps=exif['GPS'];
          if (gps&&gps[piexif.GPSIFD.GPSLatitude]) {
            const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
            lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
            lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
            if (isNaN(lat)||isNaN(lng)||(lat===0&&lng===0)) {lat=null;lng=null;}
          }
        } catch(ex){}
        const now=new Date();
        const name=`붙여넣기_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const pos=(lat&&lng)?new kakao.maps.LatLng(lat,lng):map.getCenter();
        addPhotoMarker(pos,imgSrc,name,'');
        if (!lat) { const added=markers.at(-1); if(added){added.marker.setDraggable(true);movingPhotoMarker=added;} }
      };
      img.src=imgSrc;
    };
    reader.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════════════
//  로드뷰 — 지점 선택 후 카카오 로드뷰를 새 창으로
// ══════════════════════════════════════════════════
function startRoadviewPick() {
  if (!map) return;
  if (roadviewPickMode) { stopRoadviewPick(); return; }   // 다시 누르면 취소
  roadviewPickMode = true;
  try { map.setCursor('crosshair'); } catch(e){}
  const btn = document.getElementById('roadviewBtn');
  if (btn) { btn.style.background = '#2d6cdf'; btn.style.color = '#fff'; }
  showSaveStatus('📷 로드뷰로 볼 지점을 지도에서 클릭하세요 (Esc=취소)');
}
function stopRoadviewPick() {
  roadviewPickMode = false;
  try { map.setCursor(''); } catch(e){}
  const btn = document.getElementById('roadviewBtn');
  if (btn) { btn.style.background = ''; btn.style.color = ''; }
}
function openRoadview(lat, lng) {
  // 카카오지도 사이트를 새 창으로 열어 해당 지점을 스카이뷰(+로드뷰)로 표시한다.
  //  link/roadview API는 스카이뷰 지정이 안 되므로, 실제 map.kakao.com URL을 직접 구성:
  //   map_type=TYPE_SKYVIEW(스카이뷰) + map_attribute=ROADVIEW(로드뷰) + panoid + 내부좌표(urlX/urlY)
  // 팝업차단 회피 위해 사용자 클릭 제스처 안에서 창을 먼저 열고, panoid를 받은 뒤 이동.
  const w = window.open('about:blank', 'kakaoSkyview',
    'width=1100,height=800,scrollbars=yes,resizable=yes');
  if (!w) { alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.'); return; }
  try { w.document.write('<title>카카오 스카이뷰</title><body style="font:14px sans-serif;padding:20px;">카카오지도 여는 중…</body>'); } catch(e){}

  // 위경도 → 카카오 내부좌표(WCONGNAMUL)
  let ux = '', uy = '';
  try {
    const co = new kakao.maps.LatLng(lat, lng).toCoords();
    if (co.getX) { ux = Math.round(co.getX()); uy = Math.round(co.getY()); }
    else { const mm = String(co).match(/-?\d+\.?\d*/g); if (mm) { ux = Math.round(+mm[0]); uy = Math.round(+mm[1]); } }
  } catch(e){}

  const base = `map_type=TYPE_SKYVIEW&map_hybrid=true&urlLevel=3&urlX=${ux}&urlY=${uy}`;
  const skyOnly = `https://map.kakao.com/?${base}`;
  try {
    new kakao.maps.RoadviewClient().getNearestPanoId(
      new kakao.maps.LatLng(lat, lng), 50, function(panoId) {
        w.location.href = (panoId != null)
          ? `https://map.kakao.com/?${base}&map_attribute=ROADVIEW&panoid=${panoId}&pan=0&tilt=0&zoom=0`
          : skyOnly;   // 근처 로드뷰 없으면 스카이뷰 지도만
        if (panoId == null) showSaveStatus('이 지점 부근에 로드뷰가 없어 스카이뷰 지도만 엽니다');
      });
  } catch(e) {
    w.location.href = skyOnly;
  }
  w.focus();
}

// ══════════════════════════════════════════════════
//  위치로 검색 — 지도에서 중심점 클릭 → 드래그로 반경 지정
// ══════════════════════════════════════════════════
const _fmtR = d => d < 1000 ? `${Math.round(d)} m` : `${(d/1000).toFixed(2)} km`;

function clearLocationPick(keepCircle = false) {
  if (locRadiusLine)    { locRadiusLine.setMap(null);    locRadiusLine = null; }
  if (locRadiusOverlay) { locRadiusOverlay.setMap(null); locRadiusOverlay = null; }
  if (!keepCircle) {
    if (locCircle)    { locCircle.setMap(null);    locCircle = null; }
    if (locCenterDot) { locCenterDot.setMap(null); locCenterDot = null; }
    locCenter = null;
  }
}
function stopLocationPick() {
  locPickMode = null;
  try { map.setCursor(''); } catch(e){}
  const b = document.getElementById('kmzNearBtn');
  if (b) { b.style.background = ''; b.style.color = ''; }
}
function startLocationPick() {
  if (!(window.__wsReady && window.__wsReady())) {
    alert('탐색기 연동 서버(사진위치표시.py)가 실행 중이어야 합니다.'); return;
  }
  if (!map) return;
  if (roadviewPickMode) stopRoadviewPick();
  clearLocationPick(false);     // 이전 검색 원 제거
  locPickMode = 'center';
  try { map.setCursor('crosshair'); } catch(e){}
  const b = document.getElementById('kmzNearBtn');
  if (b) { b.style.background = '#2d6cdf'; b.style.color = '#fff'; }
  showSaveStatus('🧭 검색 중심점을 지도에서 클릭하세요 (Esc=취소)');
}
// 반경 단계: 마우스 따라 원·선·라벨 갱신
function updateLocationRadius(mouseEvent) {
  if (locPickMode !== 'radius' || !locCenter) return;
  const cur = mouseEvent.latLng;
  if (!locRadiusLine) {
    locRadiusLine = new kakao.maps.Polyline({ strokeWeight:3, strokeColor:'#ff00aa', strokeOpacity:0.9 });
    locRadiusLine.setMap(map);
  }
  locRadiusLine.setPath([locCenter, cur]);
  const r = locRadiusLine.getLength();   // 측지 거리(m)
  if (locCircle) locCircle.setRadius(Math.max(1, r));
  const html = `<div style="padding:2px 8px;background:rgba(255,0,170,.92);color:#fff;border-radius:10px;font-size:12px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4);">반경 ${_fmtR(r)}</div>`;
  if (!locRadiusOverlay) {
    locRadiusOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:cur, xAnchor:0, yAnchor:0.5, zIndex:7 });
  } else { locRadiusOverlay.setContent(html); locRadiusOverlay.setPosition(cur); }
}

// ══════════════════════════════════════════════════
//  마커 추가
// ══════════════════════════════════════════════════
function showMarkerInput(latlng) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);
  const c=document.createElement('div');
  c.innerHTML=`<input type="text" placeholder="마커 이름" style="width:120px;padding:3px;" lang="ko" autocomplete="off" autofocus><button style="margin-top:4px;">추가</button><button style="margin-top:4px;">취소</button>`;
  c.style='background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';
  markerInputOverlay=new kakao.maps.CustomOverlay({position:latlng,content:c,yAnchor:1});
  markerInputOverlay.setMap(map);
  c.addEventListener('mousedown',e=>e.stopPropagation());
  const [inp,addBtn,cancelBtn]=c.querySelectorAll('input,button');
  inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addBtn.click();}});
  addBtn.onclick=()=>{addMarker(latlng,inp.value.trim()||'설명 없음');markerInputOverlay.setMap(null);};
  cancelBtn.onclick=()=>markerInputOverlay.setMap(null);
}

// ── 마커 이미지 생성 (SVG 원형) ──
function mkMarkerImg(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"><circle cx="9" cy="9" r="8" fill="${color}" stroke="white" stroke-width="2"/></svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(18, 18),
    { offset: new kakao.maps.Point(9, 9) }
  );
}
const MARKER_IMG_RED  = ()=>mkMarkerImg('#e74c3c');  // 설명/위치 마커
const MARKER_IMG_BLUE = ()=>mkMarkerImg('#2471a3');  // 사진 마커

// ── 선택된 사진 마커 강조 이미지 (주황·크게 — 구분용) ──
function mkPhotoSelImg() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"><circle cx="14" cy="14" r="11" fill="#ff9800" stroke="#fff" stroke-width="3"/><circle cx="14" cy="14" r="4" fill="#fff"/></svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(28, 28),
    { offset: new kakao.maps.Point(14, 14) }
  );
}
// 선택된 사진 마커만 강조 이미지로, 나머지는 파란 원으로 복원
function highlightPhotoMarkers(selItem) {
  allItems.forEach(i => {
    if (i.type === 'photo' && i.markerObj && i.markerObj.marker) {
      const on = (i === selItem);
      try { i.markerObj.marker.setImage(on ? mkPhotoSelImg() : MARKER_IMG_BLUE()); i.markerObj.marker.setZIndex(on ? 10001 : 0); } catch(e) {}   // 선택 마커는 항상 맨 앞 (임시사진 초록마커 10000보다 위)
    }
  });
}

function addMarker(latlng, desc) {
  const marker=new kakao.maps.Marker({map,position:latlng,image:MARKER_IMG_RED(),draggable:false});
  if (drawingMode) marker.setClickable(false);   // 선그리기 중 생성 시 클릭 통과
  const div=document.createElement('div');
  div.style='position:relative;display:flex;align-items:center;justify-content:space-between;padding:5px;';
  div.innerHTML=`<span>${desc}</span><div style="cursor:pointer;font-weight:bold;margin-left:8px;">✖</div>`;
  const [label,btn]=div.querySelectorAll('span,div');
  const iw=new kakao.maps.InfoWindow({content:div});
  kakao.maps.event.addListener(marker,'click',()=>{if(drawingMode)return;blockMapClick();selectItemByMarker(marker);});
  kakao.maps.event.addListener(marker,'rightclick',()=>{if(drawingMode||Date.now()-_lastDrawFinishTs<400)return;showEditInput({marker,iw,name:desc},label);});
  btn.onclick=()=>iw.close();
  let holdTimer=null;
  let _dragStartPos = null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{if(drawingMode)return;map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);_dragStartPos=marker.getPosition();movingPhotoMarker={marker,iw,name:desc};},300);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;const prev=_dragStartPos;const next=marker.getPosition();_dragStartPos=null;updateMarkerAddr(marker);if(prev&&(prev.getLat()!==next.getLat()||prev.getLng()!==next.getLng())){pushHistory({undo(){marker.setPosition(prev);updateMarkerAddr(marker);},redo(){marker.setPosition(next);updateMarkerAddr(marker);}});}}});
  const markerObj={marker,iw,name:desc};
  markers.push(markerObj);
  addItem({type:'marker',name:desc,address:'',markerObj});
}

// ── CAD 문자(point 모드) 텍스트 라벨 : 마커 없이 글자만(회전 포함) ──
//    KMZ Placemark 의 ExtendedData(kind=text, rot, color)로 들어온 문자를
//    지도 위에 CustomOverlay 글자 라벨로 그린다. (항목 목록엔 넣지 않음)
let textLabels = [], textLabelsVisible = true;
function addTextLabel(latlng, text, rot, color) {
  const safe = String(text == null ? '' : text)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const col = /^#[0-9a-fA-F]{6}$/.test(color || '') ? color : '#FFEB00';
  // CAD 회전(반시계, 도) -> 화면 CSS 회전(시계 양수)이라 부호 반전
  const content =
    '<div style="transform:rotate(' + (-(Number(rot) || 0)) + 'deg);' +
    'transform-origin:center center;white-space:nowrap;font-size:13px;' +
    'font-weight:bold;line-height:1;color:' + col + ';pointer-events:none;' +
    'text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 0 2px #000;">' +
    safe + '</div>';
  const ov = new kakao.maps.CustomOverlay({
    map: textLabelsVisible ? map : null, content, position: latlng,
    xAnchor: 0.5, yAnchor: 0.5, zIndex: 6 });
  textLabels.push(ov);
}
function clearTextLabels() {
  textLabels.forEach(o => o.setMap(null));
  textLabels = [];
}

function addPhotoMarker(latlng, imgSrc, filename, takenDate, fileHandle=null) {
  const marker=new kakao.maps.Marker({map,position:latlng,image:MARKER_IMG_BLUE(),draggable:false});
  if (drawingMode) marker.setClickable(false);   // 선그리기 중 생성 시 클릭 통과
  const div=document.createElement('div');
  div.style='position:relative;width:374px;overflow:hidden;';
  div.innerHTML=`<div style="font-weight:bold;font-size:13px;padding:4px 6px 2px;">${filename}</div><div style="position:relative;"><img src="${imgSrc}" style="display:block;width:100%;max-height:281px;object-fit:cover;"><div style="position:absolute;top:4px;right:4px;display:flex;gap:3px;"><span class="dl-btn" style="cursor:pointer;font-size:13px;background:rgba(0,0,0,0.5);color:#fff;border-radius:3px;padding:1px 5px;" title="다운로드">💾</span><span class="cl-btn" style="cursor:pointer;font-size:13px;font-weight:bold;background:rgba(0,0,0,0.5);color:#fff;border-radius:3px;padding:1px 5px;">✖</span></div></div>`;
  const title=div.querySelector('div');
  const dlBtn=div.querySelector('.dl-btn');
  const clBtn=div.querySelector('.cl-btn');

  let isDownloading=false;
  dlBtn.onclick=async()=>{
    if(isDownloading)return; isDownloading=true;
    const pos=marker.getPosition();
    const entry=allItems.find(i=>i.markerObj?.marker===marker);
    await downloadPhotoWithGPS(entry?.imgSrc||imgSrc, entry?.name||filename, pos.getLat(), pos.getLng());
    isDownloading=false;
  };

  const iw=new kakao.maps.InfoWindow({content:div});
  // 타이머로 단일클릭/더블클릭 구분 (Kakao dblclick 이벤트는 지도 줌과 충돌)
  let _clickTimer=null;
  kakao.maps.event.addListener(marker,'click',()=>{
    if(drawingMode)return;
    if(_clickTimer){clearTimeout(_clickTimer);_clickTimer=null;
      // 더블클릭: 수정창 열기
      iw.open(map,marker);
      const entry=allItems.find(i=>i.markerObj?.marker===marker);
      showEditInput(entry?entry.markerObj:{marker,iw,name:filename},title);
    } else {
      _clickTimer=setTimeout(()=>{_clickTimer=null;blockMapClick();selectItemByMarker(marker);},280);
    }
  });
  kakao.maps.event.addListener(marker,'rightclick',()=>{if(drawingMode||Date.now()-_lastDrawFinishTs<400)return;const e=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(e?e.markerObj:{marker,iw,name:filename},title);});
  // InfoWindow 제목 더블클릭으로도 수정 가능
  title.ondblclick=e=>{e.stopPropagation();const entry=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(entry?entry.markerObj:{marker,iw,name:filename},title);};
  clBtn.onclick=()=>iw.close();

  let holdTimer=null;
  let _dragStartPos2 = null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{if(drawingMode)return;map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);_dragStartPos2=marker.getPosition();movingPhotoMarker={marker,iw,name:filename};},300);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;const prev=_dragStartPos2;const next=marker.getPosition();_dragStartPos2=null;updateMarkerAddr(marker);if(prev&&(prev.getLat()!==next.getLat()||prev.getLng()!==next.getLng())){pushHistory({undo(){marker.setPosition(prev);updateMarkerAddr(marker);},redo(){marker.setPosition(next);updateMarkerAddr(marker);}});}}});

  if (!markers.find(m=>m.marker===marker)) {
    const markerObj={marker,iw,name:filename,fileHandle};
    markers.push(markerObj);
    addItem({type:'photo',name:filename,address:'',markerObj,imgSrc,fileHandle,takenDate:takenDate||''});
  }
}

function selectItemByMarker(marker) {
  const item=allItems.find(i=>i.markerObj?.marker===marker);
  if (!item) return;
  openSidebar();
  let filtered=getFilteredItems();
  if (filtered.indexOf(item)<0) {   // 현재 필터에 안 보이면 '전체'로 전환
    currentFilter='all';
    document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
    filtered=getFilteredItems();
  }
  const idx=filtered.indexOf(item);
  if (idx>=0) {
    selectedItems.clear(); selectedItems.add(idx);
    anchorIdx=idx; lastClickedIdx=idx;
    renderList(); selectFilteredItem(idx, true);   // 지도 마커 클릭 → 사진창 유지, 선택/미리보기/강조
  }
}

function showEditInput(markerObj, label) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);
  const c=document.createElement('div');
  c.innerHTML=`<input type="text" value="${label.textContent}" style="width:120px;padding:3px;" lang="ko" autocomplete="off" autofocus><button style="margin-top:4px;">수정</button><button style="margin-top:4px;">삭제</button>`;
  c.style='background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';
  markerInputOverlay=new kakao.maps.CustomOverlay({position:markerObj.marker.getPosition(),content:c,yAnchor:1});
  markerInputOverlay.setMap(map);
  c.addEventListener('mousedown',e=>e.stopPropagation());
  const [inp,editBtn,deleteBtn]=c.querySelectorAll('input,button');
  inp.focus(); const v=inp.value; inp.value=''; inp.value=v;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();editBtn.click();}});

  editBtn.onclick=()=>{
    const newName=inp.value.trim()||'설명 없음';
    label.textContent=newName;
    const dup=markers.filter(m=>m.marker===markerObj.marker);
    if (dup.length>1) markers=markers.filter((m,i)=>m.marker!==markerObj.marker||i===markers.findIndex(x=>x.marker===markerObj.marker));
    const found=markers.find(m=>m.marker===markerObj.marker);
    if (found) found.name=newName;
    markerObj.name=newName;
    const aItem=allItems.find(i=>i.markerObj?.marker===markerObj.marker);
    if (aItem){aItem.name=newName;renderList();}
    markerObj.iw.close(); markerInputOverlay.setMap(null);
  };
  deleteBtn.onclick=()=>{
    markerInputOverlay.setMap(null);
    const item = allItems.find(i => i.markerObj?.marker === markerObj.marker);
    if (item) {
      _hideItemOnMap(item);
      const idx = allItems.indexOf(item);
      if (idx >= 0) allItems.splice(idx, 1);
      selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
      clearPreview(); renderList();
      pushHistory({
        undo(){ _readdItemSilent(item); },
        redo(){ _removeItemSilent(item); }
      });
    } else {
      markerObj.marker.setMap(null); markerObj.iw.close();
      markers = markers.filter(m => m.marker !== markerObj.marker);
    }
  };
}

function attachPolylineRightClick(poly) {
  kakao.maps.event.addListener(poly,'rightclick',e=>{if(drawingMode&&poly===currentPolyline)return;showPolyMenu(lastClientX,lastClientY,poly);});
  let lp=null;
  kakao.maps.event.addListener(poly,'touchstart',()=>{lp=setTimeout(()=>showPolyMenu(lastClientX,lastClientY,poly),600);});
  kakao.maps.event.addListener(poly,'touchend',()=>clearTimeout(lp));
  kakao.maps.event.addListener(poly,'touchmove',()=>clearTimeout(lp));
}

document.addEventListener('mousemove',e=>{lastClientX=e.clientX;lastClientY=e.clientY;},{passive:true});
document.addEventListener('touchstart',e=>{if(e.touches.length===1){lastClientX=e.touches[0].clientX;lastClientY=e.touches[0].clientY;}},{passive:true});

document.getElementById('polyEditBtn').onclick=()=>{
  if (!polyMenuTarget) return;
  const poly=polyMenuTarget; const oldName=poly._name;
  hidePolyMenu();
  // htm 색상묶음(멀티파트) 선은 수천 개 선이 한 객체 — 점 편집 대상이 아님
  if (pathParts(poly).length > 1) { alert('색상별로 묶인 선(htm 로딩)은 수정할 수 없습니다.'); return; }

  drawingMode=true;
  currentPath=path.map(p=>new kakao.maps.LatLng(p.getLat(),p.getLng()));
  // 수정 중에도 원래 색/굵기 유지 (과거: 빨강 고정으로 색이 바뀌어 보였음)
  const _ecolor=poly._origColor||'#FF0000', _eweight=poly._origWeight||3;
  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:_eweight,strokeColor:_ecolor,strokeOpacity:1});
  currentPolyline._name=oldName; currentPolyline._origColor=_ecolor; currentPolyline._origWeight=_eweight;
  polylines.push(currentPolyline); attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');

//  엑셀식 색상 팔레트 (선 색상 선택 · 트랙 색 변경 공용)

const PALETTE_COLORS = [
  '#000000','#404040','#808080','#BFBFBF','#FFFFFF','#C00000','#FF0000','#FFC000','#FFFF00','#92D050',
  '#00B050','#00B0F0','#0070C0','#002060','#7030A0','#FF6600','#00B0A0','#E91E63','#795548','#2E86C1'
];
let currentDrawColor = '#FF0000';
let _paletteOnPick = null;
(function buildPalette(){
  const grid = document.querySelector('#colorPalette .pal-grid');
  if (!grid) return;
  PALETTE_COLORS.forEach(c => {
    const b = document.createElement('button');

function hideColorPalette(){ const p=document.getElementById('colorPalette'); if(p)p.classList.remove('show'); _paletteOnPick=null; }
function openColorPalette(anchorEl, onPick){
  const p=document.getElementById('colorPalette'); if(!p)return;

document.addEventListener('click',e=>{ const p=document.getElementById('colorPalette'); if(p&&p.classList.contains('show')&&!p.contains(e.target)&&e.target.id!=='drawColorBtn'&&!e.target.classList.contains('track-swatch')) hideColorPalette(); });
// 툴바 선 색상 버튼 → 팔레트 열기.
//  · 사이드바에서 트랙이 선택돼 있으면 그 트랙(들)의 색을 바로 변경.
//  · 선택된 트랙이 없으면 앞으로 그릴 선의 색을 설정.
document.getElementById('drawColorBtn').onclick = function(e){

  const btn=this;
  const selTracks=[...selectedItems].map(i=>getFilteredItems()[i]).filter(it=>it&&it.type==='track');
  openColorPalette(btn, c => {
    btn.style.background=c; btn.blur(); currentDrawColor=c;   // 버튼색 = 그릴 선 색
    if (selTracks.length){
      selTracks.forEach(it=>recolorTrack(it,c));             // 선택된 트랙 색도 변경
      if (window.showSaveStatus) showSaveStatus(`🎨 트랙 ${selTracks.length}개 색상 변경`);
    }

};

// ── 트랙 색/굵기 변경 — 카카오 폴리라인은 옵션 변경이 안 되어 같은 경로로 재생성 후 참조 교체 ──
//   color/weight 를 안 주면(null) 기존 값 유지.
function _recreatePoly(old, color, weight){
  const c=color||old._origColor||'#FF0000';
  const w=weight||old._origWeight||3;
  const np=new kakao.maps.Polyline({map:old.getMap()||map, path:old._parts||old.getPath(),
    strokeWeight:w, strokeColor:c, strokeOpacity:1});
  if(old._parts){np._parts=old._parts;np._pnum=old._pnum;}   // 멀티파트(htm 색상묶음) 경로·좌표캐시 유지
  np._origColor=c; np._origWeight=w; np._name=old._name;
  old.setMap(null);
  const i=polylines.indexOf(old); if(i>=0)polylines[i]=np; else polylines.push(np);
  attachPolylineRightClick(np);
  return np;
}
function recolorTrack(item, color){
  if(!item||item.type!=='track')return;
  if(item.polyline)item.polyline=_recreatePoly(item.polyline,color,null);
  if(item.extraOverlays)item.extraOverlays=item.extraOverlays.map(o=>_recreatePoly(o,color,null));
  item._origColor=color;
  renderList(); updateTrackHighlights(); scheduleBundleCull();
}
function resizeTrack(item, width){
  if(!item||item.type!=='track')return;
  const w=Math.max(1,parseInt(width,10)||3);
  if(item.polyline)item.polyline=_recreatePoly(item.polyline,null,w);
  if(item.extraOverlays)item.extraOverlays=item.extraOverlays.map(o=>_recreatePoly(o,null,w));
  item._origWeight=w;
  renderList(); updateTrackHighlights(); scheduleBundleCull();
}
// 트랙의 대표 색 (사이드바 색상칸/재색상 기준)
function trackColorOf(item){
  return (item&&(item._origColor||(item.polyline&&item.polyline._origColor)))||'#1e8449';
}
// 두께 드롭다운 변경 → 선택된 트랙이 있으면 그 굵기 변경 (없으면 앞으로 그릴 선 두께로만 쓰임)
document.getElementById('drawWidth').addEventListener('change', function(){
  const w=Math.max(1,parseInt(this.value,10)||3);
  const selTracks=[...selectedItems].map(i=>getFilteredItems()[i]).filter(it=>it&&it.type==='track');
  if(selTracks.length){
    selTracks.forEach(it=>resizeTrack(it,w));
    if(window.showSaveStatus) showSaveStatus(`📏 트랙 ${selTracks.length}개 굵기 ${w}px`);
  }
});

// ── 선그리기 중 마커 클릭 통과 + 반투명 (마커 위에도 선을 찍을 수 있게) ──
function setMarkersClickThrough(drawing) {
  const on = !drawing;
  const op = drawing ? 0.35 : 1;
  markers.forEach(m => { try { m.marker.setClickable(on); m.marker.setOpacity(op); } catch(e){} });
  const _liveOvs = (typeof window.__getLiveOvs === 'function') ? window.__getLiveOvs() : [];
  _liveOvs.forEach(o => {
    if (o && typeof o.setClickable === 'function') {
      try { o.setClickable(on); o.setDraggable(on); o.setOpacity(op); } catch(e){}
    }
  });
  if (typeof searchMarker !== 'undefined' && searchMarker)
    try { searchMarker.setClickable(on); searchMarker.setOpacity(op); } catch(e){}
}

// ── 그리기 꼭짓점 추가 (지도 클릭/마커 위 클릭 공통) ──
function addDrawPoint(latlng) {
  currentPath.push(latlng);
  currentPolyline.setPath(currentPath);
  if (currentPath.length===1 && !distanceOverlay)
    distanceOverlay = new kakao.maps.CustomOverlay({ map, content:`<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 0m</div>`, position:latlng, xAnchor:0, yAnchor:1, zIndex:3 });
}

// ── 그리기 종료 (우클릭 / Alt 공통) ──
let _lastDrawFinishTs = 0;
function finishDrawing() {
  if (!drawingMode) return;
  _lastDrawFinishTs = Date.now();
  if (moveLine) { moveLine.setMap(null); moveLine=null; }
  if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay=null; }
  drawingMode=false;
  document.getElementById('map').classList.remove('drawing-cursor');
  setMarkersClickThrough(false);
  hideDrawCatcher();
  // 완성된 트랙을 목록에 추가
  if (currentPath.length >= 2) {
    const tname = currentPolyline._name || `경로 ${++trackCounter}`;
    if (!currentPolyline._name) currentPolyline._name = tname;
    const newItem = { type:'track', name:tname, address:'', polyline:currentPolyline, _origColor:currentPolyline._origColor };
    addItem(newItem);
    if(trackNameOrgActive){
      const markerItems=allItems.filter(i=>i.markerObj&&!isDefaultName(i.name));
      if(markerItems.length){
        const tll=getItemLatLng(newItem);
        if(tll){
          let nearest=null,minDist=Infinity;
          markerItems.forEach(m=>{const mpos=m.markerObj.marker.getPosition();const d=haversineDistance(tll.getLat(),tll.getLng(),mpos.getLat(),mpos.getLng());if(d<minDist){minDist=d;nearest=m;}});
          if(nearest){trackOrigNames.set(newItem,tname);newItem.name=nearest.name;currentPolyline._name=nearest.name;renderList();}
        }
      }
    }
  } else {
    currentPolyline.setMap(null);
    polylines = polylines.filter(p=>p!==currentPolyline);
  }
}

// ── 선그리기 클릭 수신 레이어 ──
// 그리기 중에만 지도 전체를 덮는 투명 레이어. 마커/오버레이가 클릭을 가로채지 못하므로
// 마커 위에서도 꼭짓점이 찍힌다. 클릭=꼭짓점, 우클릭=종료, 드래그=지도 이동, 휠=확대/축소.
let drawCatcher = null;

function _catcherLatLng(e) {
  const rect = document.getElementById('map').getBoundingClientRect();
  const pt = new kakao.maps.Point(e.clientX - rect.left, e.clientY - rect.top);
  const proj = map.getProjection();
  // 컨테이너(화면) 픽셀 → 지도 좌표. 구버전 호환 위해 두 가지 메서드 모두 시도.
  if (typeof proj.coordsFromContainerPoint === 'function')
    return proj.coordsFromContainerPoint(pt);
  return proj.coordsFromPoint(pt);
}

function showDrawCatcher() {
  if (drawCatcher) return;
  const el = document.createElement('div');
  el.id = 'drawCatcher';
  el.style.cssText = 'position:absolute;left:0;top:0;right:0;bottom:0;z-index:2147483647;cursor:crosshair;background:transparent;pointer-events:auto;';
  document.getElementById('map').appendChild(el);
  drawCatcher = el;

  let down = null, panning = false;
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    down = [e.clientX, e.clientY]; panning = false;
  });
  el.addEventListener('mousemove', e => {
    if (down) {
      const dx = e.clientX - down[0], dy = e.clientY - down[1];
      if (panning || Math.hypot(dx, dy) > 4) {
        panning = true;
        map.panBy(down[0] - e.clientX, down[1] - e.clientY);   // 드래그로 지도 이동
        down = [e.clientX, e.clientY];
      }
      return;
    }
    if (drawingMode && currentPath.length) updateDistance({ latLng: _catcherLatLng(e) });
  });
  el.addEventListener('mouseup', e => {
    if (e.button !== 0) { down = null; return; }
    const wasPanning = panning;
    down = null; panning = false;
    if (wasPanning || !drawingMode) return;
    try { addDrawPoint(_catcherLatLng(e)); }   // 마커 위든 어디든 꼭짓점 추가
    catch(err) { console.error('[선그리기] 좌표 변환 실패', err); }
  });
  el.addEventListener('mouseleave', () => { down = null; panning = false; });
  el.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    finishDrawing();
  });
  el.addEventListener('wheel', e => {
    e.preventDefault();
    map.setLevel(map.getLevel() + (e.deltaY > 0 ? 1 : -1), { anchor: _catcherLatLng(e) });
  }, { passive: false });
  el.addEventListener('dblclick', e => e.preventDefault());
}

function hideDrawCatcher() {
  if (drawCatcher) { drawCatcher.remove(); drawCatcher = null; }
}

function startDrawing() {
  if (drawingMode) return;
  if (moveLine){moveLine.setMap(null);moveLine=null;}
  if (distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  drawingMode=true; currentPath=[];
  // 툴바 팔레트에서 고른 색상·두께로 그리기 (없으면 빨강 3px)
  const _dw=document.getElementById('drawWidth');
  const _drawColor=currentDrawColor||'#FF0000';
  const _drawWidth=Math.max(1,parseInt((_dw&&_dw.value)||'3',10)||3);
  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:_drawWidth,strokeColor:_drawColor,strokeOpacity:1});
  currentPolyline._origColor=_drawColor; currentPolyline._origWeight=_drawWidth;
  polylines.push(currentPolyline); attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
  setMarkersClickThrough(true);
  showDrawCatcher();
}

const resetPolylines=()=>{
  polylines.forEach(p=>p.setMap(null)); polylines=[]; clearTextLabels(); drawingMode=false;
  setMarkersClickThrough(false);
  hideDrawCatcher();
  if(moveLine){moveLine.setMap(null);moveLine=null;}
  if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  document.getElementById('map').classList.remove('drawing-cursor');
  allItems=allItems.filter(i=>i.type!=='track');
  if(currentFilter==='all'||currentFilter==='track'){selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();}
  renderList();
};

const resetAll=()=>{
  const hadKmz = allItems.some(i => i._srcKmz || i._live);
  markers.forEach(m=>{m.iw.close();m.marker.setMap(null);}); markers=[];
  polylines.forEach(p=>p.setMap(null)); polylines=[]; clearTextLabels();
  if(moveLine){moveLine.setMap(null);moveLine=null;}
  if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  drawingMode=false; document.getElementById('map').classList.remove('drawing-cursor');
  setMarkersClickThrough(false); hideDrawCatcher();
  stopLocationPick(); clearLocationPick(false);   // 위치검색 원·중심점 제거
  if(window.__clearRecordHelpers) window.__clearRecordHelpers();
  locationMarkerCount=0; trackCounter=0;
  allItems=[]; selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
  renderList(); clearPreview();
  if(hadKmz && window.__wsSend) window.__wsSend({type:'reset_live_broadcast'});
};

document.addEventListener('keydown', e => {
  const inInput = e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA';
  const inListInput = inInput && e.target.closest('#photoListWrapper');

  // 목록 인풋 안에서는 상위 처리 차단 (onkeydown으로 자체 처리)
  if (inListInput) return;

  // 로드뷰 지점 선택 모드 — Esc로 취소
  if (roadviewPickMode && e.key==='Escape') {
    e.preventDefault(); stopRoadviewPick(); showSaveStatus('로드뷰 선택 취소됨'); return;
  }
  // 위치로 검색 지점 선택 모드 — Esc로 취소
  if (locPickMode && e.key==='Escape') {
    e.preventDefault(); stopLocationPick(); clearLocationPick(false); showSaveStatus('위치 검색 선택 취소됨'); return;
  }

  // 그리기 모드 Backspace/Escape/Ctrl+Z
  if (drawingMode && currentPath.length>0 && !inInput) {
    if (e.key==='Backspace'||e.key==='Escape'||(e.key==='z'&&e.ctrlKey)) {
      e.preventDefault(); currentPath.pop(); currentPolyline.setPath([...currentPath]);
      if (!currentPath.length){if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}if(moveLine){moveLine.setMap(null);moveLine=null;}}
      else updateDistanceOverlay(currentPath[currentPath.length-1]);
      return;
    }
  }

  // 일반 단축키
  if (!inInput) {
    // Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y — 통합 Undo/Redo
    if (e.ctrlKey && !e.shiftKey && e.key.toLowerCase()==='z'){e.preventDefault();doUndo();return;}
    if (e.ctrlKey && ((e.shiftKey && e.key.toLowerCase()==='z') || e.key.toLowerCase()==='y')){e.preventDefault();doRedo();return;}
    if (e.ctrlKey&&e.key.toLowerCase()==='a'){e.preventDefault();const fl=getFilteredItems();fl.forEach((_,i)=>selectedItems.add(i));anchorIdx=0;lastClickedIdx=fl.length-1;renderList();maybeShowMultiTrackTotal();return;}
    if (e.ctrlKey&&e.key.toLowerCase()==='c'&&!window.getSelection().toString()){
      e.preventDefault();
      if (selectedItems.size > 0) {
        copySelectedFiles();   // Ctrl+C: 실제 파일 복사 (복사버튼은 목록 복사 유지)
      } else {
        copyAndMarkLocation();
      }
      return;
    }
    // Ctrl+Shift+V 또는 Insert — 임시 객체 영구 삽입(확정)
    if ((e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='v') || e.key==='Insert'){e.preventDefault();insertLiveObjects();return;}
    if (e.key==='F1'){e.preventDefault();window.open('https://junty75.github.io/map/help','_blank','width=900,height=700,scrollbars=yes');return;}
    // Alt 키 자체의 '한 번 누름'으로만 토글 (e.repeat = 길게 눌러 자동반복되는 키이벤트 무시).
    // 과거: e.altKey 로 검사 → Alt 를 누르고 있는 동안 keydown 이 자동반복되며 start/finish 가
    //       빠르게 토글되어 손을 떼면 그리기가 꺼져 "안 됨"처럼 보였음.
    if (e.key==='Alt' && !e.repeat){
      e.preventDefault();
      if (drawingMode) finishDrawing();
      else startDrawing();
      return;
    }
  }
  if (e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();exportByFormat();return;}

  // 목록 방향키 + Enter + Delete (입력창 밖)
  if (!inInput) {
    const filtered=getFilteredItems();

    if (e.key==='Delete' && selectedItems.size>0) {
      e.preventDefault();
      const toDelete=[...selectedItems].map(i=>filtered[i]).filter(Boolean);
      if(!toDelete.length)return;
      toDelete.forEach(item => _hideItemOnMap(item));
      allItems=allItems.filter(i=>!toDelete.includes(i));
      selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
      clearPreview(); renderList();
      pushHistory({
        undo(){ toDelete.forEach(item => _readdItemSilent(item)); },
        redo(){ toDelete.forEach(item => _removeItemSilent(item)); }
      });
      return;
    }

    const _srm = document.getElementById('searchResultModal');
    if (_srm && _srm.style.display !== 'none' && (e.key==='ArrowDown'||e.key==='ArrowUp')) return;   // 검색결과 모달이 ↑↓ 전담
    if (e.key==='ArrowDown'){
      e.preventDefault();
      const next=lastClickedIdx<0?0:Math.min(lastClickedIdx+1,filtered.length-1);
      if (filtered.length>0){
        selectedItems.clear(); selectedItems.add(next); anchorIdx=next;
        renderList(); selectFilteredItem(next);
      }
    } else if (e.key==='ArrowUp'){
      e.preventDefault();
      if (lastClickedIdx>0){
        const prev=lastClickedIdx-1;
        selectedItems.clear(); selectedItems.add(prev); anchorIdx=prev;
        renderList(); selectFilteredItem(prev);
      }
    } else if (e.key==='Enter'&&lastClickedIdx>=0){
      e.preventDefault();
      const rows=document.querySelectorAll('#photoTbody tr');
      const row=rows[lastClickedIdx];
      if (row&&!row.querySelector('.item-name-input')) startEditItem(row,filtered[lastClickedIdx],lastClickedIdx);
    }
  }
});

function copyCoordFromInput(el) {
  if (!el.value) return;
  navigator.clipboard.writeText(el.value).catch(()=>{const t=document.createElement('textarea');t.value=el.value;t.style='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
}

function copyAndMarkLocation() {
  const val=document.getElementById('latlng-display').value; if(!val)return;
  const [lat,lng]=[val.split(',')[0]?.trim(),val.split(',')[1]?.trim()];
  const addr=document.getElementById('address-display').innerText;
  if (!lat||!lng) return;
  navigator.clipboard.writeText(`${lat}\t${lng}\t${addr}`).then(()=>{
    createLocationMarker(parseFloat(lat),parseFloat(lng));
    const el=document.getElementById('address-display'),prev=el.innerText;
    el.innerText='✅ 복사됨';setTimeout(()=>{el.innerText=prev;},1200);
  }).catch(()=>{
    const t=document.createElement('textarea');t.value=`${lat}\t${lng}\t${addr}`;t.style='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    createLocationMarker(parseFloat(lat),parseFloat(lng));
  });
}

function createLocationMarker(lat,lng) {
  locationMarkerCount++;
  const latlng=new kakao.maps.LatLng(lat,lng);
  const addr=document.getElementById('address-display').innerText;
  addMarker(latlng,String(locationMarkerCount));
  const entry=markers[markers.length-1];
  if (entry){entry.addr=(addr==='✅ 복사됨'||addr==='주소 없음')?'':addr;entry.iw.open(map,entry.marker);}
}

let _lastBaseType='HYBRID',_terrainOn=false,_cadastralOn=false;
function changeMapType(value){
  if(_terrainOn){map.removeOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);_terrainOn=false;}
  if(_cadastralOn){map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);_cadastralOn=false;}
  if(value==='TERRAIN'){map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);map.addOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);_terrainOn=true;}
  else if(value==='USE_DISTRICT'){map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);_cadastralOn=true;}
  else{_lastBaseType=value;map.setMapTypeId(kakao.maps.MapTypeId[value]);}
}
