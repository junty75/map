//  파일 드롭
// ══════════════════════════════════════════════════
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files); if(!files.length)return;
  // ── 파일 핸들 수집 (이벤트 핸들러 안에서만 getAsFileSystemHandle 호출 가능) ──
  const _fhPromises=[];
  if(e.dataTransfer.items){
    for(let i=0;i<e.dataTransfer.items.length;i++){
      const it=e.dataTransfer.items[i];
      _fhPromises[i]=(it.kind==='file'&&typeof it.getAsFileSystemHandle==='function')
        ?it.getAsFileSystemHandle().catch(()=>null):Promise.resolve(null);
    }
  }
  const bounds=new kakao.maps.LatLngBounds();
  let noGPSAction=null;

  files.forEach((file,_fi)=>{
    const name=file.name.toLowerCase();

    if (name.endsWith('.kmz')||name.endsWith('.zip')) {
      loadKMZ(file,bounds);

    } else if (name.endsWith('.htm')||name.endsWith('.html')) {
      const reader=new FileReader();
      reader.onload=ev=>{
        const html=ev.target.result;
        // dmap/캐드 htm: 각 linePathN 의 색을 바로 뒤 Polyline 선언(strokeColor)에서 추출.
        // rgb(r,g,b) -> #RRGGBB 로 정규화(카카오 strokeColor 는 hex 기대).
        const rgb2hex=c=>{c=(c||'').trim();const m=c.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
          if(m)return '#'+[m[1],m[2],m[3]].map(x=>(+x).toString(16).padStart(2,'0')).join('');
          return c[0]==='#'?c:('#'+c);};
        const colorMap={};
        for(const pm of html.matchAll(/path:\s*(linePath\d+|polygonPath\d+)\b[\s\S]*?strokeColor:\s*['"]([^'"]+)['"]/g)){
          if(colorMap[pm[1]]===undefined)colorMap[pm[1]]=rgb2hex(pm[2]);
        }
        const lineBlocks=[...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];
        // 색상별로 묶어 항목 1개씩 (linePath 수천 개를 개별 항목으로 만들면 DOM 폭증 -> 무거움).
        const htmGroups={};
        lineBlocks.forEach(m=>{
          const pts=[...m[2].matchAll(/new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)]
            .map(c=>{const ll=new kakao.maps.LatLng(parseFloat(c[1]),parseFloat(c[2]));bounds.extend(ll);return ll;});
          if(pts.length<2)return;
          const col=colorMap[m[1]]||'#FF00FF';
          (htmGroups[col]=htmGroups[col]||[]).push(pts);
        });
        const _htmPolys=[];   // setBounds 후 한 번에 setMap (이중 렌더 방지 — loadKMZ 와 동일)
        Object.entries(htmGroups).forEach(([col,arr])=>{
          // 색상별 멀티파트 Polyline 1개 (선 수천 개 -> 색상 수만큼) — Vmap mkMultiLineLyr 과 동일 경량화.
          // 개별 Polyline 1만+개를 만들면 카카오 오버레이 갱신이 느려 pan/zoom 이 버벅임.
          const poly=new kakao.maps.Polyline({path:arr.length===1?arr[0]:arr,strokeWeight:2,strokeColor:col,strokeOpacity:1});
          if(arr.length>1)poly._parts=arr;   // 멀티파트 원본 보관 (getPath()는 멀티파트를 유실 — 내보내기/연장계산용). 단일 경로는 편집 가능하므로 getPath() 사용
          poly._origColor=col;poly._origWeight=2;_htmPolys.push(poly);polylines.push(poly);attachPolylineRightClick(poly);
          const tn=`경로 ${++trackCounter}`;poly._name=tn;
          addItem({type:'track',name:tn,address:'',polyline:poly,_origColor:col});
        });
        const posMatches=[...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
        posMatches.forEach(m=>{
          const rawName=m[1].replace(/<a\b[^>]*>.*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim()||'마커';
          const ll=new kakao.maps.LatLng(parseFloat(m[2]),parseFloat(m[3]));
          bounds.extend(ll);addMarker(ll,rawName);
        });
        if(posMatches.length===0){
          const mk=[...html.matchAll(/new\s+(?:kakao|daum)\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
          mk.forEach((m,i)=>{const ll=new kakao.maps.LatLng(parseFloat(m[1]),parseFloat(m[2]));bounds.extend(ll);addMarker(ll,`마커_${i+1}`);});
        }
        if(!bounds.isEmpty())map.setBounds(bounds);
        // 화면(줌) 확정 후 한 번만 그림. 묶음선(_parts)은 컬링이 화면 교차 구간만 붙임.
        _htmPolys.forEach(p=>{if(!p._parts)p.setMap(map);});
        cullBundlePolys();
      };
      reader.readAsText(file,'utf-8');

    } else if (name.endsWith('.gpx')) {
      const reader=new FileReader();
      reader.onload=ev=>{
        const xml=new DOMParser().parseFromString(ev.target.result,'application/xml');
        Array.from(xml.getElementsByTagName('trk')).forEach((trk,index)=>{
          const trackName=trk.getElementsByTagName('name')[0]?.textContent||`경로${index+1}`;
          Array.from(trk.getElementsByTagName('trkseg')).forEach(seg=>{
            const pts=Array.from(seg.getElementsByTagName('trkpt')).map(pt=>{
              const ll=new kakao.maps.LatLng(parseFloat(pt.getAttribute('lat')),parseFloat(pt.getAttribute('lon')));
              bounds.extend(ll);return ll;
            });
            if(pts.length){
              const _gpxClr=getRandomColor();const poly=new kakao.maps.Polyline({map,path:pts,strokeWeight:4,strokeColor:_gpxClr,strokeOpacity:0.9});poly._origColor=_gpxClr;poly._origWeight=4;
              const dist=poly.getLength(),fmt=d=>d<=10?`${d.toFixed(1)}m`:d<1000?`${Math.round(d)}m`:`${(d/1000).toFixed(2)}km`;
              const ov=new kakao.maps.CustomOverlay({content:`<div style="padding:5px 8px;background:white;border:1px solid #333;font-size:1em;border-radius:3px;"><b>${trackName}</b><br>총거리:${fmt(dist)}</div>`,yAnchor:1,zIndex:4});
              kakao.maps.event.addListener(poly,'mouseover',()=>{ov.setPosition(poly.getPath()[Math.floor(pts.length/2)]);ov.setMap(map);});
              kakao.maps.event.addListener(poly,'mouseout',()=>ov.setMap(null));
              polylines.push(poly);attachPolylineRightClick(poly);
              poly._name=trackName;
              addItem({type:'track',name:trackName,address:'',polyline:poly,_origColor:_gpxClr});
            }
          });
        });
        Array.from(xml.getElementsByTagName('wpt')).forEach(wpt=>{
          const ll=new kakao.maps.LatLng(parseFloat(wpt.getAttribute('lat')),parseFloat(wpt.getAttribute('lon')));
          bounds.extend(ll);addMarker(ll,wpt.getElementsByTagName('name')[0]?.textContent||'설명 없음');
        });
        if(!bounds.isEmpty())map.setBounds(bounds);
      };
      reader.readAsText(file);

    } else if (isImageFile(file)) {
      // 탐색기에서 임시삽입(미리보기) 중인 그 파일을 드래그한 경우 → 임시항목을 그대로 영구 확정(중복 방지·경로 유지)
      if (window.__promoteMatchingLive && window.__promoteMatchingLive(file.name)) return;
      // 이미 영구 삽입된 같은 파일(파일명)이면 다시 삽입하지 않음 (재삽입 중복 방지)
      if (hasItemByFileName(file.name)) { window.__setBadge && window.__setBadge(true, `이미 삽입됨: ${file.name}`); return; }
      (async()=>{
        const imgName=file.name.replace(/\.[^/.]+$/,'');
        // 드롭 직후 추가된 사진에 서버(최근 탐색기 선택)에서 디스크 경로를 받아 부여 (Ctrl+C 파일복사·중복방지용)
        const _resolveLast=()=>{const _a=allItems[allItems.length-1];if(_a&&_a.type==='photo'&&!_a.path)requestPathResolve(_a,file.name);};
        if (RAW_EXT.test(name)) {
          let imgSrc=null,latlng=null,takenDate='';
          if (typeof exifr!=='undefined') {
            const [gpsData,thumbBuf,exifData]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null),exifr.parse(file,['DateTimeOriginal']).catch(()=>null)]);
            if(gpsData?.longitude!==undefined)latlng=new kakao.maps.LatLng(gpsData.latitude,gpsData.longitude);
            if(exifData?.DateTimeOriginal)takenDate=exifData.DateTimeOriginal.toISOString().substring(0,10);
            if(thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
          }
          if(!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
          if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);_resolveLast();if(!bounds.isEmpty())map.setBounds(bounds);}
          else{if(noGPSAction===null)noGPSAction=confirm(`"${file.name}" 위치 정보가 없습니다.\n지도 중심에 마커를 추가하시겠습니까?`);if(noGPSAction){addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);_resolveLast();}}
          return;
        }
        const fh=_fhPromises[_fi]?await _fhPromises[_fi]:null;
        const imgFile=await convertHeicIfNeeded(file);
        const imgSrc=await new Promise(r=>{const rd=new FileReader();rd.onload=ev=>r(ev.target.result);rd.readAsDataURL(imgFile);});
        let latlng=null,takenDate='',useName=imgName;
        try{
          const exif=piexif.load(imgSrc),gps=exif['GPS'];
          if(gps&&gps[piexif.GPSIFD.GPSLatitude]&&gps[piexif.GPSIFD.GPSLongitude]){
            const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
            const lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
            const lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
            if(!isNaN(lat)&&!isNaN(lng)&&(lat!==0||lng!==0))latlng=new kakao.maps.LatLng(lat,lng);
          }
          const rawDate=exif['Exif']?.[piexif.ExifIFD.DateTimeOriginal]||exif['0th']?.[piexif.ImageIFD.DateTime]||'';
          if(rawDate)takenDate=rawDate.substring(0,10).replace(/:/g,'-');
          const mn=readMetaName(exif); if(mn) useName=mn;
        }catch(ex){}
        if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,useName,takenDate,fh);_resolveLast();if(!bounds.isEmpty())map.setBounds(bounds);}
        else{
          if(noGPSAction===null)noGPSAction=confirm(`"${file.name}" 위치 정보가 없습니다.\n지도 중심에 마커를 추가하시겠습니까?\n(이 선택은 이번 일괄 업로드에 적용됩니다)`);
          if(noGPSAction){addPhotoMarker(map.getCenter(),imgSrc,useName,takenDate,fh);_resolveLast();const added=markers.at(-1);if(added){added.marker.setDraggable(true);movingPhotoMarker=added;}}
        }
      })();

    } else if (name.endsWith('.csv')) {
      const reader=new FileReader();
      reader.onload=evt=>{
        const text=evt.target.result.replace(/^﻿/,'');
        const lines=text.trim().split(/\r?\n/);if(lines.length<2)return;
        function parseLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}
        const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
        const iLat=headers.findIndex(h=>h.includes('위도')||h==='lat'||h==='latitude');
        const iLng=headers.findIndex(h=>h.includes('경도')||h==='lng'||h==='lon'||h==='longitude');
        const iName=headers.findIndex(h=>h.includes('이름')||h.includes('name'));
        const hasH=iLat!==-1&&iLng!==-1;
        const ci={name:hasH?iName:1,lat:hasH?iLat:2,lng:hasH?iLng:3};
        lines.slice(hasH?1:0).forEach(line=>{
          if(!line.trim())return;
          const cols=parseLine(line);
          const lat=parseFloat(cols[ci.lat]),lng=parseFloat(cols[ci.lng]);
          if(isNaN(lat)||isNaN(lng))return;
          const ll=new kakao.maps.LatLng(lat,lng);bounds.extend(ll);
          addMarker(ll,(cols[ci.name]||'').replace(/^"|"$/g,'')||'마커');
        });
        if(!bounds.isEmpty())map.setBounds(bounds);
      };
      reader.readAsText(file,'utf-8');
    }
  });
});

// ══════════════════════════════════════════════════
//  KMZ 로딩
// ══════════════════════════════════════════════════
async function loadKMZ(file,bounds,kmzDiskPath) {
  // 선은 파싱 중엔 지도에 안 붙이고 모아뒀다가 setBounds 후 한 번에 붙인다.
  // (파싱 중 map 에 붙이면 현재 줌에서 그리고, setBounds 로 화면이 바뀌며 전부
  //  다시 그려 이중 렌더 → 대형 KMZ 로딩이 Vmap 보다 느렸음)
  const _deferPolys=[];
  try {
    let zip=null, zipFiles=[], kmlText=null;
    // KMZ(zip)는 'PK'(0x50 0x4B)로 시작. 평문 .kml 은 zip 이 아니므로 JSZip 으로 열면
    // 오류가 나서 표시가 안 됨 → 헤더로 판별해 .kml 은 텍스트로 직접 파싱한다.
    const head=new Uint8Array(await file.slice(0,2).arrayBuffer());
    const isZip=head[0]===0x50 && head[1]===0x4B;
    if(isZip){
      zip=await JSZip.loadAsync(file);
      zipFiles=Object.keys(zip.files);
      for (const n of zipFiles){const cn=n.replace(/\0/g,'');if(/\.kml$/i.test(cn)){try{const t=await zip.files[n].async('string');if(t&&t.length){kmlText=t;break;}}catch(e){}}}
      if(!kmlText){alert('KMZ 안에 .kml 파일이 없습니다.');return;}
    } else {
      kmlText=await file.text();   // 평문 KML (내부 임베드 사진 없음 — 마커/트랙만)
    }
    const xml=new DOMParser().parseFromString(kmlText,'application/xml');
    const placemarks=Array.from(xml.getElementsByTagName('Placemark'));
    const _bulkStart=allItems.length;
    bulkLoading=true;

    // KML 스타일 색상 맵 (styleUrl -> #RRGGBB). KML 색은 aabbggrr 순서.
    const styleColors={}, styleWidths={}, styleOpac={};
    const kmlC2Hex=c=>{c=(c||'').trim();if(c.length<8)return null;return '#'+c.slice(6,8)+c.slice(4,6)+c.slice(2,4);};
    const kmlAlpha=c=>{c=(c||'').trim();if(c.length<8)return null;const a=parseInt(c.slice(0,2),16);return isNaN(a)?null:a/255;};
    for (const st of Array.from(xml.getElementsByTagName('Style'))) {
      const id=st.getAttribute('id'); if(!id) continue;
      const cs=(st.getElementsByTagName('LineStyle')[0]||st.getElementsByTagName('PolyStyle')[0]);
      const colTxt=cs?.getElementsByTagName('color')[0]?.textContent;
      const h=kmlC2Hex(colTxt);
      if(h) styleColors['#'+id]=h;
      // KMZ 의 <width>(선 굵기) / 색상 alpha(불투명도)를 읽어 그대로 반영
      const w=parseFloat(cs?.getElementsByTagName('width')[0]?.textContent);
      if(!isNaN(w)) styleWidths['#'+id]=w;
      const op=kmlAlpha(colTxt);
      if(op!=null) styleOpac['#'+id]=op;
    }

    for (const pm of placemarks) {
      const pmName=pm.getElementsByTagName('name')[0]?.textContent?.trim()||'설명 없음';

      // ── 선/폴리곤 도형 전부 수집 (MultiGeometry 안의 모든 LineString + Polygon 링) ──
      const coordEls=[];
      for(const ls of Array.from(pm.getElementsByTagName('LineString')))
        coordEls.push(ls.getElementsByTagName('coordinates')[0]);
      for(const pg of Array.from(pm.getElementsByTagName('Polygon')))
        for(const lr of Array.from(pg.getElementsByTagName('LinearRing')))
          coordEls.push(lr.getElementsByTagName('coordinates')[0]);

      if (coordEls.length) {
        const su=pm.getElementsByTagName('styleUrl')[0]?.textContent?.trim();
        const color=(su&&styleColors[su])||getRandomColor();
        // KMZ 스타일의 선 굵기/불투명도 반영(없으면 기본 3 / 0.9).
        // Kakao는 선 굵기를 정수 px로 렌더 → 0.6·1.2 같은 소수가 같은 1px로 뭉개짐.
        // 올림(ceil)으로 구분: 치수 0.6→1, 글씨 1.2→2, 일반선 2.5→3 (값이 다르면 굵기도 달라짐).
        const sw=(su&&styleWidths[su]!=null)?Math.max(1,Math.ceil(styleWidths[su])):3;
        const so=1;   // Vmap처럼 색을 선명하게(전체 불투명). KMZ 색 alpha(텍스트 0.7 등)는 화면에선 무시
        // Placemark 하나(MultiGeometry 포함)의 모든 선을 멀티파트 Polyline 1개로 —
        // 선별 개별 Polyline 은 수천 개 KMZ 에서 pan/zoom 버벅임(htm 로딩과 동일 경량화).
        // 원본 경로는 _parts 에 보관(getPath()가 멀티파트를 유실하므로 내보내기용).
        const parts=[];
        for(const ce of coordEls){
          const coordsText=ce?.textContent||'';
          const pts=coordsText.trim().split(/\s+/).map(c=>{const[lng,lat]=c.split(',').map(Number);return new kakao.maps.LatLng(lat,lng);}).filter(ll=>!isNaN(ll.getLat())&&!isNaN(ll.getLng()));
          if(pts.length<2)continue;
          pts.forEach(p=>bounds.extend(p));
          parts.push(pts);
        }
        if(parts.length){
          const poly=new kakao.maps.Polyline({path:parts.length===1?parts[0]:parts,strokeWeight:sw,strokeColor:color,strokeOpacity:so});
          if(parts.length>1)poly._parts=parts;   // 단일 경로는 점 편집 가능 — getPath()로 최신 경로 사용
          poly._origWeight=sw;
          poly._origColor=color; poly._name=pmName;
          _deferPolys.push(poly);   // setBounds 후 한 번에 setMap
          polylines.push(poly); attachPolylineRightClick(poly);
          addItem({type:'track',name:pmName,address:'',polyline:poly,_origColor:color});
        }
        continue;
      }

      // ── 점(사진/마커) ──
      const point=pm.getElementsByTagName('Point')[0];

      // ── CAD 문자(point 모드): 마커 대신 회전 텍스트 라벨만 그림 ──
      if (point) {
        let _kind='';
        for(const d of Array.from(pm.getElementsByTagName('Data'))){
          if(d.getAttribute('name')==='kind'){_kind=(d.getElementsByTagName('value')[0]?.textContent||'').trim();break;}}
        if(_kind==='text'){
          const ct=point.getElementsByTagName('coordinates')[0]?.textContent||'';
          const[lng,lat]=ct.trim().split(',').map(Number);
          if(!isNaN(lat)&&!isNaN(lng)){
            let _rot=0,_col='';
            for(const d of Array.from(pm.getElementsByTagName('Data'))){
              const nm=d.getAttribute('name'); const v=d.getElementsByTagName('value')[0]?.textContent||'';
              if(nm==='rot')_rot=parseFloat(v)||0; else if(nm==='color')_col=v.trim();}
            const ll=new kakao.maps.LatLng(lat,lng); bounds.extend(ll);
            addTextLabel(ll,pmName,_rot,_col);
          }
          continue;
        }
      }

      let photoFilename='';
      for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='photoFile'){photoFilename=d.getElementsByTagName('value')[0]?.textContent||'';break;}}
      if(!photoFilename){
        const descEl=pm.getElementsByTagName('description')[0];
        if(descEl){const dt=descEl.textContent||'';const im=dt.match(/src=["']([^"']+\.(jpe?g|png))["']/i)||dt.match(/src=([^\s>]+\.(jpe?g|png))/i);
        if(im){const tp=im[1].trim(),rp=tp.replace('_thumb.','_roll.');const re=zipFiles.find(z=>{const c=z.replace(/\0/g,'');return c===rp||c.endsWith('/'+rp.split('/').pop());});photoFilename=re?rp:tp;}}
      }
      if (point) {
        const coordsText=point.getElementsByTagName('coordinates')[0]?.textContent||'';
        const[lng,lat]=coordsText.trim().split(',').map(Number);
        if(isNaN(lat)||isNaN(lng))continue;
        const ll=new kakao.maps.LatLng(lat,lng);bounds.extend(ll);
        if(photoFilename){
          const baseName=photoFilename.split('/').pop();let photoZipFile=null,matchedInner='';
          for(const n of zipFiles){const cn=n.replace(/\0/g,'');if(cn===photoFilename||cn===`files/${photoFilename}`||cn===`images/${baseName}`||cn===`photo/${baseName}`||cn.endsWith('/'+baseName)||cn===baseName){photoZipFile=zip.files[n];matchedInner=cn;break;}}
          if(photoZipFile){const base64=await photoZipFile.async('base64');const ext=baseName.split('.').pop().toLowerCase();addPhotoMarker(ll,`data:${ext==='png'?'image/png':'image/jpeg'};base64,${base64}`,pmName,'');
            // KMZ 내부 사진: 복사(Ctrl+C)용 출처 태깅 — _srcKmz(디스크 경로)+_kmzInner(내부 상대경로)
            const _last=allItems[allItems.length-1];if(_last){_last._kmzInner=matchedInner;if(kmzDiskPath)_last._srcKmz=kmzDiskPath;}}
          else addMarker(ll,pmName);
        } else addMarker(ll,pmName);
      }
    }
    bulkLoading=false;
    // 대량 로드 마무리: 표는 한 번만 그리고, 전체 가져오기를 한 묶음으로 되돌리기 가능하게 등록
    const _added=allItems.slice(_bulkStart);
    if(_added.length){
      if(allItems.length===_added.length)openSidebar();
      renderList();
      queueAddrFetch(_added);   // KMZ 안 사진·트랙 주소를 천천히 조회
      const _set=new Set(_added);
      pushHistory({
        undo(){_added.forEach(_hideItemOnMap);allItems=allItems.filter(i=>!_set.has(i));selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();renderList();},
        redo(){_added.forEach(it=>{_showItemOnMap(it);if(!allItems.includes(it))allItems.push(it);});renderList();}
      });
    }
    if(!bounds.isEmpty())map.setBounds(bounds);
    // 화면(줌) 확정 후 한 번만 그림. 묶음선(_parts)은 컬링이 화면 교차 구간만 붙임.
    _deferPolys.forEach(p=>{if(!p._parts)p.setMap(map);});
    cullBundlePolys();
  } catch(err){
    bulkLoading=false;console.error(err);alert('KMZ 파일 오류: '+err.message);
    // 오류 전까지 파싱된 선은 그대로 표시 (숨은 채 남지 않게)
    try{_deferPolys.forEach(p=>{if(!p.getMap())p.setMap(map);});}catch(e){}
  }
}

// ══════════════════════════════════════════════════
//  거리 계산 유틸
// ══════════════════════════════════════════════════
function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ══════════════════════════════════════════════════
//  거리 기준 클러스터 각각저장 (KMZ)
// ══════════════════════════════════════════════════
async function exportClusteredKMZ(scope) {
  let scopeItems;
  if (scope === 'all') {
    // 사이드바에 보이는 객체(필터 켜면 화면 안 객체만)
    scopeItems = getFilteredItems().filter(i => {
      if (i.markerObj) return !!i.markerObj.marker.getMap();
      if (i.polyline)  return !!(i.polyline.getMap() || i.polyline._viewCulled);
      return false;
    });
  } else if (scope === 'visible') {
    const bounds = map.getBounds();
    scopeItems = allItems.filter(i => {
      if (i.markerObj) return !!i.markerObj.marker.getMap() && bounds.contain(i.markerObj.marker.getPosition());
      if (i.polyline)  return !!i.polyline.getMap() && flatPath(i.polyline).some(p => bounds.contain(p));
      return false;
    });
  } else {
    if (selectedItems.size === 0) { alert('선택된 항목이 없습니다.'); return; }
    const filtered = getFilteredItems();
    const selSet = new Set([...selectedItems].map(i => filtered[i]).filter(Boolean));
    scopeItems = allItems.filter(i => selSet.has(i));
  }

  if (!scopeItems.length) { alert('저장할 항목이 없습니다.'); return; }

  const threshStr = prompt('같은 파일로 묶을 거리 (m)\n이 거리 안에 있는 객체끼리 한 파일로 저장됩니다', '100');
  if (threshStr === null) return;
  const threshold = Math.max(1, parseFloat(threshStr) || 100);

  // Union-Find 클러스터링
  const n = scopeItems.length;
  const parent = Array.from({ length: n }, (_, i) => i);
  function find(x) { return parent[x] === x ? x : (parent[x] = find(parent[x])); }
  function union(a, b) { parent[find(a)] = find(b); }

  for (let i = 0; i < n; i++) {
    const ci = getItemLatLng(scopeItems[i]);
    if (!ci) continue;
    for (let j = i + 1; j < n; j++) {
      const cj = getItemLatLng(scopeItems[j]);
      if (!cj) continue;
      if (haversineDistance(ci.getLat(), ci.getLng(), cj.getLat(), cj.getLng()) <= threshold) union(i, j);
    }
  }

  const clustersMap = new Map();
  for (let i = 0; i < n; i++) {
    const root = find(i);
    if (!clustersMap.has(root)) clustersMap.set(root, []);
    clustersMap.get(root).push(scopeItems[i]);
  }

  const clusterArr = [...clustersMap.values()];
  if (!confirm(`${clusterArr.length}개 파일로 저장됩니다.\n계속하시겠습니까?`)) return;

  const nnm = buildNumNameMap();
  const clusterRenames = [];   // 디스크 원본 rename 누적 (마지막에 1회 전송)

  for (const clusterItems of clusterArr) {
    // 클러스터 이름: marker → photo → track 순으로 우선
    const nameItem = clusterItems.find(i => i.type === 'marker') ||
                     clusterItems.find(i => i.type === 'photo') ||
                     clusterItems[0];
    const clusterName = (nameItem?.name || '지도').replace(/[\/\\:*?"<>|]/g, '_');

    const zip = new JSZip(), photoFileMap = new Map(), usedNames = new Set(), seqRef = { n: 0 };

    for (const item of clusterItems) {
      if (!item.markerObj) continue;
      const m = item.markerObj;
      const sf = await _zipPhoto(zip, m, item, nnm, usedNames, seqRef, clusterRenames);
      if (sf) photoFileMap.set(m, sf);
    }

    let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n  <name>${clusterName}</name>\n`;
    for (const item of clusterItems) {
      if (item.polyline) {
        const pl = item.polyline;
        for (const part of pathParts(pl)) {
          if (part.length < 2) continue;
          const coords = part.map(p => `${p.getLng()},${p.getLat()},0`).join(' ');
          kml += `  <Placemark><name>${nnm?.get(pl) || item.name}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;
        }
      } else if (item.markerObj) {
        const m = item.markerObj;
        const p = m.marker.getPosition();
        const nm = nnm?.get(m) || m.name || '';
        const sf = photoFileMap.get(m);
        if (sf) kml += `  <Placemark><name>${nm}</name><description><![CDATA[<img src="files/${sf}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${sf}</value></Data></ExtendedData><Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point></Placemark>\n`;
        else kml += `  <Placemark><name>${nm}</name><Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point></Placemark>\n`;
      }
    }
    kml += '</Document>\n</kml>';
    zip.file('doc.kml', kml);

    const blob = await zip.generateAsync({ type: 'blob' });
    saveBlob(blob, clusterName + '.kmz');   // 각각저장은 클러스터 이름 그대로
    await new Promise(r => setTimeout(r, 400));
  }

  _sendPhotoRenames(clusterRenames);
  setTimeout(() => alert(`✅ ${clusterArr.length}개 파일 저장 완료!`), 500);
}

// ══════════════════════════════════════════════════
//  저장 위치 결정 + 공통 저장 (Python 연동)
// ══════════════════════════════════════════════════
let loadedDataFiles = [];   // 엑셀에서 올라온 KMZ/GPX/CSV 원본 전체경로 (영구)
let liveDataFile    = '';   // 단일 셀 임시 KMZ 경로 (셀 이동 시 비움)

function dirOf(p){ return p ? p.replace(/[\\/][^\\/]*$/, '') : ''; }
function baseName(p){ return p ? p.replace(/^.*[\\/]/, '').replace(/\.[^.]*$/, '') : ''; }

// 저장 대상 결정 → {folder, base}
//  folder: ① 화면 중심 최근접 사진 폴더(최우선) → ② 셀에서 올린 KMZ 폴더
//  base  : 기준 사진 이름(확장자 없음). 사진이 있을 때만 채워짐
function resolveSaveTarget(){
  if (map){
    const c = map.getCenter();
    let best = null, bestD = Infinity;
    const folders = new Set();
    allItems.forEach(it => {
      if (it.type === 'photo' && it.path && it.markerObj){
        folders.add(dirOf(it.path));
        const pos = it.markerObj.marker.getPosition();
        const d = Math.hypot(pos.getLat() - c.getLat(), pos.getLng() - c.getLng());
        if (d < bestD){ bestD = d; best = it; }
      }
    });
    // 사진이 모두 같은 폴더면 그 폴더에 저장, 서로 다른 폴더면 다운로드 폴더(folder 비움)
    if (best) return { folder: (folders.size > 1) ? '' : dirOf(best.path), base: baseName(best.path) };
  }
  // 사진이 없으면 셀에서 올린 KMZ 폴더·이름 사용 (그 KMZ 위에 덮어쓰기 흐름)
  if (liveDataFile) return { folder: dirOf(liveDataFile), base: baseName(liveDataFile) };
  for (let i = loadedDataFiles.length - 1; i >= 0; i--)
    if (loadedDataFiles[i]) return { folder: dirOf(loadedDataFiles[i]), base: baseName(loadedDataFiles[i]) };
  return { folder: '', base: '' };
}

// 저장 prompt 기본값: 기준 사진 이름(있으면) → 없으면 fallback
function defaultSaveName(fallback){
  const t = resolveSaveTarget();
  return t.base || fallback;
}

// 공통 저장 — 폴더가 정해지고 WS 연결되면 Python에 저장, 아니면 다운로드
// chooseDir=true 이면 KMZ 저장 시 네이티브 '다른 이름으로 저장' 대화상자를 띄워
// 사용자가 폴더·파일명을 직접 고르게 한다(지난번 저장 폴더가 기본값).
// onSaved: 저장이 실제로 끝난 뒤 실행할 후처리(_live 표시·사진번호 등). 대화상자 경로는
// 사용자가 저장을 확정(성공)했을 때만 실행되고, 취소하면 실행되지 않는다.
function saveBlob(blob, filename, chooseDir, onSaved){
  if (chooseDir && /\.kmz$/i.test(filename) && window.__wsReady && window.__wsReady()){
    window.__kmzOnSaved = onSaved || null;   // file_saved(ok) 때 호출 / 취소·실패 시 미실행
    const sug = resolveSaveTarget().folder || '';
    const fr = new FileReader();
    fr.onload = () => {
      window.__wsSend({ type:'save_kmz_dialog', filename, suggested:sug, data:fr.result.split(',')[1] });
      window.__setBadge && window.__setBadge(true, '💾 저장 위치 선택...');
    };
    fr.readAsDataURL(blob);
    return;
  }
  const t = resolveSaveTarget();
  const folder = t.folder;
  if (folder && window.__wsReady && window.__wsReady()){
    const fr = new FileReader();
    fr.onload = () => window.__saveViaPython(folder, filename, fr.result.split(',')[1]);
    fr.readAsDataURL(blob);
  } else {
    const photos = allItems.filter(i => i.type === 'photo');
    console.warn('[저장] 작업 폴더 미확정 → 다운로드 폴더로 저장합니다.', {
      folder, wsReady: !!(window.__wsReady && window.__wsReady()),
      사진수: photos.length, 경로있는사진: photos.filter(i => i.path).length,
      데이터파일: loadedDataFiles.length, liveData: liveDataFile
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
  }
  if (onSaved) onSaved();   // 자동폴더 저장·다운로드 경로는 기존처럼 즉시 후처리
}

function getAddPhotoNum(){ const el=document.getElementById('addPhotoNum'); return !!(el&&el.checked); }
// 사진 1장을 zip에 추가하고 KMZ 내부 파일명(sf) 반환. 번호옵션이면 _NNN(3자리) 부여.
// seqRef.n 은 추가된 사진마다 증가. renames 에는 디스크 원본 rename 정보 수집(실제 디스크 파일만).
async function _zipPhoto(zip, m, item, nnm, usedNames, seqRef, renames){
  const img=m.iw.getContent().querySelector('img');
  if(!(img&&img.src.startsWith('data:image')))return null;
  const numSuffix=getAddPhotoNum()?('_'+String(seqRef.n).padStart(3,'0')):'';
  let base=((nnm?.get(m)||item.name)||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'')+numSuffix;
  let sf=base+'.jpg',suf=1;while(usedNames.has(sf))sf=`${base}_${suf++}.jpg`;usedNames.add(sf);
  const p=m.marker.getPosition();
  const imgData=injectGPS(await compressImage(img.src),p.getLat(),p.getLng());
  zip.file(`files/${sf}`,imgData.split(',')[1],{base64:true});
  // 디스크 실제 파일이고 번호옵션이면 원본 파일도 rename 대상에 추가.
  //  newName = KMZ 내부와 동일한 새 이름(목록 이름 + _NNN). 서버가 원본을 이 이름으로 바꿈.
  if(numSuffix && item.path && /^[a-zA-Z]:[\\/]/.test(item.path) && item.path.indexOf('|')<0)
    renames.push({path:item.path, suffix:numSuffix, newName:base});
  seqRef.n++;
  return sf;
}

// 트랙(선) 항목 -> KML Placemark 문자열. 색상별로 묶인 보조선(extraOverlays)까지 모두 포함.
// bounds 가 있으면 그 영역 안의 점만(현재영역 저장). 없으면 전체.
// styles(Map)를 주면 선 색·굵기를 공유 <Style>로 모아 styleUrl 로 참조(다시 열어도 같은 색).
function _lineKmlPlacemarks(item, nnm, bounds, styles) {
  // _viewCulled: 화면 밖이라 지도에서 잠시 떼어낸 묶음선 — 내보내기에선 표시 중으로 취급
  const ovs = [item.polyline, ...(item.extraOverlays || [])].filter(pl => pl && (pl.getMap() || pl._viewCulled));
  if (!ovs.length) return '';
  const nm = (nnm && nnm.get(item.polyline)) || item.name || '';
  let out = '';
  for (const pl of ovs) {
    let su = '';
    if (styles) {
      const hex = ((pl._origColor || item._origColor || '#1e8449') + '').replace('#', '');
      const w = pl._origWeight || 3;
      const key = hex + '_' + w;
      if (!styles.has(key)) styles.set(key, 'ln_' + key);
      su = `<styleUrl>#${styles.get(key)}</styleUrl>`;
    }
    // 멀티파트(htm 색상묶음 등)는 선마다 Placemark 를 만들지 않고 MultiGeometry 한 개로 묶음
    // → 파일 작고, 다시 열 때도 항목/오버레이 1개(수천 개 DOM/폴리라인 폭증 방지).
    const segs = [];
    for (let path of pathParts(pl)) {
      if (bounds) path = path.filter(p => bounds.contain(p));
      if (path.length < 2) continue;
      const coords = path.map(p => `${p.getLng()},${p.getLat()},0`).join(' ');
      segs.push(`<LineString><coordinates>${coords}</coordinates></LineString>`);
    }
    if (!segs.length) continue;
    const geom = segs.length === 1 ? segs[0] : `<MultiGeometry>${segs.join('')}</MultiGeometry>`;
    out += `  <Placemark><name>${nm}</name>${su}${geom}</Placemark>\n`;
  }
  return out;
}
// _lineKmlPlacemarks 가 모은 styles(Map: 'RRGGBB_w' -> id) -> KML <Style> 정의 문자열 (KML 색은 aabbggrr)
function _lineKmlStyleDefs(styles) {
  let out = '';
  for (const [key, id] of styles) {
    const [hex, w] = key.split('_');
    const kcol = 'ff' + hex.slice(4, 6) + hex.slice(2, 4) + hex.slice(0, 2);
    out += `  <Style id="${id}"><LineStyle><color>${kcol}</color><width>${w}</width></LineStyle></Style>\n`;
  }
  return out;
}
// KMZ 저장 후: 현재 지도에 삽입된 객체 전부를 '임시삽입(_live)' 상태로.
//  → 사이드바에 흐리게 표시되고, 다른 객체(파일)를 선택/로드하면 자동으로 사라진다.
function markAllInsertedLive() {
  let n = 0;
  allItems.forEach(i => { if (!i._live) { i._live = true; n++; } });
  if (n) { try { renderList(); } catch (e) {} }
  return n;
}

async function convertHeicIfNeeded(file){
  const isHeic=file.type==='image/heic'||file.type==='image/heif'||/\.(heic|heif)$/i.test(file.name);
  if(!isHeic)return file;
  const blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.92});
  return new File([Array.isArray(blob)?blob[0]:blob],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'});
}

function injectGPS(dataUrl,lat,lng){
  try{
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    let ex={};try{ex=piexif.load(dataUrl);}catch(e){}
    if(!ex['GPS'])ex['GPS']={};
    ex['GPS'][piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';
    ex['GPS'][piexif.GPSIFD.GPSLatitude]=toDMS(lat);
    ex['GPS'][piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';
    ex['GPS'][piexif.GPSIFD.GPSLongitude]=toDMS(lng);
    return piexif.insert(piexif.dump(ex),dataUrl);
  }catch(e){return dataUrl;}
}

function compressImage(imgSrc){
  return new Promise(r=>{
    const qVal=parseInt(document.getElementById('photoQuality')?.value??'200');
    if(qVal===0){r(imgSrc);return;}
    const img=new Image();
    img.onload=()=>{
      const T=qVal*1024,MAX=1920;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85,res=c.toDataURL('image/jpeg',q);
      while(res.length*0.75>T&&q>0.1){q=Math.round((q-0.05)*100)/100;res=c.toDataURL('image/jpeg',q);}
      try{const exif=piexif.load(imgSrc);if(exif['0th']){delete exif['0th'][piexif.ImageIFD.UserComment];delete exif['0th'][piexif.ImageIFD.ImageDescription];}if(exif['Exif'])delete exif['Exif'][piexif.ExifIFD.UserComment];res=piexif.insert(piexif.dump(exif),res);}catch(e){}
      r(res);
    };img.src=imgSrc;
  });
}

function downloadPhotoWithGPS(imgSrc,name,lat,lng){
  return new Promise(r=>{
    const qVal=parseInt(document.getElementById('photoQuality')?.value??'200');
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    const insertGPS=du=>{try{let exif={};try{exif=piexif.load(imgSrc);}catch(e){}if(exif['0th']){delete exif['0th'][piexif.ImageIFD.UserComment];delete exif['0th'][piexif.ImageIFD.ImageDescription];}if(exif['Exif'])delete exif['Exif'][piexif.ExifIFD.UserComment];if(!exif['GPS'])exif['GPS']={};exif['GPS'][piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';exif['GPS'][piexif.GPSIFD.GPSLatitude]=toDMS(lat);exif['GPS'][piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';exif['GPS'][piexif.GPSIFD.GPSLongitude]=toDMS(lng);return piexif.insert(piexif.dump(exif),du);}catch(e){return du;}};
    const doDownload=du=>{const res=insertGPS(du);const a=document.createElement('a');a.href=res;a.download=(name||'image')+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(r,300);};
    if(qVal===0){doDownload(imgSrc);return;}
    const T=qVal*1024,image=new Image();
    image.onload=()=>{
      const MAX=1920;let w=image.width,h=image.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(image,0,0,w,h);
      let q=0.92,res=c.toDataURL('image/jpeg',q);
      while(res.length*0.75>T&&q>0.1){q=Math.round((q-0.05)*100)/100;res=c.toDataURL('image/jpeg',q);}
      doDownload(res);
    };image.src=imgSrc;
  });
}

// ── 드래그 선택 / 길게 눌러 순서 변경 ──
let reorderMode = false, reorderHoldTimer = null, reorderTargetIdx = -1;

function getReorderLine() {
  let el = document.getElementById('reorderLine');
  if (!el) {
    el = document.createElement('div');
    el.id = 'reorderLine';
    el.style.cssText = 'display:none;position:absolute;left:0;right:0;height:3px;background:#e74c3c;pointer-events:none;z-index:20;';
    document.getElementById('photoListWrapper').style.position = 'relative';
    document.getElementById('photoListWrapper').appendChild(el);
  }
  return el;
}

function reorderItems(targetIdx) {
  const filtered = getFilteredItems();
  const moving = [...selectedItems].sort((a,b)=>a-b).map(i=>filtered[i]).filter(Boolean);
  if (!moving.length) return;
  const staying = filtered.filter((_, i) => !selectedItems.has(i));
  // 이동 후 삽입 위치 보정
  let ins = targetIdx;
  for (const si of [...selectedItems].sort((a,b)=>a-b)) { if (si < targetIdx) ins--; }
  ins = Math.max(0, Math.min(ins, staying.length));
  const newFiltered = [...staying.slice(0, ins), ...moving, ...staying.slice(ins)];
  if (currentFilter === 'all') {
    allItems = newFiltered;
  } else {
    let fi = 0;
    allItems = allItems.map(item => item.type === currentFilter ? newFiltered[fi++] : item);
  }
  selectedItems.clear();
  moving.forEach(item => { const ni = newFiltered.indexOf(item); if (ni >= 0) selectedItems.add(ni); });
  anchorIdx = Math.min(...[...selectedItems]);
  lastClickedIdx = Math.max(...[...selectedItems]);
  renderList();
}

document.addEventListener('mousemove', e => {
  if (dragStartIdx < 0 || e.buttons === 0) {
    dragStartIdx = -1;
    if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }
    if (reorderMode) {
      reorderMode = false;
      getReorderLine().style.display = 'none';
      document.querySelectorAll('#photoTbody tr').forEach(r => r.style.opacity = '');
    }
    return;
  }

  if (reorderMode) {
    // 순서 변경 모드: 삽입 위치 표시
    const rows = [...document.querySelectorAll('#photoTbody tr')];
    const wrapper = document.getElementById('photoListWrapper');
    const wRect = wrapper.getBoundingClientRect();
    const relY = e.clientY - wRect.top + wrapper.scrollTop;
    let target = rows.length;
    for (let i = 0; i < rows.length; i++) {
      const rRect = rows[i].getBoundingClientRect();
      const rMid = rRect.top - wRect.top + wrapper.scrollTop + rRect.height / 2;
      if (relY < rMid) { target = i; break; }
    }
    reorderTargetIdx = target;
    const line = getReorderLine();
    if (target < rows.length) {
      const rRect = rows[target].getBoundingClientRect();
      line.style.top = (rRect.top - wRect.top + wrapper.scrollTop) + 'px';
    } else if (rows.length > 0) {
      const rRect = rows[rows.length - 1].getBoundingClientRect();
      line.style.top = (rRect.bottom - wRect.top + wrapper.scrollTop) + 'px';
    }
    line.style.display = 'block';
    return;
  }

  if (!isDragging && Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) < 8) return;
  // 짧은 이동 → 일반 드래그 선택 (홀드 타이머 취소)
  if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }

  const el = document.elementFromPoint(e.clientX, e.clientY);
  const tr = el && el.closest('#photoTbody tr');
  if (!tr) return;
  const rows = [...document.querySelectorAll('#photoTbody tr')];
  const curIdx = rows.indexOf(tr);
  if (curIdx < 0) return;
  isDragging = true;
  const lo = Math.min(dragStartIdx, curIdx), hi = Math.max(dragStartIdx, curIdx);
  selectedItems.clear();
  for (let i = lo; i <= hi; i++) selectedItems.add(i);
  lastClickedIdx = curIdx;
  rows.forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
});

document.addEventListener('mouseup', () => {
  if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }
  if (reorderMode) {
    reorderMode = false;
    getReorderLine().style.display = 'none';
    document.querySelectorAll('#photoTbody tr').forEach(r => r.style.opacity = '');
    if (reorderTargetIdx >= 0) { reorderItems(reorderTargetIdx); reorderTargetIdx = -1; }
  } else if (dragStartIdx >= 0 && isDragging) {
    anchorIdx = dragStartIdx; renderList();
  }
  dragStartIdx = -1;
});

// ══════════════════════════════════════════════════
//  탐색기 연동 WebSocket (사진위치표시.py 와 통신)
// ══════════════════════════════════════════════════
(function(){
  const WS_URL = 'ws://localhost:8765';
  let ws = null, liveOvs = [], retryTimer = null;
  window.__getLiveOvs = () => liveOvs;   // 선그리기(setMarkersClickThrough)에서 접근용
  // Ctrl+C(탐색기) 사진을 지도 중심에 배치할 때 쓰는 드래그용 보조 마커(초록 점)·링.
  // 영구(live 아님)이며 위치 기록(저장) 후 제거된다. resetAll 에서 일괄 정리.
  let recordHelpers = [];
  window.__clearRecordHelpers = () => {
    recordHelpers.forEach(ov => { try { ov.setMap(null); } catch(e){} });
    recordHelpers = [];
  };
  let lastExcelRow = null;   // 엑셀 활성 셀 행 추적 (객체리셋 모드: 행 변경 시 기존 객체 제거)
  const badge = document.getElementById('explorerBadge');

  // 마커 path → { marker, ringOv } 매핑 (드래그 후 위치 복원/재적용에 사용)
  const pathToMarker = new Map();

  function setBadge(ok, text) {
    badge.textContent = text;
    badge.classList.toggle('connected', ok);
  }

  // ── 저장(saveBlob)에서 사용하는 Python 연동 공개 함수 ──
  let pendingSave = null;   // 덮어쓰기 확인용 보관 {folder, filename, b64}
  window.__wsReady = () => ws && ws.readyState === 1;
  window.__saveViaPython = (folder, filename, b64) => {
    pendingSave = { folder, filename, b64 };
    ws.send(JSON.stringify({ type:'save_file', folder, filename, data:b64, overwrite:false }));
    setBadge(true, '💾 저장 중...');
  };
  // 외부(IIFE 바깥) 함수에서 WebSocket 전송 / 배지 표시할 수 있도록 노출
  window.__wsSend = (obj) => {
    if (ws && ws.readyState === 1) { ws.send(JSON.stringify(obj)); return true; }
    return false;
  };
  window.__setBadge = setBadge;

  function removeLive() {
    liveOvs.forEach(ov => ov.setMap(null));
    liveOvs = [];
    pathToMarker.clear();
  }

  // 현재 임시(_live) 객체들을 영구 객체로 확정(Insert).
  //  - _live 플래그 제거 → live_clear/clearLiveItems 로 더 이상 지워지지 않음
  //  - 녹색 드래그 마커/링(미리보기 장식) 제거, 사진 마커·트랙은 그대로 유지
  window.__promoteLive = () => {
    const liveItems = allItems.filter(i => i._live);
    if (!liveItems.length) {
      setBadge(true, '⚠️ 삽입할 임시 객체 없음');
      return 0;
    }
    liveItems.forEach(i => { delete i._live; delete i._srcKmz; });
    removeLive();           // 라이브 오버레이 제거
    if (window.__clearRecordHelpers) window.__clearRecordHelpers();   // 녹색 드래그 마커/링 제거
    clearLivePreview();     // 하단 미리보기 비움
    liveDataFile = '';
    // 같은 파일 재선택 시 다시 임시로 들어올 수 있게 서버 live 상태 초기화
    if (window.__wsSend) window.__wsSend({ type:'reset_live_broadcast' });
    renderList();
    setBadge(true, `✅ 객체 ${liveItems.length}개 삽입됨`);
    return liveItems.length;
  };

  // 탐색기에서 임시삽입된 파일을 지도로 '드래그'하면 → 새로 로드해 중복 만들지 말고
  //  이미 있는 그 임시항목을 영구 확정(경로 유지 → Ctrl+C 파일복사 가능). 파일명(디스크경로 basename)으로 매칭.
  window.__promoteMatchingLive = fileName => {
    const base = String(fileName || '').toLowerCase();
    if (!base) return false;
    const dup = allItems.find(it => it._live && it.path &&
      String(it.path).toLowerCase().split(/[\\/]/).pop() === base);
    if (!dup) return false;
    delete dup._live; delete dup._srcKmz;            // 영구 확정
    // 이 항목의 초록 보조핀/링 제거 (미리보기 장식)
    if (dup.path && pathToMarker.has(dup.path)) {
      const h = pathToMarker.get(dup.path);
      if (h) { if (h.marker) h.marker.setMap(null); if (h.ringOv) h.ringOv.setMap(null); }
      pathToMarker.delete(dup.path);
    }
    renderList();
    setBadge(true, `✅ ${dup.name} 삽입됨`);
    return true;
  };

  // Excel 셀 선택으로 임시 삽입된 항목 전부 제거
  function clearLiveItems() {
    clearLivePreview();
    removeLive();
    if (window.__clearRecordHelpers) window.__clearRecordHelpers();   // 초록 드래그마커도 제거
    liveDataFile = '';
    const liveItems = allItems.filter(i => i._live);
    if (!liveItems.length) return;
    liveItems.forEach(item => {
      if (item.markerObj) {
        item.markerObj.iw.close();
        item.markerObj.marker.setMap(null);
        markers = markers.filter(m => m !== item.markerObj);
      }
      if (item.polyline) {
        item.polyline.setMap(null);
        polylines = polylines.filter(p => p !== item.polyline);
      }
      // 색상별로 묶인 보조선(extraOverlays)까지 지도/배열에서 제거
      if (item.extraOverlays) {
        item.extraOverlays.forEach(o => { o.setMap(null); });
        polylines = polylines.filter(p => !item.extraOverlays.includes(p));
      }
    });
    allItems = allItems.filter(i => !i._live);
    selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
    renderList();   // 사이드바 열림/닫힘 상태는 그대로 유지 (닫지 않음)
  }

  // 임시(_live) 항목이 이미 영구 삽입된 항목과 중복되면 임시항목 제거.
  //  (⬇삽입으로 확정하면 _srcKmz 가 지워져 같은 KMZ 재선택 시 중복 임시가 생기므로)
  //  판정키: 디스크경로(path) 있으면 path, 없으면 이름+대표좌표(6자리) — 둘 다 같아야 중복.
  window.__dedupLiveItems = function() {
    if (!allItems.some(i => i._live)) return 0;
    const key = it => {
      if (it.path) return 'p:' + String(it.path).toLowerCase();
      const ll = getItemLatLng(it);
      const g = ll ? ll.getLat().toFixed(6) + ',' + ll.getLng().toFixed(6) : '';
      return 'n:' + (it.name || '') + '|' + g;
    };
    const permKeys = new Set();
    for (const it of allItems) if (!it._live) permKeys.add(key(it));
    if (!permKeys.size) return 0;
    const dups = allItems.filter(i => i._live && permKeys.has(key(i)));
    if (!dups.length) return 0;
    for (const item of dups) {
      if (item.markerObj) {
        if (item.markerObj.iw) item.markerObj.iw.close();
        item.markerObj.marker.setMap(null);
        markers = markers.filter(m => m !== item.markerObj);
      }
      for (const o of _itemOverlays(item)) { o.setMap(null); polylines = polylines.filter(p => p !== o); }
      // 임시 사진의 초록 보조마커/링(있으면) 제거
      if (item.path && pathToMarker.has(item.path)) {
        const h = pathToMarker.get(item.path);
        if (h) { if (h.marker) h.marker.setMap(null); if (h.ringOv) h.ringOv.setMap(null); }
        pathToMarker.delete(item.path);
      }
    }
    allItems = allItems.filter(i => !dups.includes(i));
    return dups.length;
  };

  // path 로 식별되는 마커 위치 갱신 (undo/redo 시 시각 반영)
  function applyPos(path, lat, lng) {
    const m = pathToMarker.get(path);
    if (m) {
      const p = new kakao.maps.LatLng(lat, lng);
      m.marker.setPosition(p);
      m.ringOv.setPosition(p);
    }
  }

  // ── GPS 드래그 확인 모달 ──
  function showDragConfirm(name, lat, lng, onOk, onCancel) {
    const modal  = document.getElementById('gpsDragModal');
    const info   = document.getElementById('gpsDragInfo');
    const okBtn  = document.getElementById('gpsDragOk');
    const canBtn = document.getElementById('gpsDragCancel');
    info.textContent = `파일: ${name}\n위도: ${lat}\n경도: ${lng}`;
    modal.classList.add('visible');
    function handleOk()     { modal.classList.remove('visible'); unbind(); onOk();     }
    function handleCancel() { modal.classList.remove('visible'); unbind(); onCancel(); }
    function unbind() {
      okBtn.removeEventListener('click', handleOk);
      canBtn.removeEventListener('click', handleCancel);
    }
    okBtn.addEventListener('click', handleOk);
    canBtn.addEventListener('click', handleCancel);
  }

  // ── Kakao 내장 Marker(draggable) 사용 → 좌표 계산/이벤트 충돌 문제 모두 해소 ──
  function showLiveMulti(items) {
    // items: [{lat, lng, name, path}, ...]  — GPS 있는 것만
    removeLive();
    if (!map || !items.length) return;

    // 초록 점 (사진: path 있음, 드래그 가능)
    const greenSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22">'
                   + '<circle cx="11" cy="11" r="7" fill="#00e676" stroke="white" stroke-width="2.5"/>'
                   + '</svg>';
    const greenImg = new kakao.maps.MarkerImage(
      'data:image/svg+xml;base64,' + btoa(greenSvg),
      new kakao.maps.Size(22, 22),
      { offset: new kakao.maps.Point(11, 11) }
    );
    // 파란 점 (엑셀 좌표: path 없음, 정적)
    const blueSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22">'
                  + '<circle cx="11" cy="11" r="7" fill="#2196f3" stroke="white" stroke-width="2.5"/>'
                  + '</svg>';
    const blueImg = new kakao.maps.MarkerImage(
      'data:image/svg+xml;base64,' + btoa(blueSvg),
      new kakao.maps.Size(22, 22),
      { offset: new kakao.maps.Point(11, 11) }
    );

    const bounds = new kakao.maps.LatLngBounds();
    items.forEach(({ lat, lng, name, path }) => {
      const pos = new kakao.maps.LatLng(lat, lng);
      const isPhoto = !!path;

      // ① 사진=펄스 링만(이름 라벨 제거 — Vmap과 동일), 좌표=라벨 유지
      const ringEl = document.createElement('div');
      ringEl.className = 'live-pin' + (isPhoto ? '' : ' coord-only');
      ringEl.style.pointerEvents = 'none';
      ringEl.innerHTML = isPhoto ? `<div class="live-pin-ring"></div>`
                                 : `<div class="live-pin-label">${name}</div>`;
      const ringOv = new kakao.maps.CustomOverlay({
        map, content: ringEl, position: pos,
        xAnchor: 0.5, yAnchor: 0.5, zIndex: 998
      });

      // ② 마커 — 사진은 드래그 가능 (초록), 좌표는 정적 (파랑)
      const marker = new kakao.maps.Marker({
        map: map, position: pos,
        image: isPhoto ? greenImg : blueImg,
        clickable: !drawingMode,   // 선그리기 중 생성 시 클릭 통과
        draggable: isPhoto && !drawingMode,
        title: isPhoto ? '드래그해서 GPS 위치 수정' : (name || '좌표'),
        zIndex: 999
      });

      // 좌표만 있는 경우 — 드래그 이벤트 없이 마커만 추가하고 종료
      if (!isPhoto) {
        liveOvs.push(marker, ringOv);
        bounds.extend(pos);
        return;
      }

      let originalPos = pos;

      // 드래그 시작 → 원위치 저장
      kakao.maps.event.addListener(marker, 'dragstart', () => {
        originalPos = marker.getPosition();
        ringEl.classList.add('dragging');
      });

      // 드래그 중 → 펄스 링도 따라 이동
      kakao.maps.event.addListener(marker, 'drag', () => {
        ringOv.setPosition(marker.getPosition());
      });

      // 드래그 종료 → 확인 모달
      kakao.maps.event.addListener(marker, 'dragend', () => {
        ringEl.classList.remove('dragging');
        const newPos = marker.getPosition();
        ringOv.setPosition(newPos);   // 최종 위치로 링 정렬
        const lat = newPos.getLat().toFixed(6);
        const lng = newPos.getLng().toFixed(6);

        showDragConfirm(name, lat, lng,
          () => {  // 저장 → 글로벌 undo 스택에 기록
            const prevLat = originalPos.getLat();
            const prevLng = originalPos.getLng();
            const newLat  = parseFloat(lat);
            const newLng  = parseFloat(lng);
            const sendGps = (la, ln) => {
              if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ type:'update_gps', path, lat:la, lng:ln }));
                setBadge(true, '💾 저장 중...');
              }
            };
            sendGps(newLat, newLng);
            pushHistory({
              undo() { applyPos(path, prevLat, prevLng); sendGps(prevLat, prevLng); },
              redo() { applyPos(path, newLat,  newLng);  sendGps(newLat,  newLng);  }
            });
          },
          () => {  // 취소 → 원위치 복원
            marker.setPosition(originalPos);
            ringOv.setPosition(originalPos);
          }
        );
      });

      pathToMarker.set(path, { marker, ringOv });
      liveOvs.push(marker, ringOv);
      bounds.extend(pos);
    });

    // 사이드바 자동 열림(relayout 50ms)이 끝난 뒤 보이는 지도 중심으로 이동
    setTimeout(() => {
      if (map) map.relayout();
      if (items.length === 1) {
        map.panTo(new kakao.maps.LatLng(items[0].lat, items[0].lng));
      } else {
        map.setBounds(bounds, 60);
      }
    }, 80);
  }

  function connect() {
    if (ws && ws.readyState < 2) return;
    try { ws = new WebSocket(WS_URL); } catch(e) { scheduleRetry(); return; }

    ws.onopen = () => {
      setBadge(true, '🟢 탐색기 연동 중');
      clearTimeout(retryTimer);
      window.__wsSend({type:'get_ui_settings'});
    };

    ws.onmessage = ({ data }) => {
      try {
        const d = JSON.parse(data);
        if (d.type === 'photos') {
          if (d.items.length === 0) {
            // 활성 창에서 선택 해제 — 마커 모두 클리어
            removeLive();
            setBadge(true, '🟢 탐색기 연동 중');
          } else {
            const gpsItems = d.items.filter(i => i.has_gps);
            const noGps    = d.items.length - gpsItems.length;
            if (gpsItems.length > 0) {
              showLiveMulti(gpsItems);
              const label = gpsItems.length === 1 ? gpsItems[0].name : `${gpsItems.length}장 선택`;
              setBadge(true, `🟢 ${label}${noGps ? ` (GPS없음 ${noGps}장)` : ''}`);
            } else {
              removeLive();
              setBadge(true, `⚠️ GPS 없음 (${d.items.length}장)`);
            }
          }
        } else if (d.type === 'gps_saved') {
          const name = d.path.split('\\').pop();
          setBadge(true, d.ok ? `✅ 저장됨: ${name}` : `❌ 저장실패: ${name}`);
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'name_saved') {
          const fn = d.path.split(/[\\/]/).pop();
          if (typeof showSaveStatus === 'function')
            showSaveStatus(d.ok ? `✅ 이름 저장됨 · 수정날짜 갱신 — ${fn}` : `❌ 이름 저장 실패 — ${fn}`, !!d.ok);
          setBadge(true, d.ok ? `✅ 이름 저장: ${fn}` : `❌ 이름 저장실패: ${fn}`);
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'photos_renamed') {
          // 디스크 원본 사진 파일명 변경 완료 → 사이드바 항목 path 갱신
          let n = 0;
          (d.items || []).forEach(r => {
            if (!r.ok || !r.new || r.old === r.new) return;
            allItems.forEach(it => { if (it.path === r.old) { it.path = r.new; n++; } });
            if (pathToMarker.has(r.old)) { const mk = pathToMarker.get(r.old); pathToMarker.delete(r.old); pathToMarker.set(r.new, mk); }
          });
          setBadge(true, n ? `✅ 원본 사진 ${n}개 이름변경됨` : '⚠️ 원본 사진 이름변경 없음');
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'file_saved') {
          if (d.ok) {
            setBadge(true, `✅ 저장됨: ${d.filename}`);
            if (d.folder) { console.log('저장 위치:', d.folder + '\\' + d.filename); showSaveStatus(`✅ 저장됨: ${d.folder}\\${d.filename}`); }
            pendingSave = null;
            // KMZ '다른 이름으로 저장' 성공 → 후처리(_live 표시·사진번호) 실행
            if (window.__kmzOnSaved) { try { window.__kmzOnSaved(); } catch(e) {} window.__kmzOnSaved = null; }
          } else {
            window.__kmzOnSaved = null;   // 저장 실패 시 후처리 안 함
            // Python 저장 실패 → 브라우저 다운로드로 폴백
            setBadge(false, `❌ 저장실패: ${d.filename}`);
            if (pendingSave) {
              try {
                const ps = pendingSave; pendingSave = null;
                const bytes = atob(ps.b64);
                const arr = new Uint8Array(bytes.length);
                for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
                const fallbackBlob = new Blob([arr], { type: 'application/octet-stream' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(fallbackBlob); a.download = ps.filename;
                document.body.appendChild(a); a.click();
                setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 1000);
                showSaveStatus(`⚠️ 폴더 저장 실패 → 다운로드 폴더에 저장됨: ${ps.filename}`, false);
              } catch(e) { pendingSave = null; showSaveStatus(`❌ 저장 실패: ${e.message}`, false); }
            } else { pendingSave = null; }
          }
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 3000);
        } else if (d.type === 'file_exists') {
          if (pendingSave && confirm(`'${d.filename}' 파일이 이미 있습니다.\n덮어쓰시겠습니까?`)) {
            ws.send(JSON.stringify({ type:'save_file', folder: pendingSave.folder,
              filename: pendingSave.filename, data: pendingSave.b64, overwrite:true }));
            setBadge(true, '💾 덮어쓰는 중...');
          } else {
            pendingSave = null;
            setBadge(true, '저장 취소됨');
            setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2000);
          }
        } else if (d.type === 'ui_settings') {
          if (window.__applyUiSettings) window.__applyUiSettings(d.settings || {});
        } else if (d.type === 'promote_live') {
          // 전역 Insert 키 — 임시(live) 객체 영구 삽입
          insertLiveObjects();
        } else if (d.type === 'close_maps') {
          // 서버 '재실행' — beforeunload 경고 없이 지도창 스스로 닫기
          window.__skipUnloadGuard = true;
          try { window.close(); } catch (e) {}
        } else if (d.type === 'resolved_paths') {
          // 드롭된 사진의 디스크 경로를 서버가 회신 → 대기 항목에 반영 (Ctrl+C 파일복사 가능)
          applyResolvedPaths(d.map || {});
        } else if (d.type === 'notice') {
          // 위치로 검색 취소 → 지도에 그려둔 선택 영역(원·중심점)도 제거
          if (d.clearLocPick) { stopLocationPick(); clearLocationPick(false); }
          window.__kmzOnSaved = null;   // KMZ 저장 취소 등 → 대기 중인 후처리 폐기
          setBadge(true, d.msg || '');
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'file_meta') {
          // 메타정보창 — 현재 선택 항목의 저장된 메타 응답이면 갱신
          if (_metaItem && d.path === _metaReqPath) { _metaSm = d.meta || {}; renderMeta(_metaItem, _metaSm);
            // 서버가 읽은 촬영일시를 항목에 캐시 → 목록 '촬영일시' 컬럼에도 반영
            if (_metaSm.taken && !_metaItem.takenDate) { _metaItem.takenDate = _metaSm.taken; renderList(); } }
        } else if (d.type === 'photo_meta_saved') {
          // 메타 수정 저장 결과
          setBadge(true, d.msg || (d.ok ? '💾 저장됨' : '❌ 저장 실패'));
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
          if (d.ok) {
            // 사이드바 목록의 같은 파일 이름 갱신
            let changed = false;
            allItems.forEach(i => { if (i.path === d.path && d.title) { i.name = d.title; changed = true; } });
            if (changed) renderList();
            // 현재 메타창이 같은 파일이면 다시 읽어 갱신
            if (_metaItem && _metaReqPath === d.path) window.__wsSend && window.__wsSend({ type: 'get_file_meta', path: d.path });
          }
        } else if (d.type === 'reindex_running') {
          setReindexRunning(!!d.running, d.msg);
        } else if (d.type === 'search_running') {
          // 위치로 검색 진행/종료 표시 (running=true → 스피너+중단 버튼)
          setSearchRunning(!!d.running, d.msg);
        } else if (d.type === 'kmz_search_result') {
          // #6 결과(KMZ·사진) — 클릭 시 임시 미리보기, '저장하기'로 영구 저장
          setSearchRunning(false);
          stopLocationPick(); clearLocationPick(false);   // 결과 나오면 선택 영역(원) 제거
          const _stopTag = d.partial ? ' ⏹ 중단됨' : '';
          setBadge(true, `🧭 반경 ${Math.round(d.radius)}m: ${d.items.length}건${_stopTag}`);
          showSearchResults(
            `위치로 검색 — 반경 ${Math.round(d.radius)}m · ${d.items.length}건${d.partial ? ' (중단됨 — 그때까지 발견)' : ''}`,
            d.items,
            it => { openSidebar(); updateMetaPanel({name:it.name,path:it.path,type:it.type,takenDate:it.date||''}); window.__wsSend({type:'preview_file',path:it.path}); setBadge(true, `👁 ${it.name} 미리보기`); },
            it => `${it.type === 'photo' ? '🖼' : (it.isTrack ? '🛤' : '🗂')} <b>${escHtml(it.name)}</b> <span style="color:#888;">· ${it.dist}m</span>${it.date ? ' <span style="color:#2e7d32;font-size:11px;">📅 '+escHtml(it.date.slice(0,16))+'</span>' : ''}${it.isTrack ? ' <span style="color:#27ae60;font-size:11px;">[트랙]</span>' : ''}<br><span style="color:#aaa;font-size:11px;">${escHtml(it.path)}</span>`,
            saveSearchItems
          );
        } else if (d.type === 'kmz_meta_result') {
          // #7 메타 색인 검색 결과 — 클릭 시 임시 미리보기, '저장하기'로 영구 저장
          setSearchRunning(false);
          setBadge(true, `🔎 "${d.query}": ${d.items.length}건${d.partial ? ' ⏹ 중단됨' : ''}`);
          showSearchResults(
            `메타 검색 "${d.query}" · ${d.items.length}건${d.partial ? ' (중단됨 — 그때까지 발견)' : ''}`,
            d.items,
            it => { openSidebar(); updateMetaPanel({name:it.name,path:it.path,type:it.type,takenDate:it.date||''}); window.__wsSend({type:'preview_file',path:it.path}); setBadge(true, `👁 ${it.name} 미리보기`); },
            it => `${it.type === 'photo' ? '🖼' : '🗂'} <b>${escHtml(it.name)}</b><br><span style="color:#888;font-size:11px;">${escHtml(it.info || '')}</span><br><span style="color:#aaa;font-size:11px;">${escHtml(it.path||'')}</span>`,
            saveSearchItems
          );
        } else if (d.type === 'live_clear') {
          // 엑셀 행 변경 + 객체리셋 모드 → 기존 삽입 객체 제거
          if (d.source === 'excel') {
            const r = (d.row === undefined ? null : d.row);
            lastExcelRow = r;
          }
          clearLiveItems();
          updateMetaPanel(null);   // 선택 바뀜 → 이전 메타정보 지움 (새 선택이 다시 채움)
        } else if (d.type === 'live_insert_photo') {
          clearLiveItems();
          // 사진은 사이드바 하단 미리보기 창에 표시
          if (d.items.length && d.items[0].imgSrc) setLivePreview(d.items[0].imgSrc);
          if (d.items.length) updateMetaPanel({
            type: 'photo', name: d.items[0].name, path: d.items[0].path,
            takenDate: d.items[0].takenDate
          });

          // 이미 영구 삽입된 같은 파일의 재선택이면 위치 핀 생략 (중복 표시 방지)
          const permPaths = new Set(allItems.filter(i => i.path).map(i => i.path));
          const liveBounds = new kakao.maps.LatLngBounds();
          const liveCoords = [];

          // 녹색 마커 이미지 (최전면 드래그용)
          const greenSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22">'
                         + '<circle cx="11" cy="11" r="7" fill="#00e676" stroke="white" stroke-width="2.5"/></svg>';
          const greenImg = new kakao.maps.MarkerImage(
            'data:image/svg+xml;base64,' + btoa(greenSvg),
            new kakao.maps.Size(22, 22), { offset: new kakao.maps.Point(11, 11) });

          d.items.forEach(item => {
            if (typeof item.lat !== 'number' || typeof item.lng !== 'number' ||
                isNaN(item.lat) || isNaN(item.lng)) return;   // GPS 없음 → 미리보기만
            if (permPaths.has(item.path)) return;   // 이미 영구 삽입됨 → 위치 핀 생략
            const latlng = new kakao.maps.LatLng(item.lat, item.lng);
            const path = item.path;

            // ① 사진 마커 삽입 (썸네일 포함)
            addPhotoMarker(latlng, item.imgSrc, item.name, item.takenDate || '');
            const photoItem = allItems[allItems.length - 1];
            photoItem._live = true;
            photoItem.path = item.path;               // 저장 폴더 결정용
            const photoMarker = photoItem.markerObj ? photoItem.markerObj.marker : null;

            // ② 녹색 깜빡 링 (마커 따라다님)
            const ringEl = document.createElement('div');
            ringEl.className = 'live-pin';
            ringEl.style.pointerEvents = 'none';
            ringEl.innerHTML = '<div class="live-pin-ring"></div>';
            const ringOv = new kakao.maps.CustomOverlay({
              map, content: ringEl, position: latlng,
              xAnchor: 0.5, yAnchor: 0.5, zIndex: 9999 });

            // ③ 드래그 가능한 녹색 마커 (최전면)
            const dragMarker = new kakao.maps.Marker({
              map, position: latlng, image: greenImg, draggable: true,
              title: '드래그해서 사진 위치(GPS) 수정', zIndex: 10000 });
            if (drawingMode) { dragMarker.setClickable(false); dragMarker.setDraggable(false); }
            // 초록 마커가 사진 마커 위를 덮으므로, 클릭을 사진 마커 선택으로 전달
            kakao.maps.event.addListener(dragMarker, 'click', () => {
              if (drawingMode) return;
              blockMapClick();
              if (photoMarker) selectItemByMarker(photoMarker);
            });

            liveOvs.push(dragMarker, ringOv);

            let originalPos = latlng;
            kakao.maps.event.addListener(dragMarker, 'dragstart', () => {
              originalPos = dragMarker.getPosition();
              ringEl.classList.add('dragging');
            });
            kakao.maps.event.addListener(dragMarker, 'drag', () => {
              const p = dragMarker.getPosition();
              ringOv.setPosition(p);
              if (photoMarker) photoMarker.setPosition(p);   // 사진 마커 동시 이동
            });
            kakao.maps.event.addListener(dragMarker, 'dragend', () => {
              ringEl.classList.remove('dragging');
              const newPos = dragMarker.getPosition();
              ringOv.setPosition(newPos);
              if (photoMarker) photoMarker.setPosition(newPos);
              const la = newPos.getLat().toFixed(6);
              const ln = newPos.getLng().toFixed(6);
              const prevLat = originalPos.getLat(), prevLng = originalPos.getLng();
              const newLat  = parseFloat(la),       newLng  = parseFloat(ln);
              const sendGps = (a, b) => {
                if (ws && ws.readyState === 1) {
                  ws.send(JSON.stringify({ type:'update_gps', path, lat:a, lng:b }));
                  setBadge(true, '💾 저장 중...');
                }
              };
              const moveTo = (lat, lng) => {
                const p = new kakao.maps.LatLng(lat, lng);
                dragMarker.setPosition(p); ringOv.setPosition(p);
                if (photoMarker) { photoMarker.setPosition(p); updateMarkerAddr(photoMarker); }
              };
              showDragConfirm(item.name, la, ln,
                () => {   // 저장 + Undo/Redo 기록
                  sendGps(newLat, newLng);
                  if (photoMarker) updateMarkerAddr(photoMarker);
                  pushHistory({
                    undo() { moveTo(prevLat, prevLng); sendGps(prevLat, prevLng); },
                    redo() { moveTo(newLat,  newLng);  sendGps(newLat,  newLng);  }
                  });
                },
                () => {   // 취소 → 원위치
                  dragMarker.setPosition(originalPos);
                  ringOv.setPosition(originalPos);
                  if (photoMarker) photoMarker.setPosition(originalPos);
                });
            });

            if (path) pathToMarker.set(path, { marker: dragMarker, ringOv });
            liveBounds.extend(latlng);
            liveCoords.push(latlng);
          });

          if (window.__dedupLiveItems()) renderList();   // 이미 삽입된 것과 중복되는 임시항목 제거

          // 팝업 없이 지도만 이동 (사이드바 자동 열림 relayout 이후, GPS 있는 항목만)
          if (liveCoords.length) setTimeout(() => {
            if (map) map.relayout();
            if (liveCoords.length === 1)
              map.panTo(liveCoords[0]);
            else if (!liveBounds.isEmpty())
              map.setBounds(liveBounds, 60);
          }, 80);
          if (d.items.length) setBadge(true, `📍 ${d.items[0].name}`);
        } else if (d.type === 'place_at_center') {
          // 탐색기에서 Ctrl+C 한 사진을 지도 중심에 영구 배치.
          // GPS 있으면 그 위치, 없으면 화면 중심(여러 장이면 격자로 펼침)에 둔다.
          // 초록 점을 드래그해 위치를 잡고 [확인]하면 update_gps 로 사진에 기록된다.
          if (!map || !d.items || !d.items.length) return;
          const center = map.getCenter();
          const b = map.getBounds();
          const spanLat = b.getNorthEast().getLat() - b.getSouthWest().getLat();
          const spanLng = b.getNorthEast().getLng() - b.getSouthWest().getLng();
          // 격자 배치 step (화면의 약 8%)
          const stepLat = spanLat * 0.08, stepLng = spanLng * 0.08;
          const noGpsItems = d.items.filter(it => typeof it.lat !== 'number');
          const cols = Math.max(1, Math.ceil(Math.sqrt(noGpsItems.length)));

          // 드래그용 초록 마커 이미지
          const greenSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22">'
                         + '<circle cx="11" cy="11" r="7" fill="#00e676" stroke="white" stroke-width="2.5"/></svg>';
          const greenImg = new kakao.maps.MarkerImage(
            'data:image/svg+xml;base64,' + btoa(greenSvg),
            new kakao.maps.Size(22, 22), { offset: new kakao.maps.Point(11, 11) });

          const placedBounds = new kakao.maps.LatLngBounds();
          let noGpsIdx = 0;
          d.items.forEach(item => {
            const hasGps = (typeof item.lat === 'number' && typeof item.lng === 'number'
                            && !isNaN(item.lat) && !isNaN(item.lng));
            let pos;
            if (hasGps) {
              pos = new kakao.maps.LatLng(item.lat, item.lng);
            } else {
              // 화면 중심을 기준으로 격자 오프셋 (여러 장이 겹치지 않게)
              const r = Math.floor(noGpsIdx / cols), c = noGpsIdx % cols;
              const offRow = r - (Math.ceil(noGpsItems.length / cols) - 1) / 2;
              const offCol = c - (cols - 1) / 2;
              pos = new kakao.maps.LatLng(
                center.getLat() - offRow * stepLat,
                center.getLng() + offCol * stepLng);
              noGpsIdx++;
            }
            const path = item.path;

            // ① 영구 사진 마커 (파란 핀 + 썸네일)
            addPhotoMarker(pos, item.imgSrc, item.name, item.takenDate || '');
            const photoEntry  = allItems[allItems.length - 1];
            photoEntry.path   = item.path;   // 저장 폴더 결정용
            photoEntry._live  = true;        // 임시 객체 — 다른 파일 선택 시 내려감(⬇삽입으로 확정)
            const photoMarker = photoEntry.markerObj ? photoEntry.markerObj.marker : null;

            // ② 깜빡이는 초록 링
            const ringEl = document.createElement('div');
            ringEl.className = 'live-pin';
            ringEl.style.pointerEvents = 'none';
            ringEl.innerHTML = '<div class="live-pin-ring"></div>';
            const ringOv = new kakao.maps.CustomOverlay({
              map, content: ringEl, position: pos, xAnchor: 0.5, yAnchor: 0.5, zIndex: 9999 });

            // ③ 드래그 가능한 초록 마커 (최전면)
            const dragMarker = new kakao.maps.Marker({
              map, position: pos, image: greenImg, draggable: !drawingMode,
              title: '드래그해서 사진 위치(GPS) 기록', zIndex: 10000 });
            // 초록 마커가 사진 마커 위를 덮으므로, 클릭을 사진 마커 선택으로 전달
            kakao.maps.event.addListener(dragMarker, 'click', () => {
              if (drawingMode) return;
              blockMapClick();
              if (photoMarker) selectItemByMarker(photoMarker);
            });
            recordHelpers.push(dragMarker, ringOv);

            let originalPos = pos;
            const sendGps = (a, bb) => {
              if (ws && ws.readyState === 1) {
                ws.send(JSON.stringify({ type:'update_gps', path, lat:a, lng:bb }));
                setBadge(true, '💾 저장 중...');
              }
            };
            const moveTo = (lat, lng) => {
              const p = new kakao.maps.LatLng(lat, lng);
              dragMarker.setPosition(p); ringOv.setPosition(p);
              if (photoMarker) { photoMarker.setPosition(p); updateMarkerAddr(photoMarker); }
            };
            const removeHelper = () => {
              dragMarker.setMap(null); ringOv.setMap(null);
              recordHelpers = recordHelpers.filter(o => o !== dragMarker && o !== ringOv);
            };

            kakao.maps.event.addListener(dragMarker, 'dragstart', () => {
              originalPos = dragMarker.getPosition();
              ringEl.classList.add('dragging');
            });
            kakao.maps.event.addListener(dragMarker, 'drag', () => {
              const p = dragMarker.getPosition();
              ringOv.setPosition(p);
              if (photoMarker) photoMarker.setPosition(p);
            });
            kakao.maps.event.addListener(dragMarker, 'dragend', () => {
              ringEl.classList.remove('dragging');
              const newPos = dragMarker.getPosition();
              ringOv.setPosition(newPos);
              if (photoMarker) photoMarker.setPosition(newPos);
              const la = newPos.getLat().toFixed(6), ln = newPos.getLng().toFixed(6);
              const newLat = parseFloat(la), newLng = parseFloat(ln);
              const prevLat = originalPos.getLat(), prevLng = originalPos.getLng();
              showDragConfirm(item.name, la, ln,
                () => {   // 확인 → 파일에 GPS 기록 + 보조 마커 제거
                  sendGps(newLat, newLng);
                  if (photoMarker) updateMarkerAddr(photoMarker);
                  removeHelper();
                  pushHistory({
                    undo() { moveTo(prevLat, prevLng); sendGps(prevLat, prevLng); },
                    redo() { moveTo(newLat,  newLng);  sendGps(newLat,  newLng);  }
                  });
                },
                () => {   // 취소 → 원위치 (보조 마커 유지, 다시 드래그 가능)
                  dragMarker.setPosition(originalPos);
                  ringOv.setPosition(originalPos);
                  if (photoMarker) photoMarker.setPosition(originalPos);
                });
            });

            placedBounds.extend(pos);
          });

          renderList();   // _live 플래그 반영 (임시 객체 = 흐리게 표시)
          setTimeout(() => {
            if (map) map.relayout();
            if (d.items.length === 1) map.panTo(placedBounds.getSouthWest());
            else if (!placedBounds.isEmpty()) map.setBounds(placedBounds, 80);
          }, 80);
          setBadge(true, `📍 사진 ${d.items.length}장 임시 배치됨 — 초록 점 드래그로 위치 기록 · ⬇삽입으로 확정`);
        } else if (d.type === 'live_insert_kmz') {
          if (!d.append) clearLiveItems();   // 사진과 함께 온 KMZ(append)는 임시 사진을 지우지 않음
          // 단일(d.data) 또는 배열(d.items) 모두 지원
          let kmzItems = d.items || [{ name: d.name, path: d.path, data: d.data }];
          // 탐색기에서 KMZ를 고르면 바로 그 KMZ의 메타정보 표시 (안 사진을 안 골라도)
          if (kmzItems[0] && kmzItems[0].path)
            updateMetaPanel({ type: 'kmz', name: kmzItems[0].name, _srcKmz: kmzItems[0].path });
          // 이미 영구 삽입된 같은 파일의 재선택이면 유지 (삽입 직후 셀 재선택으로 지워지는 것 방지)
          const permKmz = new Set(allItems.map(i => i._srcKmz).filter(Boolean));
          // 이미 영구 삽입된 KMZ는 미리보기 생략 (셀 재선택 시 중복 방지)
          kmzItems = kmzItems.filter(it => !permKmz.has(it.path));
          if (!kmzItems.length) { setBadge(true, '🟢 탐색기 연동 중'); return; }
          liveDataFile = (kmzItems[0] && kmzItems[0].path) || '';
          const namesStr = kmzItems.length === 1 ? kmzItems[0].name : `KMZ ${kmzItems.length}개`;
          setBadge(true, `📂 ${namesStr} 로드 중…`);
          (async () => {
            try {
              const bounds = new kakao.maps.LatLngBounds();
              for (const item of kmzItems) {
                const bytes = Uint8Array.from(atob(item.data), c => c.charCodeAt(0));
                const file = new File([bytes], item.name,
                  { type: 'application/vnd.google-earth.kmz' });
                const preLen = allItems.length;
                await loadKMZ(file, bounds, item.path);
                for (let i = preLen; i < allItems.length; i++) allItems[i]._live = true;
              }
              window.__dedupLiveItems();   // 이미 삽입된 것과 중복되는 임시항목 제거
              renderList();
              if (!bounds.isEmpty()) map.setBounds(bounds, 60);
              setBadge(true, `🟢 탐색기 연동 중`);
            } catch(e) {
              console.error('live KMZ 오류', e);
              setBadge(true, `❌ KMZ 오류: ${namesStr}`);
            }
          })();
        } else if (d.type === 'insert_photos') {
          // 영구 삽입 — 먼저 live(미리보기) 항목 제거: 활성 셀 사진이 미리보기로만 남아
          //   선택 해제 시 사라지던 문제 방지. 이후 '영구' 항목 기준으로만 중복 판정.
          clearLiveItems();
          const existPaths = new Set(allItems.filter(i => i.path).map(i => i.path));
          const newItems = d.items.filter(item => !existPaths.has(item.path));
          const skipped = d.items.length - newItems.length;
          if (skipped > 0) console.log(`[insert_photos] ${skipped}개 이미 삽입됨 → 건너뜀`);
          const bounds = new kakao.maps.LatLngBounds();
          let added = 0;
          newItems.forEach(item => {
            const latlng = new kakao.maps.LatLng(item.lat, item.lng);
            addPhotoMarker(latlng, item.imgSrc, item.name, item.takenDate || '');
            allItems[allItems.length - 1].path = item.path;   // 저장 폴더 결정용
            bounds.extend(latlng);
            added++;
          });
          if (added && !bounds.isEmpty())
            setTimeout(() => { if (map) map.relayout(); map.setBounds(bounds, 60); }, 80);
          setBadge(true, added ? `✅ 사진 ${added}장 삽입됨${skipped ? ` (${skipped}개 중복 제외)` : ''}` : '⚠️ GPS 있는 사진 없음 또는 이미 삽입됨');
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'insert_markers') {
          // 엑셀 위경도 좌표 셀 → 마커 영구 삽입
          clearLiveItems();
          const bounds = new kakao.maps.LatLngBounds();
          let added = 0;
          (d.items || []).forEach(item => {
            const latlng = new kakao.maps.LatLng(item.lat, item.lng);
            addMarker(latlng, item.name || `${item.lat}, ${item.lng}`);
            bounds.extend(latlng);
            added++;
          });
          if (added && !bounds.isEmpty())
            setTimeout(() => { if (map) map.relayout(); map.setBounds(bounds, 60); }, 80);
          setBadge(true, added ? `✅ 좌표 마커 ${added}개 삽입됨` : '⚠️ 좌표 없음');
          setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
        } else if (d.type === 'insert_kmz') {
          // KMZ 삽입 — 먼저 live(미리보기) 항목 제거 (영구본과 중복 방지)
          clearLiveItems();
          // 사이드바에 현재 남아있는 KMZ만 중복 제외 (삭제 후엔 재삽입 허용)
          const presentKmz = new Set(allItems.map(i => i._srcKmz).filter(Boolean));
          const newItems = d.items.filter(item => !presentKmz.has(item.path));
          const skipped = d.items.length - newItems.length;
          if (skipped > 0) console.log(`[insert_kmz] ${skipped}개 사이드바에 이미 있음 → 건너뜀`);
          if (!newItems.length) {
            setBadge(true, `⚠️ KMZ 이미 모두 삽입됨`);
            setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2000);
          } else {
            setBadge(true, `📂 KMZ ${newItems.length}개 로드 중…`);
            (async () => {
              const bounds = new kakao.maps.LatLngBounds();
              for (const item of newItems) {
                try {
                  if (item.path) loadedDataFiles.push(item.path);   // 저장 폴더 결정용
                  const preLen = allItems.length;
                  const bytes = Uint8Array.from(atob(item.data), c => c.charCodeAt(0));
                  const file = new File([bytes], item.name,
                    { type: 'application/vnd.google-earth.kmz' });
                  await loadKMZ(file, bounds, item.path);
                  // 이번 KMZ로 새로 생긴 사이드바 항목에 출처경로 태깅 (삭제 후 재삽입 판정용)
                  for (let i = preLen; i < allItems.length; i++) allItems[i]._srcKmz = item.path;
                } catch(e) { console.error('KMZ 오류', item.name, e); }
              }
              if (!bounds.isEmpty()) map.setBounds(bounds, 60);
              setBadge(true, `✅ KMZ ${newItems.length}개 삽입됨${skipped ? ` (${skipped}개 중복 제외)` : ''}`);
              setTimeout(() => setBadge(true, '🟢 탐색기 연동 중'), 2500);
            })();
          }
        }
      } catch(e) { console.error('[ws.onmessage] 처리 오류:', e, '\n원본:', data); }
    };

    ws.onclose = ws.onerror = () => {
      ws = null;
      setBadge(false, '🔴 탐색기 연동 대기중');
      scheduleRetry();
    };
  }

  function scheduleRetry() {
    clearTimeout(retryTimer);
    retryTimer = setTimeout(connect, 3000);
  }

  // (Ctrl+Z/Y는 메인 keydown 핸들러의 통합 undo/redo 시스템에서 처리)

  // 로컬(http:// 또는 file://)에서만 연결 시도 — GitHub Pages(https://)에서는 숨김
  if (location.protocol !== 'https:') {
    setTimeout(connect, 3000);
  } else {
    badge.style.display = 'none';
  }
})();
</script>
</body>
</html>
