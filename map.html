<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>KMZ & 사진 지도 (v4.0)</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.cjs"></script>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; }
    #app { display:flex; width:100%; height:100%; overflow:hidden; }

    /* ── 사이드바 ── */
    #sidebar {
      width:360px; min-width:160px; display:none; flex-direction:column;
      background:#eaf4fc; flex-shrink:0; overflow:hidden;
      border-right:2px solid #85c1e9;
    }
    #sidebarResizer { width:5px; background:#85c1e9; cursor:col-resize; flex-shrink:0; transition:background .15s; display:none; }
    #sidebarResizer:hover { background:#2980b9; }
    /* 컬럼 리사이저 */
    .col-resizer { position:absolute; right:0; top:0; width:5px; height:100%; cursor:col-resize; background:#5dade2; z-index:3; }
    .col-resizer:hover { background:#1a73c8; }

    /* ── 헤더 ── */
    #listHeader { background:#2980b9; flex-shrink:0; }
    .list-header-top {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 8px; color:#fff; font-size:13px; font-weight:bold;
    }
    #itemCountBadge {
      background:#e74c3c; color:#fff; border-radius:12px;
      padding:1px 8px; font-size:11px; font-weight:normal; margin-left:6px;
    }
    #filterTabs { display:flex; background:#5dade2; }
    .ftab {
      flex:1; padding:5px 2px; font-size:11px; border:none;
      border-right:1px solid #2980b9; background:transparent;
      color:#fff; cursor:pointer; white-space:nowrap;
      display:flex; align-items:center; justify-content:center; gap:3px;
    }
    .ftab:last-child { border-right:none; }
    .ftab:hover { background:#2e86c1; color:#fff; }
    .ftab.active { background:#1a5276; color:#fff; font-weight:bold; }
    .vis-check { width:12px; height:12px; cursor:pointer; flex-shrink:0; accent-color:#aef; margin:0; }
    .ftab.hidden-type { opacity:0.55; }
    /* 폴더 선택 바 */
    #folderBar { background:#d6eaf8; padding:4px 6px; flex-shrink:0; display:flex; align-items:center; gap:6px; border-bottom:1px solid #85c1e9; }
    #folderSelectBtn { font-size:11px; padding:3px 8px; cursor:pointer; background:#fff; border:1px solid #2980b9; border-radius:3px; color:#1a5276; white-space:nowrap; }
    #folderSelectBtn:hover { background:#d6eaf8; }
    #folderName { font-size:10px; color:#1a5276; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── 목록 ── */
    #photoListWrapper { flex:1; overflow-y:auto; overflow-x:hidden; min-height:0; outline:none; }
    #photoTable { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
    #photoTable thead th {
      background:#2e86c1; color:#fff; padding:5px 6px; text-align:left;
      position:sticky; top:0; z-index:2; white-space:nowrap;
    }
    #photoTable tbody tr { cursor:pointer; }
    #photoTable tbody tr:nth-child(even) { background:#d6eaf8; }
    #photoTable tbody tr:hover { background:#aed6f1 !important; }
    #photoTable tbody tr.selected { background:#7fb3d3 !important; }
    #photoTable tbody tr.selected td { color:#0a2744 !important; }
    #photoTable tbody tr.drag-over { background:#c0d8ec !important; }
    #photoTable tbody td { padding:4px 6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px solid #b0cfe0; max-width:0; }
    .type-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; flex-shrink:0; vertical-align:middle; }
    .dot-photo { background:#2471a3; }
    .dot-marker { background:#e74c3c; }
    .dot-track { background:#1e8449; border-radius:2px; height:5px; }
    .item-name { vertical-align:middle; }
    .item-name-input { width:90%; box-sizing:border-box; font-size:12px; padding:1px 3px; border:1px solid #2980b9; outline:none; }

    /* ── 미리보기 리사이저 ── */
    #previewResizer { height:5px; background:#85c1e9; cursor:row-resize; flex-shrink:0; transition:background .15s; }
    #previewResizer:hover { background:#2980b9; }

    /* ── 미리보기 ── */
    #previewSection { flex-shrink:0; height:220px; min-height:60px; display:flex; flex-direction:column; overflow:hidden; }
    #previewHeader { background:#2980b9; color:#fff; padding:5px 10px; font-size:12px; font-weight:bold; flex-shrink:0; }
    #previewImgWrapper { flex:1; background:#d6eaf8; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    #previewImg { max-width:100%; max-height:100%; object-fit:contain; display:none; }
    #previewPlaceholder { color:#5d8aa8; font-size:12px; text-align:center; padding:8px; }

    /* ── 지도 영역 ── */
    #mapContainer { flex:1; position:relative; overflow:hidden; }
    #map { width:100%; height:100%; }

    /* 목록 토글 버튼 (항상 지도 왼쪽 가장자리) */
    #sidebarOpenBtn {
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      z-index:1001; display:flex; align-items:center; justify-content:center;
      background:#fff; color:#2980b9; border:2px solid #2980b9; border-left:none; cursor:pointer;
      border-radius:0 6px 6px 0; padding:10px 2px;
      font-size:13px; writing-mode:vertical-rl;
      box-shadow:2px 0 8px rgba(0,0,0,0.15); transition:background .15s;
    }
    #sidebarOpenBtn:hover { background:#ebf5fb; }

    /* ── 기존 맵 오버레이 ── */
    .kakao_map_marker, .daumRoughmapContainer .roughmap_maker_btn { display:none !important; }
    .wrap_map_cont .map_zoom_close, .map_info_close { display:none !important; }
    a[href*="location"], a[title*="현재위치"], a[title*="내위치"] { display:none !important; }
    .zoom_reset, [class*="zoom_reset"] { display:none !important; }

    #search-form, .controls {
      position:absolute; background:white; padding:5px; border-radius:5px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3); z-index:1000;
    }
    #search-form { top:10px; left:10px; display:flex; gap:5px; }
    .controls { top:10px; right:10px; display:flex; gap:6px; }

    /* 주소 표시 → 좌측 하단 */
    #address-display {
      position:absolute; bottom:10px; left:10px; z-index:1000;
      background:rgba(0,0,0,0.65); color:#fff;
      font-size:12px; padding:5px 8px; border-radius:5px;
      white-space:nowrap; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    }
    #address-display:hover { background:rgba(0,0,0,0.85); }

    .dotOverlay.distanceInfo { background:white; border:1px solid #db4040; padding:5px; border-radius:3px; font-size:12px; white-space:nowrap; }
    .drawing-cursor * { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="20" font-size="20" fill="red">&#x3009;</text></svg>') 0 0, auto !important; }

    #polyMenu { display:none; position:fixed; z-index:9000; background:white; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.25); overflow:hidden; min-width:140px; }
    #polyMenu.show { display:block; }
    #polyMenu button { display:block; width:100%; padding:13px 18px; border:none; background:none; text-align:left; font-size:15px; cursor:pointer; }
    #polyMenu button:hover { background:#f1f3f4; }
    #polyMenu button.danger { color:#e53935; }
  </style>
</head>
<body>
<div id="app">

  <!-- 사이드바 -->
  <div id="sidebar">
    <div id="listHeader">
      <div class="list-header-top">
        <span>📋 목록 <span id="itemCountBadge">0</span></span>
      </div>
      <div id="filterTabs">
        <button class="ftab active" data-f="all"><span>전체</span></button>
        <button class="ftab" data-f="photo"><span>사진</span><input type="checkbox" class="vis-check" data-t="photo" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="marker"><span>마커</span><input type="checkbox" class="vis-check" data-t="marker" checked title="지도 표시/숨기기"></button>
        <button class="ftab" data-f="track"><span>트랙</span><input type="checkbox" class="vis-check" data-t="track" checked title="지도 표시/숨기기"></button>
      </div>
    </div>
    <div id="folderBar">
      <button id="folderSelectBtn">📁 폴더 선택</button>
      <button id="copyListBtn" title="목록 클립보드 복사">📋 복사</button>
      <span id="folderName"></span>
    </div>
    <div id="photoListWrapper" tabindex="0">
      <table id="photoTable">
        <thead><tr>
          <th id="numColTh" style="width:10%;position:relative;text-align:center;user-select:none;">번호<div class="col-resizer" id="numColResizer"></div></th>
          <th id="nameColTh" style="width:58%;position:relative;cursor:pointer;user-select:none;">이름<span id="sortNameInd"></span><div class="col-resizer" id="colResizer"></div></th>
          <th id="addrColTh" style="width:32%;cursor:pointer;user-select:none;">주소<span id="sortAddrInd"></span></th>
        </tr></thead>
        <tbody id="photoTbody"></tbody>
      </table>
    </div>
    <div id="previewResizer"></div>
    <div id="previewSection">
      <div id="previewHeader">🖼 미리보기</div>
      <div id="previewImgWrapper">
        <span id="previewPlaceholder">항목을 선택하세요</span>
        <img id="previewImg" alt="미리보기">
      </div>
    </div>
  </div>

  <div id="sidebarResizer"></div>

  <!-- 지도 -->
  <div id="mapContainer">
    <button id="sidebarOpenBtn" title="목록 열기/닫기">▶</button>
    <form id="search-form">
      <input id="address-input" type="text" placeholder="주소 검색" style="padding:5px;width:180px;">
      <button type="submit" style="padding:5px;">검색</button>
    </form>
    <div id="address-display">주소 없음</div>
    <div id="polyMenu">
      <button id="polyEditBtn">✏️ 수정</button>
      <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
      <button id="polyMenuCancelBtn">✕ 취소</button>
    </div>
    <div class="controls">
      <input id="latlng-display" readonly style="width:220px;font-size:12px;cursor:pointer;" title="클릭하여 복사" onclick="copyCoordFromInput(this)">
      <button type="button" onclick="window.open('https://junty75.github.io/map/help','_blank','width=900,height=700,scrollbars=yes')" title="도움말 (F1)">❓</button>
      <button type="button" onclick="startDrawing()">선 그리기 (Alt)</button>
      <button type="button" onclick="resetPolylines()">선 초기화</button>
      <button type="button" onclick="resetAll()">화면 초기화</button>
      <select id="exportFormat" style="padding:5px;">
        <option value="kmz">KMZ 내보내기</option>
        <option value="gpx">GPX 내보내기</option>
        <option value="csv">CSV 내보내기</option>
        <option value="photos">📸 사진 다운로드</option>
      </select>
      <select id="exportArea" style="padding:5px;">
        <option value="all">전체 영역</option>
        <option value="visible">현재 영역</option>
        <option value="selected">선택 객체</option>
      </select>
      <select id="photoQuality" style="padding:5px;">
        <option value="200" selected>200KB↓</option>
        <option value="300">300KB↓</option>
        <option value="500">500KB↓</option>
        <option value="800">800KB↓</option>
        <option value="1024">1MB↓</option>
        <option value="0">원본</option>
      </select>
      <button type="button" onclick="exportByFormat()">💾 저장</button>
      <br>
      <select id="mapTypeSelect" style="padding:5px;margin-top:4px;" onchange="changeMapType(this.value)">
        <option value="HYBRID" selected>위성+지도</option>
        <option value="SKYVIEW">위성사진</option>
        <option value="ROADMAP">일반지도</option>
        <option value="TERRAIN">🏔️ 지형도</option>
        <option value="USE_DISTRICT">🗺️ 지적도</option>
      </select>
    </div>
    <div id="map"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// ══════════════════════════════════════════════════
//  통합 목록 관리
// ══════════════════════════════════════════════════
let allItems = [];          // { type:'photo'|'marker'|'track', name, address, markerObj?, imgSrc?, polyline? }
let currentFilter = 'all';
let sortCol = null, sortDir = 1; // sortCol: null|'name'|'address'
let visibility = { photo: true, marker: true, track: true };
let selectedItems = new Set(); // Set of filtered indices (multi-select)
let anchorIdx = -1;            // shift-click anchor
let lastClickedIdx = -1;       // keyboard nav + InfoWindow focus
let dragStartIdx = -1, isDragging = false, dragStartX = 0, dragStartY = 0;
let trackCounter = 0;

function getFilteredItems() {
  const base = currentFilter === 'all' ? allItems : allItems.filter(i => i.type === currentFilter);
  return base.filter(i => visibility[i.type] !== false);
}

function shortAddr(fullAddr) {
  if (!fullAddr) return '';
  const parts = fullAddr.split(' ');
  // 도/특별시/광역시 + 시/군/구 제거 → 읍면동리번지
  let start = 0;
  if (parts.length > 0 && /[도시]$/.test(parts[0])) start = 1;
  if (parts.length > 1 && /[시군구]$/.test(parts[start])) start++;
  return parts.slice(start).join(' ') || fullAddr;
}

function fetchAddr(latlng, callback) {
  if (!geocoder) { callback(''); return; }
  geocoder.coord2Address(latlng.getLng(), latlng.getLat(), (res, status) => {
    if (status === kakao.maps.services.Status.OK) callback(shortAddr(res[0].address?.address_name || ''));
    else callback('');
  });
}

function addItem(item) {
  allItems.push(item);
  // 첫 항목 추가 시 사이드바 자동 열기
  if (allItems.length === 1) openSidebar();
  renderList();
  const ll = getItemLatLng(item);
  if (ll) fetchAddr(ll, addr => { item.address = addr; renderList(); });
}

function getItemLatLng(item) {
  if (item.markerObj) return item.markerObj.marker.getPosition();
  if (item.polyline) {
    const path = item.polyline.getPath();
    return path.length ? path[Math.floor(path.length / 2)] : null;
  }
  return null;
}

function removeItem(predicate) {
  const ai = allItems.findIndex(predicate);
  if (ai < 0) return;
  allItems.splice(ai, 1);
  selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
  clearPreview();
  renderList();
}

function renderList() {
  const filtered = getFilteredItems();
  const tbody = document.getElementById('photoTbody');
  tbody.innerHTML = '';

  const cnt = { all: allItems.length, photo: 0, marker: 0, track: 0 };
  allItems.forEach(i => cnt[i.type]++);
  document.querySelectorAll('.ftab').forEach(btn => {
    const f = btn.dataset.f;
    const text = { all:`전체(${cnt.all})`, photo:`사진(${cnt.photo})`, marker:`마커(${cnt.marker})`, track:`트랙(${cnt.track})` }[f];
    const sp = btn.querySelector('span'); if (sp) sp.textContent = text; else btn.textContent = text;
  });
  document.getElementById('itemCountBadge').textContent = filtered.length;

  filtered.forEach((item, idx) => {
    const tr = document.createElement('tr');
    if (selectedItems.has(idx)) tr.classList.add('selected');

    const numTd = document.createElement('td');
    numTd.textContent = idx + 1;
    numTd.style.cssText = 'text-align:center;color:#777;font-size:11px;';

    const nameTd = document.createElement('td');
    const dotCls = { photo:'dot-photo', marker:'dot-marker', track:'dot-track' }[item.type];
    nameTd.innerHTML = `<span class="type-dot ${dotCls}"></span><span class="item-name">${escHtml(item.name)}</span>`;
    nameTd.title = item.name;

    const addrTd = document.createElement('td');
    addrTd.textContent = item.address !== undefined ? (item.address || '…') : '…';
    addrTd.title = item.address || '';

    tr.append(numTd, nameTd, addrTd);

    tr.ondblclick = e => {
      if (e.target.tagName === 'INPUT') return;
      e.stopPropagation();
      startEditItem(tr, item, idx);
    };

    tr.onmousedown = e => {
      if (e.button !== 0) return;
      if (e.target.tagName === 'INPUT') return;
      dragStartIdx = idx; isDragging = false;
      dragStartX = e.clientX; dragStartY = e.clientY;
      e.preventDefault();
      // 길게 누르면 순서 변경 모드 (선택 여부 무관)
      reorderHoldTimer = setTimeout(() => {
        reorderHoldTimer = null;
        if (!selectedItems.has(idx)) {
          selectedItems.clear(); selectedItems.add(idx);
          document.querySelectorAll('#photoTbody tr').forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
        }
        reorderMode = true; reorderTargetIdx = -1;
        document.querySelectorAll('#photoTbody tr').forEach((r, i) => {
          r.style.opacity = selectedItems.has(i) ? '0.4' : '1';
        });
      }, 600);
    };

    tr.onclick = e => {
      if (isDragging) { isDragging = false; return; }
      if (e.shiftKey && anchorIdx >= 0) {
        const lo = Math.min(anchorIdx, idx), hi = Math.max(anchorIdx, idx);
        if (!e.ctrlKey) selectedItems.clear();
        for (let i = lo; i <= hi; i++) selectedItems.add(i);
      } else if (e.ctrlKey || e.metaKey) {
        if (selectedItems.has(idx)) selectedItems.delete(idx);
        else selectedItems.add(idx);
        anchorIdx = idx;
      } else {
        selectedItems.clear();
        selectedItems.add(idx);
        anchorIdx = idx;
      }
      lastClickedIdx = idx;
      // renderList() 대신 클래스만 직접 업데이트 → DOM 유지로 더블클릭 정상 동작
      document.querySelectorAll('#photoTbody tr').forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
      selectFilteredItem(idx);
    };

    tbody.appendChild(tr);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function selectFilteredItem(idx) {
  const filtered = getFilteredItems();
  if (idx < 0 || idx >= filtered.length) return;
  lastClickedIdx = idx;
  const item = filtered[idx];

  allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
  if (item.markerObj) {
    const pos = item.markerObj.marker.getPosition();
    if (item.type === 'photo') {
      // 사진 InfoWindow(~300px 높이)가 지도 안에 완전히 보이도록
      // 마커를 화면의 75% 아래에 배치 (위 25% = InfoWindow 영역)
      try {
        const proj = map.getProjection();
        const mapEl = document.getElementById('map');
        const mapH = mapEl.offsetHeight, mapW = mapEl.offsetWidth;
        const markerPx = proj.pointFromCoords(pos);
        const centerPx = proj.pointFromCoords(map.getCenter());
        const targetX = mapW * 0.5, targetY = mapH * 0.75;
        const newCenter = proj.coordsFromPoint({
          x: centerPx.x + (markerPx.x - targetX),
          y: centerPx.y + (markerPx.y - targetY)
        });
        map.panTo(newCenter);
      } catch(e) {
        map.panTo(pos);
      }
    } else {
      map.panTo(pos);
    }
    item.markerObj.iw.open(map, item.markerObj.marker);
  } else if (item.polyline) {
    const path = item.polyline.getPath();
    if (path.length) {
      const b = new kakao.maps.LatLngBounds();
      path.forEach(p => b.extend(p));
      map.setBounds(b);
    }
  }

  const img = document.getElementById('previewImg');
  const ph  = document.getElementById('previewPlaceholder');
  if (item.type === 'photo' && item.imgSrc) {
    img.src = item.imgSrc; img.style.display = 'block'; ph.style.display = 'none';
  } else {
    img.style.display = 'none'; img.src = '';
    ph.style.display = ''; ph.textContent = item.type === 'track' ? `🗺 트랙: ${item.name}` : `📍 마커: ${item.name}`;
  }

  const rows = document.querySelectorAll('#photoTbody tr');
  if (rows[idx]) rows[idx].scrollIntoView({ block:'nearest' });
  document.getElementById('photoListWrapper').focus();
}

function startEditItem(tr, item, idx) {
  const nameSpan = tr.querySelector('.item-name');
  if (!nameSpan || tr.querySelector('.item-name-input')) return;
  const input = document.createElement('input');
  input.className = 'item-name-input';
  input.value = item.name;
  nameSpan.textContent = '';
  nameSpan.appendChild(input);
  input.focus(); input.select();

  const save = () => {
    const newName = input.value.trim() || item.name;
    item.name = newName;
    if (item.markerObj) {
      item.markerObj.name = newName;
      const found = markers.find(m => m.marker === item.markerObj.marker);
      if (found) found.name = newName;
      const iwContent = item.markerObj.iw.getContent();
      if (iwContent) { const t = iwContent.querySelector('span') || iwContent.querySelector('div'); if (t) t.textContent = newName; }
    }
    if (item.polyline) item.polyline._name = newName;
    renderList();
    document.getElementById('photoListWrapper').focus();
  };

  input.onblur = save;
  input.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); e.stopPropagation(); input.blur(); }

    else e.stopPropagation();
  };
  input.onclick = e => e.stopPropagation();
}

// ── 주소 → [읍면, 리, 번지] 분리 ──
function parseAddr3(addr) {
  if (!addr || addr === '…') return ['', '', ''];
  const parts = addr.trim().replace(/산\s+(\d)/g, '산$1').split(/\s+/);
  // 번지 시작 위치: 숫자로 시작하거나, 산+숫자, 또는 '산' 뒤에 숫자가 오는 경우
  let lotIdx = -1;
  for (let i = 0; i < parts.length; i++) {
    if (/^\d/.test(parts[i]) || /^산\d/.test(parts[i])) { lotIdx = i; break; }
    if (parts[i] === '산' && i + 1 < parts.length && /^\d/.test(parts[i + 1])) { lotIdx = i; break; }
  }
  if (lotIdx < 0) lotIdx = parts.length;
  const bunji = parts.slice(lotIdx).join(' ');
  const addrParts = parts.slice(0, lotIdx);
  return [addrParts[0] || '', addrParts.slice(1).join(' ') || '', bunji];
}

// 사진 확장자 (imgSrc MIME에서 추출, 전체 경로는 브라우저 보안상 불가)
function getImgExt(imgSrc) {
  const m = (imgSrc||'').match(/^data:image\/([a-zA-Z]+);/);
  if (!m) return '';
  return m[1].toLowerCase() === 'jpeg' ? '.jpg' : '.' + m[1].toLowerCase();
}

// ── 이미지 파일 판별 ──
const IMAGE_EXT = /\.(jpe?g|png|heic|heif|arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i;
const RAW_EXT   = /\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i;
function isImageFile(file) { return file.type.startsWith('image/') || IMAGE_EXT.test(file.name); }

// ── 디렉터리 재귀 탐색 (하위폴더 포함) ──
async function* walkDirForImages(dirHandle) {
  for await (const entry of dirHandle.values()) {
    if (entry.kind === 'file') {
      const file = await entry.getFile();
      if (isImageFile(file)) yield file;
    } else if (entry.kind === 'directory') {
      yield* walkDirForImages(entry);
    }
  }
}

// ── 이미지 파일 목록 처리 (공통) ──
async function processImageFileList(files, statusCb) {
  const bounds = new kakao.maps.LatLngBounds();
  let noGPSAction = null;
  let done = 0;
  for (const file of files) {
    const n = file.name.toLowerCase();
    const imgName = file.name.replace(/\.[^/.]+$/, '');
    if (statusCb) statusCb(++done, files.length);

    if (RAW_EXT.test(n)) {
      let imgSrc=null, latlng=null, takenDate='';
      if (typeof exifr!=='undefined') {
        const [gpsData,thumbBuf,exifData]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null),exifr.parse(file,['DateTimeOriginal']).catch(()=>null)]);
        if (gpsData?.longitude!==undefined) latlng=new kakao.maps.LatLng(gpsData.latitude,gpsData.longitude);
        if (exifData?.DateTimeOriginal) takenDate=exifData.DateTimeOriginal.toISOString().substring(0,10);
        if (thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
      }
      if (!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
      if (latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);}
      else{if(noGPSAction===null)noGPSAction=confirm('위치 정보가 없는 사진이 있습니다.\n지도 중심에 마커를 추가하시겠습니까?');if(noGPSAction)addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);}
      continue;
    }

    await new Promise(resolve=>{
      (async()=>{
        const imgFile=await convertHeicIfNeeded(file);
        const reader=new FileReader();
        reader.onload=ev=>{
          const imgSrc=ev.target.result;
          let latlng=null,takenDate='';
          try{
            const exif=piexif.load(imgSrc),gps=exif['GPS'];
            if(gps&&gps[piexif.GPSIFD.GPSLatitude]&&gps[piexif.GPSIFD.GPSLongitude]){
              const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
              const lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
              const lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
              if(!isNaN(lat)&&!isNaN(lng)&&(lat!==0||lng!==0))latlng=new kakao.maps.LatLng(lat,lng);
            }
            const rawDate=exif['Exif']?.[piexif.ExifIFD.DateTimeOriginal]||exif['0th']?.[piexif.ImageIFD.DateTime]||'';
            if(rawDate)takenDate=rawDate.substring(0,10).replace(/:/g,'-');
          }catch(ex){}
          if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);}
          else{if(noGPSAction===null)noGPSAction=confirm('위치 정보가 없는 사진이 있습니다.\n지도 중심에 마커를 추가하시겠습니까?');if(noGPSAction)addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);}
          resolve();
        };
        reader.readAsDataURL(imgFile);
      })();
    });
  }
  if (!bounds.isEmpty()) map.setBounds(bounds);
}

let map, geocoder, drawingMode = false;
let markers = [], polylines = [], markerInputOverlay = null;
let currentPolyline, currentPath = [];
let searchMarker = null, movingPhotoMarker = null;
let moveLine = null, distanceOverlay = null;
let locationMarkerCount = 0;

// ── 거리 표시 ──
function updateDistance(mouseEvent) {
  if (!drawingMode || !currentPath.length) return;
  const last = currentPath[currentPath.length-1];
  const mp = mouseEvent.latLng;
  if (!moveLine) moveLine = new kakao.maps.Polyline({ strokeWeight:3, strokeColor:'#db4040', strokeOpacity:0.5 });
  moveLine.setPath([last, mp]); moveLine.setMap(map);
  const total = currentPolyline.getLength() + moveLine.getLength();
  const fmt = d => d<=1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  const html = `<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 <span>${fmt(total)}</span></div>`;
  if (distanceOverlay) { distanceOverlay.setPosition(mp); distanceOverlay.setContent(html); }
  else distanceOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:mp, xAnchor:0, yAnchor:0, zIndex:3 });
}

function updateDistanceOverlay(pos) {
  const fmt = d => d<=1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  const html = `<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 <span>${fmt(currentPolyline.getLength())}</span></div>`;
  if (distanceOverlay) { distanceOverlay.setPosition(pos); distanceOverlay.setContent(html); }
  else distanceOverlay = new kakao.maps.CustomOverlay({ map, content:html, position:pos, xAnchor:0, yAnchor:0, zIndex:3 });
}

// ══════════════════════════════════════════════════
//  지도 초기화
// ══════════════════════════════════════════════════
function initializeMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), { center, level:4, mapTypeId:kakao.maps.MapTypeId.HYBRID });
  setTimeout(() => document.querySelectorAll('.zoom_in,.zoom_out,.zoom_reset,.map_zoom_close').forEach(el=>el.remove()), 500);
  window.map = map;
  geocoder = new kakao.maps.services.Geocoder();

  kakao.maps.event.addListener(map, 'click', e => {
    if (markerInputOverlay) { markerInputOverlay.setMap(null); markerInputOverlay=null; return; }
    if (movingPhotoMarker) {
      movingPhotoMarker.marker.setPosition(e.latLng);
      movingPhotoMarker.marker.setDraggable(false);
      movingPhotoMarker = null;
      return;
    }
    if (drawingMode) {
      currentPath.push(e.latLng);
      currentPolyline.setPath(currentPath);
      if (currentPath.length===1 && !distanceOverlay)
        distanceOverlay = new kakao.maps.CustomOverlay({ map, content:`<div class="dotOverlay distanceInfo" style="font-size:.8em;margin-left:4px;margin-bottom:8px;">총거리 0m</div>`, position:e.latLng, xAnchor:0, yAnchor:1, zIndex:3 });
    }
    allItems.forEach(i => { if (i.markerObj) i.markerObj.iw.close(); });
    const lat=e.latLng.getLat(), lng=e.latLng.getLng();
    document.getElementById('latlng-display').value = `${lat}, ${lng}`;
    geocoder.coord2Address(lng, lat, (res, status) => {
      const el = document.getElementById('address-display');
      el.onclick = () => { if (!el.innerText||el.innerText==='주소 없음'||el.innerText==='✅ 복사됨') return; copyAndMarkLocation(); };
      if (status===kakao.maps.services.Status.OK) {
        const legal = res[0].address?.address_name||'주소 없음';
        const roadFull = res[0].road_address?.address_name;
        const road = roadFull ? roadFull.split(' ').slice(1).join(' ') : '';
        el.innerText = road ? `${legal} / ${road}` : legal;
      } else el.innerText='주소 없음';
    });
  });

  kakao.maps.event.addListener(map, 'rightclick', e => {
    if (drawingMode) {
      if (moveLine) { moveLine.setMap(null); moveLine=null; }
      if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay=null; }
      drawingMode=false;
      document.getElementById('map').classList.remove('drawing-cursor');
      // 완성된 트랙을 목록에 추가
      if (currentPath.length >= 2) {
        const tname = currentPolyline._name || `경로 ${++trackCounter}`;
        if (!currentPolyline._name) currentPolyline._name = tname;
        addItem({ type:'track', name:tname, address:'', polyline:currentPolyline });
      } else {
        currentPolyline.setMap(null);
        polylines = polylines.filter(p=>p!==currentPolyline);
      }
      return;
    }
    const proj = map.getProjection(), clickPx = proj.pointFromCoords(e.latLng);
    let nearestPoly=null, nearestDist=Infinity;
    polylines.forEach(pl => {
      if (!pl||!pl.getMap()) return;
      const path=pl.getPath();
      for (let i=0;i<path.length-1;i++) {
        const d=ptSegDist(clickPx, proj.pointFromCoords(path[i]), proj.pointFromCoords(path[i+1]));
        if (d<nearestDist) { nearestDist=d; nearestPoly=pl; }
      }
    });
    if (nearestPoly && nearestDist<=10) showPolyMenu(lastClientX, lastClientY, nearestPoly);
    else showMarkerInput(e.latLng);
  });

  function ptSegDist(p,a,b) {
    const dx=b.x-a.x, dy=b.y-a.y;
    if (!dx&&!dy) return Math.hypot(p.x-a.x,p.y-a.y);
    const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
    return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
  }

  document.getElementById('search-form').addEventListener('submit', e => {
    e.preventDefault();
    geocoder.addressSearch(document.getElementById('address-input').value, (res,status) => {
      if (status===kakao.maps.services.Status.OK) {
        const pos=new kakao.maps.LatLng(res[0].y,res[0].x);
        map.setCenter(pos);
        if (searchMarker) searchMarker.setMap(null);
        searchMarker=new kakao.maps.Marker({map,position:pos});
        kakao.maps.event.addListener(searchMarker,'rightclick',()=>{searchMarker.setMap(null);searchMarker=null;});
      } else alert('주소를 찾을 수 없습니다');
    });
  });

  kakao.maps.event.addListener(map, 'mousemove', updateDistance);

  // Ctrl+V 붙여넣기 이미지
  document.addEventListener('paste', async e => {
    const item = Array.from(e.clipboardData?.items||[]).find(i=>i.type.startsWith('image/'));
    if (!item) return;
    e.preventDefault();
    const file=item.getAsFile(); if(!file) return;
    const reader=new FileReader();
    reader.onload = ev => {
      const imgSrc=ev.target.result;
      const img=new Image();
      img.onload = () => {
        let lat=null,lng=null;
        try {
          const exif=piexif.load(imgSrc), gps=exif['GPS'];
          if (gps&&gps[piexif.GPSIFD.GPSLatitude]) {
            const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
            lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
            lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
            if (isNaN(lat)||isNaN(lng)||(lat===0&&lng===0)) {lat=null;lng=null;}
          }
        } catch(ex){}
        const now=new Date();
        const name=`붙여넣기_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        const pos=(lat&&lng)?new kakao.maps.LatLng(lat,lng):map.getCenter();
        addPhotoMarker(pos,imgSrc,name,'');
        if (!lat) { const added=markers.at(-1); if(added){added.marker.setDraggable(true);movingPhotoMarker=added;} }
      };
      img.src=imgSrc;
    };
    reader.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════════════
//  마커 추가
// ══════════════════════════════════════════════════
function showMarkerInput(latlng) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);
  const c=document.createElement('div');
  c.innerHTML=`<input type="text" placeholder="마커 이름" style="width:120px;padding:3px;" lang="ko" autocomplete="off" autofocus><button style="margin-top:4px;">추가</button><button style="margin-top:4px;">취소</button>`;
  c.style='background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';
  markerInputOverlay=new kakao.maps.CustomOverlay({position:latlng,content:c,yAnchor:1});
  markerInputOverlay.setMap(map);
  c.addEventListener('mousedown',e=>e.stopPropagation());
  const [inp,addBtn,cancelBtn]=c.querySelectorAll('input,button');
  inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addBtn.click();}});
  addBtn.onclick=()=>{addMarker(latlng,inp.value.trim()||'설명 없음');markerInputOverlay.setMap(null);};
  cancelBtn.onclick=()=>markerInputOverlay.setMap(null);
}

function addMarker(latlng, desc) {
  const marker=new kakao.maps.Marker({map,position:latlng,draggable:false});
  const div=document.createElement('div');
  div.style='position:relative;display:flex;align-items:center;justify-content:space-between;padding:5px;';
  div.innerHTML=`<span>${desc}</span><div style="cursor:pointer;font-weight:bold;margin-left:8px;">✖</div>`;
  const [label,btn]=div.querySelectorAll('span,div');
  const iw=new kakao.maps.InfoWindow({content:div});
  kakao.maps.event.addListener(marker,'click',()=>{iw.open(map,marker);selectItemByMarker(marker);});
  kakao.maps.event.addListener(marker,'rightclick',()=>showEditInput({marker,iw,name:desc},label));
  btn.onclick=()=>iw.close();
  let holdTimer=null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);movingPhotoMarker={marker,iw,name:desc};},1000);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;}});
  const markerObj={marker,iw,name:desc};
  markers.push(markerObj);
  addItem({type:'marker',name:desc,address:'',markerObj});
}

function addPhotoMarker(latlng, imgSrc, filename, takenDate) {
  const marker=new kakao.maps.Marker({map,position:latlng,draggable:false});
  const div=document.createElement('div');
  div.style='position:relative;width:374px;overflow:hidden;';
  div.innerHTML=`<div style="font-weight:bold;font-size:13px;padding:4px 6px 2px;">${filename}</div><div style="position:relative;"><img src="${imgSrc}" style="display:block;width:100%;max-height:281px;object-fit:cover;"><div style="position:absolute;top:4px;right:4px;display:flex;gap:3px;"><span class="dl-btn" style="cursor:pointer;font-size:13px;background:rgba(0,0,0,0.5);color:#fff;border-radius:3px;padding:1px 5px;" title="다운로드">💾</span><span class="cl-btn" style="cursor:pointer;font-size:13px;font-weight:bold;background:rgba(0,0,0,0.5);color:#fff;border-radius:3px;padding:1px 5px;">✖</span></div></div>`;
  const title=div.querySelector('div');
  const dlBtn=div.querySelector('.dl-btn');
  const clBtn=div.querySelector('.cl-btn');

  let isDownloading=false;
  dlBtn.onclick=async()=>{
    if(isDownloading)return; isDownloading=true;
    const pos=marker.getPosition();
    const entry=allItems.find(i=>i.markerObj?.marker===marker);
    await downloadPhotoWithGPS(entry?.imgSrc||imgSrc, entry?.name||filename, pos.getLat(), pos.getLng());
    isDownloading=false;
  };

  const iw=new kakao.maps.InfoWindow({content:div});
  // 타이머로 단일클릭/더블클릭 구분 (Kakao dblclick 이벤트는 지도 줌과 충돌)
  let _clickTimer=null;
  kakao.maps.event.addListener(marker,'click',()=>{
    if(_clickTimer){clearTimeout(_clickTimer);_clickTimer=null;
      // 더블클릭: 수정창 열기
      iw.open(map,marker);
      const entry=allItems.find(i=>i.markerObj?.marker===marker);
      showEditInput(entry?entry.markerObj:{marker,iw,name:filename},title);
    } else {
      _clickTimer=setTimeout(()=>{_clickTimer=null;iw.open(map,marker);selectItemByMarker(marker);},280);
    }
  });
  kakao.maps.event.addListener(marker,'rightclick',()=>{const e=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(e?e.markerObj:{marker,iw,name:filename},title);});
  // InfoWindow 제목 더블클릭으로도 수정 가능
  title.ondblclick=e=>{e.stopPropagation();const entry=allItems.find(i=>i.markerObj?.marker===marker);showEditInput(entry?entry.markerObj:{marker,iw,name:filename},title);};
  clBtn.onclick=()=>iw.close();

  let holdTimer=null;
  kakao.maps.event.addListener(marker,'mousedown',()=>{map.setDraggable(false);holdTimer=setTimeout(()=>{iw.close();marker.setDraggable(true);movingPhotoMarker={marker,iw,name:filename};},1000);});
  ['mouseup','mouseout'].forEach(evt=>kakao.maps.event.addListener(marker,evt,()=>{clearTimeout(holdTimer);map.setDraggable(true);}));
  kakao.maps.event.addListener(marker,'dragend',()=>{if(movingPhotoMarker&&marker===movingPhotoMarker.marker){marker.setDraggable(false);movingPhotoMarker=null;renderList();}});

  if (!markers.find(m=>m.marker===marker)) {
    const markerObj={marker,iw,name:filename};
    markers.push(markerObj);
    addItem({type:'photo',name:filename,address:'',markerObj,imgSrc});
  }
}

function selectItemByMarker(marker) {
  const filtered=getFilteredItems();
  const idx=filtered.findIndex(i=>i.markerObj?.marker===marker);
  if (idx>=0) {
    selectedItems.clear(); selectedItems.add(idx);
    anchorIdx=idx; lastClickedIdx=idx;
    renderList(); selectFilteredItem(idx);
  }
}

function showEditInput(markerObj, label) {
  if (markerInputOverlay) markerInputOverlay.setMap(null);
  const c=document.createElement('div');
  c.innerHTML=`<input type="text" value="${label.textContent}" style="width:120px;padding:3px;" lang="ko" autocomplete="off" autofocus><button style="margin-top:4px;">수정</button><button style="margin-top:4px;">삭제</button>`;
  c.style='background:white;padding:6px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:4px;';
  markerInputOverlay=new kakao.maps.CustomOverlay({position:markerObj.marker.getPosition(),content:c,yAnchor:1});
  markerInputOverlay.setMap(map);
  c.addEventListener('mousedown',e=>e.stopPropagation());
  const [inp,editBtn,deleteBtn]=c.querySelectorAll('input,button');
  inp.focus(); const v=inp.value; inp.value=''; inp.value=v;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();editBtn.click();}});

  editBtn.onclick=()=>{
    const newName=inp.value.trim()||'설명 없음';
    label.textContent=newName;
    const dup=markers.filter(m=>m.marker===markerObj.marker);
    if (dup.length>1) markers=markers.filter((m,i)=>m.marker!==markerObj.marker||i===markers.findIndex(x=>x.marker===markerObj.marker));
    const found=markers.find(m=>m.marker===markerObj.marker);
    if (found) found.name=newName;
    markerObj.name=newName;
    const aItem=allItems.find(i=>i.markerObj?.marker===markerObj.marker);
    if (aItem){aItem.name=newName;renderList();}
    markerObj.iw.close(); markerInputOverlay.setMap(null);
  };
  deleteBtn.onclick=()=>{
    markerObj.marker.setMap(null); markerObj.iw.close(); markerInputOverlay.setMap(null);
    markers=markers.filter(m=>m.marker!==markerObj.marker);
    removeItem(i=>i.markerObj?.marker===markerObj.marker);
  };
}

function attachPolylineRightClick(poly) {
  kakao.maps.event.addListener(poly,'rightclick',e=>{if(drawingMode&&poly===currentPolyline)return;showPolyMenu(lastClientX,lastClientY,poly);});
  let lp=null;
  kakao.maps.event.addListener(poly,'touchstart',()=>{lp=setTimeout(()=>showPolyMenu(lastClientX,lastClientY,poly),600);});
  kakao.maps.event.addListener(poly,'touchend',()=>clearTimeout(lp));
  kakao.maps.event.addListener(poly,'touchmove',()=>clearTimeout(lp));
}

let polyMenuTarget=null, lastClientX=0, lastClientY=0;
document.addEventListener('mousemove',e=>{lastClientX=e.clientX;lastClientY=e.clientY;},{passive:true});
document.addEventListener('touchstart',e=>{if(e.touches.length===1){lastClientX=e.touches[0].clientX;lastClientY=e.touches[0].clientY;}},{passive:true});

function showPolyMenu(x,y,poly) {
  if (drawingMode&&poly===currentPolyline) return;
  polyMenuTarget=poly;
  const m=document.getElementById('polyMenu');
  m.style.left=Math.min(x,window.innerWidth-160)+'px';
  m.style.top=Math.min(y,window.innerHeight-130)+'px';
  m.classList.add('show');
}
function hidePolyMenu(){document.getElementById('polyMenu').classList.remove('show');polyMenuTarget=null;}
document.addEventListener('click',e=>{if(!document.getElementById('polyMenu').contains(e.target))hidePolyMenu();});
document.getElementById('polyMenuCancelBtn').onclick=hidePolyMenu;

document.getElementById('polyDeleteBtn').onclick=()=>{
  if (!polyMenuTarget) return;
  const t=polyMenuTarget; t.setMap(null);
  polylines=polylines.filter(p=>p!==t);
  removeItem(i=>i.type==='track'&&i.polyline===t);
  hidePolyMenu();
};

document.getElementById('polyEditBtn').onclick=()=>{
  if (!polyMenuTarget) return;
  const poly=polyMenuTarget; const oldName=poly._name;
  hidePolyMenu();
  removeItem(i=>i.type==='track'&&i.polyline===poly);
  if (drawingMode){if(currentPolyline){currentPolyline.setMap(null);polylines=polylines.filter(p=>p!==currentPolyline);}drawingMode=false;}
  const path=poly.getPath();
  poly.setMap(null); polylines=polylines.filter(p=>p!==poly);
  drawingMode=true;
  currentPath=path.map(p=>new kakao.maps.LatLng(p.getLat(),p.getLng()));
  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:3,strokeColor:'#FF0000',strokeOpacity:0.8});
  currentPolyline._name=oldName;
  polylines.push(currentPolyline); attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
  if (currentPath.length>0) updateDistanceOverlay(currentPath[currentPath.length-1]);
};

function startDrawing() {
  if (drawingMode) return;
  if (moveLine){moveLine.setMap(null);moveLine=null;}
  if (distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  drawingMode=true; currentPath=[];
  currentPolyline=new kakao.maps.Polyline({map,path:currentPath,strokeWeight:3,strokeColor:'#FF0000',strokeOpacity:0.8});
  polylines.push(currentPolyline); attachPolylineRightClick(currentPolyline);
  document.getElementById('map').classList.add('drawing-cursor');
}

const resetPolylines=()=>{
  polylines.forEach(p=>p.setMap(null)); polylines=[]; drawingMode=false;
  if(moveLine){moveLine.setMap(null);moveLine=null;}
  if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  document.getElementById('map').classList.remove('drawing-cursor');
  allItems=allItems.filter(i=>i.type!=='track');
  if(currentFilter==='all'||currentFilter==='track'){selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();}
  renderList();
};

const resetAll=()=>{
  markers.forEach(m=>{m.iw.close();m.marker.setMap(null);}); markers=[];
  polylines.forEach(p=>p.setMap(null)); polylines=[];
  if(moveLine){moveLine.setMap(null);moveLine=null;}
  if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}
  drawingMode=false; document.getElementById('map').classList.remove('drawing-cursor');

// ══════════════════════════════════════════════════
//  통합 키보드 핸들러
// ══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const inInput = e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA';
  const inListInput = inInput && e.target.closest('#photoListWrapper');

  // 목록 인풋 안에서는 상위 처리 차단 (onkeydown으로 자체 처리)
  if (inListInput) return;

  // 그리기 모드 Backspace/Escape/Ctrl+Z
  if (drawingMode && currentPath.length>0 && !inInput) {
    if (e.key==='Backspace'||e.key==='Escape'||(e.key==='z'&&e.ctrlKey)) {
      e.preventDefault(); currentPath.pop(); currentPolyline.setPath([...currentPath]);
      if (!currentPath.length){if(distanceOverlay){distanceOverlay.setMap(null);distanceOverlay=null;}if(moveLine){moveLine.setMap(null);moveLine=null;}}
      else updateDistanceOverlay(currentPath[currentPath.length-1]);
      return;
    }
  }

  // 일반 단축키
  if (!inInput) {
    if (e.ctrlKey&&e.key.toLowerCase()==='a'){e.preventDefault();const fl=getFilteredItems();fl.forEach((_,i)=>selectedItems.add(i));anchorIdx=0;lastClickedIdx=fl.length-1;renderList();return;}
    if (e.ctrlKey&&e.key.toLowerCase()==='c'&&!window.getSelection().toString()){
      e.preventDefault();
      const anyIwOpen = markers.some(m => m.iw && m.iw.getMap && m.iw.getMap());
      if (!anyIwOpen) {
        // 지도에 팝업 없으면 마커 생성 (사이드바 선택 무관)
        copyAndMarkLocation();
      } else if (selectedItems.size > 0) {
        // 팝업 열려있고 사이드바 선택 있으면 목록 복사
        document.getElementById('copyListBtn').click();
      }
      return;
    }
    if (e.key==='F1'){e.preventDefault();window.open('https://junty75.github.io/map/help','_blank','width=900,height=700,scrollbars=yes');return;}
    if (e.altKey){e.preventDefault();if(drawingMode){if(moveLine)moveLine.setMap(null);if(distanceOverlay)distanceOverlay.setMap(null);drawingMode=false;document.getElementById('map').classList.remove('drawing-cursor');}else startDrawing();return;}
  }
  if (e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();exportByFormat();return;}

  // 목록 방향키 + Enter + Delete (입력창 밖)
  if (!inInput) {
    const filtered=getFilteredItems();

    if (e.key==='Delete' && selectedItems.size>0) {
      e.preventDefault();
      const toDelete=[...selectedItems].map(i=>filtered[i]).filter(Boolean);
      const names=toDelete.map(i=>i.name).join(', ');
      if (!confirm(`"${names}"\n\n${toDelete.length}개 항목을 삭제하시겠습니까?`)) return;
      toDelete.forEach(item=>{
        if (item.markerObj){item.markerObj.iw.close();item.markerObj.marker.setMap(null);markers=markers.filter(m=>m.marker!==item.markerObj.marker);}
        if (item.polyline){item.polyline.setMap(null);polylines=polylines.filter(p=>p!==item.polyline);}
      });
      allItems=allItems.filter(i=>!toDelete.includes(i));
      selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
      clearPreview(); renderList();
      return;
    }

    if (e.key==='ArrowDown'){
      e.preventDefault();
      const next=lastClickedIdx<0?0:Math.min(lastClickedIdx+1,filtered.length-1);
      if (filtered.length>0){
        selectedItems.clear(); selectedItems.add(next); anchorIdx=next;
        renderList(); selectFilteredItem(next);
      }
    } else if (e.key==='ArrowUp'){
      e.preventDefault();
      if (lastClickedIdx>0){
        const prev=lastClickedIdx-1;
        selectedItems.clear(); selectedItems.add(prev); anchorIdx=prev;
        renderList(); selectFilteredItem(prev);
      }
    } else if (e.key==='Enter'&&lastClickedIdx>=0){
      e.preventDefault();
      const rows=document.querySelectorAll('#photoTbody tr');
      const row=rows[lastClickedIdx];
      if (row&&!row.querySelector('.item-name-input')) startEditItem(row,filtered[lastClickedIdx],lastClickedIdx);
    }
  }
});

function copyCoordFromInput(el) {
  if (!el.value) return;
  navigator.clipboard.writeText(el.value).catch(()=>{const t=document.createElement('textarea');t.value=el.value;t.style='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
}

function copyAndMarkLocation() {
  const val=document.getElementById('latlng-display').value; if(!val)return;
  const [lat,lng]=[val.split(',')[0]?.trim(),val.split(',')[1]?.trim()];
  const addr=document.getElementById('address-display').innerText;
  if (!lat||!lng) return;
  navigator.clipboard.writeText(`${lat}\t${lng}\t${addr}`).then(()=>{
    createLocationMarker(parseFloat(lat),parseFloat(lng));
    const el=document.getElementById('address-display'),prev=el.innerText;
    el.innerText='✅ 복사됨';setTimeout(()=>{el.innerText=prev;},1200);
  }).catch(()=>{
    const t=document.createElement('textarea');t.value=`${lat}\t${lng}\t${addr}`;t.style='position:fixed;opacity:0;';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    createLocationMarker(parseFloat(lat),parseFloat(lng));
  });
}

function createLocationMarker(lat,lng) {
  locationMarkerCount++;
  const latlng=new kakao.maps.LatLng(lat,lng);
  const addr=document.getElementById('address-display').innerText;
  addMarker(latlng,String(locationMarkerCount));
  const entry=markers[markers.length-1];
  if (entry){entry.addr=(addr==='✅ 복사됨'||addr==='주소 없음')?'':addr;entry.iw.open(map,entry.marker);}
}

let _lastBaseType='HYBRID',_terrainOn=false,_cadastralOn=false;
function changeMapType(value){
  if(_terrainOn){map.removeOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);_terrainOn=false;}
  if(_cadastralOn){map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);_cadastralOn=false;}
  if(value==='TERRAIN'){map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);map.addOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);_terrainOn=true;}
  else if(value==='USE_DISTRICT'){map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);_cadastralOn=true;}
  else{_lastBaseType=value;map.setMapTypeId(kakao.maps.MapTypeId[value]);}
}

// ══════════════════════════════════════════════════
//  파일 드롭
// ══════════════════════════════════════════════════
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files); if(!files.length)return;
  const bounds=new kakao.maps.LatLngBounds();
  let noGPSAction=null;

  files.forEach(file=>{
    const name=file.name.toLowerCase();

    if (name.endsWith('.kmz')||name.endsWith('.zip')) {
      loadKMZ(file,bounds);

    } else if (name.endsWith('.htm')||name.endsWith('.html')) {
      const reader=new FileReader();
      reader.onload=ev=>{
        const html=ev.target.result;
        const lineBlocks=[...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];
        lineBlocks.forEach((m,i)=>{
          const pts=[...m[2].matchAll(/new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)]
            .map(c=>{const ll=new kakao.maps.LatLng(parseFloat(c[1]),parseFloat(c[2]));bounds.extend(ll);return ll;});
          if(pts.length<2)return;
          const poly=new kakao.maps.Polyline({map,path:pts,strokeWeight:3,strokeColor:'#FF00FF',strokeOpacity:0.85});
          polylines.push(poly);attachPolylineRightClick(poly);
          const tn=`경로 ${++trackCounter}`;poly._name=tn;
          addItem({type:'track',name:tn,address:'',polyline:poly});
        });
        const posMatches=[...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
        posMatches.forEach(m=>{
          const rawName=m[1].replace(/<a\b[^>]*>.*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim()||'마커';
          const ll=new kakao.maps.LatLng(parseFloat(m[2]),parseFloat(m[3]));
          bounds.extend(ll);addMarker(ll,rawName);
        });
        if(posMatches.length===0){
          const mk=[...html.matchAll(/new\s+(?:kakao|daum)\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
          mk.forEach((m,i)=>{const ll=new kakao.maps.LatLng(parseFloat(m[1]),parseFloat(m[2]));bounds.extend(ll);addMarker(ll,`마커_${i+1}`);});
        }
        if(!bounds.isEmpty())map.setBounds(bounds);
      };
      reader.readAsText(file,'utf-8');

    } else if (name.endsWith('.gpx')) {
      const reader=new FileReader();
      reader.onload=ev=>{
        const xml=new DOMParser().parseFromString(ev.target.result,'application/xml');
        Array.from(xml.getElementsByTagName('trk')).forEach((trk,index)=>{
          const trackName=trk.getElementsByTagName('name')[0]?.textContent||`경로${index+1}`;
          Array.from(trk.getElementsByTagName('trkseg')).forEach(seg=>{
            const pts=Array.from(seg.getElementsByTagName('trkpt')).map(pt=>{
              const ll=new kakao.maps.LatLng(parseFloat(pt.getAttribute('lat')),parseFloat(pt.getAttribute('lon')));
              bounds.extend(ll);return ll;
            });
            if(pts.length){
              const poly=new kakao.maps.Polyline({map,path:pts,strokeWeight:4,strokeColor:getRandomColor(),strokeOpacity:0.9});
              const dist=poly.getLength(),fmt=d=>d<=10?`${d.toFixed(1)}m`:d<1000?`${Math.round(d)}m`:`${(d/1000).toFixed(2)}km`;
              const ov=new kakao.maps.CustomOverlay({content:`<div style="padding:5px 8px;background:white;border:1px solid #333;font-size:1em;border-radius:3px;"><b>${trackName}</b><br>총거리:${fmt(dist)}</div>`,yAnchor:1,zIndex:4});
              kakao.maps.event.addListener(poly,'mouseover',()=>{ov.setPosition(poly.getPath()[Math.floor(pts.length/2)]);ov.setMap(map);});
              kakao.maps.event.addListener(poly,'mouseout',()=>ov.setMap(null));
              polylines.push(poly);attachPolylineRightClick(poly);
              poly._name=trackName;
              addItem({type:'track',name:trackName,address:'',polyline:poly});
            }
          });
        });
        Array.from(xml.getElementsByTagName('wpt')).forEach(wpt=>{
          const ll=new kakao.maps.LatLng(parseFloat(wpt.getAttribute('lat')),parseFloat(wpt.getAttribute('lon')));
          bounds.extend(ll);addMarker(ll,wpt.getElementsByTagName('name')[0]?.textContent||'설명 없음');
        });
        if(!bounds.isEmpty())map.setBounds(bounds);
      };
      reader.readAsText(file);

    } else if (file.type.startsWith('image/')||/\.(jpe?g|png|heic|heif|arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i.test(name)) {
      (async()=>{
        const imgName=file.name.replace(/\.[^/.]+$/,'');
        if (/\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i.test(name)) {
          let imgSrc=null,latlng=null,takenDate='';
          if (typeof exifr!=='undefined') {
            const [gpsData,thumbBuf,exifData]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null),exifr.parse(file,['DateTimeOriginal']).catch(()=>null)]);
            if(gpsData?.longitude!==undefined)latlng=new kakao.maps.LatLng(gpsData.latitude,gpsData.longitude);
            if(exifData?.DateTimeOriginal)takenDate=exifData.DateTimeOriginal.toISOString().substring(0,10);
            if(thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
          }
          if(!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
          if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);if(!bounds.isEmpty())map.setBounds(bounds);}
          else{if(noGPSAction===null)noGPSAction=confirm(`"${file.name}" 위치 정보가 없습니다.\n지도 중심에 마커를 추가하시겠습니까?`);if(noGPSAction)addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);}
          return;
        }
        const imgFile=await convertHeicIfNeeded(file);
        const reader=new FileReader();
        reader.onload=ev=>{
          const imgSrc=ev.target.result;
          let latlng=null,takenDate='';
          try{
            const exif=piexif.load(imgSrc),gps=exif['GPS'];
            if(gps&&gps[piexif.GPSIFD.GPSLatitude]&&gps[piexif.GPSIFD.GPSLongitude]){
              const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
              const lat=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
              const lng=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
              if(!isNaN(lat)&&!isNaN(lng)&&(lat!==0||lng!==0))latlng=new kakao.maps.LatLng(lat,lng);
            }
            const rawDate=exif['Exif']?.[piexif.ExifIFD.DateTimeOriginal]||exif['0th']?.[piexif.ImageIFD.DateTime]||'';
            if(rawDate)takenDate=rawDate.substring(0,10).replace(/:/g,'-');
          }catch(ex){}
          if(latlng){bounds.extend(latlng);addPhotoMarker(latlng,imgSrc,imgName,takenDate);if(!bounds.isEmpty())map.setBounds(bounds);}
          else{
            if(noGPSAction===null)noGPSAction=confirm(`"${file.name}" 위치 정보가 없습니다.\n지도 중심에 마커를 추가하시겠습니까?\n(이 선택은 이번 일괄 업로드에 적용됩니다)`);
            if(noGPSAction){addPhotoMarker(map.getCenter(),imgSrc,imgName,takenDate);const added=markers.at(-1);if(added){added.marker.setDraggable(true);movingPhotoMarker=added;}}
          }
        };
        reader.readAsDataURL(imgFile);
      })();

    } else if (name.endsWith('.csv')) {
      const reader=new FileReader();
      reader.onload=evt=>{
        const text=evt.target.result.replace(/^﻿/,'');
        const lines=text.trim().split(/\r?\n/);if(lines.length<2)return;
        function parseLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}
        const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
        const iLat=headers.findIndex(h=>h.includes('위도')||h==='lat'||h==='latitude');
        const iLng=headers.findIndex(h=>h.includes('경도')||h==='lng'||h==='lon'||h==='longitude');
        const iName=headers.findIndex(h=>h.includes('이름')||h.includes('name'));
        const hasH=iLat!==-1&&iLng!==-1;
        const ci={name:hasH?iName:1,lat:hasH?iLat:2,lng:hasH?iLng:3};
        lines.slice(hasH?1:0).forEach(line=>{
          if(!line.trim())return;
          const cols=parseLine(line);
          const lat=parseFloat(cols[ci.lat]),lng=parseFloat(cols[ci.lng]);
          if(isNaN(lat)||isNaN(lng))return;
          const ll=new kakao.maps.LatLng(lat,lng);bounds.extend(ll);
          addMarker(ll,(cols[ci.name]||'').replace(/^"|"$/g,'')||'마커');
        });
        if(!bounds.isEmpty())map.setBounds(bounds);
      };
      reader.readAsText(file,'utf-8');
    }
  });
});

async function loadKMZ(file,bounds) {
  try {
    const zip=await JSZip.loadAsync(file);
    const zipFiles=Object.keys(zip.files);
    let kmlText=null;
    for (const n of zipFiles){const cn=n.replace(/\0/g,'');if(/\.kml$/i.test(cn)){try{const t=await zip.files[n].async('string');if(t&&t.length){kmlText=t;break;}}catch(e){}}}
    if(!kmlText){alert('KMZ 안에 .kml 파일이 없습니다.');return;}
    const xml=new DOMParser().parseFromString(kmlText,'application/xml');
    const placemarks=Array.from(xml.getElementsByTagName('Placemark'));
    for (const pm of placemarks) {
      const pmName=pm.getElementsByTagName('name')[0]?.textContent?.trim()||'설명 없음';
      const lineString=pm.getElementsByTagName('LineString')[0];
      const point=pm.getElementsByTagName('Point')[0];
      let photoFilename='';
      for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='photoFile'){photoFilename=d.getElementsByTagName('value')[0]?.textContent||'';break;}}
      if(!photoFilename){
        const descEl=pm.getElementsByTagName('description')[0];
        if(descEl){const dt=descEl.textContent||'';const im=dt.match(/src=["']([^"']+\.(jpe?g|png))["']/i)||dt.match(/src=([^\s>]+\.(jpe?g|png))/i);
        if(im){const tp=im[1].trim(),rp=tp.replace('_thumb.','_roll.');const re=zipFiles.find(z=>{const c=z.replace(/\0/g,'');return c===rp||c.endsWith('/'+rp.split('/').pop());});photoFilename=re?rp:tp;}}
      }
      if (lineString) {
        const coordsText=lineString.getElementsByTagName('coordinates')[0]?.textContent||'';
        const pts=coordsText.trim().split(/\s+/).map(c=>{const[lng,lat]=c.split(',').map(Number);return new kakao.maps.LatLng(lat,lng);}).filter(ll=>!isNaN(ll.getLat())&&!isNaN(ll.getLng()));
        if(pts.length){
          const poly=new kakao.maps.Polyline({map,path:pts,strokeWeight:4,strokeColor:getRandomColor(),strokeOpacity:0.9});
          pts.forEach(p=>bounds.extend(p));polylines.push(poly);attachPolylineRightClick(poly);
          poly._name=pmName;addItem({type:'track',name:pmName,address:'',polyline:poly});
        }
      } else if (point) {
        const coordsText=point.getElementsByTagName('coordinates')[0]?.textContent||'';
        const[lng,lat]=coordsText.trim().split(',').map(Number);
        if(isNaN(lat)||isNaN(lng))continue;
        const ll=new kakao.maps.LatLng(lat,lng);bounds.extend(ll);
        if(photoFilename){
          const baseName=photoFilename.split('/').pop();let photoZipFile=null;
          for(const n of zipFiles){const cn=n.replace(/\0/g,'');if(cn===photoFilename||cn===`files/${photoFilename}`||cn===`images/${baseName}`||cn===`photo/${baseName}`||cn.endsWith('/'+baseName)||cn===baseName){photoZipFile=zip.files[n];break;}}
          if(photoZipFile){const base64=await photoZipFile.async('base64');const ext=baseName.split('.').pop().toLowerCase();addPhotoMarker(ll,`data:${ext==='png'?'image/png':'image/jpeg'};base64,${base64}`,pmName,'');}
          else addMarker(ll,pmName);
        } else addMarker(ll,pmName);
      }
    }
    if(!bounds.isEmpty())map.setBounds(bounds);
  } catch(err){console.error(err);alert('KMZ 파일 오류: '+err.message);}
}

function exportByFormat(){

  if(fmt==='kmz'){if(area==='visible')exportVisibleKMZ();else if(area==='selected')exportSelectedKMZ();else exportKMZ();}

  const{sm,sp}=r;

  const fname=prompt('선택 객체 KMZ',ds+'_선택');if(!fname)return;
  const zip=new JSZip(),photoFiles=[],usedNames=new Set();
  for(const m of sm){const img=m.iw.getContent().querySelector('img');if(img&&img.src.startsWith('data:image')){let base=(m.name||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'');let sf=base+'.jpg';let suf=1;while(usedNames.has(sf))sf=`${base}_${suf++}.jpg`;usedNames.add(sf);photoFiles.push({filename:sf});const p=m.marker.getPosition();const imgData=injectGPS(await compressImage(img.src),p.getLat(),p.getLng());zip.file(`files/${sf}`,imgData.split(',')[1],{base64:true});}}
  let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>\n  <name>${fname}</name>\n`;
  sp.forEach((pl,i)=>{const coords=pl.getPath().map(p=>`${p.getLng()},${p.getLat()},0`).join(' ');kml+=`  <Placemark><name>path${i+1}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;});
  let pi=0;
  for(const m of sm){const p=m.marker.getPosition();const img=m.iw.getContent().querySelector('img');
    if(img&&img.src.startsWith('data:image')){const sf=photoFiles[pi]?.filename||'photo.jpg';pi++;kml+=`  <Placemark><name>${m.name||''}</name><description><![CDATA[<img src="files/${sf}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${sf}</value></Data></ExtendedData><Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point></Placemark>\n`;}
    else kml+=`  <Placemark><name>${m.name||''}</name><Point><coordinates>${p.getLng()},${p.getLat()},0</coordinates></Point></Placemark>\n`;}
  kml+='</Document>\n</kml>';zip.file('doc.kml',kml);
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(new File([blob],fname+'.kmz',{type:'application/vnd.google-earth.kmz'}));a.download=fname+'.kmz';document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
}

async function downloadSelectedPhotos(){
  const r=getSelectedExportItems();if(!r)return;
  const{sm}=r;
  const pm=sm.filter(m=>m.iw.getContent().querySelector('img'));
  if(!pm.length){alert('선택된 사진 마커가 없습니다.');return;}
  for(const m of pm){const img=m.iw.getContent().querySelector('img');const pos=m.marker.getPosition();await downloadPhotoWithGPS(img.src,m.name,pos.getLat(),pos.getLng());}
}

//  이미지 유틸
// ══════════════════════════════════════════════════
async function convertHeicIfNeeded(file){
  const isHeic=file.type==='image/heic'||file.type==='image/heif'||/\.(heic|heif)$/i.test(file.name);
  if(!isHeic)return file;
  const blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.92});
  return new File([Array.isArray(blob)?blob[0]:blob],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'});
}

function injectGPS(dataUrl,lat,lng){
  try{
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    let ex={};try{ex=piexif.load(dataUrl);}catch(e){}
    if(!ex['GPS'])ex['GPS']={};
    ex['GPS'][piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';
    ex['GPS'][piexif.GPSIFD.GPSLatitude]=toDMS(lat);
    ex['GPS'][piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';
    ex['GPS'][piexif.GPSIFD.GPSLongitude]=toDMS(lng);
    return piexif.insert(piexif.dump(ex),dataUrl);
  }catch(e){return dataUrl;}
}

function compressImage(imgSrc){
  return new Promise(r=>{
    const qVal=parseInt(document.getElementById('photoQuality')?.value??'200');
    if(qVal===0){r(imgSrc);return;}
    const img=new Image();
    img.onload=()=>{
      const T=qVal*1024,MAX=1920;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85,res=c.toDataURL('image/jpeg',q);
      while(res.length*0.75>T&&q>0.1){q=Math.round((q-0.05)*100)/100;res=c.toDataURL('image/jpeg',q);}
      try{const exif=piexif.load(imgSrc);if(exif['0th']){delete exif['0th'][piexif.ImageIFD.UserComment];delete exif['0th'][piexif.ImageIFD.ImageDescription];}if(exif['Exif'])delete exif['Exif'][piexif.ExifIFD.UserComment];res=piexif.insert(piexif.dump(exif),res);}catch(e){}
      r(res);
    };img.src=imgSrc;
  });
}

function downloadPhotoWithGPS(imgSrc,name,lat,lng){
  return new Promise(r=>{
    const qVal=parseInt(document.getElementById('photoQuality')?.value??'200');
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    const insertGPS=du=>{try{let exif={};try{exif=piexif.load(imgSrc);}catch(e){}if(exif['0th']){delete exif['0th'][piexif.ImageIFD.UserComment];delete exif['0th'][piexif.ImageIFD.ImageDescription];}if(exif['Exif'])delete exif['Exif'][piexif.ExifIFD.UserComment];if(!exif['GPS'])exif['GPS']={};exif['GPS'][piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';exif['GPS'][piexif.GPSIFD.GPSLatitude]=toDMS(lat);exif['GPS'][piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';exif['GPS'][piexif.GPSIFD.GPSLongitude]=toDMS(lng);return piexif.insert(piexif.dump(exif),du);}catch(e){return du;}};
    const doDownload=du=>{const res=insertGPS(du);const a=document.createElement('a');a.href=res;a.download=(name||'image')+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(r,300);};
    if(qVal===0){doDownload(imgSrc);return;}
    const T=qVal*1024,image=new Image();
    image.onload=()=>{
      const MAX=1920;let w=image.width,h=image.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(image,0,0,w,h);
      let q=0.92,res=c.toDataURL('image/jpeg',q);
      while(res.length*0.75>T&&q>0.1){q=Math.round((q-0.05)*100)/100;res=c.toDataURL('image/jpeg',q);}
      doDownload(res);
    };image.src=imgSrc;
  });
}

// ── 빈 공간 클릭 시 선택 해제 ──
document.getElementById('photoListWrapper').addEventListener('click', e => {
  if (!e.target.closest('#photoTbody tr')) {
    selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
    document.querySelectorAll('#photoTbody tr').forEach(r => r.classList.remove('selected'));
  }
});

// ── 드래그 선택 / 길게 눌러 순서 변경 ──
let reorderMode = false, reorderHoldTimer = null, reorderTargetIdx = -1;

function getReorderLine() {
  let el = document.getElementById('reorderLine');
  if (!el) {
    el = document.createElement('div');
    el.id = 'reorderLine';
    el.style.cssText = 'display:none;position:absolute;left:0;right:0;height:3px;background:#e74c3c;pointer-events:none;z-index:20;';
    document.getElementById('photoListWrapper').style.position = 'relative';
    document.getElementById('photoListWrapper').appendChild(el);
  }
  return el;
}

function reorderItems(targetIdx) {
  const filtered = getFilteredItems();
  const moving = [...selectedItems].sort((a,b)=>a-b).map(i=>filtered[i]).filter(Boolean);
  if (!moving.length) return;
  const staying = filtered.filter((_, i) => !selectedItems.has(i));
  // 이동 후 삽입 위치 보정
  let ins = targetIdx;
  for (const si of [...selectedItems].sort((a,b)=>a-b)) { if (si < targetIdx) ins--; }
  ins = Math.max(0, Math.min(ins, staying.length));
  const newFiltered = [...staying.slice(0, ins), ...moving, ...staying.slice(ins)];
  if (currentFilter === 'all') {
    allItems = newFiltered;
  } else {
    let fi = 0;
    allItems = allItems.map(item => item.type === currentFilter ? newFiltered[fi++] : item);
  }
  selectedItems.clear();
  moving.forEach(item => { const ni = newFiltered.indexOf(item); if (ni >= 0) selectedItems.add(ni); });
  anchorIdx = Math.min(...[...selectedItems]);
  lastClickedIdx = Math.max(...[...selectedItems]);
  renderList();
}

document.addEventListener('mousemove', e => {
  if (dragStartIdx < 0 || e.buttons === 0) {
    dragStartIdx = -1;
    if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }
    if (reorderMode) {
      reorderMode = false;
      getReorderLine().style.display = 'none';
      document.querySelectorAll('#photoTbody tr').forEach(r => r.style.opacity = '');
    }
    return;
  }

  if (reorderMode) {
    // 순서 변경 모드: 삽입 위치 표시
    const rows = [...document.querySelectorAll('#photoTbody tr')];
    const wrapper = document.getElementById('photoListWrapper');
    const wRect = wrapper.getBoundingClientRect();
    const relY = e.clientY - wRect.top + wrapper.scrollTop;
    let target = rows.length;
    for (let i = 0; i < rows.length; i++) {
      const rRect = rows[i].getBoundingClientRect();
      const rMid = rRect.top - wRect.top + wrapper.scrollTop + rRect.height / 2;
      if (relY < rMid) { target = i; break; }
    }
    reorderTargetIdx = target;
    const line = getReorderLine();
    if (target < rows.length) {
      const rRect = rows[target].getBoundingClientRect();
      line.style.top = (rRect.top - wRect.top + wrapper.scrollTop) + 'px';
    } else if (rows.length > 0) {
      const rRect = rows[rows.length - 1].getBoundingClientRect();
      line.style.top = (rRect.bottom - wRect.top + wrapper.scrollTop) + 'px';
    }
    line.style.display = 'block';
    return;
  }

  if (!isDragging && Math.hypot(e.clientX - dragStartX, e.clientY - dragStartY) < 8) return;
  // 짧은 이동 → 일반 드래그 선택 (홀드 타이머 취소)
  if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }

  const el = document.elementFromPoint(e.clientX, e.clientY);
  const tr = el && el.closest('#photoTbody tr');
  if (!tr) return;
  const rows = [...document.querySelectorAll('#photoTbody tr')];
  const curIdx = rows.indexOf(tr);
  if (curIdx < 0) return;
  isDragging = true;
  const lo = Math.min(dragStartIdx, curIdx), hi = Math.max(dragStartIdx, curIdx);
  selectedItems.clear();
  for (let i = lo; i <= hi; i++) selectedItems.add(i);
  lastClickedIdx = curIdx;
  rows.forEach((r, i) => r.classList.toggle('selected', selectedItems.has(i)));
});

document.addEventListener('mouseup', () => {
  if (reorderHoldTimer) { clearTimeout(reorderHoldTimer); reorderHoldTimer = null; }
  if (reorderMode) {
    reorderMode = false;
    getReorderLine().style.display = 'none';
    document.querySelectorAll('#photoTbody tr').forEach(r => r.style.opacity = '');
    if (reorderTargetIdx >= 0) { reorderItems(reorderTargetIdx); reorderTargetIdx = -1; }
  } else if (dragStartIdx >= 0 && isDragging) {
    anchorIdx = dragStartIdx; renderList();
  }
  dragStartIdx = -1;
});

// ── 컬럼 리사이즈 ──
(function(){
  const nr = document.getElementById('numColResizer');
  const cr = document.getElementById('colResizer');
  if (!cr) return;
  const numTh = document.getElementById('numColTh');
  const nameTh = document.getElementById('nameColTh');
  const addrTh = document.getElementById('addrColTh');
  let dragging = false, draggingN = false, startX = 0, startW = 0, startW2 = 0, tableW = 0;
  if (nr) nr.addEventListener('mousedown', e => {
    draggingN = true; startX = e.clientX;
    startW = numTh.offsetWidth; startW2 = nameTh.offsetWidth;
    tableW = numTh.closest('table').offsetWidth;
    e.preventDefault(); e.stopPropagation();
  });
  cr.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX;
    startW = nameTh.offsetWidth;
    tableW = nameTh.closest('table').offsetWidth;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (draggingN) {
      const nw = Math.max(28, Math.min(tableW - 80, startW + e.clientX - startX));
      const nmw = Math.max(50, startW + startW2 - nw);
      numTh.style.width = (nw / tableW * 100).toFixed(1) + '%';
      nameTh.style.width = (nmw / tableW * 100).toFixed(1) + '%';
    }
    if (dragging) {
      const numW = numTh.offsetWidth;
      const newW = Math.max(50, Math.min(tableW - numW - 30, startW + e.clientX - startX));
      const pct = (newW / tableW * 100).toFixed(1);
      nameTh.style.width = pct + '%';
      addrTh.style.width = ((tableW - numW - newW) / tableW * 100).toFixed(1) + '%';
    }
  });
  document.addEventListener('mouseup', () => { dragging = false; draggingN = false; });
})();
