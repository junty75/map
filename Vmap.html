<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>전태영의 사진지도 (VWorld)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
<!-- ── API 키: 고정(하드코딩). 이 폴더 파일들은 아래 브이월드 인증키 + 카카오 JS 키로 동작 ── -->
<script>
var VWORLD_KEY   = '55FD7275-A6F5-3B69-9966-CD4BFA2FD35F';
var KAKAO_JS_KEY = '94bf4516825c146467eb2318cd55b782';
document.write('<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=' + VWORLD_KEY
  + '"><\/script>');
</script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.cjs"></script>
<!-- 카카오 역지오코딩 폴백용 (VWORLD가 NOT_FOUND일 때) — 키는 위에서 고정 선언됨 -->
<script>
document.write('<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=' + KAKAO_JS_KEY
  + '&libraries=services&autoload=false"><\/script>');
</script>
<style>
html,body{height:100%;margin:0;overflow:hidden;font-family:'맑은 고딕',sans-serif;}
#app{display:flex;width:100%;height:100%;overflow:hidden;}

/* ── 사이드바 ── */
#sidebar{width:360px;min-width:160px;display:none;flex-direction:column;background:#eaf4fc;flex-shrink:0;overflow:hidden;border-right:2px solid #85c1e9;}
#sidebarResizer{width:5px;background:#85c1e9;cursor:col-resize;flex-shrink:0;transition:background .15s;display:none;}
#sidebarResizer:hover{background:#2980b9;}
.col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;background:#5dade2;z-index:3;}
.col-resizer:hover{background:#1a73c8;}
#listHeader{background:#2980b9;flex-shrink:0;}
.list-header-top{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;color:#fff;font-size:13px;font-weight:bold;}
#itemCountBadge{background:#e74c3c;color:#fff;border-radius:12px;padding:1px 8px;font-size:11px;font-weight:normal;margin-left:6px;}
.list-header-top .hdr-btns{display:flex;gap:5px;flex-shrink:0;}
.list-header-top .hdr-btn{font-size:11px;padding:2px 8px;cursor:pointer;background:#fff;border:1px solid #1a5276;border-radius:3px;color:#1a5276;font-weight:bold;white-space:nowrap;}
.list-header-top .hdr-btn:hover{background:#d6eaf8;}
.list-header-top .hdr-btn.on{background:#1a5276;color:#fff;border-color:#1a5276;}
#colVisBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#colVisBtn:hover{background:#d6eaf8;}
#colVisMenu{display:none;position:fixed;z-index:9600;background:#fff;border:1px solid #bbb;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);padding:8px 10px;font-size:12px;color:#1a5276;}
#colVisMenu.show{display:block;}
#colVisMenu .cvm-title{font-weight:bold;margin-bottom:6px;color:#1a5276;}
#colVisMenu label{display:flex;align-items:center;gap:6px;padding:3px 2px;cursor:pointer;white-space:nowrap;}
#colVisMenu label.fixed{color:#999;cursor:default;}
#colVisMenu input{accent-color:#2980b9;}
#filterTabs{display:flex;background:#5dade2;}
.ftab{flex:1;padding:5px 2px;font-size:11px;border:none;border-right:1px solid #2980b9;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px;}
.ftab:last-child{border-right:none;}
.ftab:hover{background:#2e86c1;}
.ftab.active{background:#1a5276;color:#fff;font-weight:bold;}
.vis-check{width:12px;height:12px;cursor:pointer;flex-shrink:0;accent-color:#aef;margin:0;}
.ftab.hidden-type{opacity:0.55;}
#folderBar{background:#d6eaf8;padding:4px 6px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid #85c1e9;}
#folderBar .fbar-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
#insertBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#insertBtn:hover{background:#d6eaf8;}
#numToggleBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#numToggleBtn:hover{background:#d6eaf8;}
#numToggleBtn.on{background:#1a5276;color:#fff;border-color:#1a5276;}
#trackNameOrgBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#trackNameOrgBtn:hover{background:#d6eaf8;}
#trackNameOrgBtn.on{background:#7d3c98;color:#fff;border-color:#7d3c98;}
.ftab[data-f="track"] span{cursor:pointer;}
.ftab[data-f="track"] span:hover{text-decoration:underline;}
.ftab[data-f="track"] span.track-all-on{color:#FF9F43;font-weight:bold;}
#photoListWrapper{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;outline:none;}
#photoTable{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
#photoTable thead th{background:#2e86c1;color:#fff;padding:5px 6px;text-align:left;position:sticky;top:0;z-index:2;white-space:nowrap;}
#photoTable tbody tr{cursor:pointer;user-select:none;}
#photoTable tbody tr:nth-child(even){background:#d6eaf8;}
#photoTable tbody tr:hover{background:#aed6f1 !important;}
#photoTable tbody tr.selected{background:#7fb3d3 !important;}
#photoTable tbody tr.selected td{color:#0a2744 !important;}
/* 임시(파일선택/엑셀 미리보기) 객체 — 흐리게 + 기울임으로 영구 객체와 구분 */
#photoTable tbody tr.live-row td{color:#8aa0b0;font-style:italic;opacity:.65;}
#photoTable tbody tr.live-row .item-name::after{content:' ·임시';font-size:10px;color:#9aa;font-style:normal;}
#photoTable tbody td{padding:4px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid #b0cfe0;max-width:0;}
.type-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;vertical-align:middle;}
.dot-photo{background:#2471a3;}
.dot-marker{background:#e74c3c;}
.dot-track{background:#1e8449;border-radius:2px;height:5px;}
.track-swatch{display:inline-block;width:22px;height:12px;border-radius:2px;margin-right:6px;flex-shrink:0;vertical-align:middle;border:1px solid rgba(0,0,0,.35);cursor:pointer;}
.track-swatch:hover{outline:2px solid #1a5276;outline-offset:1px;}
#colorPalette{display:none;position:fixed;z-index:9500;background:#fff;border:1px solid #bbb;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.25);padding:8px;}
#colorPalette.show{display:block;}
#colorPalette .pal-grid{display:grid;grid-template-columns:repeat(10,18px);gap:3px;}
#colorPalette .pal-sw{width:18px;height:18px;border-radius:3px;border:1px solid rgba(0,0,0,.2);cursor:pointer;padding:0;}
#colorPalette .pal-sw:hover{outline:2px solid #1a5276;outline-offset:1px;}
#drawColorBtn{width:30px;height:26px;padding:0;border:1px solid #ccc;border-radius:4px;cursor:pointer;}
.item-name{vertical-align:middle;}
.item-name-input{width:90%;box-sizing:border-box;font-size:12px;padding:2px 5px;border:1px solid #2980b9;outline:none;background:#fff;color:#000;border-radius:3px;box-shadow:0 1px 6px rgba(0,0,0,.35);}
#metaResizer{height:5px;background:#85c1e9;cursor:row-resize;flex-shrink:0;transition:background .15s;}
#metaResizer:hover{background:#2980b9;}
#metaSection{flex-shrink:0;height:150px;min-height:40px;display:flex;flex-direction:column;overflow:hidden;}
#metaHeader{background:#2980b9;color:#fff;padding:4px 10px;font-size:12px;font-weight:bold;flex-shrink:0;display:flex;justify-content:space-between;align-items:center;}
#metaEditBtn{background:#fff;color:#1a5276;border:none;border-radius:4px;padding:2px 9px;font-size:11px;font-weight:bold;cursor:pointer;}
#metaEditBtn:hover{background:#d6eaf8;}
#metaEditBtn[disabled]{opacity:.45;cursor:default;}
#metaEditModal{display:none;position:fixed;inset:0;z-index:100001;background:rgba(0,0,0,.35);align-items:center;justify-content:center;}
#metaEditBox{background:#fff;border-radius:10px;width:340px;max-width:92vw;box-shadow:0 8px 30px rgba(0,0,0,.4);overflow:hidden;}
#metaEditBox h3{margin:0;background:#2980b9;color:#fff;font-size:14px;padding:10px 14px;}
#metaEditBody{padding:14px;}
#metaEditBody label{display:block;font-size:12px;color:#1a5276;font-weight:bold;margin:8px 0 3px;}
#metaEditBody input,#metaEditBody textarea{width:100%;box-sizing:border-box;border:1px solid #bcd;border-radius:5px;padding:6px 8px;font-size:13px;font-family:inherit;}
#metaEditBody textarea{resize:vertical;min-height:60px;}
#metaEditBtns{display:flex;justify-content:flex-end;gap:8px;padding:0 14px 14px;}
#metaEditBtns button{padding:6px 16px;border-radius:5px;font-size:13px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;}
#metaEditBtns #metaEditSave{background:#d6eaf8;color:#000;border:1px solid #1a5276;font-weight:bold;}
#metaEditBtns #metaEditSave:hover{background:#aed4f0;}
#metaBody{flex:1;overflow:auto;padding:6px 10px;font-size:12px;background:#fff;color:#333;}
#metaPlaceholder{color:#5d8aa8;}
#metaBody table{width:100%;border-collapse:collapse;}
#metaBody th{text-align:left;color:#1a5276;white-space:nowrap;vertical-align:top;padding:2px 8px 2px 0;font-weight:bold;width:1%;}
#metaBody td{padding:2px 0;word-break:break-all;vertical-align:top;}
#previewResizer{height:5px;background:#85c1e9;cursor:row-resize;flex-shrink:0;transition:background .15s;}
#previewResizer:hover{background:#2980b9;}
#previewSection{flex-shrink:0;height:220px;min-height:60px;display:flex;flex-direction:column;overflow:hidden;}
#previewHeader{background:#2980b9;color:#fff;padding:5px 10px;font-size:12px;font-weight:bold;flex-shrink:0;}
#previewImgWrapper{flex:1;background:#d6eaf8;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#previewImg{max-width:100%;max-height:100%;object-fit:contain;display:none;}
#previewPlaceholder{color:#5d8aa8;font-size:12px;text-align:center;padding:8px;}

/* ── 지도 영역 ── */
#mapWrap{flex:1;position:relative;overflow:hidden;}
#vmap{width:100%;height:100%;}
/* 줌 버튼 (최대 줌 이후 CSS scale 화면 확대) */
#zoomBtns{position:absolute;right:14px;bottom:30px;z-index:1001;display:flex;flex-direction:column;gap:4px;}
#zoomBtns button{width:40px;height:40px;background:white;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;}
#zoomBtns button:hover{background:#f1f3f4;}
#sidebarOpenBtn{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:1001;display:flex;align-items:center;justify-content:center;background:#fff;color:#2980b9;border:2px solid #2980b9;border-left:none;cursor:pointer;border-radius:0 6px 6px 0;padding:10px 2px;font-size:13px;writing-mode:vertical-rl;box-shadow:2px 0 8px rgba(0,0,0,.15);transition:background .15s;}
#sidebarOpenBtn:hover{background:#ebf5fb;}

#search-form{position:absolute;top:10px;left:10px;z-index:2000;background:#fff;padding:5px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;gap:5px;}
#address-display{position:absolute;bottom:10px;left:10px;z-index:2000;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:6px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;max-width:440px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.3);}
#address-display:hover{background:rgba(0,0,0,.82);}
.controls{position:absolute;top:10px;right:10px;z-index:2000;display:flex;flex-direction:column;align-items:flex-start;gap:4px;background:#fff;padding:6px 8px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.controls button,.controls select,.controls input{padding:4px 7px;font-size:12px;font-family:inherit;border:1px solid #ccc;border-radius:4px;cursor:pointer;}
#polyMenu{display:none;position:fixed;z-index:9999;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);min-width:140px;overflow:hidden;}
#polyMenu.show{display:block;}
#polyMenu button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}
.mpopup{background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,.4);min-width:170px;font-size:13px;font-family:'맑은 고딕',sans-serif;position:relative;overflow:visible;}
.mpopup::before{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid rgba(0,0,0,.18);}
.mpopup::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff;}
.mpopup .head{display:flex;justify-content:space-between;align-items:center;font-weight:bold;margin-bottom:5px;gap:8px;}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.mpopup .pimg{max-height:450px;max-width:420px;display:block;margin-top:4px;object-fit:contain;cursor:pointer;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{flex:1;padding:4px 0;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;}
.mpopup .brow button:hover{background:#e0e0e0;}
.mpopup .inp{width:100%;box-sizing:border-box;padding:4px;font-size:13px;border:1px solid #ccc;border-radius:4px;font-family:inherit;margin-bottom:5px;}
.dist-tip{background:#fff;border:1px solid #db4040;border-radius:3px;padding:3px 7px;font-size:12px;white-space:nowrap;pointer-events:none;}
.draw-mode,.draw-mode *{cursor:crosshair !important;}
/* 선그리기 중 마커 라벨/팝업/핀 등 오버레이가 클릭을 가로채지 않게 + 옅게 (마커 위에도 꼭짓점 찍기) */
#vmap.draw-mode .ol-overlay-container{pointer-events:none !important;opacity:.35;}
#cadastralBtn.active{background:#e8f5e9;border-color:#43a047;color:#2e7d32;font-weight:bold;}

/* ── 탐색기 연동 배지 ── */
#explorerBadge{position:absolute;bottom:42px;left:10px;z-index:1001;background:rgba(0,0,0,0.62);color:#fff;font-size:11px;padding:4px 9px;border-radius:5px;white-space:nowrap;user-select:none;pointer-events:none;max-width:260px;overflow:hidden;text-overflow:ellipsis;}
#explorerBadge.connected{background:rgba(18,110,50,0.88);}
#searchRunning{display:none;position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1100;align-items:center;gap:10px;background:rgba(33,33,33,0.92);color:#fff;padding:8px 14px;border-radius:22px;box-shadow:0 3px 14px rgba(0,0,0,0.35);font-size:13px;white-space:nowrap;}
#searchRunning.on{display:inline-flex;}
#searchRunning .spin{width:15px;height:15px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#4fc3f7;border-radius:50%;display:inline-block;animation:searchSpin 0.8s linear infinite;}
@keyframes searchSpin{to{transform:rotate(360deg);}}
#searchCancelBtn{background:#e74c3c;color:#fff;border:none;border-radius:14px;padding:4px 12px;font-size:12px;font-weight:bold;cursor:pointer;}
#searchCancelBtn:hover{background:#c0392b;}

/* ── 실시간 위치 마커 ── */
@keyframes liveRing{0%{transform:translate(-50%,-50%) scale(1);opacity:.8;}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0;}}
.live-pin{position:relative;width:14px;height:14px;cursor:grab;user-select:none;}
.live-pin:active,.live-pin.dragging{cursor:grabbing;}
.live-pin-dot{position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:#00e676;border:2px solid #fff;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 4px rgba(0,0,0,.4);}
.live-pin-ring{position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:rgba(0,230,118,.55);transform:translate(-50%,-50%);animation:liveRing 1.3s ease-out infinite;z-index:1;}
.live-pin.dragging .live-pin-ring{animation:none;opacity:0;}
.live-pin-label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;}
</style>
</head>
<body>
<div id="app">

<!-- 사이드바 -->
<div id="sidebar">
  <div id="listHeader">
    <div class="list-header-top">
      <span>📋 목록 <span id="itemCountBadge">0</span></span>
      <div class="hdr-btns">
        <span id="reindexStatus" style="display:none;align-items:center;gap:4px;font-size:11px;color:#fff;background:rgba(33,33,33,0.88);padding:2px 8px;border-radius:12px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;">
          <span style="width:10px;height:10px;border:2px solid rgba(255,255,255,0.3);border-top-color:#4fc3f7;border-radius:50%;display:inline-block;animation:searchSpin 0.8s linear infinite;flex-shrink:0;"></span>
          <span id="reindexMsg">🗂 색인 중…</span>
          <button id="reindexCancelBtn" style="background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:1px 6px;font-size:10px;font-weight:bold;cursor:pointer;flex-shrink:0;">■</button>
        </span>
        <button id="holdViewBtn" class="hdr-btn" title="켜면 사이드바·검색결과에서 객체를 선택해도 지도 화면이 이동하지 않습니다 (다시 누르면 해제)">🔒 Hold</button>
        <button id="kmzNearBtn" class="hdr-btn" title="검색할 폴더를 선택하면 그 폴더와 하위 폴더에서 지도 중심 기준 반경 안의 KMZ·사진을 검색 (폴더 선택 후 트랙 포함 여부를 묻습니다)">🧭 위치로 검색</button>
        <button id="viewFilterBtn" class="hdr-btn" title="현재 지도 화면에 보이는 객체만 목록에 표시 (다시 누르면 전체). 필터 상태에서 '전체객체' 저장 시 목록에 보이는 객체만 저장됩니다.">🔲 필터</button>
      </div>
    </div>
    <div id="filterTabs">
      <button class="ftab active" data-f="all"><span>전체</span></button>
      <button class="ftab" data-f="photo"><span>사진</span><input type="checkbox" class="vis-check" data-t="photo" checked title="지도 표시/숨기기"></button>
      <button class="ftab" data-f="marker"><span>마커</span><input type="checkbox" class="vis-check" data-t="marker" checked title="지도 표시/숨기기"></button>
      <button class="ftab" data-f="track"><span>트랙</span><input type="checkbox" class="vis-check" data-t="track" checked title="지도 표시/숨기기"></button>
    </div>
  </div>
  <div id="folderBar">
    <div class="fbar-row">
      <button id="metaSearchBtn" title="색인에서 메타정보를 즉시 검색 — JPG 사진(EXIF 제목·설명·촬영일시), KMZ(엑셀메타), KMZ 안에 든 사진까지. 예: 제목:정자나무 주소:강남, 공백=AND">🔎 메타검색</button>
      <button id="metaIndexBtn" title="폴더를 지정해 그 안 JPG·KMZ의 메타정보를 색인에 등록 — 디스크 사진/KMZ 안 사진은 EXIF(제목·설명·촬영일시), KMZ는 엑셀메타 (기존 파일까지 검색되게)">🗂 메타색인</button>

<script>
'use strict';

/* ════════════════════════════════════
   전역 상태
════════════════════════════════════ */
let vmap      = null;
let markers   = [];   // {feat, lyr, ov, name, addr, isPhoto, imgSrc}
let polylines = [];   // ol.layer.Vector[]
let drawing   = false, drawCoords = [], drawLayer = null;
let guideLine = null, distOv = null, distEl = null;
let movingMk  = null, movingGhost = null, inputOv = null, locCount = 0;
let showNumbers = false, numberOverlays = [];
let isDraggingMk = false;
let vp = null;
let cssScale = 1;   // 최대 줌 이후 CSS scale 화면 확대 (+,- 버튼 전용)

const MAX_CSS_SCALE = 8;
function applyScale(s) {
  cssScale = Math.max(1, Math.min(MAX_CSS_SCALE, s));
  const el = document.getElementById('vmap');
  el.style.transformOrigin = '50% 50%';
  el.style.transform = cssScale === 1 ? '' : `scale(${cssScale})`;
}

// CSS scale 상태에서도 정확한 지도 픽셀 좌표 (scale 1이면 기존과 동일)
// OL3 getEventPixel은 transform을 보정하지 않으므로 직접 계산
function evtScaledPixel(e) {
  const rect = vp.getBoundingClientRect();
  return [
    (e.clientX - rect.left) * (vp.offsetWidth / rect.width),
    (e.clientY - rect.top) * (vp.offsetHeight / rect.height)
  ];
}

/* ── Undo / Redo ── */
const undoStack = [], redoStack = [];
function pushHistory(op) {
  undoStack.push(op);
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0;
}
function doUndo() {
  if (!undoStack.length) return;
  const op = undoStack.pop();
  op.undo();
  redoStack.push(op);
  renderList();
}
function doRedo() {
  if (!redoStack.length) return;
  const op = redoStack.pop();
  op.redo();
  undoStack.push(op);
  renderList();
}
let lastCX    = 0, lastCY = 0, polyTarget = null;
let lastAddr  = '주소 없음';
let searchMarker = null;
let trackCounter = 0;
let trackHighlightLayers = [];
let trackAllHighlightLayers = [];
let trackAllColorActive = false;
let trackNameOrgActive = false;
const trackOrigNames = new Map();

// 사이드바 / 다중선택 상태
let allItems = [];
let bulkLoading = false;    // KMZ 대량 로드 중: 항목별 renderList/주소조회/히스토리를 보류하고 끝나고 한 번에 (대형 KMZ 멈춤 방지)
let currentFilter = 'all';
let sortCol = null, sortDir = 1; // sortCol: null|'name'|'address'|'length'|'taken'|'geohash'
let viewFilterOn = false;        // '필터' 버튼: 현재 지도 화면에 보이는 객체만 목록에 표시(라이브)
let holdView = false;            // 'Hold' 버튼: 사이드바/검색결과에서 객체 선택해도 지도 화면 이동 안 함
let _lastFiltered = [];          // 마지막 renderList 의 필터결과(라이브 필터 선택 유지용)
// 목록 표시 컬럼(번호·이름은 항상 표시, 나머지는 '항목표시'로 켜고 끄기 — 설정 저장됨)
let colVis = { address: true, length: true, taken: true, geohash: true };
// 컬럼 폭 가중치(헤더 경계 드래그로 조정, 보이는 컬럼끼리 비율로 폭 분배 — 설정 저장됨)
let colW = { num: 0.55, name: 2.0, address: 1.7, length: 0.85, taken: 1.15, geohash: 1.55 };
let selectedItems = new Set();
let anchorIdx = -1, lastClickedIdx = -1;
let dragStartIdx = -1, isDragging = false, dragStartX = 0, dragStartY = 0;
let visibility = { photo: true, marker: true, track: true };

/* ════════════════════════════════════
   지도 초기화
════════════════════════════════════ */
function initMap(lat, lng) {
  vw.ol3.CameraPosition.center = ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857');
  vw.ol3.CameraPosition.zoom   = 14;
  vw.ol3.MapOptions = {
    basemapType        : vw.ol3.BasemapType.PHOTO_HYBRID,
    controlDensity     : vw.ol3.DensityType.EMPTY,
    interactionDensity : vw.ol3.DensityType.FULL,
    controlsAutoArrange: true,
    homePosition       : vw.ol3.CameraPosition,
    initPosition       : vw.ol3.CameraPosition,
    pixelRatio         : 1
  };
  vmap = new vw.ol3.Map('vmap', vw.ol3.MapOptions);
  vmap.on('click',       mapClick);
  vmap.on('pointermove', mapMove);
  vmap.on('moveend',     refreshViewFilterList);   // '필터' 켜짐 시 화면이동마다 목록 갱신
  vmap.getViewport().addEventListener('contextmenu', mapRightClick);

  vmap.getInteractions().forEach(i => {
    if (i instanceof ol.interaction.DoubleClickZoom) i.setActive(false);
  });

  // 줌 버튼 (최대 줌 이후에는 CSS scale로 화면 확대)
  document.getElementById('zoomInBtn').onclick = () => {
    if (cssScale > 1) { applyScale(cssScale * 2); return; }
    const v = vmap.getView();
    const z = v.getZoom() || 14;
    v.setZoom(z + 1);
    // 줌이 더 안 올라가면(최대 줌 도달) CSS scale로 추가 확대
    if (Math.abs((v.getZoom() || z) - z) < 0.01) applyScale(cssScale * 2);
  };
  document.getElementById('zoomOutBtn').onclick = () => {
    if (cssScale > 1) { applyScale(cssScale / 2); return; }
    vmap.getView().setZoom((vmap.getView().getZoom() || 14) - 1);
  };
  // 휠/더블클릭 등으로 실제 줌이 바뀌면 CSS scale 리셋 (좌표 어긋남 방지)
  vmap.getView().on('change:resolution', () => { if (cssScale > 1) applyScale(1); });

  let holdTimer = null, holdTarget = null, holdStartX = 0, holdStartY = 0;
  vp = vmap.getViewport();

  vp.addEventListener('pointerdown', e => {
    if (e.button !== 0 || drawing || movingMk) return;
    const px = evtScaledPixel(e);
    let target = null;
    vmap.forEachFeatureAtPixel(px, feat => {
      if (target) return;
      const m = markers.find(mk => mk.feat === feat);
      if (m) target = m;
    }, { hitTolerance: 16 });
    if (!target) return;
    holdTarget = target; holdStartX = e.clientX; holdStartY = e.clientY;
    vp.setPointerCapture(e.pointerId);
    holdTimer = setTimeout(() => {
      if (!holdTarget) return;
      const m = holdTarget; holdTarget = null; holdTimer = null;
      if (m.ov) { vmap.removeOverlay(m.ov); m.ov = null; }
      vmap.getInteractions().forEach(i => { if (i instanceof ol.interaction.DragPan) i.setActive(false); });
      // prevCoord는 드래그 시작 시점에 캡처 (endMoveMode에서 이미 바뀔 수 있으므로)
      const prevCoord = m.feat.getGeometry().getCoordinates().slice();
      // ghost overlay: CSS 위치 업데이트라 항상 즉각 반응
      const color = m.isPhoto ? '#1565C0' : '#e53935';
      const ghostEl = document.createElement('div');
      ghostEl.style.cssText = `width:16px;height:16px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none;opacity:.85;`;
      const ghost = new ol.Overlay({ element: ghostEl, positioning: 'center-center', stopEvent: false, autoPan: false });
      vmap.addOverlay(ghost);
      ghost.setPosition(prevCoord);
      m.feat.setStyle(new ol.style.Style({})); // 실제 마커 숨김
      m._prevCoord = prevCoord; // endMoveMode에서 사용
      movingMk = m; isDraggingMk = true; movingGhost = ghost; document.body.style.cursor = 'move';
    }, 300);
  });

  vp.addEventListener('pointermove', e => {
    if (holdTimer && Math.hypot(e.clientX - holdStartX, e.clientY - holdStartY) > 5) {
      clearTimeout(holdTimer); holdTimer = null; holdTarget = null;
      try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    }
    if (movingMk && movingGhost) {
      const rect = vp.getBoundingClientRect();
      const pixel = [(e.clientX - rect.left) * (vp.offsetWidth / rect.width), (e.clientY - rect.top) * (vp.offsetHeight / rect.height)];
      const coord = vmap.getCoordinateFromPixel(pixel);
      if (coord) {
        movingGhost.setPosition(coord);
        movingMk.feat.getGeometry().setCoordinates(coord); // 실제 좌표도 동시 업데이트 → fetchAddrForItem이 정확한 좌표를 읽음
      }
    }
  });

  vp.addEventListener('pointerup', e => {
    try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holdTarget = null; return; }
    if (movingMk && isDraggingMk) endMoveMode();
  });
  vp.addEventListener('pointercancel', e => {
    try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holdTarget = null; }
    if (movingMk && isDraggingMk) endMoveMode();
  });
}

function endMoveMode() {
  const moved = movingMk;
  const ghost = movingGhost;
  movingMk = null; isDraggingMk = false; movingGhost = null; document.body.style.cursor = '';
  vmap.getInteractions().forEach(i => { if (i instanceof ol.interaction.DragPan) i.setActive(true); });
  if (!moved) { if (ghost) vmap.removeOverlay(ghost); return; }
  if (ghost) vmap.removeOverlay(ghost);
  // feature 좌표는 pointermove에서 이미 최신 위치로 업데이트됨
  const prevCoord = moved._prevCoord || moved.feat.getGeometry().getCoordinates().slice();
  const newCoord  = moved.feat.getGeometry().getCoordinates().slice();
  delete moved._prevCoord;
  moved.feat.setStyle(moved.isPhoto ? mkPhotoStyle() : mkNormalStyle());
  const item = allItems.find(i => i.mkObj === moved);
  if (item) {
    item.address = '…'; renderList(); fetchAddrForItem(item);
    pushHistory({
      undo() { moved.feat.getGeometry().setCoordinates(prevCoord); item.address='…'; fetchAddrForItem(item); },
      redo() { moved.feat.getGeometry().setCoordinates(newCoord);  item.address='…'; fetchAddrForItem(item); }
    });
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='F5'&&allItems.length>0){
    e.preventDefault();
    if(confirm('저장되지 않은 데이터가 있습니다.\n\n[확인] KMZ 저장 후 새로고침\n[취소] 새로고침 취소')){exportKMZ();setTimeout(()=>location.reload(),800);}
  }
},true);
window.addEventListener('beforeunload',e=>{if(!window.__skipUnloadGuard&&allItems.length>0){e.preventDefault();e.returnValue='';}});

window.onload = () => {
  initMap(35.8242, 127.1480);
  // 위치 권한 요청(사용자 위치 파악) 제거 — 매번 뜨던 권한 팝업 방지. 기본 중심으로 시작.
  document.getElementById('sidebarOpenBtn').onclick = () => {
    getComputedStyle(document.getElementById('sidebar')).display === 'none' ? openSidebar() : closeSidebar();
  };
  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', e => {
      if (e.target.classList.contains('vis-check')) return;
      if (btn.dataset.f === 'track' && e.target.tagName === 'SPAN') {
        e.stopPropagation();
        trackAllColorActive = !trackAllColorActive;
        e.target.classList.toggle('track-all-on', trackAllColorActive);
        updateAllTrackHighlights();
        return;
      }
      currentFilter = btn.dataset.f;
      document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b === btn));
      selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
      clearPreview(); renderList();
    });
  });

  // ── 타입별 지도 표시/숨기기 ──
  function applyVisibility(type) {
    const show = visibility[type];
    allItems.forEach(item => {
      if (item.type !== type) return;
      if (item.mkObj) {
        item.mkObj.lyr.setVisible(show);
        if (!show && item.mkObj.ov) {
          const el = item.mkObj.ov.getElement();
          if (el) el.style.display = 'none';
        }
      }
      if (item.polyLyr) item.polyLyr.setVisible(show);
    });
    document.querySelectorAll(`.ftab[data-f="${type}"]`).forEach(btn => btn.classList.toggle('hidden-type', !show));
    selectedItems.clear(); anchorIdx = -1; lastClickedIdx = -1;
    renderList();
  }

        if(parts[i]==='산'&&i+1<parts.length&&/^\d/.test(parts[i+1])){lotIdx=i;break;}
      }

      const addrParts=parts.slice(0,lotIdx);

      const ri=addrParts.slice(1).join(' ')||'';

      const imgExt = (() => { const m=(item.imgSrc||'').match(/^data:image\/([a-zA-Z]+);/); if(!m)return''; return m[1].toLowerCase()==='jpeg'?'.jpg':'.'+m[1].toLowerCase(); })();
      // 번호 모드면 번호_이름 형태로 복사

   VWorld API 키 & JSONP

/* VWORLD_KEY는 <head>에서 localStorage 기반으로 선언됨 */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = data => { delete window[cb]; script.remove(); resolve(data); };
    const fullUrl = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    const script = document.createElement('script');
    script.src = fullUrl;
    script.onerror = () => { delete window[cb]; script.remove(); reject(new Error('JSONP 실패')); };
    document.body.appendChild(script);
    setTimeout(() => { if (window[cb]) { delete window[cb]; script.remove(); reject(new Error('타임아웃')); }}, 8000);
  });
}

// ── 카카오 역지오코딩 (VWORLD NOT_FOUND 폴백) ──
let kakaoGeocoder = null;
if (window.kakao && kakao.maps && typeof kakao.maps.load === 'function') {
  try { kakao.maps.load(() => { try { kakaoGeocoder = new kakao.maps.services.Geocoder(); } catch(e){} }); } catch(e){}
}
async function kakaoReverse(lng, lat) {
  // SDK 비동기 로드 — 아직 준비 안 됐으면 잠깐 대기 (폴백은 VWORLD 실패 후에만 호출됨)
  for (let i = 0; i < 20 && !kakaoGeocoder; i++) await new Promise(r => setTimeout(r, 100));
  return new Promise(resolve => {
    if (!kakaoGeocoder) { resolve({addr:'', pnu:''}); return; }
    try {
      kakaoGeocoder.coord2Address(lng, lat, (res, status) => {
        if (status === kakao.maps.services.Status.OK && res && res[0]) {
          const a = res[0].address;
          const parcel = a?.address_name || '';
          const road   = res[0].road_address?.address_name || '';
          resolve({addr: parcel || road || '', pnu: buildPnuKakao(a)});
        } else resolve({addr:'', pnu:''});
      });
    } catch(e) { resolve({addr:'', pnu:''}); }
  });
}

// ── 역지오코딩 동시요청 제한 큐 (VWORLD 레이트리밋 회피) ──
const _geoQueue = []; let _geoActive = 0; const GEO_MAX = 3;
function _geoPump() {
  while (_geoActive < GEO_MAX && _geoQueue.length) {
    const job = _geoQueue.shift(); _geoActive++;
    job().finally(() => { _geoActive--; _geoPump(); });
  }
}
function _enqueueGeo(fn) {
  return new Promise(res => { _geoQueue.push(() => fn().then(res, () => res({addr:'',pnu:''}))); _geoPump(); });
}

// VWORLD 1회 시도 — 성공 시 {addr, pnu}, 결과 없으면 빈 값 (실패는 throw)
async function _vworldReverse(lng, lat) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${lng},${lat}&type=both&format=json&key=${VWORLD_KEY}`;
  const d = await jsonp(url);
  if (d?.response?.status === 'OK' && d.response.result?.length) {
    const res = d.response.result;
    let parcel = '', road = '', struct = null;
    for (const r of res) {
      if (r.type==='parcel') { parcel=r.text||''; struct=r.structure||struct; }
      else if (r.type==='road') { road=r.text||''; if(!struct&&r.structure?.level4LC)struct={level4LC:r.structure.level4LC,detail:''}; }   // 지번 없어도 법정동코드로 PNU 생성(도로명 detail은 건물번호라 제외)
    }
    if (!parcel && !road) { parcel=res[0]?.text||''; road=res[1]?.text||''; struct=res[0]?.structure||struct; }
    if (road) { road=road.replace(/\s*\([^)]*\)/g,'').trim(); const parts=road.split(' '); if(parts.length>1) road=parts.slice(1).join(' '); }
    const addr = (parcel && road) ? `${parcel} / ${road}` : (parcel || road || '');
    return { addr, pnu: buildPnuVworld(struct) };
  }
  return { addr:'', pnu:'' };   // status OK인데 결과 없음(NOT_FOUND) 등
}

// VWORLD 재시도(에러 시) → 그래도 안 되면 카카오 폴백
async function _reverseGeocodeOnce(lng, lat) {
  let notFound = false;
  for (let t = 0; t < 2 && !notFound; t++) {
    try {
      const r = await _vworldReverse(lng, lat);
      if (r.addr) return r;
      notFound = true;                              // OK 응답인데 결과 없음 → 재시도 무의미
    } catch(e) {
      await new Promise(r => setTimeout(r, 400));    // 타임아웃/스로틀 → 잠시 후 재시도
    }
  }
  return await kakaoReverse(lng, lat);              // VWORLD가 못 찾으면 카카오로
}

async function reverseGeocode(lng, lat, cb) {
  const r = await _enqueueGeo(() => _reverseGeocodeOnce(lng, lat));
  cb((r && r.addr) || '주소 없음', (r && r.pnu) || '');
}

async function geocodeExact(address, type) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&address=${encodeURIComponent(address)}&format=json&type=${type}&key=${VWORLD_KEY}`;
  try {
    const d = await jsonp(url);
    if (d?.response?.status==='OK' && d.response.result?.point) return { lng:parseFloat(d.response.result.point.x), lat:parseFloat(d.response.result.point.y) };
  } catch(e) {}
  return null;
}

async function searchAddress(query) {
  for (const category of ['parcel','road']) {
    const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=address&category=${category}&format=json&errorformat=json&key=${VWORLD_KEY}`;
    try { const d=await jsonp(url); const item=d?.response?.result?.items?.[0]; if(item) return {lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)}; } catch(e) {}
  }
  try {
    const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=place&format=json&errorformat=json&key=${VWORLD_KEY}`;
    const d=await jsonp(url); const item=d?.response?.result?.items?.[0];
    if(item) return {lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)};
  } catch(e) {}
  return null;
}

function openRoadview(lat, lng) {
  // 카카오지도 사이트를 새 창으로 열어 해당 지점을 스카이뷰(+로드뷰)로 표시한다.
  //  map_type=TYPE_SKYVIEW(스카이뷰) + map_attribute=ROADVIEW(로드뷰) + panoid + 내부좌표(urlX/urlY)
  // 팝업차단 회피 위해 클릭 제스처 안에서 창을 먼저 열고, panoid를 받은 뒤 이동.
  const w = window.open('about:blank', 'kakaoSkyview',
    'width=1100,height=800,scrollbars=yes,resizable=yes');
  if (!w) { alert('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.'); return; }
  try { w.document.write('<title>카카오 스카이뷰</title><body style="font:14px sans-serif;padding:20px;">카카오지도 여는 중…</body>'); } catch(e){}

  // 위경도 → 카카오 내부좌표(WCONGNAMUL)
  let ux = '', uy = '';
  try {
    const co = new kakao.maps.LatLng(lat, lng).toCoords();
    if (co.getX) { ux = Math.round(co.getX()); uy = Math.round(co.getY()); }
    else { const mm = String(co).match(/-?\d+\.?\d*/g); if (mm) { ux = Math.round(+mm[0]); uy = Math.round(+mm[1]); } }
  } catch(e){}

  const base = `map_type=TYPE_SKYVIEW&map_hybrid=true&urlLevel=3&urlX=${ux}&urlY=${uy}`;
  const skyOnly = `https://map.kakao.com/?${base}`;
  try {
    new kakao.maps.RoadviewClient().getNearestPanoId(
      new kakao.maps.LatLng(lat, lng), 50, function(panoId) {
        w.location.href = (panoId != null)
          ? `https://map.kakao.com/?${base}&map_attribute=ROADVIEW&panoid=${panoId}&pan=0&tilt=0&zoom=0`
          : skyOnly;   // 근처 로드뷰 없으면 스카이뷰 지도만
        if (panoId == null) showSaveStatus('이 지점 부근에 로드뷰가 없어 스카이뷰 지도만 엽니다');
      });
  } catch(e) {
    w.location.href = skyOnly;
  }
  w.focus();
}

  if (locPickMode === 'center') {

    const circleFeat = new ol.Feature(new ol.geom.Circle(locCenter, 1));
    circleFeat.setStyle(new ol.style.Style({fill:new ol.style.Fill({color:'rgba(255,0,170,0.08)'}),stroke:new ol.style.Stroke({color:'#ff00aa',width:2,lineDash:[6,4]})}));
    const src = new ol.source.Vector({features:[dotFeat, circleFeat]});
    locCircleLyr = new ol.layer.Vector({source:src, zIndex:200});
    vmap.addLayer(locCircleLyr);
    locPickMode = 'radius';
    showSaveStatus('🧭 마우스를 움직여 반경을 정하고 클릭하세요 (Esc=취소)');
    return;
  }
  if (locPickMode === 'radius') {
    if (!locCenter) return;
    const ll_c = fromMerc(locCenter);
    const r = haversine(locCenter, coord);
    stopLocationPick();
    clearLocationPick(true);  // 원은 검색 중 남겨 둠
    window.__wsSend({type:'search_kmz_by_location', lat:ll_c[1], lng:ll_c[0], radius:r,
      winX:window.screenX, winY:window.screenY, winW:window.outerWidth, winH:window.outerHeight});
    window.__setBadge && window.__setBadge(true, `🧭 반경 ${_fmtR(r)} — 검색 폴더 선택 중…`);
    return;
  }

  // 로드뷰 지점 선택 모드 — 클릭 지점을 카카오지도(스카이뷰+로드뷰) 새 창으로
  if (roadviewPickMode) {
    stopRoadviewPick();
    const rll = fromMerc(coord);
    openRoadview(rll[1], rll[0]);   // lat, lng
    return;
  }
  if (drawing) { drawCoords.push(coord); refreshDraw(); return; }
  let hit = false;
  vmap.forEachFeatureAtPixel(pixel, feat => {
    if (hit) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) {
      hit = true;
      // 사진은 사이드바 미리보기로 충분 → 사진창(팝업) 안 띄움. 일반 마커만 이름 팝업.
      if (!showNumbers && !m.isPhoto) openPopup(m);
      // 사이드바 싱크: 해당 마커를 사이드바에서 선택하고 스크롤
      syncSidebarToMarker(m);   // 사이드바 싱크: 해당 마커를 사이드바에서 선택하고 스크롤
    }
  }, { hitTolerance:16 });
  if (hit) return;
  if (!showNumbers) closeAllPopups();
  // 지도 클릭 시 사이드바 선택 전체 해제
  if (selectedItems.size > 0) {
    selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
    document.querySelectorAll('#photoTbody tr').forEach(r=>r.classList.remove('selected'));
    highlightPhotoMarkersV(null);   // 사진마커 강조 해제
    if (showNumbers) renderNumbers();
  }
  const ll = fromMerc(coord);
  document.getElementById('latlng-box').value = `${ll[1].toFixed(6)}, ${ll[0].toFixed(6)}`;
  document.getElementById('address-display').innerText = '주소 조회 중…';
  reverseGeocode(ll[0], ll[1], addr => { lastAddr=addr; document.getElementById('address-display').innerText=addr; });
}

function mapMove(evt) {
  let coord = evt.coordinate;
  if (cssScale > 1 && evt.originalEvent) coord = vmap.getCoordinateFromPixel(evtScaledPixel(evt.originalEvent));

  // 위치로 검색 — 반경 단계: 마우스 따라 원·선·레이블 갱신
  if (locPickMode === 'radius' && locCenter) {
    const rMerc = Math.hypot(coord[0]-locCenter[0], coord[1]-locCenter[1]);
    const rM = haversine(locCenter, coord);
    if (locCircleLyr) {
      const feats = locCircleLyr.getSource().getFeatures();
      if (feats[1]) feats[1].getGeometry().setRadius(Math.max(1, rMerc));
    }
    if (!locLineLyr) {
      const src = new ol.source.Vector();
      locLineLyr = new ol.layer.Vector({source:src, zIndex:201});
      vmap.addLayer(locLineLyr);
    }
    const lSrc = locLineLyr.getSource();
    if (lSrc.getFeatures().length === 0) {
      const f = new ol.Feature(new ol.geom.LineString([locCenter, coord]));
      f.setStyle(lineSt('#ff00aa', 2));
      lSrc.addFeature(f);
    } else {
      lSrc.getFeatures()[0].getGeometry().setCoordinates([locCenter, coord]);
    }
    const html = `<div style="padding:2px 8px;background:rgba(255,0,170,.92);color:#fff;border-radius:10px;font-size:12px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.4);">반경 ${_fmtR(rM)}</div>`;
    if (!locRadiusOv) {
      const el = document.createElement('div');
      locRadiusOv = new ol.Overlay({element:el, positioning:'center-left', stopEvent:false, offset:[10,0]});
      vmap.addOverlay(locRadiusOv);
    }
    locRadiusOv.getElement().innerHTML = html;
    locRadiusOv.setPosition(coord);
  }

  if (!drawing || !drawCoords.length) { clearGuide(); return; }
  updateGuide(drawCoords[drawCoords.length-1], coord);
}
document.addEventListener('mousemove', e => { lastCX=e.clientX; lastCY=e.clientY; }, { passive:true });

function mapRightClick(e) {
  e.preventDefault(); if (!vmap) return;
  const px = evtScaledPixel(e), coord = vmap.getCoordinateFromPixel(px);
  if (drawing) { endDraw(); return; }
  if (searchMarker) {
    const hit = vmap.forEachFeatureAtPixel(px, feat => feat===searchMarker.feat, { hitTolerance:14 });
    if (hit) { vmap.removeLayer(searchMarker.lyr); searchMarker=null; return; }
  }
  let hitMk = false;
  vmap.forEachFeatureAtPixel(px, feat => {
    if (hitMk) return;
    const m = markers.find(mk => mk.feat===feat);
    if (m) { hitMk=true; showEditInput(m); }
  }, { hitTolerance:16 });
  if (hitMk) return;
  const nearPoly = findNearPoly(px, 10);
  if (nearPoly) { showPolyMenu(lastCX||e.clientX, lastCY||e.clientY, nearPoly); return; }
  showMarkerInput(coord);
}

/* ════════════════════════════════════

// ── Ctrl+C: 선택 항목의 '객체'를 복사 (임시/영구 관계없이). 목록복사는 📋 복사 버튼에서만. ──
//   ① 디스크경로 있고 서버 연결됨 → 실제 파일 복사(copy_files)  ② 그 외 사진 → 이미지 클립보드 복사
function copySelectedFiles(){
  const filtered=getFilteredItems();
  const items=[...selectedItems].sort((a,b)=>a-b).map(i=>filtered[i]).filter(Boolean);
  const paths=[...new Set(items.map(it=>it.path||it._srcKmz).filter(Boolean))];
  if(paths.length&&window.__wsReady&&window.__wsReady()){
    window.__wsSend({type:'copy_files',paths});      // 실제 파일 복사(탐색기에 붙여넣기 가능)
    if(window.__setBadge)window.__setBadge(true,'📎 파일 복사 중…');
    return;
  }
  // 서버 경로 없음/서버 미연결 → 사진이면 이미지를 클립보드로 복사 (목록복사 아님)
  const photo=[...items].reverse().find(it=>it.type==='photo'&&it.imgSrc)||items.find(it=>it.imgSrc);
  if(photo){copyPhotoImageToClipboard(photo);return;}
  if(window.__setBadge)window.__setBadge(true,'⚠️ 복사할 사진/파일이 없습니다 (목록 복사는 📋 복사)');
}
// 사진 이미지를 클립보드에 복사 (ClipboardItem 에 Promise 전달 → 사용자 제스처 유지, PNG 변환)
function copyPhotoImageToClipboard(item){
  const src=item&&item.imgSrc;
  if(!src)return;
  try{
    const blobPromise=(async()=>{
      const img=new Image();
      await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=src;});
      const c=document.createElement('canvas');
      c.width=img.naturalWidth||img.width;c.height=img.naturalHeight||img.height;
      c.getContext('2d').drawImage(img,0,0);
      return await new Promise(r=>c.toBlob(r,'image/png'));
    })();
    navigator.clipboard.write([new ClipboardItem({'image/png':blobPromise})])
      .then(()=>window.__setBadge&&window.__setBadge(true,'🖼 사진 복사됨 (클립보드)'))
      .catch(err=>{console.warn('이미지 클립보드 복사 실패',err);window.__setBadge&&window.__setBadge(true,'⚠️ 사진 복사 실패');});
  }catch(e){console.warn(e);}
}

// ── 드롭 사진 중복 방지 + 디스크경로 확보 ──
// 이미 영구 삽입된 같은 파일(파일명)이 있으면 true — 재삽입(드래그) 중복 방지.
function hasItemByFileName(fileName){
  const base=String(fileName||'').toLowerCase();
  if(!base)return false;
  return allItems.some(it=>it.type==='photo'&&!it._live&&(
    (it.path&&String(it.path).toLowerCase().split(/[\\/]/).pop()===base)||
    (it._fname&&String(it._fname).toLowerCase()===base)));
}
// 드래그&드롭된 사진은 브라우저가 원본 경로를 몰라 path 가 없다 → 서버(최근 탐색기 선택)에서
// 파일명으로 실제 디스크 경로를 받아 item.path 에 채운다(Ctrl+C 파일복사·재삽입 중복판정용).
let _pendingPathResolve=[];
function requestPathResolve(item,fileName){
  if(!item||item.path||!fileName)return;
  item._fname=fileName;
  if(!(window.__wsReady&&window.__wsReady()))return;
  _pendingPathResolve.push(item);
  window.__wsSend({type:'resolve_paths',names:[fileName]});
}
function applyResolvedPaths(map){
  const still=[];
  for(const it of _pendingPathResolve){
    const b=(it._fname||'').toLowerCase();
    if(map&&map[b]){if(!it.path)it.path=map[b];}
    else still.push(it);
  }
  _pendingPathResolve=still;
}

function toggleDraw() { drawing ? endDraw() : startDraw(); }
function setMarkersDimmed(dim){
  // 선그리기 중 마커를 옅게 표시 (영역 차지 안 하는 느낌 + 선이 잘 보이게)
  // 레이어 opacity가 안 먹는 OL 빌드(VWorld 번들)도 있어 마커 스타일 자체에도 알파 적용
  const a=dim?0.35:1;
  markers.forEach(m=>{try{
    m.lyr.setOpacity(a);
    m.feat.setStyle(m.isPhoto?mkPhotoStyle(a):mkNormalStyle(a));
  }catch(e){}});
}
// ══ 엑셀식 색상 팔레트 (선 색상 선택 · 트랙 색 변경 공용) ══
const PALETTE_COLORS = [
  '#000000','#404040','#808080','#BFBFBF','#FFFFFF','#C00000','#FF0000','#FFC000','#FFFF00','#92D050',
  '#00B050','#00B0F0','#0070C0','#002060','#7030A0','#FF6600','#00B0A0','#E91E63','#795548','#2E86C1'
];
let currentDrawColor = '#FF0000';
let _paletteOnPick = null;
(function buildPalette(){
  const grid=document.querySelector('#colorPalette .pal-grid'); if(!grid)return;
  PALETTE_COLORS.forEach(c=>{
    const b=document.createElement('button');

function hideColorPalette(){const p=document.getElementById('colorPalette');if(p)p.classList.remove('show');_paletteOnPick=null;}
function openColorPalette(anchorEl,onPick){
  const p=document.getElementById('colorPalette');if(!p)return;
  _paletteOnPick=onPick; p.classList.add('show');
  const r=anchorEl.getBoundingClientRect();
  const pw=p.offsetWidth||230, ph=p.offsetHeight||90;
  let left=Math.min(r.left,innerWidth-pw-8);
  let top=r.bottom+4; if(top+ph>innerHeight)top=r.top-ph-4;

}
document.addEventListener('click',e=>{const p=document.getElementById('colorPalette');if(p&&p.classList.contains('show')&&!p.contains(e.target)&&e.target.id!=='drawColorBtn'&&!e.target.classList.contains('track-swatch'))hideColorPalette();});
// 툴바 색상 버튼 → 팔레트. 선택된 트랙이 있으면 그 색을 바로 변경, 없으면 그릴 선 색 설정.
document.getElementById('drawColorBtn').onclick=function(e){
  e.stopPropagation();
  const btn=this;
  const selTracks=[...selectedItems].map(i=>getFilteredItems()[i]).filter(it=>it&&it.type==='track');
  openColorPalette(btn,c=>{
    btn.style.background=c; btn.blur(); currentDrawColor=c;   // 버튼색 = 그릴 선 색
    if(selTracks.length){
      selTracks.forEach(it=>recolorTrackV(it,c));            // 선택된 트랙 색도 변경
      if(window.showSaveStatus)showSaveStatus(`🎨 트랙 ${selTracks.length}개 색상 변경`);
    }
  });
};
// 트랙 색 변경 — OL 은 피처 재스타일로 즉시 반영 (굵기는 유지)
function recolorTrackV(item,color){
  if(!item||!item.polyLyr)return;
  item.polyLyr.getSource().getFeatures().forEach(f=>{
    let w=3; try{w=(f.getStyle().getStroke().getWidth())||3;}catch(e){}
    f.setStyle(lineSt(color,w));
  });
  item.polyLyr._color=color; item._origColor=color;
  renderList(); if(typeof updateTrackHighlights==='function')updateTrackHighlights();
}
function trackColorOf(item){return (item&&(item._origColor||(item.polyLyr&&item.polyLyr._color)))||'#1e8449';}
// 트랙 굵기 변경 — 색은 유지하고 두께만 재스타일
function resizeTrackV(item,width){
  if(!item||!item.polyLyr)return;
  const w=Math.max(1,parseInt(width,10)||3);
  const color=item.polyLyr._color||'#FF0000';
  item.polyLyr.getSource().getFeatures().forEach(f=>f.setStyle(lineSt(color,w)));
  item.polyLyr._width=w; item._origWeight=w;
  renderList(); if(typeof updateTrackHighlights==='function')updateTrackHighlights();
}
// 두께 드롭다운 변경 → 선택된 트랙이 있으면 그 굵기 변경 (없으면 앞으로 그릴 선 두께로만 쓰임)
document.getElementById('drawWidth').addEventListener('change',function(){
  const w=Math.max(1,parseInt(this.value,10)||3);
  const selTracks=[...selectedItems].map(i=>getFilteredItems()[i]).filter(it=>it&&it.type==='track');
  if(selTracks.length){
    selTracks.forEach(it=>resizeTrackV(it,w));
    if(window.showSaveStatus)showSaveStatus(`📏 트랙 ${selTracks.length}개 굵기 ${w}px`);
  }
});
// 툴바에서 고른 선 색상·두께 (없으면 빨강 3px)
function _drawStyle(){
  const dw=document.getElementById('drawWidth');
  return {color:currentDrawColor||'#FF0000', width:Math.max(1,parseInt((dw&&dw.value)||'3',10)||3)};
}
function startDraw() {
  if (drawing) return;
  drawing=true; drawCoords=[];
  const ds=_drawStyle();
  drawLayer=mkLineLyr([],ds.color,ds.width); drawLayer._color=ds.color; drawLayer._width=ds.width; addLyr(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').textContent='선 그리기 중지';
  setMarkersDimmed(true);
}
function endDraw() {
  if (!drawing) return;
  drawing=false; clearGuide();
  document.getElementById('vmap').classList.remove('draw-mode');
  document.getElementById('drawBtn').textContent='선 그리기(Alt)';
  setMarkersDimmed(false);
  if (drawCoords.length>=2 && drawLayer) {
    polylines.push(drawLayer);
    const name = `트랙${++trackCounter}`;
    const item = {type:'track', name, address:'', polyLyr:drawLayer};
    allItems.push(item);
    if(trackNameOrgActive){
      const markerItems=allItems.filter(i=>i.mkObj&&!isDefaultName(i.name));
      if(markerItems.length){
        const coords=getCoords(drawLayer);
        if(coords.length){
          const mid=coords[Math.floor(coords.length/2)];
          let nearest=null,minDist=Infinity;
          markerItems.forEach(m=>{const d=haversine(mid,m.mkObj.feat.getGeometry().getCoordinates());if(d<minDist){minDist=d;nearest=m;}});
          if(nearest){trackOrigNames.set(item,name);item.name=nearest.name;}
        }
      }
    }
    if (allItems.length===1) openSidebar();
    renderList();
    fetchAddrForItem(item);
    const addedLyr=drawLayer;
    pushHistory({
      undo(){removeLyr(addedLyr);polylines=polylines.filter(p=>p!==addedLyr);allItems=allItems.filter(i=>i!==item);},
      redo(){addLyr(addedLyr);polylines.push(addedLyr);allItems.push(item);if(allItems.length===1)openSidebar();}
    });
  } else if (drawLayer) removeLyr(drawLayer);
  drawLayer=null; drawCoords=[];
}
function refreshDraw() {
  if (!drawLayer) return;
  const src=drawLayer.getSource(); src.clear();
  const col=drawLayer._color||'#FF0000', wd=drawLayer._width||3;
  if (drawCoords.length>=2) { const f=new ol.Feature(new ol.geom.LineString(drawCoords)); f.setStyle(lineSt(col,wd)); src.addFeature(f); }
  else if (drawCoords.length===1) { const f=new ol.Feature(new ol.geom.Point(drawCoords[0])); f.setStyle(new ol.style.Style({image:new ol.style.Circle({radius:5,fill:new ol.style.Fill({color:col}),stroke:new ol.style.Stroke({color:'white',width:1.5})})})); src.addFeature(f); }
  drawLayer._coords=drawCoords.slice();
}

/* 레이어/스타일 헬퍼 */
function lineSt(color,width){return new ol.style.Style({stroke:new ol.style.Stroke({color,width})});}
function mkLineLyr(coords,color,width){
  const src=new ol.source.Vector();
  if(coords.length>=2){const f=new ol.Feature(new ol.geom.LineString(coords));f.setStyle(lineSt(color,width));src.addFeature(f);}
  const lyr=new ol.layer.Vector({source:src,zIndex:100});lyr._color=color;lyr._width=width;lyr._coords=coords.slice();return lyr;
}
function getCoords(lyr){const fs=lyr.getSource().getFeatures();return fs.length?fs[0].getGeometry().getCoordinates():(lyr._coords||[]);}
// 한 레이어의 '모든' 선 좌표(멀티 피처) — 내보내기/길이/히트테스트용. getCoords 는 대표(첫) 피처만.
function coordParts(lyr){
  const fs=lyr.getSource().getFeatures().filter(f=>f.getGeometry() instanceof ol.geom.LineString);
  return fs.length?fs.map(f=>f.getGeometry().getCoordinates()):((lyr._coords&&lyr._coords.length)?[lyr._coords]:[]);
}
// 묶음객체(여러 선을 한 항목에 담은 트랙 — htm 색상묶음/KMZ MultiGeometry) 여부.
// 주소·연장이 의미 없으므로 목록에 '묶음객체'로만 표시하고 주소조회도 건너뛴다. (map.html isBundleItem 대응)
function isBundleItemV(item){
  return !!(item&&item.type==='track'&&item.polyLyr&&coordParts(item.polyLyr).length>1);
}

/* 한 Placemark의 여러 도형(MultiGeometry/폴리곤 링)을 한 레이어에 전부 담기 */
function mkMultiLineLyr(coordsArrays,color,width){
  const src=new ol.source.Vector();
  for(const cs of coordsArrays){if(cs&&cs.length>=2){const f=new ol.Feature(new ol.geom.LineString(cs));f.setStyle(lineSt(color,width));src.addFeature(f);}}
  const lyr=new ol.layer.Vector({source:src,zIndex:100});lyr._color=color;lyr._width=width;lyr._coords=(coordsArrays[0]||[]);return lyr;
}

// 트랙(선) 항목 -> KML Placemark. 레이어의 모든 피처를 MultiGeometry 한 개로 묶고(과거: 첫 피처만),
// styles(Map)에 색·굵기를 모아 <Style id="ln_RRGGBB_W"> 공유(다시 열어도 같은 색). map.html 과 동일 형식.
function _lineKmlPlacemarksV(item,nnm,ext,styles){
  const l=item.polyLyr; if(!l)return'';
  const nm=esc(nnm?.get(l)||item.name||'');
  let su='';
  if(styles){
    const hex=((l._color||'#1e8449')+'').replace('#','');
    const w=l._width||3;
    const key=hex+'_'+w;
    if(!styles.has(key))styles.set(key,'ln_'+key);
    su=`<styleUrl>#${styles.get(key)}</styleUrl>`;
  }
  const segs=[];
  for(let cs of coordParts(l)){
    if(ext)cs=cs.filter(c=>ol.extent.containsCoordinate(ext,c));   // 현재영역 저장: 영역 안 점만
    if(cs.length<2)continue;
    const coords=cs.map(c=>{const ll=fromMerc(c);return`${ll[0]},${ll[1]},0`;}).join(' ');
    segs.push(`<LineString><coordinates>${coords}</coordinates></LineString>`);
  }
  if(!segs.length)return'';
  const geom=segs.length===1?segs[0]:`<MultiGeometry>${segs.join('')}</MultiGeometry>`;
  return`<Placemark><name>${nm}</name>${su}${geom}</Placemark>\n`;
}
// styles(Map: 'RRGGBB_w' -> id) -> KML <Style> 정의 (KML 색은 aabbggrr)
function _lineKmlStyleDefsV(styles){
  let out='';
  for(const[key,id]of styles){
    const[hex,w]=key.split('_');
    out+=`<Style id="${id}"><LineStyle><color>ff${hex.slice(4,6)}${hex.slice(2,4)}${hex.slice(0,2)}</color><width>${w}</width></LineStyle></Style>\n`;
  }
  return out;
}

/* CAD 문자(point 모드) 텍스트 라벨 — 마커 없이 글자만(회전 포함) */
let textLabelLyr=null;
function _ensureTextLabelLyr(){
  if(!textLabelLyr){textLabelLyr=new ol.layer.Vector({source:new ol.source.Vector(),zIndex:120});addLyr(textLabelLyr);}
  return textLabelLyr;
}
function addTextLabelV(coord,text,rot,color){
  const col=/^#[0-9a-fA-F]{6}$/.test(color||'')?color:'#FFEB00';
  const f=new ol.Feature(new ol.geom.Point(coord));
  f.setStyle(new ol.style.Style({text:new ol.style.Text({
    text:String(text==null?'':text),
    font:'bold 13px sans-serif',
    fill:new ol.style.Fill({color:col}),
    stroke:new ol.style.Stroke({color:'#000',width:3}),
    rotation:-(Number(rot)||0)*Math.PI/180,   // CAD 반시계 -> OL 시계(부호 반전)
    rotateWithView:true, overflow:true })}));
  _ensureTextLabelLyr().getSource().addFeature(f);
}
function clearTextLabelsV(){ if(textLabelLyr){textLabelLyr.getSource().clear();} }

/* 가이드선 & 거리 */
function updateGuide(from,to){
  if(guideLine){removeLyr(guideLine);guideLine=null;}
  guideLine=mkLineLyr([from,to],'#FF6666',1.5);addLyr(guideLine);
  const all=[...drawCoords,to];let dist=0;for(let i=1;i<all.length;i++)dist+=haversine(all[i-1],all[i]);
  const fmt=d=>d<1000?`${d.toFixed(1)}m`:`${(d/1000).toFixed(2)}km`;
  if(!distEl){distEl=document.createElement('div');distEl.className='dist-tip';}
  distEl.textContent=`총거리 ${fmt(dist)}`;
  if(!distOv){distOv=new ol.Overlay({element:distEl,offset:[8,-18],positioning:'bottom-left'});vmap.addOverlay(distOv);}
  distOv.setPosition(to);
}
function clearGuide(){if(guideLine){removeLyr(guideLine);guideLine=null;}if(distOv){vmap.removeOverlay(distOv);distOv=null;}distEl=null;}
function haversine(c1,c2){const[lo1,la1]=fromMerc(c1),[lo2,la2]=fromMerc(c2);const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

/* 선 근처 탐색 */
function findNearPoly(pixel,thr){let near=null,minD=Infinity;polylines.forEach(lyr=>{for(const cs of coordParts(lyr)){for(let i=0;i<cs.length-1;i++){const a=vmap.getPixelFromCoordinate(cs[i]),b=vmap.getPixelFromCoordinate(cs[i+1]);if(!a||!b)continue;const d=ptSegDist(pixel,a,b);if(d<minD){minD=d;near=lyr;}}}});return minD<=thr?near:null;}
function ptSegDist(p,a,b){const dx=b[0]-a[0],dy=b[1]-a[1];if(!dx&&!dy)return Math.hypot(p[0]-a[0],p[1]-a[1]);const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));}

/* 단축키 */
document.addEventListener('keydown', e => {
  if (e.key==='F1'){e.preventDefault();openHelp();return;}
  if (e.ctrlKey&&e.shiftKey&&e.key.toLowerCase()==='v'){e.preventDefault();insertLiveObjects();return;}
  // Insert 키 — 임시 객체 영구 삽입(확정) (입력창 제외)
  if (e.key==='Insert'&&!e.target.matches('input,textarea,select')){e.preventDefault();insertLiveObjects();return;}
  if (e.key==='Escape'){
    if(locPickMode){stopLocationPick();clearLocationPick(false);showSaveStatus('위치 검색 선택 취소됨');e.preventDefault();return;}
    if(roadviewPickMode){stopRoadviewPick();showSaveStatus('로드뷰 선택 취소됨');e.preventDefault();return;}
    if(movingMk){
      // 이동 취소: ghost 제거, 실제 마커를 원래 위치로 복원
      if(movingGhost){vmap.removeOverlay(movingGhost);movingGhost=null;}
      if(movingMk._prevCoord){movingMk.feat.getGeometry().setCoordinates(movingMk._prevCoord);delete movingMk._prevCoord;}
      movingMk.feat.setStyle(movingMk.isPhoto?mkPhotoStyle():mkNormalStyle());
      movingMk=null;isDraggingMk=false;document.body.style.cursor='';
      vmap.getInteractions().forEach(i=>{if(i instanceof ol.interaction.DragPan)i.setActive(true);});
      e.preventDefault();return;
    }
    if(inputOv){closeInputOv();e.preventDefault();return;}
  }
  if (e.key==='Alt' && !e.repeat){e.preventDefault();toggleDraw();return;}   // Alt 한 번 누름만 토글(자동반복 무시)
  if (e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();doExport();return;}
  if (e.ctrlKey&&e.key.toLowerCase()==='c'&&!getSelection().toString()){
    e.preventDefault();
    if (selectedItems.size > 0) {
      copySelectedFiles();   // Ctrl+C: 실제 파일 복사 (복사버튼은 목록 복사 유지)
    } else {
      copyAndMark();
    }
    return;
  }
  if (drawing&&(e.key==='Backspace'||e.key==='Escape'||(e.ctrlKey&&e.key.toLowerCase()==='z'))){e.preventDefault();drawCoords.pop();refreshDraw();if(!drawCoords.length)clearGuide();return;}
  if (!drawing&&e.ctrlKey&&e.key.toLowerCase()==='z'&&!e.target.matches('input,textarea,select')){e.preventDefault();doUndo();return;}
  if (!drawing&&e.ctrlKey&&(e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))&&!e.target.matches('input,textarea,select')){e.preventDefault();doRedo();return;}

  // 목록 단축키 (사이드바가 열려있고 일반 input 포커스가 없을 때)
  const listEl=document.getElementById('photoListWrapper');
  const sidebarOpen=document.getElementById('sidebar').style.display!=='none';
  const inInput=e.target.matches('input,textarea,select');
  if (e.key==='Delete'&&selectedItems.size>0&&sidebarOpen&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    const toDelete=[...selectedItems].map(i=>filtered[i]).filter(Boolean);
    if(!toDelete.length)return;
    const deletedInfos=toDelete.map(item=>({item,allIdx:allItems.indexOf(item)}));
    toDelete.forEach(item=>{
      if(item.mkObj){removeLyr(item.mkObj.lyr);if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);markers=markers.filter(m=>m!==item.mkObj);}
      if(item.polyLyr){removeLyr(item.polyLyr);polylines=polylines.filter(p=>p!==item.polyLyr);}
    });
    allItems=allItems.filter(i=>!toDelete.includes(i));
    selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();renderList();
    pushHistory({
      undo(){deletedInfos.slice().sort((a,b)=>a.allIdx-b.allIdx).forEach(({item,allIdx})=>{
        if(item.mkObj){addLyr(item.mkObj.lyr);markers.push(item.mkObj);}
        if(item.polyLyr){addLyr(item.polyLyr);polylines.push(item.polyLyr);}
        allItems.splice(Math.min(allIdx,allItems.length),0,item);
      });},
      redo(){deletedInfos.forEach(({item})=>{
        if(item.mkObj){removeLyr(item.mkObj.lyr);if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);markers=markers.filter(m=>m!==item.mkObj);}
        if(item.polyLyr){removeLyr(item.polyLyr);polylines=polylines.filter(p=>p!==item.polyLyr);}
        allItems=allItems.filter(i=>i!==item);
      });}
    });
    return;
  }
  if (e.ctrlKey&&e.key.toLowerCase()==='a'&&(document.activeElement===listEl||sidebarOpen)&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    filtered.forEach((_,i)=>selectedItems.add(i));
    document.querySelectorAll('#photoTbody tr').forEach((r,i)=>r.classList.toggle('selected',selectedItems.has(i)));
    return;
  }
  if (e.key==='Enter'&&sidebarOpen&&!inInput&&lastClickedIdx>=0){
    e.preventDefault();
    const filtered=getFilteredItems();
    const item=filtered[lastClickedIdx];
    const rows=document.querySelectorAll('#photoTbody tr');
    const tr=rows[lastClickedIdx];
    if(tr&&item)startEditItem(tr,item,lastClickedIdx);
    return;
  }
  const _srm=document.getElementById('searchResultModal');
  if(_srm&&_srm.style.display!=='none'&&(e.key==='ArrowUp'||e.key==='ArrowDown'))return;   // 검색결과 모달이 ↑↓ 전담
  if ((e.key==='ArrowUp'||e.key==='ArrowDown')&&sidebarOpen&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    if(!filtered.length)return;
    let newIdx=lastClickedIdx<0?0:lastClickedIdx+(e.key==='ArrowDown'?1:-1);
    newIdx=Math.max(0,Math.min(filtered.length-1,newIdx));
    if(newIdx===lastClickedIdx)return;
    if(e.shiftKey){
      selectedItems.add(newIdx);
    }else{
      selectedItems.clear();selectedItems.add(newIdx);anchorIdx=newIdx;
    }
    document.querySelectorAll('#photoTbody tr').forEach((r,i)=>r.classList.toggle('selected',selectedItems.has(i)));
    selectFilteredItem(newIdx);
    updateTrackHighlights();   // 방향키로 트랙 이동 시에도 강조(굵게) 표시 (마우스 클릭과 동일)
    return;
  }
});

function mkNormalStyle(alpha=1){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:`rgba(229,57,53,${alpha})`}),stroke:new ol.style.Stroke({color:`rgba(255,255,255,${alpha})`,width:1.5})})});}
function mkPhotoStyle(alpha=1){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:`rgba(21,101,192,${alpha})`}),stroke:new ol.style.Stroke({color:`rgba(255,255,255,${alpha})`,width:1.5})})});}
// 선택된 사진 마커 강조 스타일 (주황·크게 — 구분용)
function mkPhotoSelStyle(){return new ol.style.Style({image:new ol.style.Circle({radius:11,fill:new ol.style.Fill({color:'#ff9800'}),stroke:new ol.style.Stroke({color:'#fff',width:3})}),zIndex:50});}
// 선택된 사진 마커만 강조, 나머지 사진 마커는 파란 원으로 복원
function highlightPhotoMarkersV(selItem){
  allItems.forEach(i=>{
    if(i.type==='photo'&&i.mkObj&&i.mkObj.feat){
      const on=(i===selItem);
      try{ i.mkObj.feat.setStyle(on?mkPhotoSelStyle():mkPhotoStyle()); }catch(e){}
      // 마커는 각각 별도 레이어라 스타일 zIndex만으론 안 됨 — 레이어 zIndex로 맨 앞에
      try{ if(i.mkObj.lyr&&i.mkObj.lyr.setZIndex)i.mkObj.lyr.setZIndex(on?300:100); }catch(e){}
    }
  });
  // 구버전 OL(VWorld 번들)은 layer zIndex가 안 먹을 수 있음 → 선택 레이어를 맨 뒤(최상단)로 재추가
  if(selItem&&selItem.type==='photo'&&selItem.mkObj&&selItem.mkObj.lyr){
    try{ vmap.removeLayer(selItem.mkObj.lyr); vmap.addLayer(selItem.mkObj.lyr); }catch(e){}
  }
}

function addMarker(coord, name, addr) {
  const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});
  feat.setStyle(mkNormalStyle());
  const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});
  addLyr(lyr);
  const obj={feat,lyr,ov:null,name,addr:addr||'',isPhoto:false,imgSrc:null};
  markers.push(obj);
  const item={type:'marker',name,address:addr||'',mkObj:obj};
  allItems.push(item);
  if(bulkLoading)return obj;        // 대량 로드: 렌더/주소/히스토리는 loadKMZ가 끝나고 한 번에
  if(allItems.length===1)openSidebar();
  renderList();
  if(!addr) fetchAddrForItem(item);
  pushHistory({
    undo(){removeLyr(obj.lyr);if(obj.ov)vmap.removeOverlay(obj.ov);markers=markers.filter(m=>m!==obj);allItems=allItems.filter(i=>i!==item);},
    redo(){addLyr(obj.lyr);markers.push(obj);allItems.push(item);if(allItems.length===1)openSidebar();}
  });
  return obj;
}

function addPhotoMarker(coord, imgSrc, name, fileHandle=null, takenDate='') {
  const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});
  feat.setStyle(mkPhotoStyle());

  addLyr(lyr);
  const obj={feat,lyr,ov:null,name,addr:'',isPhoto:true,imgSrc,fileHandle};
  markers.push(obj);
  const item={type:'photo',name,address:'',mkObj:obj,imgSrc,fileHandle,takenDate:takenDate||''};
  allItems.push(item);
  if(bulkLoading)return obj;        // 대량 로드: 렌더/주소/히스토리는 loadKMZ가 끝나고 한 번에
  if(allItems.length===1)openSidebar();
  renderList();
  fetchAddrForItem(item);
  pushHistory({
    undo(){removeLyr(obj.lyr);if(obj.ov)vmap.removeOverlay(obj.ov);markers=markers.filter(m=>m!==obj);allItems=allItems.filter(i=>i!==item);},
    redo(){addLyr(obj.lyr);markers.push(obj);allItems.push(item);if(allItems.length===1)openSidebar();}

function fetchAddrForItem(item) {
  if (item.mkObj) {
    const coord=item.mkObj.feat.getGeometry().getCoordinates();
    const ll=fromMerc(coord);
    reverseGeocode(ll[0],ll[1],(addr,pnu)=>{item.address=addr;item.pnu=pnu;item.mkObj.addr=addr;renderList();});
  } else if (item.polyLyr) {
    if(isBundleItemV(item))return;   // 묶음객체는 주소 의미 없음('묶음객체' 표시)
    const coords=getCoords(item.polyLyr);
    if(!coords.length)return;
    const mid=coords[Math.floor(coords.length/2)];
    const ll=fromMerc(mid);
    reverseGeocode(ll[0],ll[1],(addr,pnu)=>{item.address=addr;item.pnu=pnu;renderList();});
  }
}

// 대량 로드(KMZ) 뒤 주소 일괄 조회 — 한 번에 쏟지 않고 천천히 (VWorld 과호출 방지). map.html queueAddrFetch 대응.
let _addrQueue=[], _addrRunning=false, _addrRenderT=null;
function _scheduleAddrRenderV(){ if(_addrRenderT)return; _addrRenderT=setTimeout(()=>{_addrRenderT=null;renderList();},300); }
function _itemLatLngV(item){
  if(item.mkObj)return fromMerc(item.mkObj.feat.getGeometry().getCoordinates());
  if(item.polyLyr){
    if(isBundleItemV(item))return null;
    const coords=getCoords(item.polyLyr);
    if(!coords.length)return null;
    return fromMerc(coords[Math.floor(coords.length/2)]);
  }
  return null;
}
function queueAddrFetch(items){
  for(const it of items){
    // 주소 없음('' / undefined / null) 또는 로딩표시('…')면 조회 대상. 묶음객체는 제외.
    if(it && !isBundleItemV(it) && (!it.address || it.address==='…')) _addrQueue.push(it);
  }
  if(!_addrRunning)_runAddrQueueV();
}
function _runAddrQueueV(){
  if(!_addrQueue.length){_addrRunning=false;renderList();return;}
  _addrRunning=true;
  const it=_addrQueue.shift();
  if(!allItems.includes(it)){_runAddrQueueV();return;}   // 이미 제거된 항목 skip
  const ll=_itemLatLngV(it);
  if(!ll){setTimeout(_runAddrQueueV,0);return;}
  reverseGeocode(ll[0],ll[1],(addr,pnu)=>{
    it.address=addr; it.pnu=pnu; if(it.mkObj)it.mkObj.addr=addr;
    _scheduleAddrRenderV();
    setTimeout(_runAddrQueueV,80);   // 약 12건/초로 제한
  });
}

function fmtDist(d) {
  if(d<1000)return d<100?`${d.toFixed(1)}m`:`${Math.round(d)}m`;
  return`${(d/1000).toFixed(2)}km`;
}
// 트랙 전체연장(m) — 묶음선 모든 파트 합산
function trackLenNumV(item){
  if(!item||item.type!=='track'||!item.polyLyr)return 0;
  let d=0;
  for(const coords of coordParts(item.polyLyr))
    for(let i=1;i<coords.length;i++)d+=haversine(coords[i-1],coords[i]);
  return d;
}
// 목록 컬럼용 헬퍼 (연장·촬영일시·Geohash)
function itemLenStrV(item){ const d=trackLenNumV(item); return d?fmtDist(d):''; }
function itemTakenV(item){ return (item&&item.takenDate)?String(item.takenDate):''; }
function itemGeohashV(item){ if(isBundleItemV(item))return''; const c=getItemCenterCoordV(item); if(!c)return''; const ll=fromMerc(c); return geohashEncode(ll[1],ll[0],8); }
// ── Geohash 인코딩 (표준 base32, 기본 8자리 ≈ ±19m) ──
function geohashEncode(lat,lng,prec){
  prec=prec||8;
  const b32='0123456789bcdefghjkmnpqrstuvwxyz';
  let idx=0,bit=0,evenBit=true,gh='';
  let latMin=-90,latMax=90,lngMin=-180,lngMax=180;
  while(gh.length<prec){
    if(evenBit){const mid=(lngMin+lngMax)/2;if(lng>=mid){idx=idx*2+1;lngMin=mid;}else{idx=idx*2;lngMax=mid;}}
    else{const mid=(latMin+latMax)/2;if(lat>=mid){idx=idx*2+1;latMin=mid;}else{idx=idx*2;latMax=mid;}}
    evenBit=!evenBit;
    if(++bit===5){gh+=b32[idx];bit=0;idx=0;}
  }
  return gh;
}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();if(!vmap)return;
  let noGPS=null;
  const files=Array.from(e.dataTransfer.files);
  // 파일 핸들 수집 (드롭 이벤트 내에서만 getAsFileSystemHandle 호출 가능)
  const fhMap=new Map();
  if(e.dataTransfer.items){
    Array.from(e.dataTransfer.items).forEach((it,i)=>{
      if(it.kind==='file'&&typeof it.getAsFileSystemHandle==='function'){
        const f=files[i];
        if(f)fhMap.set(f, it.getAsFileSystemHandle().catch(()=>null));
      }
    });
  }
  const imageFiles=files.filter(isImageFile);
  const otherFiles=files.filter(f=>!imageFiles.includes(f));
  otherFiles.forEach(file=>{
    const n=file.name.toLowerCase();
    if(n.endsWith('.kmz')||n.endsWith('.zip'))loadKMZ(file);
    else if(n.endsWith('.gpx'))loadGPX(file);
    else if(n.endsWith('.csv'))loadCSV(file);
    else if(n.endsWith('.htm')||n.endsWith('.html'))loadHTM(file);
  });
  if(imageFiles.length>0){
    const photoPts=[];let doneCount=0;
    const _doneStep=()=>{doneCount++;if(doneCount===imageFiles.length&&photoPts.length>0)fitPts(photoPts);};
    imageFiles.forEach(file=>{
      // 탐색기에서 임시삽입(미리보기) 중인 그 파일을 드래그 → 임시항목을 그대로 영구 확정(중복 방지·경로 유지)
      if(window.__promoteMatchingLive&&window.__promoteMatchingLive(file.name)){_doneStep();return;}
      // 이미 영구 삽입된 같은 파일(파일명)이면 다시 삽입하지 않음 (재삽입 중복 방지)
      if(hasItemByFileName(file.name)){window.__setBadge&&window.__setBadge(true,`이미 삽입됨: ${file.name}`);_doneStep();return;}
      loadImage(file,()=>noGPS,v=>noGPS=v,coord=>{
        if(coord)photoPts.push(coord);_doneStep();
      },fhMap.get(file)||null);
    });
  }
});

    list.querySelectorAll('.sr-row').forEach(r=>{r.dataset.sel='';r.style.background='';});
    const {row,it}=rows[idx];
    row.dataset.sel='1';row.style.background='#d6eaf8';
    row.scrollIntoView({block:'nearest'});
    if (typeof it.lat !== 'number' || typeof it.lng !== 'number') {
      let _mo=document.getElementById('mapCenterMsg');
      if(!_mo){_mo=document.createElement('div');_mo.id='mapCenterMsg';_mo.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;pointer-events:none;z-index:90000;transition:opacity .4s;';document.getElementById('vmap').appendChild(_mo);}
      _mo.textContent='📍 위치 정보 없음'; _mo.style.opacity='1';
      clearTimeout(_mo._t); _mo._t=setTimeout(()=>{_mo.style.opacity='0';},2000);
    }
    if (modal._srMapOn && typeof it.lat === 'number' && typeof it.lng === 'number') {
      // 목록에서 선택: 번호가 화면 안에 보이면 이동 안 함, 화면 밖일 때만 중심 이동.
      // 지도 번호 클릭(fromMap): 이동 안 함.
      const coord = ol.proj.fromLonLat([it.lng, it.lat]);
      if (!fromMap && !holdView && !ol.extent.containsCoordinate(vmap.getView().calculateExtent(vmap.getSize()), coord))
        vmap.getView().setCenter(coord);   // Hold 켜짐 → 화면 이동 안 함
      // 이전 선택 마커 → 빨강 복원
      if (modal._srSelectedIdx !== undefined && modal._srSelectedIdx !== idx) {
        const po = modal._srMapOvMap[modal._srSelectedIdx];
        if (po) { po.getElement().style.background='#e74c3c'; const pc=po.getElement().parentElement; if(pc) pc.style.zIndex='900'; }
      }
      // 현재 선택 마커 → 녹색 + 맨앞
      const co = modal._srMapOvMap[idx];
      if (co) { co.getElement().style.background='#27ae60'; const cc=co.getElement().parentElement; if(cc) cc.style.zIndex='960'; }
      modal._srSelectedIdx = idx;
    }
    onPick(it);   // 지도표시 중에도 사진 미리보기는 항상 실행
  }
  modal._moveSel=dir=>{
    if(!rows.length)return;
    let n=curIdx<0?(dir>0?0:rows.length-1):curIdx+dir;
    n=Math.max(0,Math.min(rows.length-1,n));
    selectAt(n);
  };
  modal._srSelectAt=selectAt;

  function mkOneSrOv(it,idx){
    if(typeof it.lat!=='number'||typeof it.lng!=='number')return null;
    const coord=ol.proj.fromLonLat([it.lng,it.lat]);
    const n=idx+1;
    const el=document.createElement('div');
    el.style.cssText='width:18px;height:18px;border-radius:50%;background:#e74c3c;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;color:white;font-size:8px;font-weight:bold;';
    el.textContent=n<=99?String(n):'·';
    el.title=it.name||'';
    el.onclick=()=>{modal._srSelectAt&&modal._srSelectAt(idx,true);};
    const ov=new ol.Overlay({element:el,positioning:'center-center',stopEvent:true,autoPan:false});
    vmap.addOverlay(ov);
    ov.setPosition(coord);
    // live-pin(연두색) 위에 번호가 오도록 컨테이너 z-index 높임
    requestAnimationFrame(()=>{ const c=el.parentElement; if(c) c.style.zIndex='900'; });
    return ov;
  }

  list.innerHTML='';
  if(!items.length){
    list.innerHTML='<div style="padding:20px;color:#888;text-align:center;">결과 없음</div>';
    selAll.checked=false;selAll.indeterminate=false;selCnt.textContent='0개 선택';
  } else {
    items.forEach((it,idx)=>{
      const row=document.createElement('div');
      row.className='sr-row';
      row.style.cssText='display:flex;align-items:flex-start;gap:8px;padding:8px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:13px;';
      row.onmouseover=()=>{if(row.dataset.sel!=='1')row.style.background='#eef6fc';};
      row.onmouseout=()=>{if(row.dataset.sel!=='1')row.style.background='';};
      const numBadge=document.createElement('span');
      numBadge.className='sr-num';
      numBadge.textContent=String(idx+1);
      numBadge.style.cssText='display:none;min-width:18px;height:18px;border-radius:50%;background:#e74c3c;color:white;font-size:9px;font-weight:bold;flex-shrink:0;align-items:center;justify-content:center;margin-top:2px;';
      const chk=document.createElement('input');
      chk.type='checkbox';chk.className='sr-check';chk.style.marginTop='3px';chk._item=it;
      chk.onclick=e=>{
        e.stopPropagation();
        if(modal._srMapOn){
          if(chk.checked){
            if(!modal._srMapOvMap[idx])modal._srMapOvMap[idx]=mkOneSrOv(it,idx);
          } else {
            if(modal._srMapOvMap&&modal._srMapOvMap[idx]){vmap.removeOverlay(modal._srMapOvMap[idx]);delete modal._srMapOvMap[idx];}
          }
        }
        updateCount();
      };
      const body=document.createElement('div');body.style.flex='1';
      body.innerHTML=fmt?fmt(it):`<b>${escHtml(it.name)}</b>`;
      row.appendChild(chk);row.appendChild(numBadge);row.appendChild(body);
      row.title=it.path||'';
      rows.push({row,it,chk});
      row.onclick=()=>{
        // 선택 모드일 때만 행 클릭으로 체크 토글 (기본은 미리보기만)
        if(selectMode){chk.checked=!chk.checked;updateCount();}
        selectAt(idx);
      };
      list.appendChild(row);
    });
    updateCount();
  }

  selAll.onclick=()=>{
    list.querySelectorAll('.sr-check').forEach(c=>{c.checked=selAll.checked;});
    updateCount();
  };
  saveBtn.style.display=onSaveItems?'':'none';
  saveBtn.onclick=()=>{
    const sel=[...list.querySelectorAll('.sr-check')].filter(c=>c.checked).map(c=>c._item);
    if(!sel.length){alert('저장할 항목을 체크하세요 (전체 선택 가능).');return;}
    if(onSaveItems)onSaveItems(sel);
  };

  // 지도삽입 토글 — ON: 전체 체크+지도표시 / OFF: 전체 해제+오버레이 제거
  mapToggleBtn.onclick=()=>{
    if(modal._srMapOn){
      if(modal._srMapOvMap){Object.values(modal._srMapOvMap).forEach(o=>o&&vmap.removeOverlay(o));}
      modal._srMapOvMap={};
      modal._srMapOn=false; modal._srSelectedIdx=undefined;
      window.__srMapDisplayOn=false;
      mapToggleBtn.style.background='#fff';mapToggleBtn.style.color='#27ae60';mapToggleBtn.textContent='🗺 지도삽입';
      list.querySelectorAll('.sr-check').forEach(c=>{c.checked=false;});
      list.querySelectorAll('.sr-num').forEach(n=>{n.style.display='none';});
      updateCount();
    } else {
      modal._srMapOn=true;
      modal._srMapOvMap={};
      window.__srMapDisplayOn=true;
      mapToggleBtn.style.background='#27ae60';mapToggleBtn.style.color='#fff';mapToggleBtn.textContent='✓ 지도표시 중';
      list.querySelectorAll('.sr-check').forEach(c=>{c.checked=true;});
      list.querySelectorAll('.sr-num').forEach(n=>{n.style.display='flex';});
      updateCount();
      items.forEach((it,idx)=>{
        const o=mkOneSrOv(it,idx);
        if(o)modal._srMapOvMap[idx]=o;
      });
    }
  };

  modal.style.display='flex';
}
