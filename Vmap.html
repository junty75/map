<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KMZ & 사진 지도 (VWorld)</title>
<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=55FD7275-A6F5-3B69-9966-CD4BFA2FD35F"></script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.cjs"></script>
<style>
html,body{height:100%;margin:0;overflow:hidden;font-family:'맑은 고딕',sans-serif;}
#app{display:flex;width:100%;height:100%;overflow:hidden;}

/* ── 사이드바 ── */
#sidebar{width:360px;min-width:160px;display:none;flex-direction:column;background:#eaf4fc;flex-shrink:0;overflow:hidden;border-right:2px solid #85c1e9;}
#sidebarResizer{width:5px;background:#85c1e9;cursor:col-resize;flex-shrink:0;transition:background .15s;display:none;}
#sidebarResizer:hover{background:#2980b9;}
.col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;background:#5dade2;z-index:3;}
.col-resizer:hover{background:#1a73c8;}
#listHeader{background:#2980b9;flex-shrink:0;}
.list-header-top{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;color:#fff;font-size:13px;font-weight:bold;}
#itemCountBadge{background:#e74c3c;color:#fff;border-radius:12px;padding:1px 8px;font-size:11px;font-weight:normal;margin-left:6px;}
#filterTabs{display:flex;background:#5dade2;}
.ftab{flex:1;padding:5px 2px;font-size:11px;border:none;border-right:1px solid #2980b9;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:3px;}
.ftab:last-child{border-right:none;}
.ftab:hover{background:#2e86c1;}
.ftab.active{background:#1a5276;color:#fff;font-weight:bold;}
.vis-check{width:12px;height:12px;cursor:pointer;flex-shrink:0;accent-color:#aef;margin:0;}
.ftab.hidden-type{opacity:0.55;}
#folderBar{background:#d6eaf8;padding:4px 6px;flex-shrink:0;display:flex;align-items:center;gap:6px;border-bottom:1px solid #85c1e9;}
#folderSelectBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#folderSelectBtn:hover{background:#d6eaf8;}
#numToggleBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#numToggleBtn:hover{background:#d6eaf8;}
#numToggleBtn.on{background:#1a5276;color:#fff;border-color:#1a5276;}
#trackNameOrgBtn{font-size:11px;padding:3px 8px;cursor:pointer;background:#fff;border:1px solid #2980b9;border-radius:3px;color:#1a5276;white-space:nowrap;}
#trackNameOrgBtn:hover{background:#d6eaf8;}
#trackNameOrgBtn.on{background:#7d3c98;color:#fff;border-color:#7d3c98;}
.ftab[data-f="track"] span{cursor:pointer;}
.ftab[data-f="track"] span:hover{text-decoration:underline;}
.ftab[data-f="track"] span.track-all-on{color:#FF9F43;font-weight:bold;}
#folderName{font-size:10px;color:#1a5276;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#photoListWrapper{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;outline:none;}
#photoTable{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
#photoTable thead th{background:#2e86c1;color:#fff;padding:5px 6px;text-align:left;position:sticky;top:0;z-index:2;white-space:nowrap;}
#photoTable tbody tr{cursor:pointer;user-select:none;}
#photoTable tbody tr:nth-child(even){background:#d6eaf8;}
#photoTable tbody tr:hover{background:#aed6f1 !important;}
#photoTable tbody tr.selected{background:#7fb3d3 !important;}
#photoTable tbody tr.selected td{color:#0a2744 !important;}
#photoTable tbody td{padding:4px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-bottom:1px solid #b0cfe0;max-width:0;}
.type-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;vertical-align:middle;}
.dot-photo{background:#2471a3;}
.dot-marker{background:#e74c3c;}
.dot-track{background:#1e8449;border-radius:2px;height:5px;}
.item-name{vertical-align:middle;}
.item-name-input{width:90%;box-sizing:border-box;font-size:12px;padding:1px 3px;border:1px solid #2980b9;outline:none;}
#previewResizer{height:5px;background:#85c1e9;cursor:row-resize;flex-shrink:0;transition:background .15s;}
#previewResizer:hover{background:#2980b9;}
#previewSection{flex-shrink:0;height:220px;min-height:60px;display:flex;flex-direction:column;overflow:hidden;}
#previewHeader{background:#2980b9;color:#fff;padding:5px 10px;font-size:12px;font-weight:bold;flex-shrink:0;}
#previewImgWrapper{flex:1;background:#d6eaf8;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#previewImg{max-width:100%;max-height:100%;object-fit:contain;display:none;}
#previewPlaceholder{color:#5d8aa8;font-size:12px;text-align:center;padding:8px;}

/* ── 지도 영역 ── */
#mapWrap{flex:1;position:relative;overflow:hidden;}
#vmap{width:100%;height:100%;}
#sidebarOpenBtn{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:1001;display:flex;align-items:center;justify-content:center;background:#fff;color:#2980b9;border:2px solid #2980b9;border-left:none;cursor:pointer;border-radius:0 6px 6px 0;padding:10px 2px;font-size:13px;writing-mode:vertical-rl;box-shadow:2px 0 8px rgba(0,0,0,.15);transition:background .15s;}
#sidebarOpenBtn:hover{background:#ebf5fb;}

#search-form{position:absolute;top:10px;left:10px;z-index:2000;background:#fff;padding:5px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;gap:5px;}
#address-display{position:absolute;bottom:10px;left:10px;z-index:2000;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:6px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;max-width:440px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.3);}
#address-display:hover{background:rgba(0,0,0,.82);}
.controls{position:absolute;top:10px;right:10px;z-index:2000;display:flex;flex-direction:column;align-items:flex-start;gap:4px;background:#fff;padding:6px 8px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.controls button,.controls select,.controls input{padding:4px 7px;font-size:12px;font-family:inherit;border:1px solid #ccc;border-radius:4px;cursor:pointer;}
#polyMenu{display:none;position:fixed;z-index:9999;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);min-width:140px;overflow:hidden;}
#polyMenu.show{display:block;}
#polyMenu button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}
.mpopup{background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,.4);min-width:170px;font-size:13px;font-family:'맑은 고딕',sans-serif;position:relative;overflow:visible;}
.mpopup::before{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid rgba(0,0,0,.18);}
.mpopup::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid #fff;}
.mpopup .head{display:flex;justify-content:space-between;align-items:center;font-weight:bold;margin-bottom:5px;gap:8px;}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.mpopup .pimg{max-height:450px;max-width:420px;display:block;margin-top:4px;object-fit:contain;cursor:pointer;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{flex:1;padding:4px 0;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;}
.mpopup .brow button:hover{background:#e0e0e0;}
.mpopup .inp{width:100%;box-sizing:border-box;padding:4px;font-size:13px;border:1px solid #ccc;border-radius:4px;font-family:inherit;margin-bottom:5px;}
.dist-tip{background:#fff;border:1px solid #db4040;border-radius:3px;padding:3px 7px;font-size:12px;white-space:nowrap;pointer-events:none;}
.draw-mode,.draw-mode *{cursor:crosshair !important;}
#cadastralBtn.active{background:#e8f5e9;border-color:#43a047;color:#2e7d32;font-weight:bold;}

/* ── 탐색기 연동 배지 ── */
#explorerBadge{position:absolute;bottom:42px;left:10px;z-index:1001;background:rgba(0,0,0,0.62);color:#fff;font-size:11px;padding:4px 9px;border-radius:5px;white-space:nowrap;user-select:none;pointer-events:none;max-width:260px;overflow:hidden;text-overflow:ellipsis;}
#explorerBadge.connected{background:rgba(18,110,50,0.88);}

/* ── 실시간 위치 마커 ── */
@keyframes liveRing{0%{transform:translate(-50%,-50%) scale(1);opacity:.8;}100%{transform:translate(-50%,-50%) scale(3.2);opacity:0;}}
.live-pin{position:relative;width:14px;height:14px;cursor:grab;user-select:none;}
.live-pin:active,.live-pin.dragging{cursor:grabbing;}
.live-pin-dot{position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:#00e676;border:2px solid #fff;transform:translate(-50%,-50%);z-index:2;box-shadow:0 0 4px rgba(0,0,0,.4);}
.live-pin-ring{position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:rgba(0,230,118,.55);transform:translate(-50%,-50%);animation:liveRing 1.3s ease-out infinite;z-index:1;}
.live-pin.dragging .live-pin-ring{animation:none;opacity:0;}
.live-pin-label{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;}
</style>

<body>
<div id="app">

<!-- 사이드바 -->
<div id="sidebar">
  <div id="listHeader">
    <div class="list-header-top">
      <span>📋 목록 <span id="itemCountBadge">0</span></span>
    </div>
    <div id="filterTabs">
      <button class="ftab active" data-f="all"><span>전체</span></button>

      <button class="ftab" data-f="marker"><span>마커</span><input type="checkbox" class="vis-check" data-t="marker" checked title="지도 표시/숨기기"></button>
      <button class="ftab" data-f="track"><span>트랙</span><input type="checkbox" class="vis-check" data-t="track" checked title="지도 표시/숨기기"></button>
    </div>
  </div>
  <div id="folderBar">
    <button id="folderSelectBtn">📁 폴더 선택</button>
    <button id="copyListBtn" title="목록 클립보드 복사">📋 복사</button>
    <button id="numToggleBtn" title="지도에 번호 표시/숨기기">① 번호</button>
    <button id="trackNameOrgBtn" title="이름없는 트랙(트랙N)에 가장 가까운 마커 이름 붙이기 / 다시 누르면 원위치">🏷 트랙이름 정리</button>
    <span id="folderName"></span>
  </div>
  <div id="photoListWrapper" tabindex="0">
    <table id="photoTable">
      <thead><tr>
        <th id="numColTh" style="width:10%;text-align:center;user-select:none;">번호<div class="col-resizer" id="numColResizer"></div></th>
        <th id="nameColTh" style="width:58%;cursor:pointer;user-select:none;">이름<span id="sortNameInd"></span><div class="col-resizer" id="colResizer"></div></th>
        <th id="addrColTh" style="width:32%;cursor:pointer;user-select:none;">주소<span id="sortAddrInd"></span></th>
      </tr></thead>
      <tbody id="photoTbody"></tbody>
    </table>
  </div>
  <div id="previewResizer"></div>
  <div id="previewSection">
    <div id="previewHeader">🖼 미리보기</div>
    <div id="previewImgWrapper">
      <span id="previewPlaceholder">항목을 선택하세요</span>
      <img id="previewImg" alt="미리보기">
    </div>
  </div>
</div>

<div id="sidebarResizer"></div>

<!-- 지도 -->
<div id="mapWrap">
  <button id="sidebarOpenBtn" title="목록 열기/닫기">▶</button>
  <div id="explorerBadge">🔴 탐색기 연동 대기중</div>

  <form id="search-form">
    <input id="addr-input" type="text" placeholder="주소 검색" style="width:175px;padding:4px;">
    <button type="submit">검색</button>
  </form>

  <div id="address-display" onclick="copyAndMark()">주소 없음</div>

  <div id="polyMenu">
    <button id="polyEditBtn">✏️ 수정</button>
    <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
    <button id="polyMenuCancelBtn">✕ 취소</button>
  </div>

  <div class="controls">
    <div style="display:flex;gap:5px;align-items:center;">
      <input id="latlng-box" readonly style="width:220px;" title="클릭하여 복사" onclick="copyLL(this)">
      <button onclick="openHelp()" title="도움말 (F1)">❓ 도움말</button>
      <button id="drawBtn" onclick="toggleDraw()">선 그리기(Alt)</button>
      <button onclick="resetLines()">선 초기화</button>
      <button onclick="resetAll()">화면 초기화</button>
    </div>
    <div style="display:flex;gap:5px;align-items:center;">
      <select id="exportFmt" onchange="onFmtChange(this.value)">
        <option value="kmz">KMZ 내보내기</option>
        <option value="gpx">GPX 내보내기</option>
        <option value="csv">CSV 내보내기</option>
        <option value="photos">사진</option>
      </select>
      <select id="exportArea">
        <option value="all">전체 영역</option>
        <option value="visible">현재 영역</option>

        <option value="clustered">각각저장</option>
      </select>
      <select id="photoQuality">
        <option value="200" selected>200KB↓</option>
        <option value="300">300KB↓</option>
        <option value="500">500KB↓</option>
        <option value="800">800KB↓</option>
        <option value="1024">1MB↓</option>
        <option value="0">원본</option>
      </select>
      <button onclick="doExport()">💾 저장</button>
      <select id="mapType" onchange="chgMapType(this.value)">
        <option value="GRAPHIC">일반지도</option>
        <option value="GRAPHIC_WHITE">백지도</option>
        <option value="GRAPHIC_NIGHT">야간지도</option>
        <option value="PHOTO">항공사진</option>
        <option value="PHOTO_HYBRID" selected>하이브리드</option>
      </select>
      <button id="cadastralBtn" onclick="toggleCadastral()" title="지적도 켜기/끄기">🗺️ 지적도</button>
    </div>

  <div id="vmap"></div>

</div><!-- #app -->

<script>
'use strict';

/* ════════════════════════════════════
   전역 상태
════════════════════════════════════ */
let vmap      = null;
let markers   = [];   // {feat, lyr, ov, name, addr, isPhoto, imgSrc}
let polylines = [];   // ol.layer.Vector[]
let drawing   = false, drawCoords = [], drawLayer = null;
let guideLine = null, distOv = null, distEl = null;
let movingMk  = null, movingGhost = null, inputOv = null, locCount = 0;
let showNumbers = false, numberOverlays = [];
let isDraggingMk = false;
let vp = null;

/* ── Undo / Redo ── */
const undoStack = [], redoStack = [];
function pushHistory(op) {
  undoStack.push(op);
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0;
}
function doUndo() {
  if (!undoStack.length) return;
  const op = undoStack.pop();
  op.undo();
  redoStack.push(op);
  renderList();
}
function doRedo() {
  if (!redoStack.length) return;
  const op = redoStack.pop();
  op.redo();
  undoStack.push(op);
  renderList();
}
let lastCX    = 0, lastCY = 0, polyTarget = null;
let lastAddr  = '주소 없음', lastLL = null;
let searchMarker = null;
let trackCounter = 0;
let trackHighlightLayers = [];
let trackAllHighlightLayers = [];
let trackAllColorActive = false;
let trackNameOrgActive = false;
const trackOrigNames = new Map();

// 사이드바 / 다중선택 상태
let allItems = [];
let currentFilter = 'all';
let sortCol = null, sortDir = 1; // sortCol: null|'name'|'address'
let selectedItems = new Set();
let anchorIdx = -1, lastClickedIdx = -1;
let dragStartIdx = -1, isDragging = false, dragStartX = 0, dragStartY = 0;
let visibility = { photo: true, marker: true, track: true };

/* ════════════════════════════════════
   지도 초기화
════════════════════════════════════ */
function initMap(lat, lng) {
  vw.ol3.CameraPosition.center = ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857');
  vw.ol3.CameraPosition.zoom   = 14;
  vw.ol3.MapOptions = {
    basemapType        : vw.ol3.BasemapType.PHOTO_HYBRID,
    controlDensity     : vw.ol3.DensityType.EMPTY,
    interactionDensity : vw.ol3.DensityType.FULL,
    controlsAutoArrange: true,
    homePosition       : vw.ol3.CameraPosition,
    initPosition       : vw.ol3.CameraPosition,
    pixelRatio         : 1
  };
  vmap = new vw.ol3.Map('vmap', vw.ol3.MapOptions);
  vmap.on('click',       mapClick);
  vmap.on('pointermove', mapMove);
  vmap.getViewport().addEventListener('contextmenu', mapRightClick);

  vmap.getInteractions().forEach(i => {
    if (i instanceof ol.interaction.DoubleClickZoom) i.setActive(false);
  });

  let holdTimer = null, holdTarget = null, holdStartX = 0, holdStartY = 0;
  vp = vmap.getViewport();

  vp.addEventListener('pointerdown', e => {
    if (e.button !== 0 || drawing || movingMk) return;
    const px = vmap.getEventPixel(e);
    let target = null;
    vmap.forEachFeatureAtPixel(px, feat => {
      if (target) return;
      const m = markers.find(mk => mk.feat === feat);
      if (m) target = m;
    }, { hitTolerance: 16 });
    if (!target) return;
    holdTarget = target; holdStartX = e.clientX; holdStartY = e.clientY;
    vp.setPointerCapture(e.pointerId);
    holdTimer = setTimeout(() => {
      if (!holdTarget) return;
      const m = holdTarget; holdTarget = null; holdTimer = null;
      if (m.ov) { vmap.removeOverlay(m.ov); m.ov = null; }
      vmap.getInteractions().forEach(i => { if (i instanceof ol.interaction.DragPan) i.setActive(false); });
      // prevCoord는 드래그 시작 시점에 캡처 (endMoveMode에서 이미 바뀔 수 있으므로)
      const prevCoord = m.feat.getGeometry().getCoordinates().slice();
      // ghost overlay: CSS 위치 업데이트라 항상 즉각 반응
      const color = m.isPhoto ? '#1565C0' : '#e53935';
      const ghostEl = document.createElement('div');
      ghostEl.style.cssText = `width:16px;height:16px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none;opacity:.85;`;
      const ghost = new ol.Overlay({ element: ghostEl, positioning: 'center-center', stopEvent: false, autoPan: false });
      vmap.addOverlay(ghost);
      ghost.setPosition(prevCoord);
      m.feat.setStyle(new ol.style.Style({})); // 실제 마커 숨김
      m._prevCoord = prevCoord; // endMoveMode에서 사용
      movingMk = m; isDraggingMk = true; movingGhost = ghost; document.body.style.cursor = 'move';
    }, 300);
  });

  vp.addEventListener('pointermove', e => {
    if (holdTimer && Math.hypot(e.clientX - holdStartX, e.clientY - holdStartY) > 5) {
      clearTimeout(holdTimer); holdTimer = null; holdTarget = null;
      try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    }
    if (movingMk && movingGhost) {
      const rect = vp.getBoundingClientRect();
      const pixel = [(e.clientX - rect.left) * (vp.offsetWidth / rect.width), (e.clientY - rect.top) * (vp.offsetHeight / rect.height)];
      const coord = vmap.getCoordinateFromPixel(pixel);
      if (coord) {
        movingGhost.setPosition(coord);
        movingMk.feat.getGeometry().setCoordinates(coord); // 실제 좌표도 동시 업데이트 → fetchAddrForItem이 정확한 좌표를 읽음
      }
    }
  });

  vp.addEventListener('pointerup', e => {
    try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holdTarget = null; return; }
    if (movingMk && isDraggingMk) endMoveMode();
  });
  vp.addEventListener('pointercancel', e => {
    try { vp.releasePointerCapture(e.pointerId); } catch(_) {}
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holdTarget = null; }
    if (movingMk && isDraggingMk) endMoveMode();
  });
}

function endMoveMode() {
  const moved = movingMk;
  const ghost = movingGhost;
  movingMk = null; isDraggingMk = false; movingGhost = null; document.body.style.cursor = '';
  vmap.getInteractions().forEach(i => { if (i instanceof ol.interaction.DragPan) i.setActive(true); });
  if (!moved) { if (ghost) vmap.removeOverlay(ghost); return; }
  if (ghost) vmap.removeOverlay(ghost);
  // feature 좌표는 pointermove에서 이미 최신 위치로 업데이트됨
  const prevCoord = moved._prevCoord || moved.feat.getGeometry().getCoordinates().slice();
  const newCoord  = moved.feat.getGeometry().getCoordinates().slice();
  delete moved._prevCoord;
  moved.feat.setStyle(moved.isPhoto ? mkPhotoStyle() : mkNormalStyle());
  const item = allItems.find(i => i.mkObj === moved);
  if (item) {
    item.address = '…'; renderList(); fetchAddrForItem(item);
    pushHistory({
      undo() { moved.feat.getGeometry().setCoordinates(prevCoord); item.address='…'; fetchAddrForItem(item); },
      redo() { moved.feat.getGeometry().setCoordinates(newCoord);  item.address='…'; fetchAddrForItem(item); }
    });
  }
}

/* ════════════════════════════════════
   VWorld API 키 & JSONP
════════════════════════════════════ */
const VWORLD_KEY = '55FD7275-A6F5-3B69-9966-CD4BFA2FD35F';
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = '_jsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = data => { delete window[cb]; script.remove(); resolve(data); };
    const fullUrl = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    const script = document.createElement('script');
    script.src = fullUrl;
    script.onerror = () => { delete window[cb]; script.remove(); reject(new Error('JSONP 실패')); };
    document.body.appendChild(script);
    setTimeout(() => { if (window[cb]) { delete window[cb]; script.remove(); reject(new Error('타임아웃')); }}, 8000);
  });
}

async function reverseGeocode(lng, lat, cb) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${lng},${lat}&type=both&format=json&key=${VWORLD_KEY}`;
  try {
    const d = await jsonp(url);
    if (d?.response?.status === 'OK' && d.response.result?.length) {
      const res = d.response.result;
      let parcel = '', road = '';
      for (const r of res) { if (r.type==='parcel') parcel=r.text||''; else if (r.type==='road') road=r.text||''; }
      if (!parcel && !road) { parcel=res[0]?.text||''; road=res[1]?.text||''; }
      if (road) { road=road.replace(/\s*\([^)]*\)/g,'').trim(); const parts=road.split(' '); if(parts.length>1) road=parts.slice(1).join(' '); }
      cb((parcel && road) ? `${parcel} / ${road}` : (parcel || road || '주소 없음')); return;
    }
  } catch(e) {}
  cb('주소 없음');
}

async function geocodeExact(address, type) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&address=${encodeURIComponent(address)}&format=json&type=${type}&key=${VWORLD_KEY}`;
  try {
    const d = await jsonp(url);
    if (d?.response?.status==='OK' && d.response.result?.point) return { lng:parseFloat(d.response.result.point.x), lat:parseFloat(d.response.result.point.y) };
  } catch(e) {}
  return null;
}

async function searchAddress(query) {
  for (const category of ['parcel','road']) {
    const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=address&category=${category}&format=json&errorformat=json&key=${VWORLD_KEY}`;
    try { const d=await jsonp(url); const item=d?.response?.result?.items?.[0]; if(item) return {lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)}; } catch(e) {}
  }
  try {
    const url = `https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=place&format=json&errorformat=json&key=${VWORLD_KEY}`;
    const d=await jsonp(url); const item=d?.response?.result?.items?.[0];
    if(item) return {lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)};
  } catch(e) {}
  return null;
}

function mapClick(evt) {
  if (inputOv) closeInputOv();
  if (drawing) { drawCoords.push(evt.coordinate); refreshDraw(); return; }
  let hit = false;
  vmap.forEachFeatureAtPixel(evt.pixel, feat => {
    if (hit) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) {
      hit = true;
      if (!showNumbers) openPopup(m);
      // 사이드바 싱크: 해당 마커를 사이드바에서 선택하고 스크롤
      const fi = allItems.find(i => i.mkObj === m);
      if (fi) {
        const filtered = getFilteredItems();
        const idx = filtered.indexOf(fi);
        if (idx >= 0) {
          selectedItems.clear(); selectedItems.add(idx); anchorIdx = idx; lastClickedIdx = idx;
          document.querySelectorAll('#photoTbody tr').forEach((r,i) => r.classList.toggle('selected', selectedItems.has(i)));
          if (showNumbers) { renderNumbers(); } else { if (fi.type==='photo' && fi.mkObj.imgSrc) showPreview(fi); else clearPreview(); }
          const rows = document.querySelectorAll('#photoTbody tr');
          if (rows[idx]) rows[idx].scrollIntoView({block:'nearest'});
        }
      }
    }
  }, { hitTolerance:16 });
  if (hit) return;
  if (!showNumbers) closeAllPopups();
  // 지도 클릭 시 사이드바 선택 전체 해제
  if (selectedItems.size > 0) {
    selectedItems.clear(); anchorIdx=-1; lastClickedIdx=-1;
    document.querySelectorAll('#photoTbody tr').forEach(r=>r.classList.remove('selected'));
    if (showNumbers) renderNumbers();
  }
  const ll = fromMerc(evt.coordinate); lastLL = ll;
  document.getElementById('latlng-box').value = `${ll[1].toFixed(6)}, ${ll[0].toFixed(6)}`;
  document.getElementById('address-display').innerText = '주소 조회 중…';
  reverseGeocode(ll[0], ll[1], addr => { lastAddr=addr; document.getElementById('address-display').innerText=addr; });
}

function toggleDraw() { drawing ? endDraw() : startDraw(); }
function startDraw() {
  if (drawing) return;
  drawing=true; drawCoords=[];
  drawLayer=mkLineLyr([],'#FF0000',3); addLyr(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').textContent='선 그리기 중지';
}
function endDraw() {
  if (!drawing) return;
  drawing=false; clearGuide();
  document.getElementById('vmap').classList.remove('draw-mode');
  document.getElementById('drawBtn').textContent='선 그리기(Alt)';
  if (drawCoords.length>=2 && drawLayer) {
    polylines.push(drawLayer);
    const name = `트랙${++trackCounter}`;
    const item = {type:'track', name, address:'', polyLyr:drawLayer};
    allItems.push(item);
    if (allItems.length===1) openSidebar();
    renderList();
    fetchAddrForItem(item);
    const addedLyr=drawLayer;
    pushHistory({
      undo(){removeLyr(addedLyr);polylines=polylines.filter(p=>p!==addedLyr);allItems=allItems.filter(i=>i!==item);},
      redo(){addLyr(addedLyr);polylines.push(addedLyr);allItems.push(item);if(allItems.length===1)openSidebar();}
    });
  } else if (drawLayer) removeLyr(drawLayer);
  drawLayer=null; drawCoords=[];
}
function refreshDraw() {
  if (!drawLayer) return;
  const src=drawLayer.getSource(); src.clear();
  if (drawCoords.length>=2) { const f=new ol.Feature(new ol.geom.LineString(drawCoords)); f.setStyle(lineSt('#FF0000',3)); src.addFeature(f); }
  else if (drawCoords.length===1) { const f=new ol.Feature(new ol.geom.Point(drawCoords[0])); f.setStyle(new ol.style.Style({image:new ol.style.Circle({radius:5,fill:new ol.style.Fill({color:'#FF0000'}),stroke:new ol.style.Stroke({color:'white',width:1.5})})})); src.addFeature(f); }
  drawLayer._coords=drawCoords.slice();
}

/* 레이어/스타일 헬퍼 */
function lineSt(color,width){return new ol.style.Style({stroke:new ol.style.Stroke({color,width})});}
function mkLineLyr(coords,color,width){
  const src=new ol.source.Vector();
  if(coords.length>=2){const f=new ol.Feature(new ol.geom.LineString(coords));f.setStyle(lineSt(color,width));src.addFeature(f);}
  const lyr=new ol.layer.Vector({source:src,zIndex:100});lyr._color=color;lyr._coords=coords.slice();return lyr;
}
function getCoords(lyr){const fs=lyr.getSource().getFeatures();return fs.length?fs[0].getGeometry().getCoordinates():(lyr._coords||[]);}

/* 가이드선 & 거리 */
function updateGuide(from,to){
  if(guideLine){removeLyr(guideLine);guideLine=null;}
  guideLine=mkLineLyr([from,to],'#FF6666',1.5);addLyr(guideLine);
  const all=[...drawCoords,to];let dist=0;for(let i=1;i<all.length;i++)dist+=haversine(all[i-1],all[i]);
  const fmt=d=>d<1000?`${d.toFixed(1)}m`:`${(d/1000).toFixed(2)}km`;
  if(!distEl){distEl=document.createElement('div');distEl.className='dist-tip';}
  distEl.textContent=`총거리 ${fmt(dist)}`;
  if(!distOv){distOv=new ol.Overlay({element:distEl,offset:[8,-18],positioning:'bottom-left'});vmap.addOverlay(distOv);}
  distOv.setPosition(to);
}
function clearGuide(){if(guideLine){removeLyr(guideLine);guideLine=null;}if(distOv){vmap.removeOverlay(distOv);distOv=null;}distEl=null;}
function haversine(c1,c2){const[lo1,la1]=fromMerc(c1),[lo2,la2]=fromMerc(c2);const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

/* 선 근처 탐색 */
function findNearPoly(pixel,thr){let near=null,minD=Infinity;polylines.forEach(lyr=>{const cs=getCoords(lyr);for(let i=0;i<cs.length-1;i++){const a=vmap.getPixelFromCoordinate(cs[i]),b=vmap.getPixelFromCoordinate(cs[i+1]);if(!a||!b)continue;const d=ptSegDist(pixel,a,b);if(d<minD){minD=d;near=lyr;}}});return minD<=thr?near:null;}
function ptSegDist(p,a,b){const dx=b[0]-a[0],dy=b[1]-a[1];if(!dx&&!dy)return Math.hypot(p[0]-a[0],p[1]-a[1]);const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));}

/* 단축키 */
document.addEventListener('keydown', e => {
  if (e.key==='F1'){e.preventDefault();openHelp();return;}
  if (e.key==='Escape'){
    if(movingMk){
      // 이동 취소: ghost 제거, 실제 마커를 원래 위치로 복원
      if(movingGhost){vmap.removeOverlay(movingGhost);movingGhost=null;}
      if(movingMk._prevCoord){movingMk.feat.getGeometry().setCoordinates(movingMk._prevCoord);delete movingMk._prevCoord;}
      movingMk.feat.setStyle(movingMk.isPhoto?mkPhotoStyle():mkNormalStyle());
      movingMk=null;isDraggingMk=false;document.body.style.cursor='';
      vmap.getInteractions().forEach(i=>{if(i instanceof ol.interaction.DragPan)i.setActive(true);});
      e.preventDefault();return;
    }
    if(inputOv){closeInputOv();e.preventDefault();return;}
  }
  if (e.altKey){e.preventDefault();toggleDraw();return;}
  if (e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();doExport();return;}
  if (e.ctrlKey&&e.key.toLowerCase()==='c'&&!getSelection().toString()){
    e.preventDefault();
    if (selectedItems.size > 0) {
      document.getElementById('copyListBtn').click();
    } else {
      copyAndMark();
    }
    return;
  }
  if (drawing&&(e.key==='Backspace'||e.key==='Escape'||(e.ctrlKey&&e.key.toLowerCase()==='z'))){e.preventDefault();drawCoords.pop();refreshDraw();if(!drawCoords.length)clearGuide();return;}
  if (!drawing&&e.ctrlKey&&e.key.toLowerCase()==='z'&&!e.target.matches('input,textarea,select')){e.preventDefault();doUndo();return;}
  if (!drawing&&e.ctrlKey&&(e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))&&!e.target.matches('input,textarea,select')){e.preventDefault();doRedo();return;}

  // 목록 단축키 (사이드바가 열려있고 일반 input 포커스가 없을 때)
  const listEl=document.getElementById('photoListWrapper');
  const sidebarOpen=document.getElementById('sidebar').style.display!=='none';
  const inInput=e.target.matches('input,textarea,select');
  if (e.key==='Delete'&&selectedItems.size>0&&sidebarOpen&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    const toDelete=[...selectedItems].map(i=>filtered[i]).filter(Boolean);
    if(!toDelete.length)return;
    const names=toDelete.map(i=>i.name).join(', ');
    if(!confirm(`"${names}"\n\n${toDelete.length}개 항목을 삭제하시겠습니까?`))return;
    const deletedInfos=toDelete.map(item=>({item,allIdx:allItems.indexOf(item)}));
    toDelete.forEach(item=>{
      if(item.mkObj){removeLyr(item.mkObj.lyr);if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);markers=markers.filter(m=>m!==item.mkObj);}
      if(item.polyLyr){removeLyr(item.polyLyr);polylines=polylines.filter(p=>p!==item.polyLyr);}
    });
    allItems=allItems.filter(i=>!toDelete.includes(i));
    selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();renderList();
    pushHistory({
      undo(){deletedInfos.slice().sort((a,b)=>a.allIdx-b.allIdx).forEach(({item,allIdx})=>{
        if(item.mkObj){addLyr(item.mkObj.lyr);markers.push(item.mkObj);}
        if(item.polyLyr){addLyr(item.polyLyr);polylines.push(item.polyLyr);}
        allItems.splice(Math.min(allIdx,allItems.length),0,item);
      });},
      redo(){deletedInfos.forEach(({item})=>{
        if(item.mkObj){removeLyr(item.mkObj.lyr);if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);markers=markers.filter(m=>m!==item.mkObj);}
        if(item.polyLyr){removeLyr(item.polyLyr);polylines=polylines.filter(p=>p!==item.polyLyr);}
        allItems=allItems.filter(i=>i!==item);
      });}
    });
    return;
  }
  if (e.ctrlKey&&e.key.toLowerCase()==='a'&&(document.activeElement===listEl||sidebarOpen)&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    filtered.forEach((_,i)=>selectedItems.add(i));
    document.querySelectorAll('#photoTbody tr').forEach((r,i)=>r.classList.toggle('selected',selectedItems.has(i)));
    return;
  }
  if (e.key==='Enter'&&sidebarOpen&&!inInput&&lastClickedIdx>=0){
    e.preventDefault();
    const filtered=getFilteredItems();
    const item=filtered[lastClickedIdx];
    const rows=document.querySelectorAll('#photoTbody tr');
    const tr=rows[lastClickedIdx];
    if(tr&&item)startEditItem(tr,item,lastClickedIdx);
    return;
  }
  if ((e.key==='ArrowUp'||e.key==='ArrowDown')&&sidebarOpen&&!inInput){
    e.preventDefault();
    const filtered=getFilteredItems();
    if(!filtered.length)return;
    let newIdx=lastClickedIdx<0?0:lastClickedIdx+(e.key==='ArrowDown'?1:-1);
    newIdx=Math.max(0,Math.min(filtered.length-1,newIdx));
    if(newIdx===lastClickedIdx)return;
    if(e.shiftKey){
      selectedItems.add(newIdx);
    }else{
      selectedItems.clear();selectedItems.add(newIdx);anchorIdx=newIdx;
    }
    document.querySelectorAll('#photoTbody tr').forEach((r,i)=>r.classList.toggle('selected',selectedItems.has(i)));
    selectFilteredItem(newIdx);
    return;
  }
});

function mkNormalStyle(){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:'#e53935'}),stroke:new ol.style.Stroke({color:'white',width:1.5})})});}
function mkPhotoStyle(){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:'#1565C0'}),stroke:new ol.style.Stroke({color:'white',width:1.5})})});}

function addMarker(coord, name, addr) {
  const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});
  feat.setStyle(mkNormalStyle());
  const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});
  addLyr(lyr);
  const obj={feat,lyr,ov:null,name,addr:addr||'',isPhoto:false,imgSrc:null};
  markers.push(obj);
  const item={type:'marker',name,address:addr||'',mkObj:obj};
  allItems.push(item);
  if(allItems.length===1)openSidebar();
  renderList();
  if(!addr) fetchAddrForItem(item);
  pushHistory({
    undo(){removeLyr(obj.lyr);if(obj.ov)vmap.removeOverlay(obj.ov);markers=markers.filter(m=>m!==obj);allItems=allItems.filter(i=>i!==item);},
    redo(){addLyr(obj.lyr);markers.push(obj);allItems.push(item);if(allItems.length===1)openSidebar();}
  });
  return obj;
}

function addPhotoMarker(coord, imgSrc, name) {
  const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});
  feat.setStyle(mkPhotoStyle());
  const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});
  addLyr(lyr);
  const obj={feat,lyr,ov:null,name,addr:'',isPhoto:true,imgSrc};
  markers.push(obj);
  const item={type:'photo',name,address:'',mkObj:obj,imgSrc};
  allItems.push(item);
  if(allItems.length===1)openSidebar();
  renderList();
  fetchAddrForItem(item);
  pushHistory({
    undo(){removeLyr(obj.lyr);if(obj.ov)vmap.removeOverlay(obj.ov);markers=markers.filter(m=>m!==obj);allItems=allItems.filter(i=>i!==item);},
    redo(){addLyr(obj.lyr);markers.push(obj);allItems.push(item);if(allItems.length===1)openSidebar();}
  });
  return obj;
}

function fetchAddrForItem(item) {
  if (item.mkObj) {
    const coord=item.mkObj.feat.getGeometry().getCoordinates();
    const ll=fromMerc(coord);
    reverseGeocode(ll[0],ll[1],addr=>{item.address=addr;item.mkObj.addr=addr;renderList();});
  } else if (item.polyLyr) {
    const coords=getCoords(item.polyLyr);
    if(!coords.length)return;
    const mid=coords[Math.floor(coords.length/2)];
    const ll=fromMerc(mid);
    reverseGeocode(ll[0],ll[1],addr=>{item.address=addr;renderList();});
  }
}

function fmtDist(d) {
  if(d<1000)return d<100?`${d.toFixed(1)}m`:`${Math.round(d)}m`;
  return`${(d/1000).toFixed(2)}km`;
}
function trackLenStr(item) {
  if(item.type!=='track'||!item.polyLyr)return'';
  const coords=getCoords(item.polyLyr);
  if(coords.length<2)return'';
  let dist=0;for(let i=1;i<coords.length;i++)dist+=haversine(coords[i-1],coords[i]);
  if(!dist)return'';
  return` (L=${fmtDist(dist)})`;
}

  const imageFiles=files.filter(f=>f.type.startsWith('image/')||/\.(jpe?g|png|heic|heif)$/i.test(f.name.toLowerCase())||RAW_RE.test(f.name));
  const otherFiles=files.filter(f=>!imageFiles.includes(f));
  otherFiles.forEach(file=>{
    const n=file.name.toLowerCase();
    if(n.endsWith('.kmz')||n.endsWith('.zip'))loadKMZ(file);
    else if(n.endsWith('.gpx'))loadGPX(file);

  });

    imageFiles.forEach(file=>{
      loadImage(file,()=>noGPS,v=>noGPS=v,coord=>{
        if(coord)photoPts.push(coord);doneCount++;

});

});

/* 폴더 선택 */
async function selectFolder(){
  if(!window.showDirectoryPicker){alert('폴더 선택은 Chrome/Edge에서만 지원됩니다.');return;}
  let dirHandle;
  try{dirHandle=await window.showDirectoryPicker({mode:'read'});}catch(e){return;}
  document.getElementById('folderName').textContent=dirHandle.name;
  const files=[];
  for await(const file of walkDirForImages(dirHandle))files.push(file);
  if(!files.length){alert('이미지 파일이 없습니다.');return;}
  let noGPS=null;const photoPts=[];let done=0;
  for(const file of files){
    loadImage(file,()=>noGPS,v=>noGPS=v,coord=>{
      if(coord)photoPts.push(coord);done++;
      if(done===files.length&&photoPts.length)fitPts(photoPts);
    });
  }
}
async function* walkDirForImages(dirHandle){
  for await(const entry of dirHandle.values()){
    if(entry.kind==='file'){const file=await entry.getFile();if(isImageFile(file))yield file;}
    else if(entry.kind==='directory')yield* walkDirForImages(entry);
  }
}
function isImageFile(f){return f.type.startsWith('image/')||/\.(jpe?g|png|heic|heif)$/i.test(f.name)||/\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f)$/i.test(f.name);}

async function convertHeicIfNeeded(file){
  const isHeic=file.type==='image/heic'||file.type==='image/heif'||/\.(heic|heif)$/i.test(file.name);
  if(!isHeic)return file;
  const blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.92});
  const outBlob=Array.isArray(blob)?blob[0]:blob;
  return new File([outBlob],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'});
}
function isRawFile(f){return/\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i.test(f.name);}

async function loadRaw(file,getNG,setNG,onDone){
  try{
    const name=file.name.replace(/\.[^/.]+$/,'');let imgSrc=null,gpsLng=null,gpsLat=null;
    if(typeof exifr!=='undefined'){
      const[gpsData,thumbBuf]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null)]);
      if(gpsData?.longitude!==undefined){gpsLng=gpsData.longitude;gpsLat=gpsData.latitude;}
      if(thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
    }
    if(!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text><text x="100" y="132" text-anchor="middle" font-size="11" fill="#888">${name}</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
    if(gpsLng!==null&&gpsLat!==null){const c=toMerc(gpsLng,gpsLat);addPhotoMarker(c,imgSrc,name);if(onDone)onDone(c);else fitPts([c]);}
    else{if(getNG()===null)setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));if(getNG())addPhotoMarker(vmap.getView().getCenter(),imgSrc,name);if(onDone)onDone(null);}
  }catch(e){console.error('RAW 처리 오류:',e);if(onDone)onDone(null);}
}
async function loadImage(file,getNG,setNG,onDone){
  if(isRawFile(file))return loadRaw(file,getNG,setNG,onDone);
  const imgFile=await convertHeicIfNeeded(file);
  const r=new FileReader();
  r.onload=ev=>{
    const src=ev.target.result,name=file.name.replace(/\.[^/.]+$/,''),ll=extractGPS(src);
    if(ll){const c=toMerc(ll[0],ll[1]);addPhotoMarker(c,src,name);if(onDone)onDone(c);else fitPts([c]);}
    else{if(getNG()===null)setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));if(getNG())addPhotoMarker(vmap.getView().getCenter(),src,name);if(onDone)onDone(null);}
  };
  r.readAsDataURL(imgFile);
}

function loadGPX(file){
  const r=new FileReader();
  r.onload=ev=>{
    const xml=new DOMParser().parseFromString(ev.target.result,'application/xml'),pts=[];
    Array.from(xml.getElementsByTagName('trk')).forEach(trk=>{
      const trkName=trk.getElementsByTagName('name')[0]?.textContent?.trim()||`트랙${++trackCounter}`;
      Array.from(trk.getElementsByTagName('trkseg')).forEach(seg=>{
        const cs=Array.from(seg.getElementsByTagName('trkpt')).map(pt=>{const lo=parseFloat(pt.getAttribute('lon')),la=parseFloat(pt.getAttribute('lat'));return(!isNaN(lo)&&!isNaN(la))?toMerc(lo,la):null;}).filter(Boolean);
        if(cs.length>=2){
          const lyr=mkLineLyr(cs,randColor(),4);addLyr(lyr);polylines.push(lyr);pts.push(...cs);
          const item={type:'track',name:trkName,address:'',polyLyr:lyr};
          allItems.push(item);fetchAddrForItem(item);
        }
      });
    });
    Array.from(xml.getElementsByTagName('wpt')).forEach(wpt=>{
      const lo=parseFloat(wpt.getAttribute('lon')),la=parseFloat(wpt.getAttribute('lat'));
      if(isNaN(lo)||isNaN(la))return;
      const c=toMerc(lo,la);addMarker(c,wpt.getElementsByTagName('name')[0]?.textContent||'설명 없음','');pts.push(c);
    });
    if(allItems.length>0)openSidebar();
    renderList();fitPts(pts);
  };
  r.readAsText(file);
}

function loadCSV(file){
  const r=new FileReader();
  r.onload=ev=>{
    const text=ev.target.result.replace(/^﻿/,'');
    const lines=text.trim().split(/\r?\n/);if(lines.length<2)return;
    const hdrs=parseCSV(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const iN=hdrs.findIndex(h=>h.includes('이름')||h==='name');
    const iLat=hdrs.findIndex(h=>h.includes('위도')||h==='lat'||h==='latitude');
    const iLng=hdrs.findIndex(h=>h.includes('경도')||h==='lng'||h==='lon'||h==='longitude');
    const iAdr=hdrs.findIndex(h=>h.includes('주소')||h==='address');
    const has=iLat!==-1&&iLng!==-1;
    const ci={n:has?iN:1,lat:has?iLat:2,lng:has?iLng:3,adr:has?iAdr:4};
    lines.slice(has?1:0).forEach(line=>{
      if(!line.trim())return;
      const cols=parseCSV(line);const la=parseFloat(cols[ci.lat]),lo=parseFloat(cols[ci.lng]);
      if(isNaN(la)||isNaN(lo))return;
      const c=toMerc(lo,la);
      addMarker(c,(cols[ci.n]||'마커').replace(/^"|"$/g,''),ci.adr>=0?cols[ci.adr]||'':'');
    });
    renderList();
  };
  r.readAsText(file,'utf-8');
}

function loadHTM(file){
  const r=new FileReader();
  r.onload=ev=>{
    const html=ev.target.result,pts=[];
    const lineBlocks=[...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];
    lineBlocks.forEach(m=>{
      const cs=[...m[2].matchAll(/new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)].map(c=>{const la=parseFloat(c[1]),lo=parseFloat(c[2]);return(!isNaN(la)&&!isNaN(lo))?toMerc(lo,la):null;}).filter(Boolean);
      if(cs.length>=2){
        const lyr=mkLineLyr(cs,'#FF00FF',3);addLyr(lyr);polylines.push(lyr);pts.push(...cs);
        const item={type:'track',name:m[1],address:'',polyLyr:lyr};
        allItems.push(item);fetchAddrForItem(item);
      }
    });
    const posM=[...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
    posM.forEach(m=>{
      const rawName=m[1].replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim()||'마커';
      const la=parseFloat(m[2]),lo=parseFloat(m[3]);if(isNaN(la)||isNaN(lo))return;
      const c=toMerc(lo,la);addMarker(c,rawName,'');pts.push(c);
    });
    if(posM.length===0){
      const mkM=[...html.matchAll(/new\s+(?:kakao|daum)\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
      mkM.forEach((m,i)=>{const la=parseFloat(m[1]),lo=parseFloat(m[2]);if(isNaN(la)||isNaN(lo))return;const c=toMerc(lo,la);addMarker(c,`마커_${i+1}`,'');pts.push(c);});
    }
    renderList();fitPts(pts);
  };
  r.readAsText(file,'utf-8');
}

async function loadKMZ(file){
  try{
    const zip=await JSZip.loadAsync(file),keys=Object.keys(zip.files);
    let kmlText=null;
    for(const k of keys){if(/\.kml$/i.test(k.replace(/\0/g,''))){try{const t=await zip.files[k].async('string');if(t&&t.length>0){kmlText=t;break;}}catch(e){}}}
    if(!kmlText){alert('KMZ 안에 .kml 파일이 없습니다.');return;}
    const xml=new DOMParser().parseFromString(kmlText,'application/xml'),pts=[];
    for(const pm of Array.from(xml.getElementsByTagName('Placemark'))){
      const name=pm.getElementsByTagName('name')[0]?.textContent?.trim()||'설명 없음';
      const ls=pm.getElementsByTagName('LineString')[0],pt=pm.getElementsByTagName('Point')[0];
      let pf='';
      for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='photoFile'){pf=d.getElementsByTagName('value')[0]?.textContent||'';break;}}
      if(!pf){const desc=pm.getElementsByTagName('description')[0]?.textContent||'';const mImg=desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);if(mImg){const thumbPath=mImg[1].trim();const rollPath=thumbPath.replace('_thumb.','_roll.');const rollEntry=keys.find(z=>{const c=z.replace(/\0/g,'');return c===rollPath||c.endsWith('/'+rollPath.split('/').pop());});pf=rollEntry?rollPath:thumbPath;}}
      if(ls){
        const raw=ls.getElementsByTagName('coordinates')[0]?.textContent||'';
        const cs=raw.trim().split(/\s+/).map(c=>{const p=c.split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);return(!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90)?toMerc(lo,la):null;}).filter(Boolean);
        if(cs.length>=2){const lyr=mkLineLyr(cs,randColor(),4);addLyr(lyr);polylines.push(lyr);pts.push(...cs);const tItem={type:'track',name,address:'',polyLyr:lyr};allItems.push(tItem);fetchAddrForItem(tItem);}
      } else if(pt){
        const raw=pt.getElementsByTagName('coordinates')[0]?.textContent||'';
        const p=raw.trim().split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);
        if(isNaN(lo)||isNaN(la)||Math.abs(lo)>180||Math.abs(la)>90)continue;
        const c=toMerc(lo,la);pts.push(c);
        if(pf){
          const base=pf.split('/').pop();let zipF=null;
          for(const k of keys){const ck=k.replace(/\0/g,'');if(ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base){zipF=zip.files[k];break;}}
          if(zipF){const b64=await zipF.async('base64');const mime=base.toLowerCase().endsWith('.png')?'image/png':'image/jpeg';addPhotoMarker(c,`data:${mime};base64,${b64}`,name);}
          else addMarker(c,name,'');
        } else addMarker(c,name,'');
      }
    }
    renderList();fitPts(pts);
  }catch(err){console.error(err);alert('KMZ 오류: '+err.message);}
}

async function getAddrPrefix(){
  try{
    const center=vmap.getView().getCenter(),ll=fromMerc(center);
    const url=`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${ll[0]},${ll[1]}&type=parcel&format=json&key=${VWORLD_KEY}`;
    const d=await jsonp(url);if(d?.response?.status!=='OK')return'';
    const text=d.response.result?.[0]?.text||'';
    const parts=text.split(' ').filter(p=>!/^\d/.test(p));
    const eupMyeon=parts.find(p=>/[읍면]$/.test(p))||'',ri=parts.find(p=>/리$/.test(p))||'';
    const gu=parts.find(p=>/구$/.test(p))||'',dong=[...parts].reverse().find(p=>/동(\d+가)?$/.test(p))||'';
    if(eupMyeon&&ri)return`${eupMyeon.replace(/[읍면]$/,'')}${ri}_`;
    if(eupMyeon)return`${eupMyeon}_`;if(gu&&dong)return`${gu.replace(/구$/,'')}${dong}_`;
    if(gu)return`${gu.replace(/구$/,'')}_`;if(dong)return`${dong}_`;return'';
  }catch(e){return'';}
}
async function defName(ms){
  const now=new Date(),d=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const last=([...ms].reverse().find(m=>!m.isPhoto)||ms.at(-1))?.name||'';
  const cleanLast=last.replace(/_\d{8}.*$/,'').replace(/[\\/:*?"<>|]/g,'').trim();
  const prefix=await getAddrPrefix();
  return cleanLast?`${prefix}${d}_${cleanLast}`:`${prefix}${d}_`;
}

/* ── 거리 기준 클러스터 각각저장 ── */
function getItemCenterCoordV(item){
  if(item.mkObj)return item.mkObj.feat.getGeometry().getCoordinates();
  if(item.polyLyr){const cs=getCoords(item.polyLyr);if(cs.length)return cs[Math.floor(cs.length/2)];}
  return null;
}
async function exportClusteredKMZ_V(){
  const scopeItems=allItems.filter(i=>i.mkObj||i.polyLyr);
  if(!scopeItems.length){alert('저장할 항목이 없습니다.');return;}
  const threshStr=prompt('같은 파일로 묶을 거리 (m)\n이 거리 안에 있는 객체끼리 한 파일로 저장됩니다','100');
  if(threshStr===null)return;
  const threshold=Math.max(1,parseFloat(threshStr)||100);
  const n=scopeItems.length;
  const parent=Array.from({length:n},(_,i)=>i);
  function find(x){return parent[x]===x?x:(parent[x]=find(parent[x]));}
  function union(a,b){parent[find(a)]=find(b);}
  for(let i=0;i<n;i++){
    const ci=getItemCenterCoordV(scopeItems[i]);if(!ci)continue;
    for(let j=i+1;j<n;j++){
      const cj=getItemCenterCoordV(scopeItems[j]);if(!cj)continue;
      if(haversine(ci,cj)<=threshold)union(i,j);
    }
  }
  const clustersMap=new Map();
  for(let i=0;i<n;i++){const root=find(i);if(!clustersMap.has(root))clustersMap.set(root,[]);clustersMap.get(root).push(scopeItems[i]);}
  const clusterArr=[...clustersMap.values()];
  if(!confirm(`${clusterArr.length}개 파일로 저장됩니다.\n계속하시겠습니까?`))return;
  const nnm=buildNumNameMap();
  for(const clusterItems of clusterArr){
    const nameItem=clusterItems.find(i=>i.type==='marker')||clusterItems.find(i=>i.type==='photo')||clusterItems[0];
    const clusterName=(nameItem?.name||'지도').replace(/[\/\\:*?"<>|]/g,'_');
    const zip=new JSZip(),photoFileMap=new Map(),usedFn=new Set();
    for(const item of clusterItems){
      if(!item.mkObj||!item.mkObj.isPhoto||!item.mkObj.imgSrc)continue;
      const m=item.mkObj;
      let base=((nnm?.get(m)||m.name)||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'');
      let fn=base+'.jpg';let sx=1;while(usedFn.has(fn))fn=`${base}_${sx++}.jpg`;
      usedFn.add(fn);photoFileMap.set(m,fn);
      const ll=fromMerc(m.feat.getGeometry().getCoordinates());
      const img=injectGPS(await compressImage(m.imgSrc),ll[1],ll[0]);
      zip.file(`files/${fn}`,img.split(',')[1],{base64:true});
    }
    let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(clusterName)}</name>\n`;
    for(const item of clusterItems){
      if(item.polyLyr){
        const coords=getCoords(item.polyLyr).map(c=>{const ll=fromMerc(c);return`${ll[0]},${ll[1]},0`;}).join(' ');
        kml+=`<Placemark><name>${esc(nnm?.get(item.polyLyr)||item.name)}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;
      }else if(item.mkObj){
        const m=item.mkObj;const ll=fromMerc(m.feat.getGeometry().getCoordinates());
        const nm=nnm?.get(m)||m.name;const fn=photoFileMap.get(m);
        if(fn)kml+=`<Placemark><name>${esc(nm)}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
        else kml+=`<Placemark><name>${esc(nm)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      }
    }
    kml+='</Document></kml>';zip.file('doc.kml',kml);
    const blob=await zip.generateAsync({type:'blob'});
    dlBlob(new File([blob],clusterName+'.kmz',{type:'application/vnd.google-earth.kmz'}),clusterName+'.kmz');
    await new Promise(r=>setTimeout(r,400));
  }
  setTimeout(()=>alert(`✅ ${clusterArr.length}개 파일 저장 완료!`),500);
}

  const fname=prompt('선택 객체 GPX',ms.at(-1)?.name||'selected');if(!fname)return;
  const nnm=buildNumNameMap();
  let gpx='<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="VWorldMap">\n';
  ls.forEach((l,i)=>{const pts=getCoords(l).map(c=>{const ll=fromMerc(c);return`<trkpt lat="${ll[1]}" lon="${ll[0]}"></trkpt>\n`;}).join('');gpx+=`<trk><name>${nnm?.get(l)||'path'+(i+1)}</name><trkseg>\n${pts}</trkseg></trk>\n`;});
  ms.forEach(m=>{const ll=fromMerc(m.feat.getGeometry().getCoordinates());gpx+=`<wpt lat="${ll[1]}" lon="${ll[0]}"><name>${nnm?.get(m)||m.name}</name></wpt>\n`;});
  gpx+='</gpx>';dlBlob(new Blob([gpx],{type:'application/gpx+xml'}),fname+'.gpx');
}
async function exportSelectedCSV(){
  const r=getSelectedExportItems();if(!r)return;const{ms}=r;
  if(!ms.length){alert('선택된 마커가 없습니다.');return;}
  const fname=prompt('선택 객체 CSV','selected');if(!fname)return;
  const nnm=buildNumNameMap();
  let csv='﻿이름,위도,경도,주소\n';
  for(const m of ms){const ll=fromMerc(m.feat.getGeometry().getCoordinates());const addr=m.addr||await new Promise(r=>reverseGeocode(ll[0],ll[1],r));csv+=`"${nnm?.get(m)||m.name}",${ll[1]},${ll[0]},"${addr}"\n`;}
  dlBlob(new Blob([csv],{type:'text/csv;charset=utf-8;'}),fname+'.csv');
}
async function exportSelectedKMZ(){
  if(selectedItems.size===0){alert('선택된 항목이 없습니다.');return;}
  const filtered=getFilteredItems();
  const selSet=new Set([...selectedItems].map(i=>filtered[i]).filter(Boolean));
  const selItems=allItems.filter(item=>selSet.has(item));
  const now=new Date(),ds=now.getFullYear()+(now.getMonth()+1+'').padStart(2,'0')+(now.getDate()+'').padStart(2,'0');
  const fname=prompt('선택 객체 KMZ',ds+'_선택');if(!fname)return;
  const nnm=buildNumNameMap();
  const zip=new JSZip(),photoFileMap=new Map(),usedFn=new Set();
  for(const item of selItems){if(!item.mkObj)continue;const m=item.mkObj;if(m.isPhoto&&m.imgSrc){let base=((nnm?.get(m)||m.name)||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'');let fn=base+'.jpg';let sx=1;while(usedFn.has(fn))fn=`${base}_${sx++}.jpg`;usedFn.add(fn);photoFileMap.set(m,fn);const ll=fromMerc(m.feat.getGeometry().getCoordinates());const img=injectGPS(await compressImage(m.imgSrc),ll[1],ll[0]);zip.file(`files/${fn}`,img.split(',')[1],{base64:true});}}
  let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(fname)}</name>\n`;
  for(const item of selItems){if(item.polyLyr){const l=item.polyLyr;const coords=getCoords(l).map(c=>{const ll=fromMerc(c);return`${ll[0]},${ll[1]},0`;}).join(' ');kml+=`<Placemark><name>${esc(nnm?.get(l)||item.name)}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;}else if(item.mkObj){const m=item.mkObj;const ll=fromMerc(m.feat.getGeometry().getCoordinates());const nm=nnm?.get(m)||m.name;const fn=photoFileMap.get(m);if(fn){kml+=`<Placemark><name>${esc(nm)}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}else{kml+=`<Placemark><name>${esc(nm)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}}}
  kml+='</Document></kml>';zip.file('doc.kml',kml);
  const blob=await zip.generateAsync({type:'blob'});
  dlBlob(new File([blob],fname+'.kmz',{type:'application/vnd.google-earth.kmz'}),fname+'.kmz');
}
