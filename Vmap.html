function isImageFile(f){return f.type.startsWith('image/')||/\.(jpe?g|png|heic|heif)$/i.test(f.name)||isRawFile(f);}

/* ════════════════════════════════════
   파일 로더
════════════════════════════════════ */
async function convertHeicIfNeeded(file){
  const isHeic=file.type==='image/heic'||file.type==='image/heif'||/\.(heic|heif)$/i.test(file.name);
  if(!isHeic)return file;
  const blob=await heic2any({blob:file,toType:'image/jpeg',quality:0.92});
  const outBlob=Array.isArray(blob)?blob[0]:blob;
  return new File([outBlob],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'});
}
function isRawFile(f){return/\.(arw|cr2|cr3|nef|nrw|dng|orf|raf|rw2|pef|srw|x3f|3fr|mef|mos|mrw|rwl|srf|sr2)$/i.test(f.name);}

async function loadRaw(file,getNG,setNG,onDone){
  try{
    const name=file.name.replace(/\.[^/.]+$/,'');let imgSrc=null,gpsLng=null,gpsLat=null;
    if(typeof exifr!=='undefined'){
      const[gpsData,thumbBuf]=await Promise.all([exifr.gps(file).catch(()=>null),exifr.thumbnail(file).catch(()=>null)]);
      if(gpsData?.longitude!==undefined){gpsLng=gpsData.longitude;gpsLat=gpsData.latitude;}
      if(thumbBuf){const blob=new Blob([thumbBuf],{type:'image/jpeg'});imgSrc=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});}
    }
    if(!imgSrc){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150"><rect width="200" height="150" fill="#e0e0e0" rx="8"/><text x="100" y="70" text-anchor="middle" font-size="48">📷</text><text x="100" y="108" text-anchor="middle" font-size="18" fill="#555">RAW</text><text x="100" y="132" text-anchor="middle" font-size="11" fill="#888">${name}</text></svg>`;imgSrc='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}
    if(gpsLng!==null&&gpsLat!==null){const c=toMerc(gpsLng,gpsLat);addPhotoMarker(c,imgSrc,name);if(onDone)onDone(c);else fitPts([c]);}
    else{if(getNG()===null)setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));if(getNG())addPhotoMarker(vmap.getView().getCenter(),imgSrc,name);if(onDone)onDone(null);}
  }catch(e){console.error('RAW 처리 오류:',e);if(onDone)onDone(null);}
}
async function loadImage(file,getNG,setNG,onDone,fhPromise=null){
  if(isRawFile(file))return loadRaw(file,getNG,setNG,onDone);
  const fh=fhPromise?await fhPromise:null;
  const imgFile=await convertHeicIfNeeded(file);
  const r=new FileReader();
  r.onload=ev=>{
    const src=ev.target.result,ll=extractGPS(src);
    let name=file.name.replace(/\.[^/.]+$/,''),taken='';
    // EXIF에 저장된 제목(이름)·촬영일시가 있으면 사용
    try{const ex=piexif.load(src);const mn=readMetaName(ex);if(mn)name=mn;const dt=ex['Exif']&&ex['Exif'][piexif.ExifIFD.DateTimeOriginal];if(dt)taken=String(dt).slice(0,10).replace(/:/g,'-');}catch(e){}
    // 드롭 직후 추가된 사진에 서버(최근 탐색기 선택)에서 디스크 경로를 받아 부여 (Ctrl+C 파일복사·중복방지용)
    const _tag=()=>{const _a=allItems[allItems.length-1];if(_a&&_a.type==='photo'&&!_a.path)requestPathResolve(_a,file.name);};
    if(ll){const c=toMerc(ll[0],ll[1]);addPhotoMarker(c,src,name,fh,taken);_tag();if(onDone)onDone(c);else fitPts([c]);}
    else{if(getNG()===null)setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));if(getNG()){addPhotoMarker(vmap.getView().getCenter(),src,name,fh,taken);_tag();}if(onDone)onDone(null);}
  };
  r.readAsDataURL(imgFile);
}

function loadGPX(file){
  const r=new FileReader();
  r.onload=ev=>{
    const xml=new DOMParser().parseFromString(ev.target.result,'application/xml'),pts=[];
    Array.from(xml.getElementsByTagName('trk')).forEach(trk=>{
      const trkName=trk.getElementsByTagName('name')[0]?.textContent?.trim()||`트랙${++trackCounter}`;
      Array.from(trk.getElementsByTagName('trkseg')).forEach(seg=>{
        const cs=Array.from(seg.getElementsByTagName('trkpt')).map(pt=>{const lo=parseFloat(pt.getAttribute('lon')),la=parseFloat(pt.getAttribute('lat'));return(!isNaN(lo)&&!isNaN(la))?toMerc(lo,la):null;}).filter(Boolean);
        if(cs.length>=2){
          const lyr=mkLineLyr(cs,randColor(),4);addLyr(lyr);polylines.push(lyr);pts.push(...cs);
          const item={type:'track',name:trkName,address:'',polyLyr:lyr};
          allItems.push(item);fetchAddrForItem(item);
        }
      });
    });
    Array.from(xml.getElementsByTagName('wpt')).forEach(wpt=>{
      const lo=parseFloat(wpt.getAttribute('lon')),la=parseFloat(wpt.getAttribute('lat'));
      if(isNaN(lo)||isNaN(la))return;
      const c=toMerc(lo,la);addMarker(c,wpt.getElementsByTagName('name')[0]?.textContent||'설명 없음','');pts.push(c);
    });
    if(allItems.length>0)openSidebar();
    renderList();fitPts(pts);
  };
  r.readAsText(file);
}

function loadCSV(file){
  const r=new FileReader();
  r.onload=ev=>{
    const text=ev.target.result.replace(/^﻿/,'');
    const lines=text.trim().split(/\r?\n/);if(lines.length<2)return;
    const hdrs=parseCSV(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());
    const iN=hdrs.findIndex(h=>h.includes('이름')||h==='name');
    const iLat=hdrs.findIndex(h=>h.includes('위도')||h==='lat'||h==='latitude');
    const iLng=hdrs.findIndex(h=>h.includes('경도')||h==='lng'||h==='lon'||h==='longitude');
    const iAdr=hdrs.findIndex(h=>h.includes('주소')||h==='address');
    const has=iLat!==-1&&iLng!==-1;
    const ci={n:has?iN:1,lat:has?iLat:2,lng:has?iLng:3,adr:has?iAdr:4};
    lines.slice(has?1:0).forEach(line=>{
      if(!line.trim())return;
      const cols=parseCSV(line);const la=parseFloat(cols[ci.lat]),lo=parseFloat(cols[ci.lng]);
      if(isNaN(la)||isNaN(lo))return;
      const c=toMerc(lo,la);
      addMarker(c,(cols[ci.n]||'마커').replace(/^"|"$/g,''),ci.adr>=0?cols[ci.adr]||'':'');
    });
    renderList();
  };
  r.readAsText(file,'utf-8');
}

function loadHTM(file){
  const r=new FileReader();
  r.onload=ev=>{
    const html=ev.target.result,pts=[];
    // dmap/캐드 htm: 각 linePathN 의 색을 바로 뒤 Polyline 선언(strokeColor)에서 추출.
    // rgb(r,g,b) -> #RRGGBB 로 정규화. (map.html 과 동일 — 실제 색 + 색상묶음으로 가볍게)
    const rgb2hex=c=>{c=(c||'').trim();const mm=c.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
      if(mm)return '#'+[mm[1],mm[2],mm[3]].map(x=>(+x).toString(16).padStart(2,'0')).join('');
      return c[0]==='#'?c:('#'+c);};
    const colorMap={};
    for(const pm of html.matchAll(/path:\s*(linePath\d+|polygonPath\d+)\b[\s\S]*?strokeColor:\s*['"]([^'"]+)['"]/g)){
      if(colorMap[pm[1]]===undefined)colorMap[pm[1]]=rgb2hex(pm[2]);
    }
    const lineBlocks=[...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];
    // 색상별로 묶어 항목 1개씩 (linePath 수천 개를 개별 레이어로 만들면 무거움 -> 색상별 1레이어).
    const htmGroups={};
    lineBlocks.forEach(m=>{
      const cs=[...m[2].matchAll(/new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)].map(c=>{const la=parseFloat(c[1]),lo=parseFloat(c[2]);return(!isNaN(la)&&!isNaN(lo))?toMerc(lo,la):null;}).filter(Boolean);
      if(cs.length<2)return;
      const col=colorMap[m[1]]||'#FF00FF';
      (htmGroups[col]=htmGroups[col]||[]).push(cs);
      pts.push(...cs);
    });
    Object.entries(htmGroups).forEach(([col,arr])=>{
      const lyr=mkMultiLineLyr(arr,col,2);addLyr(lyr);polylines.push(lyr);
      const item={type:'track',name:`경로 ${++trackCounter}`,address:'',polyLyr:lyr};
      allItems.push(item);fetchAddrForItem(item);
    });
    const posM=[...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
    posM.forEach(m=>{
      const rawName=m[1].replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim()||'마커';
      const la=parseFloat(m[2]),lo=parseFloat(m[3]);if(isNaN(la)||isNaN(lo))return;
      const c=toMerc(lo,la);addMarker(c,rawName,'');pts.push(c);
    });
    if(posM.length===0){
      const mkM=[...html.matchAll(/new\s+(?:kakao|daum)\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+(?:kakao|daum)\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
      mkM.forEach((m,i)=>{const la=parseFloat(m[1]),lo=parseFloat(m[2]);if(isNaN(la)||isNaN(lo))return;const c=toMerc(lo,la);addMarker(c,`마커_${i+1}`,'');pts.push(c);});
    }
    renderList();fitPts(pts);
  };
  r.readAsText(file,'utf-8');
}

async function loadKMZ(file){
  try{
    let zip=null,keys=[],kmlText=null;
    // KMZ(zip)는 'PK'(0x50 0x4B)로 시작. 평문 .kml 은 zip 이 아니므로 JSZip 으로 열면
    // 오류가 나서 표시가 안 됨 → 헤더로 판별해 .kml 은 텍스트로 직접 파싱한다.
    const head=new Uint8Array(await file.slice(0,2).arrayBuffer());
    const isZip=head[0]===0x50 && head[1]===0x4B;
    if(isZip){
      zip=await JSZip.loadAsync(file);keys=Object.keys(zip.files);
      for(const k of keys){if(/\.kml$/i.test(k.replace(/\0/g,''))){try{const t=await zip.files[k].async('string');if(t&&t.length>0){kmlText=t;break;}}catch(e){}}}
      if(!kmlText){alert('KMZ 안에 .kml 파일이 없습니다.');return;}
    } else {
      kmlText=await file.text();   // 평문 KML (내부 임베드 사진 없음 — 마커/트랙만)
    }
    const xml=new DOMParser().parseFromString(kmlText,'application/xml'),pts=[];
    const _bulkStart=allItems.length;
    bulkLoading=true;
    // KML 스타일 색상 맵 (styleUrl -> #RRGGBB). KML 색은 aabbggrr 순서.
    const styleColors={},styleWidths={};
    const kmlC2Hex=c=>{c=(c||'').trim();if(c.length<8)return null;return '#'+c.slice(6,8)+c.slice(4,6)+c.slice(2,4);};
    for(const st of Array.from(xml.getElementsByTagName('Style'))){
      const id=st.getAttribute('id');if(!id)continue;
      const cs=(st.getElementsByTagName('LineStyle')[0]||st.getElementsByTagName('PolyStyle')[0]);
      const h=kmlC2Hex(cs?.getElementsByTagName('color')[0]?.textContent);
      if(h)styleColors['#'+id]=h;
      const w=parseFloat(cs?.getElementsByTagName('width')[0]?.textContent); // KMZ 선 굵기 반영
      if(!isNaN(w))styleWidths['#'+id]=w;
    }
    const parseCoords=raw=>raw.trim().split(/\s+/).map(c=>{const p=c.split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);return(!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90)?toMerc(lo,la):null;}).filter(Boolean);

    for(const pm of Array.from(xml.getElementsByTagName('Placemark'))){
      const name=pm.getElementsByTagName('name')[0]?.textContent?.trim()||'설명 없음';
      const pt=pm.getElementsByTagName('Point')[0];

      // ── CAD 문자(point 모드): 마커 대신 회전 텍스트 라벨만 ──
      if(pt){
        let _kind='';
        for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='kind'){_kind=(d.getElementsByTagName('value')[0]?.textContent||'').trim();break;}}
        if(_kind==='text'){
          const raw=pt.getElementsByTagName('coordinates')[0]?.textContent||'';
          const p=raw.trim().split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);
          if(!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90){
            let _rot=0,_col='';
            for(const d of Array.from(pm.getElementsByTagName('Data'))){const nm=d.getAttribute('name');const v=d.getElementsByTagName('value')[0]?.textContent||'';if(nm==='rot')_rot=parseFloat(v)||0;else if(nm==='color')_col=v.trim();}
            const c=toMerc(lo,la);pts.push(c);addTextLabelV(c,name,_rot,_col);
          }
          continue;
        }
      }

      // ── 선/폴리곤 도형 전부 수집 (MultiGeometry 안의 모든 LineString + Polygon 링) ──
      const coordArrays=[];
      for(const lsEl of Array.from(pm.getElementsByTagName('LineString'))){const cs=parseCoords(lsEl.getElementsByTagName('coordinates')[0]?.textContent||'');if(cs.length>=2)coordArrays.push(cs);}
      for(const pgEl of Array.from(pm.getElementsByTagName('Polygon'))){for(const lr of Array.from(pgEl.getElementsByTagName('LinearRing'))){const cs=parseCoords(lr.getElementsByTagName('coordinates')[0]?.textContent||'');if(cs.length>=2)coordArrays.push(cs);}}

      if(coordArrays.length){
        const su=pm.getElementsByTagName('styleUrl')[0]?.textContent?.trim();
        const color=(su&&styleColors[su])||randColor();
        const sw=(su&&styleWidths[su]!=null)?Math.max(1,styleWidths[su]):3; // KMZ 굵기(없으면 3)
        const lyr=mkMultiLineLyr(coordArrays,color,sw);addLyr(lyr);polylines.push(lyr);
        for(const cs of coordArrays)pts.push(...cs);
        const tItem={type:'track',name,address:'',polyLyr:lyr};allItems.push(tItem);if(!bulkLoading)fetchAddrForItem(tItem);
        continue;
      }

      // ── 점(사진/마커) ──
      if(pt){
        let pf='';
        for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='photoFile'){pf=d.getElementsByTagName('value')[0]?.textContent||'';break;}}
        if(!pf){const desc=pm.getElementsByTagName('description')[0]?.textContent||'';const mImg=desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);if(mImg){const thumbPath=mImg[1].trim();const rollPath=thumbPath.replace('_thumb.','_roll.');const rollEntry=keys.find(z=>{const c=z.replace(/\0/g,'');return c===rollPath||c.endsWith('/'+rollPath.split('/').pop());});pf=rollEntry?rollPath:thumbPath;}}
        const raw=pt.getElementsByTagName('coordinates')[0]?.textContent||'';
        const p=raw.trim().split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);
        if(isNaN(lo)||isNaN(la)||Math.abs(lo)>180||Math.abs(la)>90)continue;
        const c=toMerc(lo,la);pts.push(c);
        if(pf){
          const base=pf.split('/').pop();let zipF=null;
          for(const k of keys){const ck=k.replace(/\0/g,'');if(ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base){zipF=zip.files[k];break;}}
          if(zipF){const b64=await zipF.async('base64');const mime=base.toLowerCase().endsWith('.png')?'image/png':'image/jpeg';addPhotoMarker(c,`data:${mime};base64,${b64}`,name);}
          else addMarker(c,name,'');
        } else addMarker(c,name,'');
      }
    }
    bulkLoading=false;
    // 대량 로드 마무리: 표는 한 번만, 전체 가져오기를 한 묶음으로 되돌리기 가능하게 등록
    const _added=allItems.slice(_bulkStart);
    if(_added.length){
      if(allItems.length===_added.length)openSidebar();
      queueAddrFetch(_added);   // KMZ 안 사진·마커·트랙 주소를 천천히 조회
      const _set=new Set(_added);
      pushHistory({
        undo(){_added.forEach(it=>{if(it.mkObj){removeLyr(it.mkObj.lyr);if(it.mkObj.ov)vmap.removeOverlay(it.mkObj.ov);markers=markers.filter(m=>m!==it.mkObj);}if(it.polyLyr){removeLyr(it.polyLyr);polylines=polylines.filter(p=>p!==it.polyLyr);}});allItems=allItems.filter(i=>!_set.has(i));selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;clearPreview();renderList();},
        redo(){_added.forEach(it=>{if(it.mkObj){addLyr(it.mkObj.lyr);markers.push(it.mkObj);}if(it.polyLyr){addLyr(it.polyLyr);polylines.push(it.polyLyr);}if(!allItems.includes(it))allItems.push(it);});renderList();}
      });
    }
    renderList();fitPts(pts);
  }catch(err){bulkLoading=false;console.error(err);alert('KMZ 오류: '+err.message);}
}

// KMZ 저장 시 사진 파일명에 _NNN 번호를 붙일지 여부
function getAddPhotoNum(){const el=document.getElementById('addPhotoNum');return !!(el&&el.checked);}
// 사진 1장을 zip에 추가하고 KMZ 내부 파일명(fn) 반환. 번호옵션이면 _NNN(3자리) 부여.
async function _zipPhotoV(zip,m,item,nnm,usedFn,seqRef,renames){
  if(!(m.isPhoto&&m.imgSrc))return null;
  const numSuffix=getAddPhotoNum()?('_'+String(seqRef.n).padStart(3,'0')):'';
  let base=((nnm?.get(m)||m.name)||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'')+numSuffix;
  let fn=base+'.jpg',sx=1;while(usedFn.has(fn))fn=`${base}_${sx++}.jpg`;usedFn.add(fn);
  const ll=fromMerc(m.feat.getGeometry().getCoordinates());
  const img=injectGPS(await compressImage(m.imgSrc),ll[1],ll[0]);
  zip.file(`files/${fn}`,img.split(',')[1],{base64:true});
  const p=(item&&item.path)||m.path;
  // newName = KMZ 내부와 동일한 새 이름(목록 이름 + _NNN). 서버가 원본을 이 이름으로 바꿈.
  if(numSuffix && p && /^[a-zA-Z]:[\\/]/.test(p) && p.indexOf('|')<0)
    renames.push({path:p,suffix:numSuffix,newName:base});
  seqRef.n++;
  return fn;
}
// 수집한 디스크 원본 rename 요청을 서버로 전송
function _sendPhotoRenames(renames){
  if(!renames||!renames.length)return;
  if(!(window.__wsReady&&window.__wsReady())){window.__setBadge&&window.__setBadge(true,'⚠️ 서버 미연결 — 원본 파일명 변경 생략');return;}
  window.__wsSend({type:'rename_photos',items:renames});
}
// KMZ 저장 후: 현재 지도에 삽입된 객체 전부를 '임시삽입(_live)' 상태로.
//  → 사이드바에 흐리게 표시되고, 다른 객체(파일)를 선택/로드하면 자동으로 사라진다. (map.html 과 동일)
function markAllInsertedLive(){
  let n=0;
  allItems.forEach(i=>{if(!i._live){i._live=true;n++;}});

async function getAddrPrefix(){
  try{
    const center=vmap.getView().getCenter(),ll=fromMerc(center);
    const url=`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${ll[0]},${ll[1]}&type=parcel&format=json&key=${VWORLD_KEY}`;
    const d=await jsonp(url);if(d?.response?.status!=='OK')return'';
    const text=d.response.result?.[0]?.text||'';
    const parts=text.split(' ').filter(p=>!/^\d/.test(p));
    const eupMyeon=parts.find(p=>/[읍면]$/.test(p))||'',ri=parts.find(p=>/리$/.test(p))||'';
    const gu=parts.find(p=>/구$/.test(p))||'',dong=[...parts].reverse().find(p=>/동(\d+가)?$/.test(p))||'';
    if(eupMyeon&&ri)return`${eupMyeon.replace(/[읍면]$/,'')}${ri}_`;
    if(eupMyeon)return`${eupMyeon}_`;if(gu&&dong)return`${gu.replace(/구$/,'')}${dong}_`;
    if(gu)return`${gu.replace(/구$/,'')}_`;if(dong)return`${dong}_`;return'';
  }catch(e){return'';}
}
async function defName(ms){
  const base=resolveSaveTarget().base;   // 기준 사진 이름 우선
  if(base)return base;
  const now=new Date(),d=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const last=([...ms].reverse().find(m=>!m.isPhoto)||ms.at(-1))?.name||'';
  const cleanLast=last.replace(/_\d{8}.*$/,'').replace(/[\\/:*?"<>|]/g,'').trim();
  const prefix=await getAddrPrefix();
  return cleanLast?`${prefix}${d}_${cleanLast}`:`${prefix}${d}_`;
}

/* ── 거리 기준 클러스터 각각저장 ── */
function getItemCenterCoordV(item){
  if(item.mkObj)return item.mkObj.feat.getGeometry().getCoordinates();
  if(item.polyLyr){const cs=getCoords(item.polyLyr);if(cs.length)return cs[Math.floor(cs.length/2)];}
  return null;
}
async function exportClusteredKMZ_V(){
  // 사이드바에 보이는 객체(필터 켜면 화면 안 객체만)
  const scopeItems=getFilteredItems().filter(i=>i.mkObj||i.polyLyr);
  if(!scopeItems.length){alert('저장할 항목이 없습니다.');return;}
  const threshStr=prompt('같은 파일로 묶을 거리 (m)\n이 거리 안에 있는 객체끼리 한 파일로 저장됩니다','100');
  if(threshStr===null)return;
  const threshold=Math.max(1,parseFloat(threshStr)||100);
  const n=scopeItems.length;
  const parent=Array.from({length:n},(_,i)=>i);
  function find(x){return parent[x]===x?x:(parent[x]=find(parent[x]));}
  function union(a,b){parent[find(a)]=find(b);}
  for(let i=0;i<n;i++){
    const ci=getItemCenterCoordV(scopeItems[i]);if(!ci)continue;
    for(let j=i+1;j<n;j++){
      const cj=getItemCenterCoordV(scopeItems[j]);if(!cj)continue;
      if(haversine(ci,cj)<=threshold)union(i,j);
    }
  }
  const clustersMap=new Map();
  for(let i=0;i<n;i++){const root=find(i);if(!clustersMap.has(root))clustersMap.set(root,[]);clustersMap.get(root).push(scopeItems[i]);}
  const clusterArr=[...clustersMap.values()];
  if(!confirm(`${clusterArr.length}개 파일로 저장됩니다.\n계속하시겠습니까?`))return;
  const nnm=buildNumNameMap();
  const clusterRenames=[];   // 디스크 원본 rename 누적 (마지막에 1회 전송)
  for(const clusterItems of clusterArr){
    const nameItem=clusterItems.find(i=>i.type==='marker')||clusterItems.find(i=>i.type==='photo')||clusterItems[0];
    const clusterName=(nameItem?.name||'지도').replace(/[\/\\:*?"<>|]/g,'_');
    const zip=new JSZip(),photoFileMap=new Map(),usedFn=new Set(),seqRef={n:0};
    for(const item of clusterItems){
      if(!item.mkObj)continue;
      const m=item.mkObj;
      const fn=await _zipPhotoV(zip,m,item,nnm,usedFn,seqRef,clusterRenames);
      if(fn)photoFileMap.set(m,fn);
    }
    let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(clusterName)}</name>\n`;
    const lnStyles=new Map();
    for(const item of clusterItems){
      if(item.polyLyr){
        kml+=_lineKmlPlacemarksV(item,nnm,null,lnStyles);
      }else if(item.mkObj){
        const m=item.mkObj;const ll=fromMerc(m.feat.getGeometry().getCoordinates());
        const nm=nnm?.get(m)||m.name;const fn=photoFileMap.get(m);
        if(fn)kml+=`<Placemark><name>${esc(nm)}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
        else kml+=`<Placemark><name>${esc(nm)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      }
    }
    kml+=_lineKmlStyleDefsV(lnStyles)+'</Document></kml>';zip.file('doc.kml',kml);
    const blob=await zip.generateAsync({type:'blob'});
    dlBlob(new File([blob],clusterName+'.kmz',{type:'application/vnd.google-earth.kmz'}),clusterName+'.kmz');   // 각각저장은 클러스터 이름 그대로
    await new Promise(r=>setTimeout(r,400));
  }
  _sendPhotoRenames(clusterRenames);
  markAllInsertedLive();   // 저장 후 현재 객체들을 임시삽입(_live) 상태로 (다른 객체 선택 시 사라짐)
  setTimeout(()=>alert(`✅ ${clusterArr.length}개 파일 저장 완료!`),500);
}

  for(const item of selItems){if(item.polyLyr){kml+=_lineKmlPlacemarksV(item,nnm,null,lnStyles);}else if(item.mkObj){const m=item.mkObj;const ll=fromMerc(m.feat.getGeometry().getCoordinates());const nm=nnm?.get(m)||m.name;const fn=photoFileMap.get(m);if(fn){kml+=`<Placemark><name>${esc(nm)}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}else{kml+=`<Placemark><name>${esc(nm)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}}}
  kml+=_lineKmlStyleDefsV(lnStyles)+'</Document></kml>';zip.file('doc.kml',kml);
  const blob=await zip.generateAsync({type:'blob'});
  dlBlob(new File([blob],fname+'.kmz',{type:'application/vnd.google-earth.kmz'}),fname+'.kmz',true,()=>{_sendPhotoRenames(renames);markAllInsertedLive();});
}

function getFilteredItems(){
  let base = currentFilter==='all' ? allItems : allItems.filter(i=>i.type===currentFilter);
  base = base.filter(i=>visibility[i.type]!==false);
  // '필터' 켜짐: 현재 지도 화면(extent) 안에 있는 객체만
  if(viewFilterOn && vmap){
    const ext=vmap.getView().calculateExtent(vmap.getSize());
    if(ext) base=base.filter(i=>itemInViewV(i,ext));
  }
  return base;
}
// 항목이 현재 화면(extent) 안에 있는가 — 마커는 위치, 트랙은 어느 점이라도 화면 안이면 포함
function itemInViewV(item,ext){
  if(item.mkObj) return ol.extent.containsCoordinate(ext,item.mkObj.feat.getGeometry().getCoordinates());
  if(item.polyLyr) return coordParts(item.polyLyr).some(cs=>cs.some(c=>ol.extent.containsCoordinate(ext,c)));
  return false;
}

// ── 목록 표시 컬럼(항목표시) — 번호·이름 고정, 나머지 켜고 끄기(설정 저장) ──
const _colOrder=['num','name','address','length','taken','geohash'];
const _colThId={num:'numColTh',name:'nameColTh',address:'addrColTh',length:'lenColTh',taken:'takenColTh',geohash:'geoColTh'};
function _colShown(k){return (k==='num'||k==='name')?true:colVis[k]!==false;}
function applyColHeaders(){
  let sum=0;for(const k of _colOrder)if(_colShown(k))sum+=colW[k];
  if(!sum)sum=1;
  for(const k of _colOrder){const el=document.getElementById(_colThId[k]);if(!el)continue;if(_colShown(k)){el.style.display='';el.style.width=(colW[k]/sum*100).toFixed(2)+'%';}else el.style.display='none';}
}

function saveColW(){if(window.__saveUi)window.__saveUi('colw',JSON.stringify(colW));}
// 헤더 경계 드래그로 컬럼 폭 조정 (드래그한 컬럼 ↔ 오른쪽 이웃 보이는 컬럼 사이에서 가중치 이동)
(function(){
  const _nextShown=k=>{const oi=_colOrder.indexOf(k);for(let i=oi+1;i<_colOrder.length;i++)if(_colShown(_colOrder[i]))return _colOrder[i];return null;};
  const MIN=0.15;
  let drag=null;
  _colOrder.forEach(k=>{
    const th=document.getElementById(_colThId[k]);if(!th)return;
    const rz=th.querySelector('.col-resizer');if(!rz)return;
    rz.addEventListener('mousedown',e=>{
      const nk=_nextShown(k);if(!nk)return;   // 마지막 보이는 컬럼은 조정 대상 없음
      let sum=0;for(const c of _colOrder)if(_colShown(c))sum+=colW[c];
      drag={k,nk,startX:e.clientX,tableW:(th.closest('table').offsetWidth||1),wk0:colW[k],total:colW[k]+colW[nk],sum};
      document.body.style.cursor='col-resize';
      e.preventDefault();e.stopPropagation();
    });
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dw=(e.clientX-drag.startX)*drag.sum/drag.tableW;   // px 이동량 → 가중치
    const wk=Math.max(MIN,Math.min(drag.total-MIN,drag.wk0+dw));
    colW[drag.k]=wk;colW[drag.nk]=drag.total-wk;
    applyColHeaders();
  });
  document.addEventListener('mouseup',()=>{if(drag){drag=null;document.body.style.cursor='';saveColW();}});
})();

function buildNumNameMap(){
  if(!showNumbers)return null;
  const filtered=getFilteredItems();
  const total=filtered.length;
  const digits=String(total).length;
  const m=new Map();
  filtered.forEach((item,idx)=>{
    const base=item.name.replace(/^\d+_/,''); // 기존 번호 프레픽스 제거
    const n=String(idx+1).padStart(digits,'0')+'_'+base;
    if(item.mkObj)m.set(item.mkObj,n);
    if(item.polyLyr)m.set(item.polyLyr,n);
  });

function renderNumbers(){

  getFilteredItems().forEach((item,idx)=>{

    else if(item.polyLyr){const cs=getCoords(item.polyLyr);if(cs.length)coord=cs[Math.floor(cs.length/2)];}
    if(!coord)return;
    // map.html처럼 마커 상단 중앙에 번호 표시 (0크기 래퍼 + 위쪽 중앙 정렬 배지)
    const el=document.createElement('div');
    el.style.cssText='position:relative;width:0;height:0;';

    const bg=isSel?'rgba(200,0,0,.9)':'rgba(0,0,0,.65)';
    badge.style.cssText=`position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;border-radius:4px;padding:0 4px;font-size:10px;font-weight:bold;line-height:16px;pointer-events:none;white-space:nowrap;`;
    el.appendChild(badge);
    const ov=new ol.Overlay({element:el,positioning:'center-center',stopEvent:false,autoPan:false});
    vmap.addOverlay(ov);
    ov.setPosition(coord);
    // 컨테이너 z-index 직접 설정: 선택=앞, 비선택=뒤
    const container=el.parentElement;
    if(container) container.style.zIndex=isSel?'100':'5';
    numberOverlays.push(ov);
  });
}

/* 원래 색 그대로, '굵게만' 표시하는 하이라이트 레이어 생성 (모든 피처 복제) */
function _mkHighlightLayer(item){
  const color=trackColorOf(item);
  const src=new ol.source.Vector();
  item.polyLyr.getSource().getFeatures().forEach(f=>{
    let w=3; try{w=(f.getStyle().getStroke().getWidth())||3;}catch(e){}
    const nf=f.clone(); nf.setStyle(lineSt(color,w+6)); src.addFeature(nf);
  });
  const lyr=new ol.layer.Vector({source:src,zIndex:200}); return lyr;
}
/* ── 트랙 선택 시 하이라이트 — 원래 색 유지, 굵게만(임시) ── */
function updateTrackHighlights() {
  trackHighlightLayers.forEach(l=>{try{removeLyr(l);}catch(e){}});
  trackHighlightLayers=[];
  if(!vmap)return;
  const filtered=getFilteredItems();
  [...selectedItems].forEach(idx=>{
    const item=filtered[idx];
    if(item&&item.type==='track'&&item.polyLyr){const hl=_mkHighlightLayer(item);addLyr(hl);trackHighlightLayers.push(hl);}
  });
}

/* ── 전체 트랙 강조 토글 — 원래 색 유지, 굵게만 ── */
function updateAllTrackHighlights() {

}

/* ── 트랙이름 정리 ── */
// 이름정리 대상 판별: 사용자가 직접 붙인 이름은 그대로 두고,
// 자동 생성된 기본 이름(붙여넣기_*, 사진 파일명, 트랙N/경로 N)만 바꾼다.
function isDefaultName(nm){
  nm=(nm||'').trim();
  if(!nm)return true;
  if(/^붙여넣기_/.test(nm))return true;                                     // Ctrl+V 붙여넣기 기본명
  if(/\.(jpe?g|png|gif|bmp|webp|heic|heif|tiff?)$/i.test(nm))return true;   // 사진 파일명
  if(/^트랙\s*\d+$/.test(nm))return true;                                   // Vmap 기본 트랙명
  if(/^경로\s*\d+$/.test(nm))return true;                                   // map 기본 트랙명
  return false;
}
document.getElementById('trackNameOrgBtn').onclick=()=>{
  // 이름정리: 기본이름(붙여넣기_*·파일명·트랙N)인 트랙·사진에 '가장 가까운 이름있는 객체'의 이름을 붙임 (다시 누르면 원위치)
  const markerItems=allItems.filter(i=>i.mkObj&&!isDefaultName(i.name));   // 이름 기준점 = 사용자가 이름 붙인 점 객체(마커·사진)
  const targets=allItems.filter(i=>(i.type==='track'&&i.polyLyr)||(i.type==='photo'&&i.mkObj)); // 대상 = 트랙·사진
  if(!trackNameOrgActive){
    // 마커가 없어도 토글은 항상 켜짐 (이후 선/사진 추가 시 가까운 마커 이름 자동 적용)
    if(markerItems.length){
      targets.forEach(t=>{
        if(!isDefaultName(t.name))return;   // 사용자가 붙인 이름은 건드리지 않음
        let mid=null;
        if(t.polyLyr){const coords=getCoords(t.polyLyr);if(coords.length)mid=coords[Math.floor(coords.length/2)];}
        else if(t.mkObj){mid=t.mkObj.feat.getGeometry().getCoordinates();}
        if(!mid)return;
        let nearest=null,minDist=Infinity;
        markerItems.forEach(m=>{const d=haversine(mid,m.mkObj.feat.getGeometry().getCoordinates());if(d<minDist){minDist=d;nearest=m;}});
        if(nearest){trackOrigNames.set(t,t.name);t.name=nearest.name;if(t.mkObj)t.mkObj.name=nearest.name;}
      });
    }
    trackNameOrgActive=true;
    document.getElementById('trackNameOrgBtn').classList.add('on');
    renderList();
  }else{
    trackOrigNames.forEach((origName,t)=>{t.name=origName;if(t.mkObj)t.mkObj.name=origName;});
    trackOrigNames.clear();
    trackNameOrgActive=false;
    document.getElementById('trackNameOrgBtn').classList.remove('on');
    renderList();
  }
};

function selectFilteredItem(idx){
  const filtered=getFilteredItems();
  if(idx<0||idx>=filtered.length)return;
  lastClickedIdx=idx;
  const item=filtered[idx];
  updateMetaPanel(item);   // 사진리스트↔미리보기 사이 메타정보창 갱신

  // 번호 표시 모드: 팝업 없이 번호 색상만 변경
  if(showNumbers){
    renderNumbers();
    highlightPhotoMarkersV(item);   // 선택된 사진마커 강조(구분)
    let coord=null;
    if(item.mkObj) coord=item.mkObj.feat.getGeometry().getCoordinates();
    else if(item.polyLyr){const cs=getCoords(item.polyLyr);if(cs.length)coord=cs[Math.floor(cs.length/2)];}
    if(coord && !holdView) panTo(coord);   // Hold 켜짐 → 화면 이동 안 함
    if(item.mkObj&&item.type==='photo'&&item.mkObj.imgSrc)showPreview(item);else clearPreview();
    const rows=document.querySelectorAll('#photoTbody tr');
    if(rows[idx])rows[idx].scrollIntoView({block:'nearest'});
    document.getElementById('photoListWrapper').focus();
    return;
  }

  closeAllPopups();
  highlightPhotoMarkersV(item);   // 선택된 사진마커 강조(구분)
  if(item.mkObj){
    // 사이드바 선택 시 사진창(팝업)은 띄우지 않음 — 마커로 이동 + 미리보기만
    if(!holdView) panTo(item.mkObj.feat.getGeometry().getCoordinates());   // Hold 켜짐 → 화면 이동 안 함
    if(item.type==='photo'&&item.mkObj.imgSrc)showPreview(item);else clearPreview();
  }else if(item.polyLyr){
    const coords=getCoords(item.polyLyr);
    if(coords.length && !holdView)panTo(coords[Math.floor(coords.length/2)]);   // Hold 켜짐 → 화면 이동 안 함
    clearPreview();
  }
  const rows=document.querySelectorAll('#photoTbody tr');
  if(rows[idx])rows[idx].scrollIntoView({block:'nearest'});
  document.getElementById('photoListWrapper').focus();
}

function renderMeta(item,sm){

  // KMZ 파일은 파일명을 제목으로 쓰지 않음(저장 메타 없으면 공란)

  else if(item.type!=='kmz')add('제목',item.name);
  add('촬영일시',(sm&&sm.taken)||item.takenDate);
  if(sm)add('설명',sm.desc);

    ?'<table>'+rows.map(([k,v])=>`<tr><th>${escHtml(k)}</th><td>${escHtml(v)}</td></tr>`).join('')+'</table>'

/* ── EXIF 제목(이름) 읽기/쓰기 ── */
function xpTitleToStr(bytes){
  if(!bytes||bytes.length<2)return'';
  let s='';
  for(let i=0;i+1<bytes.length;i+=2){const code=bytes[i]|(bytes[i+1]<<8);if(code===0)break;s+=String.fromCharCode(code);}
  return s.trim();
}
function readMetaName(exifObj){
  try{
    const xpRaw=exifObj['0th']?.[40091]; // XPTitle
    if(xpRaw&&xpRaw.length>2){const n=xpTitleToStr(xpRaw);if(n)return n;}
    const desc=(exifObj['0th']?.[piexif.ImageIFD.ImageDescription]||'').trim();
    if(desc)return desc;
  }catch(e){}
  return'';
}
/* 저장 결과 토스트 */
function showSaveStatus(msg,ok=true){
  let el=document.getElementById('_saveToast');
  if(!el){el=document.createElement('div');el.id='_saveToast';el.style.cssText='position:fixed;bottom:54px;left:50%;transform:translateX(-50%);padding:7px 16px;border-radius:6px;font-size:13px;z-index:99999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);';document.body.appendChild(el);}
  el.textContent=msg;el.style.background=ok?'rgba(39,174,96,.93)':'rgba(192,57,43,.93)';el.style.color='#fff';el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';},ok?2200:4000);
}
/* 사진 이름 → EXIF 저장: (1)서버경로 위임 (2)드래그&드롭 직접쓰기 (3)메모리만 */
async function savePhotoName(item,newName){
  if(item.path&&window.__wsSend){
    const sent=window.__wsSend({type:'update_name',path:item.path,name:newName});
    if(sent){showSaveStatus('💾 저장 중… '+item.path.split(/[\\/]/).pop());return;}
    showSaveStatus('🔴 서버 연결 안됨 — 메타데이터 저장 실패',false);return;
  }
  if(!(item.imgSrc&&item.imgSrc.startsWith('data:image/jpeg'))){showSaveStatus('ℹ️ JPEG가 아니어서 메타데이터 저장 안 함');return;}
  let exifBytes;
  try{
    let old=null;try{old=piexif.load(item.imgSrc);}catch(e){}
    const exif={'0th':{},'Exif':{},'GPS':{},'1st':{},'thumbnail':null};
    if(old){
      if(old['GPS'])exif['GPS']=old['GPS'];
      const ori=old['0th']?.[piexif.ImageIFD.Orientation];if(ori!==undefined)exif['0th'][piexif.ImageIFD.Orientation]=ori;
      const dto=old['Exif']?.[piexif.ExifIFD.DateTimeOriginal];if(dto!==undefined)exif['Exif'][piexif.ExifIFD.DateTimeOriginal]=dto;
      const dt=old['0th']?.[piexif.ImageIFD.DateTime];if(dt!==undefined)exif['0th'][piexif.ImageIFD.DateTime]=dt;
    }
    // ImageDescription은 ASCII 필드 — piexif.js가 한글을 깨뜨림(꿀뷰 등에서 깨져 보임) → ASCII일 때만 기록
    if(/^[\x00-\x7F]*$/.test(newName))exif['0th'][piexif.ImageIFD.ImageDescription]=newName;
    const u=[];for(let i=0;i<newName.length;i++){const c=newName.charCodeAt(i);u.push(c&0xff,(c>>8)&0xff);}u.push(0,0);
    exif['0th'][40091]=u; // XPTitle
    try{exifBytes=piexif.dump(exif);}catch(e){delete exif['0th'][40091];exifBytes=piexif.dump(exif);}
    let base=item.imgSrc;try{base=piexif.remove(item.imgSrc);}catch(e){}
    item.imgSrc=piexif.insert(exifBytes,base);
    if(item.mkObj)item.mkObj.imgSrc=item.imgSrc;
  }catch(e){console.error('EXIF 처리 실패 상세:',e);showSaveStatus('❌ EXIF 처리 실패: '+(e&&e.message?e.message:e),false);return;}
  const fh=item.fileHandle||item.mkObj?.fileHandle;
  if(fh&&fh.kind==='file'){
    try{
      const b64=item.imgSrc.split(',')[1],bin=atob(b64),buf=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
      const w=await fh.createWritable();await w.write(new Blob([buf],{type:'image/jpeg'}));await w.close();
      showSaveStatus('✅ 파일 저장됨 · 수정날짜 갱신됨 — '+fh.name);
    }catch(ex){console.error('파일 직접저장 실패:',ex);showSaveStatus('⚠️ 직접저장 실패: '+ex.message+' (내보내기로 저장하세요)',false);}
  }else{showSaveStatus('💾 메타데이터 반영됨 (파일저장: 내보내기로 저장하세요)');}
}

function startEditItem(tr,item,idx){
  // 이미 편집 중인 input이 있으면 먼저 커밋
  const existing=document.querySelector('#photoTbody .item-name-input');
  if(existing){existing.blur();}
  // blur → renderList가 동기 실행되므로 tr/span이 교체됨, idx로 다시 찾기
  const rows=document.querySelectorAll('#photoTbody tr');
  const currentTr=rows[idx];if(!currentTr)return;
  const span=currentTr.querySelector('.item-name');if(!span)return;
  const nameTd=span.parentElement;
  const inp=document.createElement('input');inp.className='item-name-input';inp.value=item.name;
  span.replaceWith(inp);
  // 이름 칸이 좁아 긴 이름이 잘려 오타 확인이 안 되던 문제 →
  // 편집 중에는 칸을 넘어 줄 오른쪽 끝까지 넓게 띄워 전체 이름이 보이게 한다.
  const _prevOv=nameTd.style.overflow,_prevPos=nameTd.style.position;
  nameTd.style.overflow='visible';nameTd.style.position='relative';
  const _rowR=currentTr.getBoundingClientRect(),_tdR=nameTd.getBoundingClientRect();
  const _avail=Math.round(_rowR.right-_tdR.left-8);
  inp.style.position='absolute';inp.style.left='0';inp.style.top='50%';inp.style.transform='translateY(-50%)';
  inp.style.width=Math.max(220,_avail)+'px';inp.style.zIndex='30';
  const _restoreCell=()=>{nameTd.style.overflow=_prevOv;nameTd.style.position=_prevPos;};
  inp.focus();inp.select();
  // 같은 줄 내부의 빈 공간(번호/주소 칸 등)을 눌러도 편집 유지 (input 포커스 보존)
  const keepFocus=e=>{if(e.target!==inp){e.preventDefault();inp.focus();}};
  currentTr.addEventListener('mousedown',keepFocus);
  let committed=false;
  function commit(){
    if(committed)return;committed=true;
    _restoreCell();
    currentTr.removeEventListener('mousedown',keepFocus);
    const newName=inp.value.trim()||item.name;
    item.name=newName;if(item.mkObj)item.mkObj.name=newName;
    if(item.type==='photo')savePhotoName(item,newName);
    renderList();
  }
  inp.onblur=()=>setTimeout(commit,30);
  inp.onkeydown=e=>{
    if(e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='Escape'){committed=true;_restoreCell();renderList();}
  };
}

/* 드래그 선택 / 길게 눌러 순서 변경 */
let reorderMode=false,reorderHoldTimer=null,reorderTargetIdx=-1;

function getReorderLine(){
  let el=document.getElementById('reorderLine');
  if(!el){el=document.createElement('div');el.id='reorderLine';el.style.cssText='display:none;position:absolute;left:0;right:0;height:3px;background:#e74c3c;pointer-events:none;z-index:20;';document.getElementById('photoListWrapper').style.position='relative';document.getElementById('photoListWrapper').appendChild(el);}
  return el;
}

function reorderItems(targetIdx){
  const prevOrder=allItems.slice();
  const filtered=getFilteredItems();
  const moving=[...selectedItems].sort((a,b)=>a-b).map(i=>filtered[i]).filter(Boolean);
  if(!moving.length)return;
  const staying=filtered.filter((_,i)=>!selectedItems.has(i));
  let ins=targetIdx;
  for(const si of[...selectedItems].sort((a,b)=>a-b)){if(si<targetIdx)ins--;}
  ins=Math.max(0,Math.min(ins,staying.length));
  const nf=[...staying.slice(0,ins),...moving,...staying.slice(ins)];
  if(currentFilter==='all'){allItems=nf;}
  else{let fi=0;allItems=allItems.map(item=>item.type===currentFilter?nf[fi++]:item);}
  selectedItems.clear();
  moving.forEach(item=>{const ni=nf.indexOf(item);if(ni>=0)selectedItems.add(ni);});
  anchorIdx=Math.min(...[...selectedItems]);lastClickedIdx=Math.max(...[...selectedItems]);
  renderList();
  const newOrder=allItems.slice();
  pushHistory({
    undo(){allItems.length=0;prevOrder.forEach(i=>allItems.push(i));selectedItems.clear();},
    redo(){allItems.length=0;newOrder.forEach(i=>allItems.push(i));selectedItems.clear();}
  });
}

document.addEventListener('mousemove',e=>{
  if(dragStartIdx<0||e.buttons===0){
    dragStartIdx=-1;
    if(reorderHoldTimer){clearTimeout(reorderHoldTimer);reorderHoldTimer=null;}
    if(reorderMode){reorderMode=false;getReorderLine().style.display='none';document.querySelectorAll('#photoTbody tr').forEach(r=>r.style.opacity='');}
    return;
  }
  if(reorderMode){
    const rows=[...document.querySelectorAll('#photoTbody tr')];
    const wrapper=document.getElementById('photoListWrapper');
    const wRect=wrapper.getBoundingClientRect();
    const relY=e.clientY-wRect.top+wrapper.scrollTop;
    let target=rows.length;
    for(let i=0;i<rows.length;i++){const rRect=rows[i].getBoundingClientRect();const rMid=rRect.top-wRect.top+wrapper.scrollTop+rRect.height/2;if(relY<rMid){target=i;break;}}
    reorderTargetIdx=target;
    const line=getReorderLine();
    if(target<rows.length){line.style.top=(rows[target].getBoundingClientRect().top-wRect.top+wrapper.scrollTop)+'px';}
    else if(rows.length){line.style.top=(rows[rows.length-1].getBoundingClientRect().bottom-wRect.top+wrapper.scrollTop)+'px';}
    line.style.display='block';
    return;
  }
  if(!isDragging&&Math.hypot(e.clientX-dragStartX,e.clientY-dragStartY)<8)return;
  if(reorderHoldTimer){clearTimeout(reorderHoldTimer);reorderHoldTimer=null;}
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const tr=el&&el.closest('#photoTbody tr');if(!tr)return;
  const rows=[...document.querySelectorAll('#photoTbody tr')];
  const curIdx=rows.indexOf(tr);if(curIdx<0)return;
  isDragging=true;
  const lo=Math.min(dragStartIdx,curIdx),hi=Math.max(dragStartIdx,curIdx);
  selectedItems.clear();for(let i=lo;i<=hi;i++)selectedItems.add(i);
  lastClickedIdx=curIdx;
  rows.forEach((r,i)=>r.classList.toggle('selected',selectedItems.has(i)));
});
document.addEventListener('mouseup',()=>{
  if(reorderHoldTimer){clearTimeout(reorderHoldTimer);reorderHoldTimer=null;}
  if(reorderMode){
    reorderMode=false;getReorderLine().style.display='none';
    document.querySelectorAll('#photoTbody tr').forEach(r=>r.style.opacity='');
    if(reorderTargetIdx>=0){reorderItems(reorderTargetIdx);reorderTargetIdx=-1;}
  }else if(dragStartIdx>=0&&isDragging){anchorIdx=dragStartIdx;renderList();}
  dragStartIdx=-1;
});

/* 리사이저 초기화 */
function initResizers(){
  // 사이드바 리사이저
  const sidebar=document.getElementById('sidebar'),sr=document.getElementById('sidebarResizer');
  const ps=document.getElementById('previewSection'),pr=document.getElementById('previewResizer');
  const ms=document.getElementById('metaSection'),mr=document.getElementById('metaResizer');
  function applyUi(s){
    if(s['vmap.sb_w'])  sidebar.style.width  = s['vmap.sb_w'];
    if(s['vmap.prev_h'])ps.style.height      = s['vmap.prev_h'];
    if(s['vmap.meta_h'])ms.style.height      = s['vmap.meta_h'];
    if(s['vmap.colvis']){ try{ colVis = Object.assign(colVis, JSON.parse(s['vmap.colvis'])); }catch(e){} }
    if(s['vmap.colw']){ try{ colW = Object.assign(colW, JSON.parse(s['vmap.colw'])); }catch(e){} }
    if((s['vmap.colvis']||s['vmap.colw'])){ if(typeof applyColHeaders==='function') applyColHeaders(); if(typeof renderList==='function') renderList(); }
    if(vmap) setTimeout(()=>vmap.updateSize(),50);
  }
  // localStorage 로 즉시 복원 (WS 연결 전)
  try{ const c=localStorage.getItem('vmap_ui'); if(c) applyUi(JSON.parse(c)); }catch(e){}
  function saveUi(key,val){
    if(!val) return;
    try{ const c=JSON.parse(localStorage.getItem('vmap_ui')||'{}'); c['vmap.'+key]=val; localStorage.setItem('vmap_ui',JSON.stringify(c)); }catch(e){}
    window.__wsSend({type:'set_ui_setting',key:'vmap.'+key,val:val});
  }
  window.__applyUiSettings = applyUi;
  window.__saveUi = saveUi;   // 항목표시(컬럼) 설정 저장용 (전역 노출)
  let rS=false,rP=false,rM=false;
  sr.addEventListener('mousedown',e=>{rS=true;e.preventDefault();});
  pr.addEventListener('mousedown',e=>{rP=true;e.preventDefault();});
  mr.addEventListener('mousedown',e=>{rM=true;e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(rS){const w=e.clientX;if(w>=160&&w<=window.innerWidth-100){sidebar.style.width=w+'px';if(vmap)vmap.updateSize();}}
    if(rP){const sRect=sidebar.getBoundingClientRect();const h=sRect.bottom-e.clientY;if(h>=60&&h<=sRect.height-80)ps.style.height=h+'px';}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// PNU 정렬키 — 법정동코드(10)+산구분(1)+본번(5)+부번(5).
// 역지오코딩 응답에서 직접 생성: Vworld는 structure(level4LC/detail), 카카오 폴백은 address 필드 사용.
function pnuKey(code, isSan, main, sub){
  if(!code)return '';
  return String(code).slice(0,10).padEnd(10,'0')+(isSan?'2':'1')
       +String(main||0).padStart(5,'0')+String(sub||0).padStart(5,'0');
}
function buildPnuVworld(st){
  if(!st||!st.level4LC)return '';
  let d=String(st.detail||'').trim(),san=false;
  if(/^산/.test(d)){san=true;d=d.replace(/^산\s*/,'');}
  const m=d.match(/(\d+)(?:-(\d+))?/);
  return pnuKey(st.level4LC,san,m?+m[1]:0,m&&m[2]?+m[2]:0);
}
function buildPnuKakao(a){
  if(!a||!a.b_code)return '';
  return pnuKey(a.b_code,a.mountain_yn==='Y',parseInt(a.main_address_no||'0',10),parseInt(a.sub_address_no||'0',10));
}

// 상위 행정구역 제거. 단 (광역시 아닌) 시·군 명칭은 유지.
//  · 도 → 제거, 그 아래 시·군은 유지
//  · 특별시/광역시/특별자치시 → 제거하고 그 아래 구도 제거
function trimRegion(parts){
  let i=0;
  if(/도$/.test(parts[0]||'')){
    i++;
  }else if(/(특별시|광역시|특별자치시)$/.test(parts[0]||'')){
    i++;
    if(/구$/.test(parts[i]||''))i++;
  }
  return parts.slice(i);
}
function shortAddr(addr){
  if(!addr||addr==='주소 없음'||addr==='…')return addr||'';
  // "지번 / 도로명" 형식이면 지번만 사용
  const parcel=addr.includes(' / ')?addr.split(' / ')[0].trim():addr.trim();
  const out=trimRegion(parcel.split(/\s+/));
  return out.join(' ')||parcel;
}

function injectGPS(dataUrl, lat, lng) {
  try {
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    let ex={};try{ex=piexif.load(dataUrl);}catch(e){}
    if(!ex.GPS)ex.GPS={};
    ex.GPS[piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';
    ex.GPS[piexif.GPSIFD.GPSLatitude]=toDMS(lat);
    ex.GPS[piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';
    ex.GPS[piexif.GPSIFD.GPSLongitude]=toDMS(lng);
    return piexif.insert(piexif.dump(ex),dataUrl);
  }catch(e){return dataUrl;}
}
function compressImage(src){
  return new Promise(res=>{
    const qv=parseInt(document.getElementById('photoQuality')?.value||'200');
    if(qv===0){res(src);return;}
    const img=new Image();
    img.onload=()=>{
      const T=qv*1024,M=1920;let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85,r=cv.toDataURL('image/jpeg',q);
      while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}
      try{const ex=piexif.load(src);if(ex['0th']){delete ex['0th'][piexif.ImageIFD.UserComment];delete ex['0th'][piexif.ImageIFD.ImageDescription];}if(ex['Exif'])delete ex['Exif'][piexif.ExifIFD.UserComment];r=piexif.insert(piexif.dump(ex),r);}catch(e){}
      res(r);
    };img.src=src;
  });
}
function downloadPhotoWithGPS(imgSrc,name,lat,lng){
  return new Promise(res=>{
    const qv=parseInt(document.getElementById('photoQuality')?.value||'200');
    const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};
    const addGPS=dataUrl=>{
      try{let ex={};try{ex=piexif.load(imgSrc);}catch(e){}

        if(!ex.GPS)ex.GPS={};
        ex.GPS[piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';ex.GPS[piexif.GPSIFD.GPSLatitude]=toDMS(lat);
        ex.GPS[piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';ex.GPS[piexif.GPSIFD.GPSLongitude]=toDMS(lng);

    };

      let q=0.92,r=cv.toDataURL('image/jpeg',q);while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}

function toMerc(lng,lat){return ol.proj.transform([lng,lat],'EPSG:4326','EPSG:3857');}
function fromMerc(c){return ol.proj.transform(c,'EPSG:3857','EPSG:4326');}
function pad(n){return String(n).padStart(2,'0');}
function randColor(){return'#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function extractGPS(imgSrc){
  try{
    const exif=piexif.load(imgSrc),gps=exif['GPS'];
    if(!gps?.[piexif.GPSIFD.GPSLatitude])return null;
    const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
    const la=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
    const lo=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
    return(isNaN(la)||isNaN(lo)||(!la&&!lo))?null:[lo,la];
  }catch(e){return null;}
}

function fitPts(pts){
  if(!pts||!pts.length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  pts.forEach(c=>{if(c[0]<minX)minX=c[0];if(c[0]>maxX)maxX=c[0];if(c[1]<minY)minY=c[1];if(c[1]>maxY)maxY=c[1];});
  const cx=(minX+maxX)/2,cy=(minY+maxY)/2;vmap.getView().setCenter([cx,cy]);
  const w=maxX-minX,h=maxY-minY;
  if(w<100&&h<100){vmap.getView().setZoom(16);return;}
  const mapSize=vmap.getSize()||[window.innerWidth,window.innerHeight];
  const viewW=Math.max(mapSize[0]-160,100),viewH=Math.max(mapSize[1]-160,100);
  const res=Math.max(w/viewW,h/viewH);
  vmap.getView().setZoom(Math.min(Math.max(Math.floor(Math.log2(156543.03392/res)),1),16));
}

// ── 저장 위치 결정 (① 데이터파일 폴더 → ② 화면 중심 최근접 사진 폴더) ──
let loadedDataFiles=[];   // 엑셀에서 올라온 KMZ/GPX/CSV 원본 전체경로 (영구)
let liveDataFile='';      // 단일 셀 임시 KMZ 경로 (셀 이동 시 비움)
function dirOf(p){return p?p.replace(/[\\/][^\\/]*$/,''):'';}
function baseName(p){return p?p.replace(/^.*[\\/]/,'').replace(/\.[^.]*$/,''):'';}

// 저장 대상 → {folder, base(기준 사진 이름, 확장자 없음)}
function resolveSaveTarget(){
  if(typeof vmap!=='undefined'&&vmap){
    const c=vmap.getView().getCenter();
    let best=null,bestD=Infinity;
    const folders=new Set();
    allItems.forEach(it=>{
      if(it.type==='photo'&&it.path&&it.mkObj){
        folders.add(dirOf(it.path));
        const p=it.mkObj.feat.getGeometry().getCoordinates();
        const d=Math.hypot(p[0]-c[0],p[1]-c[1]);
        if(d<bestD){bestD=d;best=it;}
      }
    });
    // 사진이 모두 같은 폴더면 그 폴더에 저장, 서로 다른 폴더면 다운로드 폴더(folder 비움)
    if(best)return {folder:(folders.size>1)?'':dirOf(best.path),base:baseName(best.path)};
  }
  // ② 사진이 없으면 셀에서 올린 KMZ 폴더·이름 사용 (그 KMZ 위에 덮어쓰기 흐름)
  if(liveDataFile)return {folder:dirOf(liveDataFile),base:baseName(liveDataFile)};
  for(let i=loadedDataFiles.length-1;i>=0;i--)if(loadedDataFiles[i])return {folder:dirOf(loadedDataFiles[i]),base:baseName(loadedDataFiles[i])};
  return {folder:'',base:''};
}

// 저장 prompt 기본값: 기준 사진 이름(있으면) → 없으면 fallback
function defaultSaveName(fallback){
  const t=resolveSaveTarget();
  return t.base || fallback;
}

// onSaved: 저장이 실제로 끝난 뒤 실행할 후처리(_live 표시·사진번호 등). 대화상자 경로는
// 사용자가 저장을 확정(성공)했을 때만 실행되고, 취소하면 실행되지 않는다.
function dlBlob(blob,filename,chooseDir,onSaved){
  // chooseDir=true 이면 KMZ 저장 시 네이티브 '다른 이름으로 저장' 대화상자를 띄워
  // 사용자가 폴더·파일명을 직접 고르게 한다(지난번 저장 폴더가 기본값).
  if(chooseDir && /\.kmz$/i.test(filename) && window.__wsReady && window.__wsReady()){
    window.__kmzOnSaved=onSaved||null;   // file_saved(ok) 때 호출 / 취소·실패 시 미실행
    const sug=resolveSaveTarget().folder||'';
    const fr=new FileReader();
    fr.onload=()=>{
      window.__wsSend({type:'save_kmz_dialog',filename,suggested:sug,data:fr.result.split(',')[1]});
      window.__setBadge&&window.__setBadge(true,'💾 저장 위치 선택...');
    };
    fr.readAsDataURL(blob);
    return;
  }
  // 작업 폴더가 정해지고 WS 연결되면 Python에 저장, 아니면 다운로드
  const t=resolveSaveTarget();
  const folder=t.folder;
  if(folder && window.__wsReady && window.__wsReady()){
    const fr=new FileReader();
    fr.onload=()=>window.__saveViaPython(folder,filename,fr.result.split(',')[1]);
    fr.readAsDataURL(blob);
    if(onSaved)onSaved();
    return;
  }
  const photos=allItems.filter(i=>i.type==='photo');
  console.warn('[저장] 작업 폴더 미확정 → 다운로드 폴더로 저장합니다.',{
    folder, wsReady:!!(window.__wsReady&&window.__wsReady()),
    사진수:photos.length, 경로있는사진:photos.filter(i=>i.path).length,
    데이터파일:loadedDataFiles.length, liveData:liveDataFile
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
  if(onSaved)onSaved();
}
function parseCSV(line){const r=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}

// ══════════════════════════════════════════════════
//  탐색기 연동 WebSocket (사진위치표시.py 와 통신)
// ══════════════════════════════════════════════════
(function(){
  const WS_URL='ws://localhost:8765';
  let ws=null, liveOvs=[], retryTimer=null;
  // Ctrl+C(탐색기) 위치없는 사진을 지도 중심에 임시 배치할 때 쓰는 드래그용 초록 핀.
  // 임시(_live) 객체와 함께 clearLiveItems/⬇삽입 시 정리되고, resetAll 에서도 정리한다.
  let recordOvs=[];
  window.__clearRecordOvs=()=>{ recordOvs.forEach(ov=>{try{vmap.removeOverlay(ov);}catch(e){}}); recordOvs=[]; };
  let lastExcelRow=null;   // 엑셀 활성 셀 행 추적 (객체리셋 모드: 행 변경 시 기존 객체 제거)
  const badge=document.getElementById('explorerBadge');
  // path → overlay / 사진마커 매핑 (undo/redo·드래그 위치 복원에 사용)
  const pathToOv=new Map();
  const pathToMk=new Map();

  function setBadge(ok,text){badge.textContent=text;badge.classList.toggle('connected',ok);}

  // ── 저장(dlBlob)에서 사용하는 Python 연동 공개 함수 ──
  let pendingSave=null;   // 덮어쓰기 확인용 보관 {folder, filename, b64}
  window.__wsReady=()=>ws&&ws.readyState===1;
  window.__saveViaPython=(folder,filename,b64)=>{
    pendingSave={folder,filename,b64};
    ws.send(JSON.stringify({type:'save_file',folder,filename,data:b64,overwrite:false}));
    setBadge(true,'💾 저장 중...');
  };
  // 외부(IIFE 바깥) 함수에서 WebSocket 전송 / 배지 표시할 수 있도록 노출
  window.__wsSend=(obj)=>{ if(ws&&ws.readyState===1){ws.send(JSON.stringify(obj));return true;} return false; };
  window.__setBadge=setBadge;

  function removeLive(){
    liveOvs.forEach(ov=>vmap.removeOverlay(ov));
    liveOvs=[];
    pathToOv.clear();
    pathToMk.clear();
  }

  // 현재 임시(_live) 객체들을 영구 객체로 확정(Insert).
  //  - _live 플래그 제거 → live_clear/clearLiveItems 로 더 이상 지워지지 않음
  //  - 녹색 드래그 마커/링(미리보기 장식) 제거, 사진 마커·트랙은 그대로 유지
  window.__promoteLive=()=>{
    const liveItems=allItems.filter(i=>i._live);
    if(!liveItems.length){setBadge(true,'⚠️ 삽입할 임시 객체 없음');return 0;}
    liveItems.forEach(i=>{delete i._live;delete i._srcKmz;});
    removeLive();
    if(window.__clearRecordOvs)window.__clearRecordOvs();   // 초록 드래그핀 제거
    clearLivePreview();
    liveDataFile='';
    if(window.__wsSend)window.__wsSend({type:'reset_live_broadcast'});
    renderList();
    setBadge(true,`✅ 객체 ${liveItems.length}개 삽입됨`);
    return liveItems.length;
  };

  // 탐색기에서 임시삽입된 파일을 지도로 '드래그'하면 → 새로 로드해 중복 만들지 말고
  //  이미 있는 그 임시항목을 영구 확정(경로 유지 → Ctrl+C 파일복사 가능). 파일명(디스크경로 basename)으로 매칭.
  window.__promoteMatchingLive=fileName=>{
    const base=String(fileName||'').toLowerCase();
    if(!base)return false;
    const dup=allItems.find(it=>it._live&&it.path&&
      String(it.path).toLowerCase().split(/[\\/]/).pop()===base);
    if(!dup)return false;
    delete dup._live;delete dup._srcKmz;            // 영구 확정
    if(dup.path&&pathToOv.has(dup.path)){const ov=pathToOv.get(dup.path);if(ov)vmap.removeOverlay(ov);pathToOv.delete(dup.path);pathToMk.delete(dup.path);}
    renderList();
    setBadge(true,`✅ ${dup.name} 삽입됨`);
    return true;
  };

  // 엑셀 셀 선택으로 임시 삽입된 항목(사진마커·KMZ) 전부 제거
  function clearLiveItems(){
    clearLivePreview();
    removeLive();
    if(window.__clearRecordOvs)window.__clearRecordOvs();   // 초록 드래그핀도 제거
    liveDataFile='';
    const live=allItems.filter(i=>i._live);
    if(!live.length)return;
    live.forEach(item=>{
      if(item.mkObj){
        if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);
        removeLyr(item.mkObj.lyr);
        markers=markers.filter(m=>m!==item.mkObj);
      }
      if(item.polyLyr){
        removeLyr(item.polyLyr);
        polylines=polylines.filter(p=>p!==item.polyLyr);
      }
    });
    allItems=allItems.filter(i=>!i._live);
    selectedItems.clear();anchorIdx=-1;lastClickedIdx=-1;
    renderList();
  }

  // 임시(_live) 항목이 이미 영구 삽입된 항목과 중복되면 임시항목 제거.
  //  (⬇삽입으로 확정하면 _srcKmz 가 지워져 같은 KMZ 재선택 시 중복 임시가 생기므로)
  //  판정키: 디스크경로(path) 있으면 path, 없으면 이름+대표좌표(6자리) — 둘 다 같아야 중복.
  window.__dedupLiveItems=function(){
    if(!allItems.some(i=>i._live))return 0;
    const key=it=>{
      if(it.path)return 'p:'+String(it.path).toLowerCase();
      const c=getItemCenterCoordV(it);let g='';
      if(c){const ll=fromMerc(c);g=ll[1].toFixed(6)+','+ll[0].toFixed(6);}
      return 'n:'+(it.name||'')+'|'+g;
    };
    const permKeys=new Set();
    for(const it of allItems)if(!it._live)permKeys.add(key(it));
    if(!permKeys.size)return 0;
    const dups=allItems.filter(i=>i._live&&permKeys.has(key(i)));
    if(!dups.length)return 0;
    for(const item of dups){
      if(item.mkObj){if(item.mkObj.ov)vmap.removeOverlay(item.mkObj.ov);removeLyr(item.mkObj.lyr);markers=markers.filter(m=>m!==item.mkObj);}
      if(item.polyLyr){removeLyr(item.polyLyr);polylines=polylines.filter(p=>p!==item.polyLyr);}
      if(item.path){const ov=pathToOv.get(item.path);if(ov)vmap.removeOverlay(ov);pathToOv.delete(item.path);pathToMk.delete(item.path);}
    }
    allItems=allItems.filter(i=>!dups.includes(i));
    return dups.length;
  };

  // path 로 식별되는 마커 위치 적용 (undo/redo 시 시각 반영)
  function applyPos(path, lat, lng){
    const coord=toMerc(lng, lat);
    const ov=pathToOv.get(path);
    if(ov) ov.setPosition(coord);
    const mk=pathToMk.get(path);                       // 사진 마커도 함께 이동
    if(mk) mk.feat.getGeometry().setCoordinates(coord);
  }

  // Python 측 GPS 저장 요청
  function sendGps(path, lat, lng){
    if(ws&&ws.readyState===1){
      ws.send(JSON.stringify({type:'update_gps',path,lat,lng}));
      setBadge(true,'💾 저장 중...');
    }
  }

  // ── 드래그로 마커 이동 + Python에 새 좌표 전송 ──
  //  mkObj: 함께 움직일 사진 마커(ol.Feature 보유). 없으면 오버레이만 이동.
  function makeDraggable(el, ov, path, mkObj){
    el.addEventListener('pointerdown', e=>{
      if(e.button!==0)return;
      e.stopPropagation();              // 지도 클릭 이벤트 차단
      // e.preventDefault() 제거 → 키보드 포커스 관리 정상 유지
      const sx=e.clientX, sy=e.clientY;
      const origCoord=ov.getPosition(); // 취소 시 복원용
      let dragging=false;

      const holdTimer=setTimeout(()=>{
        dragging=true;
        el.classList.add('dragging');
      }, 400);

      function onMove(e){
        if(!dragging){
          if(Math.hypot(e.clientX-sx,e.clientY-sy)>6){clearTimeout(holdTimer);cleanup();}
          return;
        }
        // 마우스 픽셀 → 지도 좌표 변환
        const mapEl=document.getElementById('vmap');
        const rect=mapEl.getBoundingClientRect();
        const pixel=[e.clientX-rect.left, e.clientY-rect.top];
        const coord=vmap.getCoordinateFromPixel(pixel);
        if(coord){
          ov.setPosition(coord);
          if(mkObj) mkObj.feat.getGeometry().setCoordinates(coord);  // 사진 마커 동시 이동
        }
      }

      function onUp(){
        clearTimeout(holdTimer); cleanup();
        if(!dragging){
          // 짧은 클릭(드래그 아님) → 초록 핀 아래 사진 마커를 사이드바에서 선택
          if(mkObj) syncSidebarToMarker(mkObj);
          return;
        }
        el.classList.remove('dragging');
        // overlay는 드래그된 위치에 있음 → 확인창 뜨는 동안 그대로 보임

        const coord=ov.getPosition();
        if(!coord)return;
        const [lng,lat]=fromMerc(coord);
        const [prevLng,prevLat]=fromMerc(origCoord);
        const name=path.split('\\').pop();

        if(!confirm(`📍 GPS 위치를 수정하시겠습니까?\n\n파일: ${name}\n위도: ${lat.toFixed(6)}\n경도: ${lng.toFixed(6)}`)){
          ov.setPosition(origCoord);    // 취소 → 원래 위치로 복원
          if(mkObj) mkObj.feat.getGeometry().setCoordinates(origCoord);
          return;
        }

        // 확인 → Python으로 새 좌표 전송 + 글로벌 undo 스택에 기록
        sendGps(path, lat, lng);
        if(mkObj){const it=allItems.find(i=>i.mkObj===mkObj);if(it)fetchAddrForItem(it);}
        pushHistory({
          undo(){ applyPos(path, prevLat, prevLng); sendGps(path, prevLat, prevLng); },
          redo(){ applyPos(path, lat,     lng);     sendGps(path, lat,     lng);     }
        });
      }

      function cleanup(){
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',  onUp);
      }
      document.addEventListener('pointermove',onMove);
      document.addEventListener('pointerup',  onUp);
    });
  }

  function showLiveMulti(items){
    removeLive();
    if(!vmap||!items.length)return;

    const coords=[];
    items.forEach(({lat,lng,name,path})=>{
      // 유효 좌표만 처리
      if (typeof lat !== 'number' || typeof lng !== 'number' ||
          isNaN(lat) || isNaN(lng)) return;

      const coord=toMerc(lng,lat);
      coords.push(coord);
      const isPhoto = !!path;
      const el=document.createElement('div');
      el.className = 'live-pin' + (isPhoto ? '' : ' coord-only');
      el.title = isPhoto ? '길게 눌러 드래그하면 GPS 위치 수정' : (name || '좌표');
      // 사진(초록) → 펄스 링 + 점 / 좌표(파랑) → 정적 파란 점만
      if (isPhoto) {
        el.innerHTML='<div class="live-pin-ring"></div>'
                    +'<div class="live-pin-dot"></div>';   // 사진마커 이름 라벨 제거
      } else {
        el.innerHTML='<div class="live-pin-label">'+name+'</div>'
                    +'<div class="live-pin-dot" style="background:#2196f3;"></div>';
      }
      const ov=new ol.Overlay({element:el,position:coord,positioning:'center-center',stopEvent:isPhoto});
      vmap.addOverlay(ov);
      liveOvs.push(ov);
      if (isPhoto) {
        makeDraggable(el,ov,path);
        pathToOv.set(path, ov);
      }
    });

    if (!coords.length) return;

    // 맵 크기 갱신 (사이드바 토글 등으로 크기 변경되었을 수 있음)
    try { vmap.updateSize(); } catch (e) {}

    const view = vmap.getView();

    // 모든 좌표의 범위 계산
    const xs = coords.map(c => c[0]);
    const ys = coords.map(c => c[1]);
    const minX = Math.min.apply(null, xs);
    const maxX = Math.max.apply(null, xs);
    const minY = Math.min.apply(null, ys);
    const maxY = Math.max.apply(null, ys);
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const sameSpot = (minX === maxX && minY === maxY);

    // 단일 좌표 또는 동일 좌표들 → 중심점으로 이동 + 적절한 줌
    if (coords.length === 1 || sameSpot) {
      const curZoom = view.getZoom();
      const targetZoom = (typeof curZoom === 'number' && curZoom >= 14) ? curZoom : 15;
      if (typeof view.animate === 'function') {
        view.animate({ center: [cx, cy], zoom: targetZoom, duration: 400 });
      } else {
        view.setCenter([cx, cy]);
        view.setZoom(targetZoom);
      }
      return;
    }

    // 여러 좌표 → 수동으로 줌 계산해서 view.animate
    // (view.fit이 일부 환경에서 maxZoom으로 튀는 문제 회피)
    const mapSize = vmap.getSize() || [800, 600];
    const padW = Math.max(100, mapSize[0] - 140);   // 좌우 70px 여유
    const padH = Math.max(100, mapSize[1] - 140);   // 상하 70px 여유
    const extW = maxX - minX;
    const extH = maxY - minY;

    // Web Mercator 줌 공식: resolution = 156543.04 / 2^zoom
    // → zoom = log2(156543.04 / resolution)
    const resX = extW / padW;
    const resY = extH / padH;
    const res  = Math.max(resX, resY, 0.1);   // 0 방지
    let zoom = Math.log2(156543.04 / res);
    zoom = Math.min(16, Math.max(3, zoom));

    try {
      if (typeof view.animate === 'function') {
        view.animate({ center: [cx, cy], zoom: zoom, duration: 400 });
      } else {
        view.setCenter([cx, cy]);
        view.setZoom(zoom);
      }
    } catch (e) {
      try { view.setCenter([cx, cy]); view.setZoom(13); } catch (e2) {}
    }
  }

  function connect(){
    if(ws&&ws.readyState<2)return;
    try{ws=new WebSocket(WS_URL);}catch(e){scheduleRetry();return;}

    ws.onopen=()=>{setBadge(true,'🟢 탐색기 연동 중');clearTimeout(retryTimer);window.__wsSend({type:'get_ui_settings'});};

    ws.onmessage=({data})=>{
      try{
        const d=JSON.parse(data);
        if(d.type==='photos'){
          if(d.items.length===0){
            removeLive();
            setBadge(true,'🟢 탐색기 연동 중');
          } else {
            const gpsItems=d.items.filter(i=>i.has_gps);
            const noGps=d.items.length-gpsItems.length;
            if(gpsItems.length>0){
              showLiveMulti(gpsItems);
              const label=gpsItems.length===1?gpsItems[0].name:gpsItems.length+'장 선택';
              setBadge(true,'🟢 '+label+(noGps?' (GPS없음 '+noGps+'장)':''));
            } else {
              removeLive();
              setBadge(true,'⚠️ GPS 없음 ('+d.items.length+'장)');
            }
          }
        } else if(d.type==='ui_settings'){
          if(window.__applyUiSettings)window.__applyUiSettings(d.settings||{});
        } else if(d.type==='promote_live'){
          // 전역 Insert 키 — 임시(live) 객체 영구 삽입
          insertLiveObjects();
        } else if(d.type==='close_maps'){
          // 서버 '재실행' — beforeunload 경고 없이 지도창 스스로 닫기
          window.__skipUnloadGuard=true;
          try{window.close();}catch(e){}
        } else if(d.type==='resolved_paths'){
          // 드롭된 사진의 디스크 경로를 서버가 회신 → 대기 항목에 반영 (Ctrl+C 파일복사 가능)
          applyResolvedPaths(d.map||{});
        } else if(d.type==='notice'){
          if(d.clearLocPick){stopLocationPick();clearLocationPick(false);}
          window.__kmzOnSaved=null;   // KMZ 저장 취소 등 → 대기 중인 후처리 폐기
          setBadge(true, d.msg||'');
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='file_meta'){
          // 메타정보창 — 현재 선택 항목의 저장된 메타 응답이면 갱신
          if(_metaItem&&d.path===_metaReqPath){_metaSm=d.meta||{};renderMeta(_metaItem,_metaSm);
            // 서버가 읽은 촬영일시를 항목에 캐시 → 목록 '촬영일시' 컬럼에도 반영
            if(_metaSm.taken&&!_metaItem.takenDate){_metaItem.takenDate=_metaSm.taken;renderList();}}
        } else if(d.type==='photo_meta_saved'){
          // 메타 수정 저장 결과
          setBadge(true,d.msg||(d.ok?'💾 저장됨':'❌ 저장 실패'));
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
          if(d.ok){
            let changed=false;

            if(changed)renderList();

            it=>`${it.type==='photo'?'🖼':'🗂'} <b>${escHtml(it.name)}</b><br><span style="color:#888;font-size:11px;">${escHtml(it.info||'')}</span><br><span style="color:#aaa;font-size:11px;">${escHtml(it.path||'')}</span>`,
            saveSearchItems
          );
        } else if(d.type==='gps_saved'){
          const name=d.path.split('\\').pop();
          setBadge(true, d.ok?'✅ 저장됨: '+name:'❌ 저장실패: '+name);
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='name_saved'){
          const fn=d.path.split(/[\\/]/).pop();
          if(typeof showSaveStatus==='function')
            showSaveStatus(d.ok?'✅ 이름 저장됨 · 수정날짜 갱신 — '+fn:'❌ 이름 저장 실패 — '+fn, !!d.ok);
          setBadge(true, d.ok?'✅ 이름 저장: '+fn:'❌ 이름 저장실패: '+fn);
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='photos_renamed'){
          // 디스크 원본 사진 파일명 변경 완료 → 사이드바 항목 path 갱신
          let n=0;
          (d.items||[]).forEach(r=>{
            if(!r.ok||!r.new||r.old===r.new)return;
            allItems.forEach(it=>{if(it.path===r.old){it.path=r.new;n++;}});
            [pathToOv,pathToMk].forEach(mp=>{if(mp.has(r.old)){const v=mp.get(r.old);mp.delete(r.old);mp.set(r.new,v);}});
          });
          setBadge(true, n?`✅ 원본 사진 ${n}개 이름변경됨`:'⚠️ 원본 사진 이름변경 없음');
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='file_saved'){
          if(d.ok){

            if(d.folder){console.log('저장 위치:',d.folder+'\\'+d.filename); showSaveStatus('✅ 저장됨: '+d.folder+'\\'+d.filename);}
            pendingSave=null;
            // KMZ '다른 이름으로 저장' 성공 → 후처리(_live 표시·사진번호) 실행
            if(window.__kmzOnSaved){try{window.__kmzOnSaved();}catch(e){}window.__kmzOnSaved=null;}
          } else {
            window.__kmzOnSaved=null;   // 저장 실패 시 후처리 안 함
            setBadge(false,'❌ 저장실패: '+d.filename);
            if(pendingSave){
              try{
                const ps=pendingSave; pendingSave=null;
                const bytes=atob(ps.b64);
                const arr=new Uint8Array(bytes.length);
                for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
                const fb=new Blob([arr],{type:'application/octet-stream'});
                const a=document.createElement('a'); a.href=URL.createObjectURL(fb); a.download=ps.filename;
                document.body.appendChild(a); a.click();
                setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
                showSaveStatus('⚠️ 폴더 저장 실패 → 다운로드 폴더에 저장됨: '+ps.filename, false);
              } catch(e){ pendingSave=null; showSaveStatus('❌ 저장 실패: '+e.message, false); }
            } else { pendingSave=null; }
          }
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),3000);
        } else if(d.type==='file_exists'){
          if(pendingSave && confirm("'"+d.filename+"' 파일이 이미 있습니다.\n덮어쓰시겠습니까?")){
            ws.send(JSON.stringify({type:'save_file',folder:pendingSave.folder,
              filename:pendingSave.filename,data:pendingSave.b64,overwrite:true}));
            setBadge(true,'💾 덮어쓰는 중...');
          } else {
            pendingSave=null;
            setBadge(true,'저장 취소됨');
            setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2000);
          }

          // 엑셀 행 변경 + 객체리셋 모드 → 기존 삽입 객체 제거
          if(d.source==='excel'){

          updateMetaPanel(null);   // 선택 바뀜 → 이전 메타정보 지움 (새 선택이 다시 채움)
        } else if(d.type==='live_insert_photo'){

          if(d.items.length&&d.items[0].imgSrc)setLivePreview(d.items[0].imgSrc);
          // 탐색기/엑셀에서 임시로 삽입된 사진도 메타정보창에 표시
          if(d.items.length)updateMetaPanel({type:'photo',name:d.items[0].name,path:d.items[0].path,takenDate:d.items[0].takenDate});
          const permPaths=new Set(allItems.filter(i=>i.path).map(i=>i.path));

            if(typeof item.lat!=='number'||typeof item.lng!=='number'||
               isNaN(item.lat)||isNaN(item.lng))return;   // GPS 없음 → 미리보기만
            if(permPaths.has(item.path))return;   // 이미 영구 삽입됨 → 위치 핀 생략
            const coord=toMerc(item.lng,item.lat);

            const mkObj=addPhotoMarker(coord,item.imgSrc,item.name);
            allItems[allItems.length-1]._live=true;
            allItems[allItems.length-1].path=item.path;   // 저장 폴더 결정용
            // ② 녹색 깜빡 드래그 핀 (최전면)
            const el=document.createElement('div');
            el.className='live-pin';
            el.title='길게 눌러 드래그하면 사진 위치(GPS) 수정';
            el.innerHTML='<div class="live-pin-ring"></div>'
                        +'<div class="live-pin-dot"></div>';   // 사진마커 이름 라벨 제거
            const ov=new ol.Overlay({element:el,position:coord,positioning:'center-center',stopEvent:true});
            vmap.addOverlay(ov);liveOvs.push(ov);
            makeDraggable(el,ov,path,mkObj);   // 핀+사진마커 함께 이동, GPS 저장
            if(path){pathToOv.set(path,ov);pathToMk.set(path,mkObj);}
            coords.push(coord);
          });
          if(window.__dedupLiveItems())renderList();   // 이미 삽입된 것과 중복되는 임시항목 제거
          if(coords.length){
            // 사이드바 자동 열림(updateSize 50ms) 이후 보이는 지도 중심으로 이동
            setTimeout(()=>{
              try{vmap.updateSize();}catch(e){}
              if(coords.length===1){
                const v=vmap.getView();const z=v.getZoom();
                const tz=(typeof z==='number'&&z>=14)?z:16;
                if(typeof v.animate==='function')v.animate({center:coords[0],zoom:tz,duration:400});
                else{v.setCenter(coords[0]);v.setZoom(tz);}
              } else fitPts(coords);
            },80);
            setBadge(true,'📍 '+d.items[0].name);
          }
        } else if(d.type==='place_at_center'){
          // 탐색기에서 Ctrl+C 한 사진을 지도 중심에 영구 배치.
          // GPS 있으면 그 위치, 없으면 화면 중심(여러 장이면 격자로 펼침)에 둔다.
          // 초록 핀을 길게 눌러 드래그하면 update_gps 로 사진 파일에 위치가 기록된다.
          if(!vmap||!d.items||!d.items.length)return;
          const center=vmap.getView().getCenter();
          const ext=vmap.getView().calculateExtent(vmap.getSize());
          const spanX=ext[2]-ext[0], spanY=ext[3]-ext[1];
          const stepX=spanX*0.08, stepY=spanY*0.08;   // 격자 간격(화면의 약 8%)
          const noGpsItems=d.items.filter(it=>typeof it.lat!=='number');
          const cols=Math.max(1,Math.ceil(Math.sqrt(noGpsItems.length)));
          const placed=[];
          let noGpsIdx=0;
          d.items.forEach(item=>{
            const hasGps=(typeof item.lat==='number'&&typeof item.lng==='number'
                          &&!isNaN(item.lat)&&!isNaN(item.lng));
            let coord;
            if(hasGps){
              coord=toMerc(item.lng,item.lat);
            } else {
              const r=Math.floor(noGpsIdx/cols), c=noGpsIdx%cols;
              const offRow=r-(Math.ceil(noGpsItems.length/cols)-1)/2;
              const offCol=c-(cols-1)/2;
              coord=[center[0]+offCol*stepX, center[1]-offRow*stepY];
              noGpsIdx++;
            }
            const path=item.path;
            // ① 영구 사진 마커
            const mkObj=addPhotoMarker(coord,item.imgSrc,item.name);
            allItems[allItems.length-1].path=item.path;   // 저장 폴더 결정용
            allItems[allItems.length-1]._live=true;        // 임시 객체 — 다른 파일 선택 시 내려감(⬇삽입으로 확정)
            // ② 길게 눌러 드래그하는 초록 핀 (위치 기록용)
            const el=document.createElement('div');
            el.className='live-pin';
            el.title='길게 눌러 드래그하면 사진 위치(GPS) 기록';
            el.innerHTML='<div class="live-pin-ring"></div>'
                        +'<div class="live-pin-dot"></div>';   // 사진마커 이름 라벨 제거
            const ov=new ol.Overlay({element:el,position:coord,positioning:'center-center',stopEvent:true});
            vmap.addOverlay(ov);recordOvs.push(ov);
            makeDraggable(el,ov,path,mkObj);   // 핀+사진마커 함께 이동, GPS 저장
            if(path){pathToOv.set(path,ov);pathToMk.set(path,mkObj);}
            placed.push(coord);
          });
          renderList();   // _live 플래그 반영 (임시 객체 = 흐리게 표시)
          setTimeout(()=>{
            try{vmap.updateSize();}catch(e){}
            if(placed.length===1){
              const v=vmap.getView();const z=v.getZoom();
              const tz=(typeof z==='number'&&z>=14)?z:16;
              if(typeof v.animate==='function')v.animate({center:placed[0],zoom:tz,duration:400});
              else{v.setCenter(placed[0]);v.setZoom(tz);}
            } else fitPts(placed);
          },80);
          setBadge(true,'📍 사진 '+d.items.length+'장 임시 배치됨 — 초록 핀 드래그로 위치 기록 · ⬇삽입으로 확정');
        } else if(d.type==='live_insert_kmz'){
          if(!d.append)clearLiveItems();   // 사진과 함께 온 KMZ(append)는 임시 사진을 지우지 않음
          // 단일(d.data) 또는 배열(d.items) 모두 지원
          let kmzItems=d.items||[{name:d.name,path:d.path,data:d.data}];
          // 탐색기에서 KMZ를 고르면 바로 그 KMZ의 메타정보 표시 (안 사진을 안 골라도)
          if(kmzItems[0]&&kmzItems[0].path)
            updateMetaPanel({type:'kmz',name:kmzItems[0].name,_srcKmz:kmzItems[0].path});
          // 이미 영구 삽입된 같은 파일의 재선택이면 유지 (삽입 직후 셀 재선택으로 지워지는 것 방지)
          const permKmz=new Set(allItems.map(i=>i._srcKmz).filter(Boolean));
          // 이미 영구 삽입된 KMZ는 미리보기 생략 (셀 재선택 시 중복 방지)
          kmzItems=kmzItems.filter(it=>!permKmz.has(it.path));
          if(!kmzItems.length){setBadge(true,'🟢 탐색기 연동 중');return;}
          liveDataFile=(kmzItems[0]&&kmzItems[0].path)||'';
          const namesStr=kmzItems.length===1?kmzItems[0].name:'KMZ '+kmzItems.length+'개';
          setBadge(true,'📂 '+namesStr+' 로드 중…');
          (async()=>{
            try{
              for(const item of kmzItems){
                const bytes=Uint8Array.from(atob(item.data),c=>c.charCodeAt(0));
                const file=new File([bytes],item.name,{type:'application/vnd.google-earth.kmz'});
                const preLen=allItems.length;
                await loadKMZ(file);
                for(let i=preLen;i<allItems.length;i++)allItems[i]._live=true;
              }
              window.__dedupLiveItems();   // 이미 삽입된 것과 중복되는 임시항목 제거
              renderList();
              setBadge(true,'🟢 탐색기 연동 중');
            }catch(e){console.error('live KMZ 오류',e);setBadge(true,'❌ KMZ 오류: '+namesStr);}
          })();
        } else if(d.type==='insert_photos'){
          // 영구 삽입 — 먼저 live(미리보기) 제거: 활성 셀 사진이 미리보기로만 남아
          //   선택 해제 시 사라지던 문제 방지. 이후 '영구' 항목 기준으로만 중복 판정.
          clearLiveItems();
          const existPaths=new Set(allItems.filter(i=>i.path).map(i=>i.path));
          const newItems=d.items.filter(item=>!existPaths.has(item.path));
          const skipped=d.items.length-newItems.length;
          if(skipped>0)console.log('[insert_photos] '+skipped+'개 이미 삽입됨 → 건너뜀');
          const coords=[];
          newItems.forEach(item=>{
            if(typeof item.lat!=='number'||typeof item.lng!=='number'||
               isNaN(item.lat)||isNaN(item.lng))return;
            const coord=toMerc(item.lng,item.lat);
            addPhotoMarker(coord,item.imgSrc,item.name);
            allItems[allItems.length-1].path=item.path;   // 저장 폴더 결정용
            coords.push(coord);
          });
          if(coords.length)setTimeout(()=>{try{vmap.updateSize();}catch(e){}fitPts(coords);},80);
          setBadge(true, coords.length?('✅ 사진 '+coords.length+'장 삽입됨'+(skipped?' ('+skipped+'개 중복 제외)':'')):'⚠️ GPS 있는 사진 없음 또는 이미 삽입됨');
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='insert_markers'){
          // 엑셀 위경도 좌표 셀 → 마커 영구 삽입
          clearLiveItems();
          const coords=[];
          (d.items||[]).forEach(item=>{
            if(typeof item.lat!=='number'||typeof item.lng!=='number'||
               isNaN(item.lat)||isNaN(item.lng))return;
            const coord=toMerc(item.lng,item.lat);
            addMarker(coord,item.name||(item.lat+', '+item.lng));
            coords.push(coord);
          });
          if(coords.length)setTimeout(()=>{try{vmap.updateSize();}catch(e){}fitPts(coords);},80);
          setBadge(true, coords.length?('✅ 좌표 마커 '+coords.length+'개 삽입됨'):'⚠️ 좌표 없음');
          setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
        } else if(d.type==='insert_kmz'){
          // KMZ 삽입 — 먼저 live(미리보기) 제거, 사이드바에 현재 남아있는 KMZ만 중복 제외
          clearLiveItems();
          const presentKmz=new Set(allItems.map(i=>i._srcKmz).filter(Boolean));
          const newItems=d.items.filter(item=>!presentKmz.has(item.path));
          const skipped=d.items.length-newItems.length;
          if(skipped>0)console.log('[insert_kmz] '+skipped+'개 사이드바에 이미 있음 → 건너뜀');
          if(!newItems.length){
            setBadge(true,'⚠️ KMZ 이미 모두 삽입됨');
            setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2000);
          }else{
            setBadge(true,'📂 KMZ '+newItems.length+'개 로드 중…');
            (async()=>{
              for(const item of newItems){
                try{
                  if(item.path)loadedDataFiles.push(item.path);   // 저장 폴더 결정용
                  const preLen=allItems.length;
                  const bytes=Uint8Array.from(atob(item.data),c=>c.charCodeAt(0));
                  const file=new File([bytes],item.name,{type:'application/vnd.google-earth.kmz'});
                  await loadKMZ(file);
                  // 이번 KMZ로 새로 생긴 항목에 출처경로 태깅 (삭제 후 재삽입 판정용)
                  for(let i=preLen;i<allItems.length;i++)allItems[i]._srcKmz=item.path;
                }catch(e){console.error('KMZ 오류',item.name,e);}
              }
              setBadge(true,'✅ KMZ '+newItems.length+'개 삽입됨'+(skipped?' ('+skipped+'개 중복 제외)':''));
              setTimeout(()=>setBadge(true,'🟢 탐색기 연동 중'),2500);
            })();
          }
        }
      }catch(e){ console.error('[ws.onmessage] 처리 오류:', e, '\n원본:', data); }
    };

    ws.onclose=ws.onerror=()=>{
      ws=null;
      setBadge(false,'🔴 탐색기 연동 대기중');
      scheduleRetry();
    };
  }

  function scheduleRetry(){clearTimeout(retryTimer);retryTimer=setTimeout(connect,3000);}

  // 로컬(http:// 또는 file://)에서만 연결 시도 — GitHub Pages(https://)에서는 숨김
  if(location.protocol!=='https:'){
    setTimeout(connect,3000);
  } else {
    badge.style.display='none';
  }
})();
</script>

</html>
