<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 문자 인식 & 복사</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #666;
            font-size: 1.1em;
        }
        
        #fileInput {
            display: none;
        }
        
        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 20px auto;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .text-area-container {
            margin: 20px 0;
        }
        
        .text-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }
        
        #textArea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        #textArea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-copy {
            background: #10b981;
            color: white;
        }
        
        .btn-copy:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-copy.copied {
            background: #3b82f6;
        }
        
        .btn-reset {
            background: #ef4444;
            color: white;
        }
        
        .btn-reset:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            display: none;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status.processing {
            background: #fef3c7;
            color: #92400e;
        }
        
        .hint {
            text-align: center;
            color: #666;
            font-size: 0.85em;
            margin-top: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 이미지 문자 인식</h1>
        <p class="subtitle">이미지를 업로드하면 텍스트를 인식합니다</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">클릭하거나 이미지를 드래그하세요</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <img id="preview" alt="미리보기">
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>텍스트 인식 중...</p>
        </div>
        
        <div class="text-area-container">
            <label class="text-label">인식된 텍스트</label>
            <textarea id="textArea" placeholder="인식된 텍스트가 여기에 표시됩니다..."></textarea>
        </div>
        
        <div class="button-container">
            <button class="btn-copy" id="copyBtn">
                <span>📋</span>
                <span id="copyText">복사하기</span>
            </button>
            <button class="btn-reset" id="resetBtn">
                <span>🔄</span>
                <span>초기화</span>
            </button>
        </div>
        
        <div class="hint">💡 텍스트 영역에서 <kbd>Enter</kbd> 키를 눌러도 복사됩니다</div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const textArea = document.getElementById('textArea');
        const copyBtn = document.getElementById('copyBtn');
        const copyText = document.getElementById('copyText');
        const resetBtn = document.getElementById('resetBtn');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');

        // 클릭으로 파일 선택
        uploadArea.addEventListener('click', () => fileInput.click());

        // 파일 선택 처리
        fileInput.addEventListener('change', handleFile);

        // 드래그 앤 드롭
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFileObject(file);
            }
        });

        function handleFile(e) {
            const file = e.target.files[0];
            if (file) {
                handleFileObject(file);
            }
        }

        async function handleFileObject(file) {
            // 미리보기 표시
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // OCR 실행
            await recognizeText(file);
        }

        async function recognizeText(file) {
            loading.style.display = 'block';
            textArea.value = '';
            showStatus('텍스트 인식 중...', 'processing');

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64Data = e.target.result.split(',')[1];
                    
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 1000,
                            messages: [
                                {
                                    role: "user",
                                    content: [
                                        {
                                            type: "image",
                                            source: {
                                                type: "base64",
                                                media_type: file.type,
                                                data: base64Data
                                            }
                                        },
                                        {
                                            type: "text",
                                            text: "이 이미지에 있는 모든 텍스트를 정확하게 추출해주세요. 텍스트만 출력하고 다른 설명은 필요없습니다."
                                        }
                                    ]
                                }
                            ]
                        })
                    });

                    const data = await response.json();
                    const extractedText = data.content
                        .filter(item => item.type === "text")
                        .map(item => item.text)
                        .join('\n');
                    
                    textArea.value = extractedText;
                    loading.style.display = 'none';
                    showStatus('✅ 텍스트 인식 완료!', 'success');
                };
                reader.readAsDataURL(file);
            } catch (error) {
                loading.style.display = 'none';
                showStatus('❌ 텍스트 인식 실패: ' + error.message, 'error');
            }
        }

        // 복사 기능
        copyBtn.addEventListener('click', copyToClipboard);

        function copyToClipboard() {
            const text = textArea.value.trim();
            if (!text) {
                showStatus('❌ 복사할 텍스트가 없습니다', 'error');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                copyBtn.classList.add('copied');
                copyText.textContent = '복사 완료!';
                showStatus('✅ 클립보드에 복사되었습니다!', 'success');
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyText.textContent = '복사하기';
                }, 2000);
            }).catch(err => {
                showStatus('❌ 복사 실패: ' + err.message, 'error');
            });
        }

        // Enter 키로 복사
        textArea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                copyToClipboard();
            }
        });

        // 초기화
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            preview.style.display = 'none';
            textArea.value = '';
            status.style.display = 'none';
            loading.style.display = 'none';
        });

        // 상태 표시
        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
