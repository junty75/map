<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMZ 뷰어1.1</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .btn {
      position: absolute; z-index: 1000;
      background: white; border: none; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; width: 48px; height: 48px;
    }
    #loadBtn { top: 16px; right: 16px; }
    #myLocationBtn { top: 72px; right: 16px; padding: 0; transition: background 0.2s; }
    #myLocationBtn.active { background: #e8f0fe; box-shadow: 0 2px 8px rgba(26,115,232,0.4); }
    #myLocationBtn svg { width: 26px; height: 26px; }
    #fileInput { display: none; }

    /* 로딩 */
    #loading {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 9999;
      flex-direction: column; gap: 12px;
      align-items: center; justify-content: center;
      color: white; font-size: 15px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 사진 모달 - 배경이 직접 탭 이벤트를 받음 */
    #photoModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 8000;
    }
    #photoModal.show { display: block; }
    #modalCloseBtn {
      position: absolute; top: 12px; right: 12px;
      background: rgba(255,255,255,0.2); border: none;
      color: white; font-size: 22px;
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    #modalContent {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% - 32px);
      display: flex; flex-direction: column; align-items: center;
      pointer-events: none; /* 배경 탭이 모달까지 통과 */
    }
    #modalImg {
      max-width: 100%; max-height: 75vh;
      border-radius: 8px; object-fit: contain; display: block;
      pointer-events: auto;
    }
    #modalName {
      color: white; font-size: 14px;
      margin-top: 10px; text-align: center;
    }

    /* 삭제 메뉴 */
    #deleteMenu {
      display: none; position: fixed;
      background: white; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 7000; overflow: hidden; min-width: 180px;
    }
    #deleteMenu.show { display: block; }
    .menu-title { padding: 12px 16px; font-size: 13px; color: #888; border-bottom: 1px solid #f0f0f0; }
    .menu-del { padding: 15px 16px; font-size: 16px; color: #e53935; cursor: pointer; }
    .menu-del:active { background: #fff0f0; }
    .menu-cancel { padding: 15px 16px; font-size: 16px; color: #333; border-top: 1px solid #f0f0f0; cursor: pointer; }
    .menu-cancel:active { background: #f5f5f5; }
  </style>
</head>
<body>

<div id="map"></div>

<button class="btn" id="loadBtn">📂</button>
<button class="btn" id="myLocationBtn">
  <svg viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="4" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="12" cy="12" r="8" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<input type="file" id="fileInput" accept=".kmz">

<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">불러오는 중...</div>
</div>

<!-- 사진 모달: 배경(#photoModal)을 직접 터치하면 닫힘 -->
<div id="photoModal">
  <button id="modalCloseBtn">✕</button>
  <div id="modalContent">
    <img id="modalImg" src="" alt="">
    <div id="modalName"></div>
  </div>
</div>

<!-- 마커 삭제 메뉴 -->
<div id="deleteMenu">
  <div class="menu-title" id="deleteMenuTitle"></div>
  <div class="menu-del" id="deleteConfirm">🗑 마커 삭제</div>
  <div class="menu-cancel" id="deleteCancel">취소</div>
</div>

<script>
let map, markers = [], polylines = [];
let trackingOn = false, watchId = null, locationMarker = null;
let pendingDelete = null;

// ── 지도 초기화 ───────────────────────────────────
function initMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center, level: 5, mapTypeId: kakao.maps.MapTypeId.HYBRID
  });
}
window.onload = () => {
  navigator.geolocation.getCurrentPosition(
    p => initMap(new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude)),
    () => initMap(new kakao.maps.LatLng(37.5665, 126.9780))
  );
};

// ── 사진 모달 ─────────────────────────────────────
function showPhoto(src, name) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modalName').textContent = name;
  document.getElementById('photoModal').classList.add('show');
}
function closeModal() {
  document.getElementById('photoModal').classList.remove('show');
}

// 모달 배경 터치/클릭 → 닫기 (#photoModal 자체만 감지)
const photoModal = document.getElementById('photoModal');
photoModal.addEventListener('touchend', e => {
  if (e.target === photoModal) { e.preventDefault(); closeModal(); }
});
photoModal.addEventListener('click', e => {
  if (e.target === photoModal) closeModal();
});

// 닫기 버튼
const modalCloseBtn = document.getElementById('modalCloseBtn');
modalCloseBtn.addEventListener('touchend', e => { e.preventDefault(); closeModal(); });
modalCloseBtn.addEventListener('click', closeModal);

// ── 삭제 메뉴 ─────────────────────────────────────
function showDeleteMenu(markerObj, touchX, touchY) {
  pendingDelete = markerObj;
  document.getElementById('deleteMenuTitle').textContent = markerObj.name || '마커';
  const menu = document.getElementById('deleteMenu');
  const mw = 180, mh = 120;
  menu.style.left = Math.min(touchX, window.innerWidth - mw - 10) + 'px';
  menu.style.top  = Math.min(touchY, window.innerHeight - mh - 10) + 'px';
  menu.classList.add('show');
}
function closeDeleteMenu() {
  document.getElementById('deleteMenu').classList.remove('show');
  pendingDelete = null;
}
function doDelete() {
  if (!pendingDelete) return;
  pendingDelete.iw.close();
  pendingDelete.marker.setMap(null);
  markers = markers.filter(m => m !== pendingDelete);
  closeDeleteMenu();
}

document.getElementById('deleteConfirm').addEventListener('touchend', e => { e.preventDefault(); doDelete(); });
document.getElementById('deleteConfirm').addEventListener('click', doDelete);
document.getElementById('deleteCancel').addEventListener('touchend', e => { e.preventDefault(); closeDeleteMenu(); });
document.getElementById('deleteCancel').addEventListener('click', closeDeleteMenu);

// 지도 터치 시 삭제 메뉴 닫기
document.getElementById('map').addEventListener('touchstart', () => closeDeleteMenu(), { passive: true });

// ── 길게 누르기 (DOM 터치 이벤트로 직접 처리) ─────
function attachLongPress(markerObj) {
  // 카카오맵 마커의 실제 DOM 요소를 가져오는 방법이 없으므로
  // kakao 마커 이벤트 중 touchstart/touchend 사용
  let holdTimer = null;
  let touchX = 0, touchY = 0;

  kakao.maps.event.addListener(markerObj.marker, 'touchstart', e => {
    // e.point는 지도 좌표계 픽셀, 화면 좌표는 직접 추적
    holdTimer = setTimeout(() => {
      markerObj.iw.close();
      showDeleteMenu(markerObj, touchX, touchY);
    }, 600);
  });
  kakao.maps.event.addListener(markerObj.marker, 'touchend', () => clearTimeout(holdTimer));
  kakao.maps.event.addListener(markerObj.marker, 'touchmove', () => clearTimeout(holdTimer));

  // 화면 터치 좌표 추적 (touchstart 위치 저장)
  document.addEventListener('touchstart', e => {
    touchX = e.touches[0]?.clientX || 0;
    touchY = e.touches[0]?.clientY || 0;
  }, { passive: true });
}

// ── 마커 추가 ─────────────────────────────────────
function addMarker(latlng, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });
  const div = document.createElement('div');
  div.style.cssText = 'background:white;padding:6px 10px;border-radius:6px;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.3);display:flex;align-items:center;gap:8px;white-space:nowrap;';
  div.innerHTML = `<span>${name}</span><span class="xbtn" style="color:#bbb;font-size:18px;cursor:pointer;">✕</span>`;
  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });

  const xbtn = div.querySelector('.xbtn');
  xbtn.addEventListener('touchend', e => { e.preventDefault(); iw.close(); });
  xbtn.addEventListener('click', () => iw.close());

  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));

  const markerObj = { marker, iw, name };
  attachLongPress(markerObj);
  markers.push(markerObj);
}

// ── 사진 마커 추가 ────────────────────────────────
function addPhotoMarker(latlng, imgSrc, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });
  const div = document.createElement('div');
  div.style.cssText = 'background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.3);width:220px;';
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;font-size:13px;font-weight:bold;border-bottom:1px solid #eee;">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px;">${name}</span>
      <span class="xbtn" style="color:#bbb;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 2px;">✕</span>
    </div>
    <img class="thumb" src="${imgSrc}" style="width:100%;height:160px;object-fit:cover;display:block;">
  `;
  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });

  div.querySelector('.xbtn').addEventListener('touchend', e => { e.preventDefault(); iw.close(); });
  div.querySelector('.xbtn').addEventListener('click', () => iw.close());

  const thumb = div.querySelector('.thumb');
  thumb.addEventListener('touchend', e => { e.preventDefault(); showPhoto(imgSrc, name); });
  thumb.addEventListener('click', () => showPhoto(imgSrc, name));

  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));

  const markerObj = { marker, iw, name };
  attachLongPress(markerObj);
  markers.push(markerObj);
}

// ── 내 위치 토글 ──────────────────────────────────
document.getElementById('myLocationBtn').addEventListener('click', () => {
  const btn = document.getElementById('myLocationBtn');
  if (trackingOn) {
    trackingOn = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationMarker) { locationMarker.setMap(null); locationMarker = null; }
    btn.classList.remove('active');
  } else {
    trackingOn = true;
    btn.classList.add('active');
    watchId = navigator.geolocation.watchPosition(pos => {
      const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      map.setCenter(ll);
      if (locationMarker) locationMarker.setMap(null);
      locationMarker = new kakao.maps.Marker({ map, position: ll });
    }, () => {
      alert('위치 정보를 가져올 수 없습니다.');
      trackingOn = false;
      btn.classList.remove('active');
    }, { enableHighAccuracy: true, maximumAge: 3000 });
  }
});

// ── 불러오기 ──────────────────────────────────────
document.getElementById('loadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  loadKMZ(file);
});

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '불러오는 중...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

// ── KMZ 불러오기 ──────────────────────────────────
async function loadKMZ(file) {
  showLoading('KMZ 압축 해제 중...');
  markers.forEach(m => { m.iw.close(); m.marker.setMap(null); });
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];

  try {
    const zip = await JSZip.loadAsync(file);
    const kmlFile = zip.file('doc.kml');
    if (!kmlFile) { alert('doc.kml 파일이 없습니다.'); hideLoading(); return; }

    showLoading('데이터 읽는 중...');
    const kmlText = await kmlFile.async('string');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const placemarks = Array.from(xml.getElementsByTagName('Placemark'));
    const bounds = new kakao.maps.LatLngBounds();
    const zipFiles = Object.keys(zip.files);

    for (let i = 0; i < placemarks.length; i++) {
      const pm = placemarks[i];
      const pmName = pm.getElementsByTagName('name')[0]?.textContent
                  || pm.getElementsByTagName('n')[0]?.textContent
                  || '설명 없음';

      let photoFilename = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') {
          photoFilename = d.getElementsByTagName('value')[0]?.textContent || '';
          break;
        }
      }

      const lineString = pm.getElementsByTagName('LineString')[0];
      const point = pm.getElementsByTagName('Point')[0];

      if (lineString) {
        const coordsText = lineString.getElementsByTagName('coordinates')[0]?.textContent || '';
        const pts = coordsText.trim().split(/\s+/).map(c => {
          const [lng, lat] = c.split(',').map(Number);
          return new kakao.maps.LatLng(lat, lng);
        }).filter(ll => !isNaN(ll.getLat()) && !isNaN(ll.getLng()));
        if (pts.length) {
          const poly = new kakao.maps.Polyline({ map, path: pts, strokeWeight: 4, strokeColor: '#FF5733', strokeOpacity: 0.9 });
          pts.forEach(p => bounds.extend(p));
          polylines.push(poly);
        }
      } else if (point) {
        const coordsText = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = coordsText.trim().split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) continue;
        const ll = new kakao.maps.LatLng(lat, lng);
        bounds.extend(ll);

        if (photoFilename) {
          const candidates = [`files/${photoFilename}`, photoFilename, ...zipFiles.filter(p => p.endsWith(photoFilename))];
          let photoZipFile = null;
          for (const c of candidates) { photoZipFile = zip.file(c); if (photoZipFile) break; }
          if (photoZipFile) {
            const base64 = await photoZipFile.async('base64');
            const ext = photoFilename.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' : 'image/jpeg';
            addPhotoMarker(ll, `data:${mime};base64,${base64}`, pmName);
          } else {
            addMarker(ll, pmName);
          }
        } else {
          addMarker(ll, pmName);
        }
      }

      if (i % 10 === 0) {
        showLoading(`마커 생성 중... (${i + 1} / ${placemarks.length})`);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    if (!bounds.isEmpty()) map.setBounds(bounds);
    hideLoading();
  } catch (err) {
    hideLoading();
    alert('오류가 발생했습니다.\n' + err.message);
  }
}
</script>
</body>
</html>
