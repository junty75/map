<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMZ 뷰어1.0</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .btn {
      position: absolute;
      z-index: 1000;
      background: white;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      width: 48px;
      height: 48px;
    }

    #loadBtn {
      top: 16px;
      right: 16px;
    }

    #myLocationBtn {
      top: 72px;
      right: 16px;
      padding: 0;
      transition: background 0.2s;
    }
    #myLocationBtn.active {
      background: #e8f0fe;
      box-shadow: 0 2px 8px rgba(26,115,232,0.4);
    }
    #myLocationBtn svg {
      width: 26px;
      height: 26px;
    }

    #fileInput { display: none; }

    /* 로딩 오버레이 */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-size: 15px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 사진 팝업 */
    #photoModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 8000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 16px;
    }
    #photoModal.show { display: flex; }
    #photoModal img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }
    #photoModal .photo-name {
      color: white;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    #photoModal .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div id="map"></div>

<button class="btn" id="loadBtn" title="KMZ 불러오기">📂</button>
<button class="btn" id="myLocationBtn" title="현재 위치">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="4" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="12" cy="12" r="8" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<input type="file" id="fileInput" accept=".kmz">

<!-- 로딩 -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">불러오는 중...</div>
</div>

<!-- 사진 전체화면 모달 -->
<div id="photoModal">
  <button class="close-btn" id="modalClose">✕</button>
  <img id="modalImg" src="" alt="">
  <div class="photo-name" id="modalName"></div>
</div>

<script>
let map, markers = [], polylines = [];
let trackingOn = false;
let watchId = null;
let locationMarker = null;

// 지도 초기화
function initMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center,
    level: 5,
    mapTypeId: kakao.maps.MapTypeId.HYBRID
  });
}

window.onload = () => {
  navigator.geolocation.getCurrentPosition(
    pos => initMap(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude)),
    () => initMap(new kakao.maps.LatLng(37.5665, 126.9780))
  );
};

// 내 위치 버튼 - 토글
document.getElementById('myLocationBtn').onclick = () => {
  if (trackingOn) {
    // 끄기
    trackingOn = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationMarker) { locationMarker.setMap(null); locationMarker = null; }
    document.getElementById('myLocationBtn').classList.remove('active');
  } else {
    // 켜기
    trackingOn = true;
    document.getElementById('myLocationBtn').classList.add('active');

    watchId = navigator.geolocation.watchPosition(pos => {
      const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      map.setCenter(ll);
      if (locationMarker) locationMarker.setMap(null);
      locationMarker = new kakao.maps.Marker({
        map,
        position: ll,
        image: new kakao.maps.MarkerImage(
          'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
          new kakao.maps.Size(24, 35)
        )
      });
    }, () => {
      alert('위치 정보를 가져올 수 없습니다.');
      trackingOn = false;
      document.getElementById('myLocationBtn').classList.remove('active');
    }, { enableHighAccuracy: true, maximumAge: 3000 });
  }
};

// 불러오기 버튼
document.getElementById('loadBtn').onclick = () => {
  document.getElementById('fileInput').click();
};

document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  loadKMZ(file);
};

// 사진 모달 닫기 - 배경(모달 자체) 또는 닫기 버튼 클릭
function closeModal() {
  document.getElementById('photoModal').classList.remove('show');
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('photoModal').addEventListener('click', e => {
  // 이미지나 이름 텍스트가 아닌 배경 클릭 시 닫기
  if (e.target === document.getElementById('photoModal') ||
      e.target === document.getElementById('modalName')) {
    closeModal();
  }
});

function showPhoto(src, name) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modalName').textContent = name;
  document.getElementById('photoModal').classList.add('show');
}

function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '불러오는 중...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// 마커 추가 (텍스트 전용)
function addMarker(latlng, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });
  const div = document.createElement('div');
  div.style = 'background:white; padding:6px 10px; border-radius:6px; font-size:13px; box-shadow:0 1px 4px rgba(0,0,0,0.3); display:flex; align-items:center; gap:6px;';
  div.innerHTML = `<span>${name}</span><span style="cursor:pointer; color:#999;">✕</span>`;
  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });
  div.querySelector('span:last-child').onclick = () => iw.close();
  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));
  markers.push({ marker, iw });
}

// 사진 마커 추가
function addPhotoMarker(latlng, imgSrc, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });

  const div = document.createElement('div');
  div.style = 'background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.3); max-width:260px;';
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 10px; font-size:13px; font-weight:bold; border-bottom:1px solid #eee;">
      <span>${name}</span>
      <span class="cl" style="cursor:pointer; color:#999; margin-left:8px;">✕</span>
    </div>
    <img src="${imgSrc}" style="width:100%; max-height:200px; object-fit:cover; display:block; cursor:pointer;">
  `;

  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });
  div.querySelector('.cl').onclick = () => iw.close();
  div.querySelector('img').onclick = () => showPhoto(imgSrc, name);

  kakao.maps.event.addListener(marker, 'click', () => iw.open(map, marker));
  markers.push({ marker, iw });
}

// KMZ 불러오기
async function loadKMZ(file) {
  showLoading('KMZ 압축 해제 중...');

  // 기존 마커/선 초기화
  markers.forEach(m => { m.iw.close(); m.marker.setMap(null); });
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];

  try {
    const zip = await JSZip.loadAsync(file);
    const kmlFile = zip.file('doc.kml');
    if (!kmlFile) { alert('KMZ 안에 doc.kml 파일이 없습니다.'); hideLoading(); return; }

    showLoading('지도 데이터 읽는 중...');
    const kmlText = await kmlFile.async('string');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const placemarks = Array.from(xml.getElementsByTagName('Placemark'));
    const bounds = new kakao.maps.LatLngBounds();
    const zipFiles = Object.keys(zip.files);

    showLoading(`마커 생성 중... (0 / ${placemarks.length})`);

    for (let i = 0; i < placemarks.length; i++) {
      const pm = placemarks[i];
      const pmName = pm.getElementsByTagName('name')[0]?.textContent
                  || pm.getElementsByTagName('n')[0]?.textContent
                  || '설명 없음';

      // photoFile 탐색
      let photoFilename = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') {
          photoFilename = d.getElementsByTagName('value')[0]?.textContent || '';
          break;
        }
      }

      const lineString = pm.getElementsByTagName('LineString')[0];
      const point = pm.getElementsByTagName('Point')[0];

      if (lineString) {
        const coordsText = lineString.getElementsByTagName('coordinates')[0]?.textContent || '';
        const pts = coordsText.trim().split(/\s+/).map(c => {
          const [lng, lat] = c.split(',').map(Number);
          return new kakao.maps.LatLng(lat, lng);
        }).filter(ll => !isNaN(ll.getLat()) && !isNaN(ll.getLng()));
        if (pts.length) {
          const poly = new kakao.maps.Polyline({
            map, path: pts,
            strokeWeight: 4,
            strokeColor: '#FF5733',
            strokeOpacity: 0.9
          });
          pts.forEach(p => bounds.extend(p));
          polylines.push(poly);
        }
      } else if (point) {
        const coordsText = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = coordsText.trim().split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) continue;
        const ll = new kakao.maps.LatLng(lat, lng);
        bounds.extend(ll);

        if (photoFilename) {
          const candidates = [
            `files/${photoFilename}`,
            photoFilename,
            ...zipFiles.filter(p => p.endsWith(photoFilename))
          ];
          let photoZipFile = null;
          for (const c of candidates) {
            photoZipFile = zip.file(c);
            if (photoZipFile) break;
          }

          if (photoZipFile) {
            const base64 = await photoZipFile.async('base64');
            const ext = photoFilename.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' : 'image/jpeg';
            addPhotoMarker(ll, `data:${mime};base64,${base64}`, pmName);
          } else {
            addMarker(ll, pmName);
          }
        } else {
          addMarker(ll, pmName);
        }
      }

      if (i % 10 === 0) {
        showLoading(`마커 생성 중... (${i + 1} / ${placemarks.length})`);
        await new Promise(r => setTimeout(r, 0)); // UI 업데이트
      }
    }

    if (!bounds.isEmpty()) map.setBounds(bounds);
    hideLoading();

  } catch (err) {
    hideLoading();
    alert('KMZ 파일을 읽는 중 오류가 발생했습니다.\n' + err.message);
  }
}
</script>
</body>
</html>
