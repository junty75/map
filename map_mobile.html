<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KMZ 뷰어</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&autoload=false"></script>  
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    .btn {
      position: absolute;
      z-index: 1000;
      background: white;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      width: 48px;
      height: 48px;
    }

    /* 저장 버튼 - 열기 버튼 왼쪽 */
    #saveBtn {
      top: 16px;
      right: 72px;
    }
    #saveBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #loadBtn {
      top: 16px;
      right: 16px;
    }

    #myLocationBtn {
      top: 72px;
      right: 16px;
      padding: 0;
      transition: background 0.2s;
    }
    #myLocationBtn.active {
      background: #e8f0fe;
      box-shadow: 0 2px 8px rgba(26,115,232,0.4);
    }
    #myLocationBtn svg {
      width: 26px;
      height: 26px;
    }

    #fileInput { display: none; }

    /* 로딩 오버레이 */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: white;
      font-size: 15px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 삭제 토스트 힌트 */
    #deleteHint {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 20px;
      z-index: 5000;
      pointer-events: none;
      white-space: nowrap;
    }
    #deleteHint.show { display: block; }

    /* 길게누르기 진행 원 */
    .long-press-ring {
      position: fixed;
      width: 52px;
      height: 52px;
      margin-left: -26px;
      margin-top: -26px;
      border-radius: 50%;
      border: 3px solid #e74c3c;
      z-index: 4000;
      pointer-events: none;
      transform: scale(0);
      transition: transform 0.6s ease-out, opacity 0.2s;
      opacity: 0;
    }
    .long-press-ring.active {
      transform: scale(1);
      opacity: 1;
    }

    /* 사진 InfoWindow */
    .photo-iw {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      max-width: 300px;
    }
    .photo-iw-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      gap: 6px;
    }
    .photo-iw-header .iw-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .photo-iw-header .iw-map-btn {
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      line-height: 1;
    }
    .photo-iw-header .iw-close {
      cursor: pointer;
      color: #999;
      font-size: 14px;
      line-height: 1;
    }
    .photo-iw img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
    }

    /* 전체화면 사진 뷰어 (지도 위 오버레이가 아닌 별도 레이어) */
    #photoViewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 8000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 16px;
    }
    #photoViewer.show { display: flex; }
    #photoViewer img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 8px;
      object-fit: contain;
    }
    #photoViewer .pv-name {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-top: 10px;
    }
    /* 전체화면 뷰어는 배경 탭/클릭으로 닫힘 — 별도 닫기 버튼 없음 */
  </style>
</head>
<body>

<div id="map"></div>

<!-- ✅ 저장 버튼 (열기 버튼 왼쪽) -->
<button class="btn" id="saveBtn" title="현재 지도 HTML로 저장" disabled>💾</button>
<button class="btn" id="loadBtn" title="KMZ 불러오기">📂</button>
<button class="btn" id="myLocationBtn" title="현재 위치">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="4" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="12" cy="12" r="8" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<input type="file" id="fileInput" accept=".kmz">

<!-- 로딩 -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">불러오는 중...</div>
</div>

<!-- 삭제 힌트 토스트 -->
<div id="deleteHint">꾹 눌러서 마커 / 선을 삭제할 수 있어요</div>

<!-- 길게누르기 시각 효과 -->
<div class="long-press-ring" id="longPressRing"></div>

<!-- 사진 전체화면 뷰어 (배경 탭으로 닫기) -->
<div id="photoViewer">
  <img id="viewerImg" src="" alt="">
  <div class="pv-name" id="viewerName"></div>
</div>

<script>
let map, markers = [], polylines = [];
let trackingOn = false;
let watchId = null;
let locationMarker = null;
let hasData = false;
let suppressMapClick = false; // 마커 클릭 후 map click 이벤트 억제용

// ─── 지도 초기화 ───────────────────────────────────────────
function initMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center,
    level: 5,
    mapTypeId: kakao.maps.MapTypeId.HYBRID
  });

  // 지도 클릭 시 모든 InfoWindow 닫기
  // suppressMapClick: 마커 클릭 직후 map click 이벤트가 연달아 오는 것을 막음
  kakao.maps.event.addListener(map, 'click', () => {
    if (suppressMapClick) { suppressMapClick = false; return; }
    markers.forEach(m => m.iw.close());
  });
}

kakao.maps.load(() => {
  // 1. 위치 권한과 상관없이, 현재 내 위치든 아니든 지도를 일단 무조건 먼저 생성합니다.
  // (내 현재 위치를 알 수 있다면 그 위치를, 아니면 임의의 좌표로 시작)
  initMap(new kakao.maps.LatLng(37.5665, 126.9780)); 

  // 2. 그 다음, 내 위치를 비동기적으로 가져와서 이동시킵니다.
  navigator.geolocation.getCurrentPosition(
    pos => {
      const myLatlng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      map.setCenter(myLatlng); // 지도를 내 위치로 이동
      
      // 내 위치에 마커 표시 (선택사항)
      if (locationMarker) locationMarker.setMap(null);
      locationMarker = new kakao.maps.Marker({
        map,
        position: myLatlng,
        image: new kakao.maps.MarkerImage(
          'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
          new kakao.maps.Size(24, 35)
        )
      });
    },
    err => {
      console.log("위치 정보를 가져올 수 없습니다. 기본 위치로 유지합니다.");
    }, 
    { enableHighAccuracy: true, timeout: 5000 } // 5초 안에 안 잡히면 포기하도록 설정
  );
});

// ─── 전체화면 사진 뷰어 (배경 탭/클릭으로 닫기) ───────────
const photoViewer = document.getElementById('photoViewer');
photoViewer.addEventListener('click', e => {
  // 이미지나 이름 텍스트가 아닌 배경 클릭 시 닫기
  if (e.target === photoViewer || e.target === document.getElementById('viewerName')) {
    photoViewer.classList.remove('show');
  }
});

function openViewer(src, name) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewerName').textContent = name;
  photoViewer.classList.add('show');
}

// ─── 내 위치 토글 ──────────────────────────────────────────
document.getElementById('myLocationBtn').onclick = () => {
  if (trackingOn) {
    trackingOn = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationMarker) { locationMarker.setMap(null); locationMarker = null; }
    document.getElementById('myLocationBtn').classList.remove('active');
  } else {
    trackingOn = true;
    document.getElementById('myLocationBtn').classList.add('active');
    watchId = navigator.geolocation.watchPosition(pos => {
      const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
      map.setCenter(ll);
      if (locationMarker) locationMarker.setMap(null);
      locationMarker = new kakao.maps.Marker({
        map,
        position: ll,
        image: new kakao.maps.MarkerImage(
          'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
          new kakao.maps.Size(24, 35)
        )
      });
    }, () => {
      alert('위치 정보를 가져올 수 없습니다.');
      trackingOn = false;
      document.getElementById('myLocationBtn').classList.remove('active');
    }, { enableHighAccuracy: true, maximumAge: 3000 });
  }
};

// ─── 불러오기 버튼 ─────────────────────────────────────────
document.getElementById('loadBtn').onclick = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  loadKMZ(file);
};

// ─── 저장 버튼 → KMZ 내보내기 ────────────────────────────
document.getElementById('saveBtn').onclick = () => exportKMZ();

async function exportKMZ() {
  showLoading('KMZ 저장 중...');
  try {
    const zip = new JSZip();
    const filesFolder = zip.folder('files');
    let placemarkXml = '';
    let photoIndex = 0;

    // 마커 (텍스트 / 사진)
    for (const m of markers) {
      if (!m.marker.getMap()) continue; // 삭제된 마커 제외
      const pos = m.marker.getPosition();
      const lat = pos.getLat();
      const lng = pos.getLng();
      const safeName = (m.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      if (m.imgSrc) {
        // 사진 마커: base64 → 파일로 저장
        const base64Data = m.imgSrc.split(',')[1];
        const ext = m.imgSrc.startsWith('data:image/png') ? 'png' : 'jpg';
        const filename = `photo_${String(photoIndex++).padStart(4,'0')}.${ext}`;
        filesFolder.file(filename, base64Data, { base64: true });

        placemarkXml += `
  <Placemark>
    <name>${safeName}</name>
    <ExtendedData>
      <Data name="photoFile"><value>${filename}</value></Data>
    </ExtendedData>
    <Point><coordinates>${lng},${lat},0</coordinates></Point>
  </Placemark>`;
      } else {
        // 텍스트 마커
        placemarkXml += `
  <Placemark>
    <name>${safeName}</name>
    <Point><coordinates>${lng},${lat},0</coordinates></Point>
  </Placemark>`;
      }
    }

    // 폴리라인
    for (const pl of polylines) {
      if (!pl.poly.getMap()) continue; // 삭제된 선 제외
      const safeName = (pl.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const coords = pl.path.map(p => `${p.getLng()},${p.getLat()},0`).join('\n      ');
      placemarkXml += `
  <Placemark>
    <name>${safeName}</name>
    <LineString>
      <coordinates>${coords}</coordinates>
    </LineString>
  </Placemark>`;
    }

    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>${placemarkXml}
</Document>
</kml>`;

    zip.file('doc.kml', kml);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const url = URL.createObjectURL(blob);

    // iOS Safari는 a.click() blob 다운로드 미지원 → window.open으로 우회
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS) {
      // iOS: 새 탭에서 열기 (사용자가 길게 눌러 저장)
      const newTab = window.open(url, '_blank');
      if (!newTab) {
        // 팝업 차단된 경우 링크로 안내
        alert('파일이 준비됐습니다.\n아래 링크를 길게 눌러 저장하세요.');
        window.location.href = url;
      }
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    } else {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'map_export.kmz';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    hideLoading();
  } catch (err) {
    hideLoading();
    alert('KMZ 저장 중 오류가 발생했습니다.\n' + err.message);
  }
}

// ─── 로딩 ──────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || '불러오는 중...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// ─── 길게 누르기 유틸 ──────────────────────────────────────
// 마커/폴리라인에 모바일(touchstart) + 데스크탑(mousedown) 길게 누르기 삭제 기능 부착
const LONG_PRESS_MS = 600;

function attachLongPress(target, onLongPress) {
  let timer = null;
  let startX, startY;
  const ring = document.getElementById('longPressRing');

  function start(x, y) {
    startX = x; startY = y;
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    ring.classList.add('active');
    timer = setTimeout(() => {
      ring.classList.remove('active');
      onLongPress();
    }, LONG_PRESS_MS);
  }

  function cancel() {
    clearTimeout(timer);
    timer = null;
    ring.classList.remove('active');
  }

  // Touch
  kakao.maps.event.addListener(target, 'touchstart', e => {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    start(t.clientX, t.clientY);
  });
  kakao.maps.event.addListener(target, 'touchend', cancel);
  kakao.maps.event.addListener(target, 'touchmove', e => {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    if (Math.abs(t.clientX - startX) > 8 || Math.abs(t.clientY - startY) > 8) cancel();
  });

  // Mouse (desktop)
  kakao.maps.event.addListener(target, 'mousedown', e => {
    // 카카오맵 이벤트 객체는 button 프로퍼티가 없을 수 있으므로 옵셔널 체크
    if (e && e.button != null && e.button !== 0) return;
    try {
      const point = map.getProjection().pointFromCoords(
        target.getPosition ? target.getPosition() : target.getPath()[0]
      );
      start(point.x, point.y);
    } catch (_) {}
  });
  kakao.maps.event.addListener(target, 'mouseup', cancel);
}

// ─── 삭제 힌트 토스트 ──────────────────────────────────────
let hintShown = false;
function showDeleteHint() {
  if (hintShown) return;
  hintShown = true;
  const el = document.getElementById('deleteHint');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── 마커 추가 (텍스트 전용) ───────────────────────────────
function addMarker(latlng, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });

  const div = document.createElement('div');
  div.style = 'background:white; padding:6px 10px; border-radius:6px; font-size:13px; box-shadow:0 1px 4px rgba(0,0,0,0.3); display:flex; align-items:center; gap:6px;';
  div.innerHTML = `<span>${name}</span><span style="cursor:pointer; color:#999;">✕</span>`;
  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });
  div.querySelector('span:last-child').onclick = () => iw.close();
  kakao.maps.event.addListener(marker, 'click', () => {
    suppressMapClick = true;
    iw.open(map, marker);
  });

  // ✅ 길게 누르면 마커 삭제
  attachLongPress(marker, () => {
    if (!confirm(`"${name}" 마커를 삭제할까요?`)) return;
    iw.close();
    marker.setMap(null);
    markers = markers.filter(m => m.marker !== marker);
  });

  markers.push({ marker, iw, name, imgSrc: null });
  showDeleteHint();
}

// ─── 사진 마커 추가 ────────────────────────────────────────
function addPhotoMarker(latlng, imgSrc, name) {
  const marker = new kakao.maps.Marker({ map, position: latlng });

  const lat = latlng.getLat();
  const lng = latlng.getLng();
  // 카카오맵 앱 딥링크 (앱 설치 시 앱으로, 미설치 시 웹으로 폴백)
  const kakaoAppUrl = `kakaomap://look?p=${lat},${lng}`;
  const kakaoWebUrl = `https://map.kakao.com/link/map/${encodeURIComponent(name)},${lat},${lng}`;

  const div = document.createElement('div');
  div.className = 'photo-iw';
  div.innerHTML = `
    <div class="photo-iw-header">
      <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${name}</span>
      <div class="iw-actions">
        <span class="iw-map-btn" title="카카오맵에서 열기">🗺️</span>
        <span class="iw-close" title="닫기">✕</span>
      </div>
    </div>
    <img src="${imgSrc}" title="탭하면 크게 보기">
  `;

  const iw = new kakao.maps.InfoWindow({ content: div, removable: false });

  div.querySelector('.iw-close').onclick = () => iw.close();
div.querySelector('.iw-map-btn').onclick = () => {
  const kakaoAppUrl = `kakaomap://look?p=${lat},${lng}`;
  
  // 앱 실행 시도
  window.location.href = kakaoAppUrl;

  // 1.5초 후 앱이 실행되지 않았다고 판단되면 웹으로 이동
  setTimeout(() => {
    if (!document.hidden) {
      // 기존처럼 새 탭을 열거나, 혹은 현재 탭에서 이동하려면 window.location.href 사용
      window.open(kakaoWebUrl, '_blank');
    }
  }, 1500);
};

  // 사진 탭 → 전체화면 뷰어 (배경 탭으로 닫기)
  div.querySelector('img').onclick = () => openViewer(imgSrc, name);

  kakao.maps.event.addListener(marker, 'click', () => {
    suppressMapClick = true;
    iw.open(map, marker);
  });

  // ✅ 길게 누르면 마커 삭제
  attachLongPress(marker, () => {
    if (!confirm(`"${name}" 마커를 삭제할까요?`)) return;
    iw.close();
    marker.setMap(null);
    markers = markers.filter(m => m.marker !== marker);
  });

  markers.push({ marker, iw, name, imgSrc });
  showDeleteHint();
}

// ─── KMZ 불러오기 ──────────────────────────────────────────
async function loadKMZ(file) {
  showLoading('KMZ 압축 해제 중...');

  // 기존 마커/선 초기화
  markers.forEach(m => { m.iw.close(); m.marker.setMap(null); });
  markers = [];
  polylines.forEach(p => p.poly.setMap(null));
  polylines = [];
  hasData = false;
  document.getElementById('saveBtn').disabled = true;

  try {
    const zip = await JSZip.loadAsync(file);
    const kmlFile = zip.file('doc.kml');
    if (!kmlFile) { alert('KMZ 안에 doc.kml 파일이 없습니다.'); hideLoading(); return; }

    showLoading('지도 데이터 읽는 중...');
    const kmlText = await kmlFile.async('string');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const placemarks = Array.from(xml.getElementsByTagName('Placemark'));
    const bounds = new kakao.maps.LatLngBounds();
    const zipFiles = Object.keys(zip.files);

    showLoading(`마커 생성 중... (0 / ${placemarks.length})`);

    for (let i = 0; i < placemarks.length; i++) {
      const pm = placemarks[i];
      const pmName = pm.getElementsByTagName('name')[0]?.textContent
                  || pm.getElementsByTagName('n')[0]?.textContent
                  || '설명 없음';

      // photoFile 탐색
      let photoFilename = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') {
          photoFilename = d.getElementsByTagName('value')[0]?.textContent || '';
          break;
        }
      }

      const lineString = pm.getElementsByTagName('LineString')[0];
      const point = pm.getElementsByTagName('Point')[0];

      if (lineString) {
        const coordsText = lineString.getElementsByTagName('coordinates')[0]?.textContent || '';
        const pts = coordsText.trim().split(/\s+/).map(c => {
          const [lng, lat] = c.split(',').map(Number);
          return new kakao.maps.LatLng(lat, lng);
        }).filter(ll => !isNaN(ll.getLat()) && !isNaN(ll.getLng()));

        if (pts.length) {
          const poly = new kakao.maps.Polyline({
            map, path: pts,
            strokeWeight: 4,
            strokeColor: '#FF5733',
            strokeOpacity: 0.9
          });
          pts.forEach(p => bounds.extend(p));

          // ✅ 폴리라인 길게 누르면 삭제
          const polyName = pmName;
          attachLongPress(poly, () => {
            if (!confirm(`"${polyName}" 선을 삭제할까요?`)) return;
            poly.setMap(null);
            polylines = polylines.filter(p => p.poly !== poly);
          });

          polylines.push({ poly, name: pmName, path: pts });
        }
      } else if (point) {
        const coordsText = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = coordsText.trim().split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) continue;
        const ll = new kakao.maps.LatLng(lat, lng);
        bounds.extend(ll);

        if (photoFilename) {
          const candidates = [
            `files/${photoFilename}`,
            photoFilename,
            ...zipFiles.filter(p => p.endsWith(photoFilename))
          ];
          let photoZipFile = null;
          for (const c of candidates) {
            photoZipFile = zip.file(c);
            if (photoZipFile) break;
          }

          if (photoZipFile) {
            const base64 = await photoZipFile.async('base64');
            const ext = photoFilename.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' : 'image/jpeg';
            addPhotoMarker(ll, `data:${mime};base64,${base64}`, pmName);
          } else {
            addMarker(ll, pmName);
          }
        } else {
          addMarker(ll, pmName);
        }
      }

      if (i % 10 === 0) {
        showLoading(`마커 생성 중... (${i + 1} / ${placemarks.length})`);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    if (!bounds.isEmpty()) map.setBounds(bounds);

    // ✅ 데이터 로드 완료 → 저장 버튼 활성화
    hasData = true;
    document.getElementById('saveBtn').disabled = false;

    hideLoading();

  } catch (err) {
    hideLoading();
    alert('KMZ 파일을 읽는 중 오류가 발생했습니다.\n' + err.message);
  }
}
</script>
</body>
</html>
